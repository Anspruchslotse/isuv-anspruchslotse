function UmgangsantragFormular({ ext, onSaveErgebnis }) {
  var u = rStyles;
  var [daten, setDaten] = React.useState({
    antragsteller_name: ext ? "" : "",
    antragsteller_anschrift: "",
    antragsgegner_name: "",
    antragsgegner_anschrift: "",
    kind_name: ext && ext.kinder && ext.kinder[0] ? ext.kinder[0].name || "" : "",
    kind_geburt: ext && ext.kinder && ext.kinder[0] ? ext.kinder[0].geburt || "" : "",
    aktuelles_modell: "",
    gewuenschter_umgang: "",
    umgang_wochenende: "",
    umgang_ferien: "",
    umgang_feiertage: "",
    bisherige_vereinbarung: "",
    konflikte: "",
    kindeswohl_hinweis: "",
    ort: "",
    datum: new Date().toLocaleDateString("de-DE"),
    gericht: "", gericht_abteilung: "", gericht_strasse: "", gericht_plz: "", gericht_ort: ""
  });
  var set = function(f,v){ setDaten(function(p){ return Object.assign({},p,{[f]:v}); }); };

      <input style={u.input} placeholder="Straße, PLZ Ort" value={daten.vater_anschrift} onChange={function(e){set("vater_anschrift",e.target.value);}} />

      <div style={u.modSection}>Kind</div>
      <label style={u.label}>Name</label>
      <input style={u.input} placeholder="Vorname Nachname" value={daten.kind_name} onChange={function(e){set("kind_name",e.target.value);}} />
      <label style={u.label}>Geburtsdatum</label>
      <input style={u.input} type="date" value={daten.kind_geburt} onChange={function(e){set("kind_geburt",e.target.value);}} />
      <label style={u.label}>Lebt hauptsächlich bei</label>
      <select style={u.input} value={daten.kind_wohnort} onChange={function(e){set("kind_wohnort",e.target.value);}}>
        <option value="">– wählen –</option>
        <option value="der Mutter">der Mutter</option>
        <option value="dem Vater">dem Vater</option>
        <option value="beiden Elternteilen (Wechselmodell)">beiden Elternteilen (Wechselmodell)</option>
      </select>

      <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"8px", padding:"10px 12px", marginBottom:"14px", fontSize:"11px", color:"#2e7d32" }}>
        ✅ <strong>Keine Begründungspflicht:</strong> Nach § 1626a Abs. 2 BGB (i.d.F. seit 19.05.2013) und BVerfG (1 BvR 420/09) besteht ein Anspruch auf gemeinsame Sorge ohne inhaltliche Begründung. Das Gericht überträgt die gemeinsame Sorge, sofern dies nicht dem Kindeswohl widerspricht – die Beweislast liegt beim ablehnenden Elternteil.
      </div>

      <div style={u.modSection}>Ort & Datum</div>
      <div style={{ display:"flex", gap:"8px" }}>
        <div style={{ flex:1 }}><label style={u.label}>Ort</label><input style={u.input} placeholder="München" value={daten.ort} onChange={function(e){set("ort",e.target.value);}} /></div>
        <div style={{ flex:1 }}><label style={u.label}>Datum</label><input style={u.input} value={daten.datum} onChange={function(e){set("datum",e.target.value);}} /></div>
      </div>

      <button onClick={drucken} style={{ width:"100%", padding:"12px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginTop:"16px" }}>
        🖨️ Antrag als PDF / Druckansicht
      </button>
      {gedruckt && <div style={{ backgroundColor:"#e8f5e9", borderRadius:"6px", padding:"8px 12px", marginTop:"8px", fontSize:"12px", color:"#2e7d32" }}>✅ Druckansicht geöffnet.</div>}
      <div style={{ backgroundColor:"#fff9e6", borderRadius:"8px", padding:"10px 12px", marginTop:"12px", fontSize:"11px", color:"#856404" }}>
        ⚖️ <strong>Rechtsgrundlagen:</strong> § 1626a BGB (Sorge nicht verheirateter Eltern), § 1697a BGB (Kindeswohlprinzip), BVerfG 1 BvR 420/09 vom 21.07.2010. Der Antrag erfordert <strong>keine inhaltliche Begründung</strong> – das Gericht prüft von Amts wegen, ob die gemeinsame Sorge dem Kindeswohl widerspricht.
      </div>
    </div>
  );
}

function TrennungsFragebogen({ ext, onSaveErgebnis }) {
  var u = rStyles;
  var [abschnitt, setAbschnitt] = React.useState(0);
  var [daten, setDaten] = React.useState({

    heirat_datum:"", heirat_ort:"", trennung_datum:"", scheidung_beantragt:"nein",
    trennungsjahr_abgelaufen:"nein", versorgungsausgleich_gewuenscht:"ja",
    // Kinder
    hat_kinder:"nein", kinder:[],
    kinder_betreuung:"", kinder_unterhalt_geregelt:"nein", kinder_unterhalt_betrag:"",
    // Vermögen
    gemeinsame_wohnung:"nein", wohnung_eigentuemer:"", wohnung_wert:"", wohnung_kredit:"",
    gemeinsame_konten:"nein", konten_guthaben:"",
    sonstige_vermoegenswerte:"",
    schulden:"nein", schulden_betrag:"", schulden_art:"",
    // Unterhalt
    ehegattenunterhalt_gewuenscht:"nein", unterhalt_art:"", unterhalt_dauer:"",
    trennungsunterhalt_betrag:"", nachehelicher_betrag:"",

    anwalt_beauftragt:"nein", mediation_interesse:"nein", besondere_umstaende:"",
    notizen:""
  });
  var set = function(f,v){ setDaten(function(p){ return Object.assign({},p,{[f]:v}); }); };

  var abschnitte = [
    "👥 Personen", "💍 Ehe & Trennung", "👶 Kinder", "🏠 Vermögen & Schulden", "💰 Unterhalt", "📝 Abschluss"
  ];

  var [gedruckt, setGedruckt] = React.useState(false);

  var drucken = function() {
    var html = "<html><head><meta charset='UTF-8'><style>body{font-family:Arial,sans-serif;font-size:12px;margin:40px;color:#111;line-height:1.6}"
      + "h1{font-size:16px;text-align:center;margin-bottom:4px}h2{font-size:13px;color:#003366;border-bottom:1px solid #003366;margin-top:20px}"

      + "table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#003366;color:#fff;padding:6px;font-size:11px;text-align:left}"
      + "td{padding:6px;border-bottom:1px solid #eee;font-size:11px}.sect{background:#e8f0fb;padding:3px 8px;font-size:10px;font-weight:bold;color:#003366;text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 6px}"
      + "</style></head><body>"
      + "<h1>Trennungs-/Scheidungsfragebogen</h1>"
      + "<p style='text-align:center;font-size:11px;color:#666'>Vertraulich – nur für Beratungszwecke</p>"
      + "<div class='sect'>Angaben zu den Personen</div>"
      + "<table><tr><th>Feld</th><th>Person 1 (Antragsteller/in)</th><th>Person 2 (Ehepartner/in)</th></tr>"
      + "<tr><td>Name</td><td>"+(daten.p1_name||"–")+"</td><td>"+(daten.p2_name||"–")+"</td></tr>"
      + "<tr><td>Geburtsdatum</td><td>"+(daten.p1_geburt||"–")+"</td><td>"+(daten.p2_geburt||"–")+"</td></tr>"
      + "<tr><td>Anschrift</td><td>"+(daten.p1_anschrift||"–")+"</td><td>"+(daten.p2_anschrift||"–")+"</td></tr>"
      + "<tr><td>Beruf</td><td>"+(daten.p1_beruf||"–")+"</td><td>"+(daten.p2_beruf||"–")+"</td></tr>"
      + "<tr><td>Nettoeinkommen</td><td>"+(daten.p1_einkommen ? daten.p1_einkommen+" €" :"–")+"</td><td>"+(daten.p2_einkommen ? daten.p2_einkommen+" €":"–")+"</td></tr>"
      + "</table>"
      + "<div class='sect'>Ehe & Trennung</div>"
      + "<div class='row'><span class='label'>Heiratsdatum:</span><span class='val'>"+(daten.heirat_datum||"–")+"</span></div>"
      + "<div class='row'><span class='label'>Heiratsort:</span><span class='val'>"+(daten.heirat_ort||"–")+"</span></div>"
      + "<div class='row'><span class='label'>Trennungsdatum:</span><span class='val'>"+(daten.trennung_datum||"–")+"</span></div>"
      + "<div class='row'><span class='label'>Trennungsjahr abgelaufen:</span><span class='val'>"+(daten.trennungsjahr_abgelaufen==="ja"?"Ja":"Nein")+"</span></div>"
      + "<div class='row'><span class='label'>Scheidung beantragt:</span><span class='val'>"+(daten.scheidung_beantragt==="ja"?"Ja":"Nein")+"</span></div>"
      + "<div class='row'><span class='label'>Versorgungsausgleich gewünscht:</span><span class='val'>"+(daten.versorgungsausgleich_gewuenscht==="ja"?"Ja":"Nein")+"</span></div>"
      + (daten.hat_kinder==="ja" ? "<div class='sect'>Kinder</div>"
        + "<div class='row'><span class='label'>Betreuungsmodell:</span><span class='val'>"+(daten.kinder_betreuung||"–")+"</span></div>"
        + "<div class='row'><span class='label'>Kindesunterhalt geregelt:</span><span class='val'>"+(daten.kinder_unterhalt_geregelt==="ja"?"Ja, "+daten.kinder_unterhalt_betrag+" €/Monat":"Nein")+"</span></div>"
        : "<div class='sect'>Kinder</div><p>Keine gemeinsamen Kinder.</p>")
      + "<div class='sect'>Vermögen & Schulden</div>"
      + "<div class='row'><span class='label'>Gemeinsame Wohnung / Immobilie:</span><span class='val'>"+(daten.gemeinsame_wohnung==="ja"?"Ja, Wert: "+(daten.wohnung_wert||"?")+", Eigentümer: "+(daten.wohnung_eigentuemer||"?")+(daten.wohnung_kredit?" (Kredit: "+daten.wohnung_kredit+"€)":""):"Nein")+"</span></div>"
      + "<div class='row'><span class='label'>Gemeinsame Konten:</span><span class='val'>"+(daten.gemeinsame_konten==="ja"?"Ja, Guthaben: "+(daten.konten_guthaben||"?"):"Nein")+"</span></div>"
      + (daten.sonstige_vermoegenswerte ? "<div class='row'><span class='label'>Sonstige Vermögenswerte:</span><span class='val'>"+daten.sonstige_vermoegenswerte+"</span></div>" : "")
      + "<div class='row'><span class='label'>Gemeinsame Schulden:</span><span class='val'>"+(daten.schulden==="ja"?"Ja, "+daten.schulden_betrag+" € ("+daten.schulden_art+")":"Nein")+"</span></div>"
      + "<div class='sect'>Unterhalt</div>"
      + "<div class='row'><span class='label'>Ehegattenunterhalt:</span><span class='val'>"+(daten.ehegattenunterhalt_gewuenscht==="ja"?"Ja, "+(daten.unterhalt_art||"Art offen"):(daten.ehegattenunterhalt_gewuenscht==="nein"?"Nicht gewünscht":"Noch unklar"))+"</span></div>"
      + (daten.trennungsunterhalt_betrag ? "<div class='row'><span class='label'>Trennungsunterhalt (§ 1361 BGB):</span><span class='val'>"+daten.trennungsunterhalt_betrag+" €/Monat</span></div>" : "")
      + (daten.nachehelicher_betrag ? "<div class='row'><span class='label'>Nachehelicher Unterhalt (§ 1569 ff.):</span><span class='val'>"+daten.nachehelicher_betrag+" €/Monat</span></div>" : "")
      + "<div class='sect'>Sonstiges</div>"
      + "<div class='row'><span class='label'>Anwalt beauftragt:</span><span class='val'>"+(daten.anwalt_beauftragt==="ja"?"Ja":"Nein")+"</span></div>"
      + "<div class='row'><span class='label'>Interesse an Mediation:</span><span class='val'>"+(daten.mediation_interesse==="ja"?"Ja":"Nein")+"</span></div>"
      + (daten.besondere_umstaende ? "<div class='row'><span class='label'>Besondere Umstände:</span><span class='val'>"+daten.besondere_umstaende+"</span></div>" : "")
      + (daten.notizen ? "<div class='row'><span class='label'>Notizen:</span><span class='val'>"+daten.notizen+"</span></div>" : "")
      + "<p style='font-size:10px;color:#888;margin-top:24px;border-top:1px solid #eee;padding-top:8px'>Erstellt am " + new Date().toLocaleDateString("de-DE") + " · ISUV Anspruchslotse · Rechtsgrundlagen: §§ 1361, 1569 ff., 1626a, 1684 BGB, §§ 1 ff. VersAusglG</p>"
      + "<div class='noprint' style='margin-top:20px;text-align:center'><button onclick='window.print()' style='padding:10px 24px;background:#003366;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px'>Drucken / Als PDF speichern</button></div>"
      + "</body></html>";
    var w = window.open("","_blank","width=800,height=1000");
    w.document.write(html);
    w.document.close();
    setGedruckt(true);
    if (onSaveErgebnis) onSaveErgebnis({ typ:"Trennungs-/Scheidungsfragebogen", ergebnis:"Erstellt am "+new Date().toLocaleDateString("de-DE"), rechtsbereich:"Familienrecht", details:"Trennung: "+(daten.trennung_datum||"?") });
  };

  return (
    <div>
      <div style={u.modHeader}><span style={u.modIcon}>📄</span><div><div style={u.modTitle}>Trennungs-/Scheidungsfragebogen</div><div style={u.modSub}>Strukturierte Erfassung aller relevanten Daten für die Beratung</div></div></div>

      {/* Abschnitts-Navigation */}
      <div style={{ display:"flex", gap:"4px", marginBottom:"16px", flexWrap:"wrap" }}>
        {abschnitte.map(function(a,i){
          return <div key={i} onClick={function(){setAbschnitt(i);}}
            style={{ padding:"5px 10px", borderRadius:"6px", fontSize:"11px", fontWeight:"bold", cursor:"pointer",
              backgroundColor:abschnitt===i?"#003366":"#e8f0fb",
              color:abschnitt===i?"#fff":"#003366" }}>{a}</div>;
        })}
      </div>

      {abschnitt===0 && (
        <div>
          <div style={u.modSection}>👤 Person 1 (Ratsuchende/r)</div>
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Name</label><input style={u.input} value={daten.p1_name} onChange={function(e){set("p1_name",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Geburtsdatum</label><input type="date" style={u.input} value={daten.p1_geburt} onChange={function(e){set("p1_geburt",e.target.value);}} /></div>
          </div>
          <label style={u.label}>Anschrift</label>
          <input style={u.input} placeholder="Straße, PLZ Ort" value={daten.p1_anschrift} onChange={function(e){set("p1_anschrift",e.target.value);}} />
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Beruf</label><input style={u.input} value={daten.p1_beruf} onChange={function(e){set("p1_beruf",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Nettoeinkommen (€/Mo)</label><input type="number" style={u.input} value={daten.p1_einkommen} onChange={function(e){set("p1_einkommen",e.target.value);}} /></div>
          </div>
          <div style={u.modSection}>👤 Person 2 (Ehepartner/in)</div>
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Name</label><input style={u.input} value={daten.p2_name} onChange={function(e){set("p2_name",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Geburtsdatum</label><input type="date" style={u.input} value={daten.p2_geburt} onChange={function(e){set("p2_geburt",e.target.value);}} /></div>
          </div>
          <label style={u.label}>Anschrift</label>
          <input style={u.input} placeholder="Straße, PLZ Ort" value={daten.p2_anschrift} onChange={function(e){set("p2_anschrift",e.target.value);}} />
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Beruf</label><input style={u.input} value={daten.p2_beruf} onChange={function(e){set("p2_beruf",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Nettoeinkommen (€/Mo)</label><input type="number" style={u.input} value={daten.p2_einkommen} onChange={function(e){set("p2_einkommen",e.target.value);}} /></div>
          </div>
        </div>
      )}

      {abschnitt===1 && (
        <div>
          <div style={u.modSection}>💍 Ehe</div>
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Heiratsdatum</label><input type="date" style={u.input} value={daten.heirat_datum} onChange={function(e){set("heirat_datum",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Heiratsort</label><input style={u.input} value={daten.heirat_ort} onChange={function(e){set("heirat_ort",e.target.value);}} /></div>

          <div style={u.modSection}>💔 Trennung</div>
          <label style={u.label}>Trennungsdatum (§ 1567 BGB)</label>
          <input type="date" style={u.input} value={daten.trennung_datum} onChange={function(e){set("trennung_datum",e.target.value);}} />
          <label style={u.label}>Trennungsjahr (1 Jahr) bereits abgelaufen?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("trennungsjahr_abgelaufen",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",

            })}
          </div>
          <label style={u.label}>Scheidung bereits beantragt?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>

                  backgroundColor:daten.scheidung_beantragt===o.v?"#003366":"#eee",
                  color:daten.scheidung_beantragt===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Versorgungsausgleich gewünscht? (§ 1 ff. VersAusglG)</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"},{v:"unklar",l:"Noch unklar"}].map(function(o){
              return <div key={o.v} onClick={function(){set("versorgungsausgleich_gewuenscht",o.v);}}
                style={{ padding:"6px 12px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.versorgungsausgleich_gewuenscht===o.v?"#003366":"#eee",
                  color:daten.versorgungsausgleich_gewuenscht===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <div style={{ backgroundColor:"#e8f0fb", borderRadius:"6px", padding:"8px 10px", fontSize:"11px", color:"#003366" }}>
            ℹ️ Der Versorgungsausgleich (Rentenausgleich) wird im Scheidungsverfahren automatisch durchgeführt, sofern nicht beide Parteien auf ihn verzichten (§ 6 VersAusglG).
          </div>
        </div>
      )}

      {abschnitt===2 && (
        <div>
          <label style={u.label}>Gibt es gemeinsame Kinder?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>

                  backgroundColor:daten.hat_kinder===o.v?"#003366":"#eee",
                  color:daten.hat_kinder===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          {daten.hat_kinder==="ja" && (
            <div>
              {daten.kinder.map(function(k,idx){
                var upd=function(f,v){setDaten(function(p){var nk=p.kinder.map(function(x,i){return i===idx?Object.assign({},x,{[f]:v}):x;});return Object.assign({},p,{kinder:nk});});};
                return (
                  <div key={idx} style={{ backgroundColor:"#f0f7ff", borderRadius:"8px", padding:"10px", marginBottom:"8px", borderLeft:"3px solid #003366" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"6px" }}>
                      <strong style={{ fontSize:"12px" }}>Kind {idx+1}</strong>
                      <button onClick={function(){setDaten(function(p){return Object.assign({},p,{kinder:p.kinder.filter(function(_,i){return i!==idx;})});});}}
                        style={{ background:"none", border:"none", color:"#e53935", cursor:"pointer", fontSize:"16px" }}>×</button>
                    </div>
                    <div style={{ display:"flex", gap:"6px" }}>
                      <div style={{ flex:1 }}><label style={u.label}>Name</label><input style={u.input} value={k.name||""} onChange={function(e){upd("name",e.target.value);}} /></div>
                      <div style={{ flex:1 }}><label style={u.label}>Geburtsdatum</label><input type="date" style={u.input} value={k.geburt||""} onChange={function(e){upd("geburt",e.target.value);}} /></div>
                    </div>
                  </div>
                );
              })}
              <button onClick={function(){setDaten(function(p){return Object.assign({},p,{kinder:p.kinder.concat([{name:"",geburt:""}])});});}}
                style={{ width:"100%", padding:"6px", backgroundColor:"#e8f0fb", color:"#003366", border:"1px dashed #003366", borderRadius:"6px", cursor:"pointer", fontSize:"11px", marginBottom:"12px" }}>
                + Kind hinzufügen
              </button>
              <label style={u.label}>Betreuungsmodell</label>
              <select style={u.input} value={daten.kinder_betreuung} onChange={function(e){set("kinder_betreuung",e.target.value);}}>
                <option value="">– wählen –</option>
                <option value="Residenzmodell bei Mutter">Residenzmodell bei Mutter</option>
                <option value="Residenzmodell bei Vater">Residenzmodell bei Vater</option>
                <option value="Wechselmodell paritätisch">Wechselmodell (paritätisch)</option>
                <option value="Wechselmodell asymmetrisch">Wechselmodell (asymmetrisch)</option>
                <option value="Kein Umgang">Kein Umgang</option>
              </select>
              <label style={u.label}>Kindesunterhalt bereits geregelt?</label>
              <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
                {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
                  return <div key={o.v} onClick={function(){set("kinder_unterhalt_geregelt",o.v);}}
                    style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                      backgroundColor:daten.kinder_unterhalt_geregelt===o.v?"#003366":"#eee",
                      color:daten.kinder_unterhalt_geregelt===o.v?"#fff":"#333" }}>{o.l}</div>;
                })}
              </div>
              {daten.kinder_unterhalt_geregelt==="ja" && (
                <div><label style={u.label}>Unterhaltsbetrag (€/Monat)</label>
                <input type="number" style={u.input} value={daten.kinder_unterhalt_betrag} onChange={function(e){set("kinder_unterhalt_betrag",e.target.value);}} /></div>
              )}
            </div>
          )}
        </div>
      )}

      {abschnitt===3 && (
        <div>
          <div style={u.modSection}>🏠 Immobilien / Gemeinsame Wohnung</div>
          <label style={u.label}>Gemeinsame Wohnung oder Immobilie vorhanden?</label>

                  return <div key={v} onClick={function(){set("unterhalt_art",v);}}
                    style={{ padding:"5px 10px", borderRadius:"6px", cursor:"pointer", fontSize:"11px",
                      backgroundColor:daten.unterhalt_art===v?"#003366":"#eee",
                      color:daten.unterhalt_art===v?"#fff":"#333" }}>{v}</div>;

              <div style={{ display:"flex", gap:"8px" }}>

                <div style={{ flex:1 }}><label style={u.label}>Nachehelicher Unterhalt (€/Mo)</label><input type="number" style={u.input} value={daten.nachehelicher_betrag} onChange={function(e){set("nachehelicher_betrag",e.target.value);}} /></div>
              </div>
            </div>
          )}
          <div style={{ backgroundColor:"#e8f0fb", borderRadius:"6px", padding:"8px 10px", marginTop:"8px", fontSize:"11px", color:"#003366" }}>
            ℹ️ <strong>§ 1361 BGB</strong> (Trennungsunterhalt): Während der Trennungszeit. <strong>§§ 1569 ff. BGB</strong> (Nachehelicher Unterhalt): Nach rechtskräftiger Scheidung, z.B. wegen Kinderbetreuung (§ 1570), Alter (§ 1571), Krankheit (§ 1572), Erwerbslosigkeit (§ 1573).
          </div>
        </div>
      )}

      {abschnitt===5 && (
        <div>
          <label style={u.label}>Anwalt/Anwältin beauftragt?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("anwalt_beauftragt",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.anwalt_beauftragt===o.v?"#003366":"#eee",
                  color:daten.anwalt_beauftragt===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Interesse an Mediation / außergerichtlicher Einigung?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("mediation_interesse",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.mediation_interesse===o.v?"#1b5e20":"#eee",
                  color:daten.mediation_interesse===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Besondere Umstände / Konflikte</label>
          <textarea style={Object.assign({},u.input,{height:"70px",resize:"vertical"})} placeholder="Häusliche Gewalt, Sucht, psychische Erkrankungen, laufende Gerichtsverfahren etc." value={daten.besondere_umstaende} onChange={function(e){set("besondere_umstaende",e.target.value);}} />
          <label style={u.label}>Weitere Notizen für die Beratung</label>
          <textarea style={Object.assign({},u.input,{height:"70px",resize:"vertical"})} value={daten.notizen} onChange={function(e){set("notizen",e.target.value);}} />

          <button onClick={drucken} style={{ width:"100%", padding:"12px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginTop:"16px" }}>
            🖨️ Fragebogen drucken / PDF
          </button>
          {gedruckt && <div style={{ backgroundColor:"#e8f5e9", borderRadius:"6px", padding:"8px 12px", marginTop:"8px", fontSize:"12px", color:"#2e7d32" }}>✅ Druckansicht geöffnet.</div>}
        </div>
      )}

      {/* Navigation */}
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:"20px" }}>
        {abschnitt > 0 && <button onClick={function(){setAbschnitt(function(p){return p-1;});}} style={{ padding:"8px 16px", backgroundColor:"#e8f0fb", color:"#003366", border:"none", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"12px" }}>‹ Zurück</button>}
        {abschnitt < abschnitte.length-1 && <button onClick={function(){setAbschnitt(function(p){return p+1;});}} style={{ padding:"8px 16px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"12px", marginLeft:"auto" }}>Weiter ›</button>}
      </div>

      <div style={{ backgroundColor:"#fff9e6", borderRadius:"8px", padding:"10px 12px", marginTop:"12px", fontSize:"11px", color:"#856404" }}>
        ⚖️ <strong>Rechtsgrundlagen:</strong> §§ 1361, 1569–1581 BGB (Unterhalt), §§ 1564 ff. BGB (Scheidung), § 1567 BGB (Getrenntleben), §§ 1 ff. VersAusglG (Versorgungsausgleich), §§ 1626a, 1671, 1684 BGB (Elterliche Sorge & Umgang)
      </div>
    </div>
  );
}

function FamilienrechtView({ view, activeMember, memberExtras, setView, setMemberErgebnisse }) {
  var INFO = {
    "fr_kindesunterhalt":{ titel:"👶 Kindesunterhalt 2024", sub:"Düsseldorfer Tabelle · Rolle · Mangelfall" },
    "fr_ehegatten":      { titel:"💍 Ehegattenunterhalt", sub:"§§ 1361 / 1569 ff. BGB · Halbteilung" },
    "fr_wechselmodell":  { titel:"🔄 Wechselmodell-Unterhalt", sub:"BGH XII ZB 234/15 · Fahrtkosten · TBG" },
    "fr_rechtsvergleich":{ titel:"⚖️ Rechtsvergleich", sub:"Familienrecht vs. Sozialrecht · BSG · OLG" },
    "fr_dtTabelle":      { titel:"📊 Düsseldorfer Tabelle 2024", sub:"Nachschlagewerk · Vollständige Tabelle" },
    "fr_fristen":        { titel:"⏰ Fristenrechner", sub:"Widerspruch · Klage · Verjährung" },
    "fr_umgang":         { titel:"🤝 Musterantrag Umgang", sub:"§ 1684 BGB – Interaktives Formular" },
    "fr_sorgerecht":     { titel:"👨‍👩‍👧 Antrag Gemeinsames Sorgerecht", sub:"§ 1626a BGB – Interaktives Formular" },
    "fr_trennungsvereinbarung": { titel:"📄 Trennungs-/Scheidungsfragebogen", sub:"Strukturierte Datenerfassung für die Beratung" },
  };
  var info = INFO[view] || {titel:"Familienrecht", sub:""};
  var ext = activeMember ? (memberExtras[activeMember.id]||null) : null;
  var aend = ext && ext._letzteAenderung;
  function saveErg(ergebnis) {
    if(!activeMember) return;
    var mid=activeMember.id, jetzt=new Date().toLocaleDateString("de-DE");
    setMemberErgebnisse(function(prev){
      return Object.assign({},prev,{[mid]:(prev[mid]||[]).slice(-29).concat([Object.assign({datum:jetzt},ergebnis)])});
    });
  }
  return (
    <div style={{ background:"#f5f7fa", minHeight:"100vh" }}>
      <div style={{ textAlign:"center", padding:"20px 16px 12px", backgroundColor:"#fff", borderBottom:"1px solid #eee" }}>
        <img src={window.ISUV_LOGO} alt="ISUV" style={{ width:"130px", height:"auto", marginBottom:"8px" }} />
        <div style={{ fontSize:"14px", fontWeight:"bold", color:"#003366" }}>{info.titel}</div>
        <div style={{ fontSize:"11px", color:"#666" }}>{info.sub}</div>
      </div>
      <div style={{ padding:"12px 16px 0" }}>
        <button onClick={function(){setView("dashboard");}} style={{ background:"none", border:"none", color:"#003366", fontWeight:"bold", fontSize:"13px", cursor:"pointer", padding:0, marginBottom:"8px" }}>‹ Zurück</button>
        {!activeMember && <InfoBox typ="empf" titel={null} kinder={<span>Kein Mitglied geöffnet – Ergebnisse nicht gespeichert.</span>} />}
        {aend && <InfoBox typ="warnung" titel={"Akte geändert am "+aend.datum} kinder={<span>Felder: {(aend.felder||[]).join(", ")}</span>} />}
      </div>
      <div style={{ padding: window && window.innerWidth >= 600 ? "0 24px 32px" : "0 16px 24px" }}>
        {view==="fr_kindesunterhalt" && <KindesunterhaltsRechnerNeu ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
        {view==="fr_ehegatten" && <EhegattenUnterhaltsRechner ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
        {view==="fr_wechselmodell" && <div><WechselmodellRechner ext={ext} onSaveErgebnis={activeMember?saveErg:null} /><div style={{marginTop:"20px",borderTop:"2px solid #e8f0fb",paddingTop:"16px"}}><RechtsvergleichModul ext={ext} /></div></div>}
        {view==="fr_rechtsvergleich" && <RechtsvergleichModul ext={ext} />}
        {view==="fr_dtTabelle" && <DuesseldorferTabelleNachschlag />}
        {view==="fr_fristen" && <FristenRechner />}
        {view==="fr_umgang" && <UmgangsantragFormular ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
        {view==="fr_sorgerecht" && <SorgerechtAntragFormular ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
        {view==="fr_trennungsvereinbarung" && <TrennungsFragebogen ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
      </div>
    </div>
  );
}

function RechnerReiter() {
  const [kategorie, setKategorie] = useState(null);
  const [unterkategorie, setUnterkategorie] = useState(null);
  const [aktiverRechner, setAktivenRechner] = useState(null);

  const familienRechner = [
    { id: "kindesNeu", label: "👶 Kindesunterhalt 2024", desc: "Düsseldorfer Tabelle, Rolle, Mangelfall" },
    { id: "ehegatten", label: "💍 Ehegattenunterhalt", desc: "Trennung & nachehelich, Halbteilung" },
    { id: "wechselmodell", label: "🔄 Wechselmodell-Unterhalt", desc: "BGH XII ZB 234/15, Fahrtkosten" },
    { id: "dtTabelle", label: "📊 Düsseldorfer Tabelle 2024", desc: "Nachschlagewerk + vollständige Tabelle" },
    { id: "fristen", label: "⏰ Fristenrechner", desc: "Widerspruch, Klage, Verjährung" },
    { id: "rechtsvergleich", label: "⚖️ Familienrecht vs. Sozialrecht", desc: "Selbstbehalt, KdU, Sozialgerichte" },
    { id: "betreuungsunterhalt", label: "§ 1615l Betreuungsunterhalt", desc: "" },
  ];
  const sozialUnterkategorien = [
    { id: "buergergeld", label: "🏛️ Bürgergeld (SGB II)", desc: "Bedarf, Freibeträge, KdU, Vermögen" },
    { id: "betreuung", label: "👨‍👧 Betreuungs- / Umgangskosten", desc: "Mehrbedarf Alleinerziehende, Umgangskosten, TBG" },
    { id: "wohngeld", label: "🏡 Wohngeld", desc: "Wohngeldberechnung nach WoGG" },
  ];
  const betreuungsRechner = [
    { id: "mbAlleinerziehende", label: "👨‍👧 Mehrbedarf Alleinerziehende" },
    { id: "mbUmgang", label: "🚗 Mehrbedarf Umgangskosten" },
    { id: "tbg", label: "🏠 Temporäre Bedarfsgemeinschaft" },
    { id: "kinderzuschlag", label: "👶 Kinderzuschlag (§ 6a BKGG)" },
  ];

  const backBtn = (label, onClick) => (
    <button onClick={onClick} style={{ background: "none", border: "none", color: "#00afad", cursor: "pointer", fontWeight: "bold", marginBottom: "12px", padding: 0 }}>‹ {label}</button>
  );

  if (aktiverRechner) {
    const zurueck = unterkategorie === "betreuung" ? "Betreuungs-/Umgangskosten" : "Familienrecht";
    return (
      <div>
        {backBtn(zurueck, () => setAktivenRechner(null))}
        {aktiverRechner === "kindesNeu" && <KindesunterhaltsRechnerNeu />}
        {aktiverRechner === "ehegatten" && <EhegattenUnterhaltsRechner />}
        {aktiverRechner === "wechselmodell" && <WechselmodellRechner />}
        {aktiverRechner === "dtTabelle" && <DuesseldorferTabelleNachschlag />}
        {aktiverRechner === "fristen" && <FristenRechner />}
        {aktiverRechner === "rechtsvergleich" && <RechtsvergleichModul />}
        {aktiverRechner === "kindes" && <KindesunterhaltsRechner />}
        {aktiverRechner === "betreuungsunterhalt" && <BetreuungsunterhaltsRechner />}
        {aktiverRechner === "trennung" && <TrennungsunterhaltsRechner />}
        {aktiverRechner === "nachehelich" && <NachehelicherUnterhaltsRechner />}
        {aktiverRechner === "mbAlleinerziehende" && <MehrbedarfAlleinerziehende />}
        {aktiverRechner === "mbUmgang" && <MehrbedarfUmgangskosten />}
        {aktiverRechner === "tbg" && <TemporaereBedarfsgemeinschaft />}
        {aktiverRechner === "buergergeld" && <BuergergeldRechnerStandalone />}
        {aktiverRechner === "wohngeld" && <WohngeldRechner />}
        {aktiverRechner === "kinderzuschlag" && <KinderzuschlagRechner />}
      </div>
    );
  }

  if (unterkategorie === "betreuung") return (
    <div>
      {backBtn("Sozialrecht", () => setUnterkategorie(null))}
      <div style={{ fontSize: "11px", fontWeight: "bold", color: "#003366", marginBottom: "8px", textTransform: "uppercase" }}>👨‍👧 Betreuungs- / Umgangskosten</div>
      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
        {betreuungsRechner.map(r => (
          <div key={r.id} onClick={() => setAktivenRechner(r.id)} style={{ padding: "12px", backgroundColor: "#f9f9f9", borderRadius: "8px", cursor: "pointer", borderLeft: "4px solid #00afad", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <strong style={{ fontSize: "13px" }}>{r.label}</strong><span style={{ color: "#00afad" }}>›</span>
          </div>
        ))}
      </div>
    </div>
  );

  if (kategorie === "sozialrecht") return (
    <div>
      {backBtn("Kategorien", () => { setKategorie(null); setUnterkategorie(null); })}
      <div style={{ fontSize: "11px", fontWeight: "bold", color: "#003366", marginBottom: "8px", textTransform: "uppercase" }}>🏛️ Sozialrecht – Bereich wählen:</div>
      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
        {sozialUnterkategorien.map(u => (
          <div key={u.id} onClick={() => { if (u.id === "wohngeld" || u.id === "buergergeld") setAktivenRechner(u.id); else setUnterkategorie(u.id); }} style={{ padding: "12px", backgroundColor: "#f9f9f9", borderRadius: "8px", cursor: "pointer", borderLeft: "4px solid #00afad", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div><strong style={{ fontSize: "13px" }}>{u.label}</strong><div style={{ fontSize: "10px", color: "#999", marginTop: "2px" }}>{u.desc}</div></div>
            <span style={{ color: "#00afad", marginLeft: "8px" }}>›</span>
          </div>
        ))}
      </div>
    </div>
  );

  if (kategorie === "familienrecht") return (
    <div>
      {backBtn("Kategorien", () => setKategorie(null))}
      <div style={{ fontSize: "11px", fontWeight: "bold", color: "#003366", marginBottom: "8px", textTransform: "uppercase" }}>⚖️ Familienrecht – Rechner wählen:</div>
      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
        {familienRechner.map(r => (
          <div key={r.id} onClick={() => setAktivenRechner(r.id)}
            style={{ padding:"12px", backgroundColor:"#f9f9f9", borderRadius:"8px", cursor:"pointer",
              borderLeft:"4px solid "+(r.id==="rechtsvergleich"?"#6a1b9a":r.id==="fristen"?"#ef6c00":"#003366"),
              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <strong style={{ fontSize:"13px" }}>{r.label}</strong>
              {r.desc && <div style={{ fontSize:"10px", color:"#999", marginTop:"2px" }}>{r.desc}</div>}
            </div>
            <span style={{ color:"#00afad" }}>›</span>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
      <div onClick={() => setKategorie("familienrecht")} style={{ padding: "14px", backgroundColor: "#f9f9f9", borderRadius: "10px", cursor: "pointer", borderLeft: "4px solid #003366", display: "flex", alignItems: "center", gap: "12px" }}>
        <span style={{ fontSize: "18px" }}>⚖️</span>
        <div><div style={{ fontWeight: "bold", fontSize: "13px" }}>Familienrecht</div><div style={{ fontSize: "10px", color: "#aaa" }}>Kindes-, Trennungs- und nachehelicher Unterhalt</div></div>
        <span style={{ marginLeft: "auto", color: "#00afad" }}>›</span>
      </div>
      <div onClick={() => setKategorie("sozialrecht")} style={{ padding: "14px", backgroundColor: "#f9f9f9", borderRadius: "10px", cursor: "pointer", borderLeft: "4px solid #00afad", display: "flex", alignItems: "center", gap: "12px" }}>
        <span style={{ fontSize: "18px" }}>🏛️</span>
        <div><div style={{ fontWeight: "bold", fontSize: "13px" }}>Sozialrecht</div><div style={{ fontSize: "10px", color: "#aaa" }}>Mehrbedarf, TBG, Wohngeld</div></div>
        <span style={{ marginLeft: "auto", color: "#00afad" }}>›</span>
      </div>
    </div>
  );
}

              <div style={u.calcStep}><span>– Selbstbehalt Ex-Ehegatte:</span><span>1.300 €</span></div>
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Masse:</span><span>{nuResult.masse} €</span></div>
              <div style={u.compositionBox}><div style={{...u.resRow,fontWeight:"bold",fontSize:"16px",borderTop:"2px solid #003366",paddingTop:"4px"}}><span>Nachehelicher Unterhalt:</span><span>{nuResult.anspruch} €/Monat</span></div></div>
            </>
          )}
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "mbAlleinerziehende") return (
    <div>
      <h4 style={u.modTitle}>👨‍👧 Mehrbedarf Alleinerziehende (§ 21 Abs.3 SGB II)</h4>
      {ext && ext.betreuungsmodell && <div style={u.infoBox}>✅ Betreuungsmodell aus Akte: <strong>{ext.betreuungsmodell}</strong></div>}
      <div style={{ fontSize:"12px", marginBottom:"8px" }}>Kinderkonstellation: <strong>{mbKonf}</strong> ({anzK} Kind{anzK!==1?"er":""})</div>
      <label style={u.sectionLabel}>Betreuungsmodell bestätigen:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
        {["paritaetisch","asymmetrisch"].map(v => (
          <div key={v} onClick={() => setMbModell(v)} style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", backgroundColor:mbModell===v?"#00afad":"#eee", color:mbModell===v?"#fff":"#333" }}>
            {v==="paritaetisch" ? "Paritätisch" : "Residenz / Asymm."}
          </div>
        ))}
      </div>
      <button style={{...u.btnPrimary, opacity:mbModell?1:0.5}} disabled={!mbModell} onClick={berechneMB}>Berechnen & In Akte speichern</button>
      {mbResult && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Regelbedarf:</span><span>563,00 €</span></div>
          <div style={u.calcStep}><span>Prozentsatz:</span><span>{mbResult.proz} %</span></div>
          <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Mehrbedarf / Monat:</span><span>{mbResult.betrag} €</span></div>
          <div style={{...u.infoBox,marginTop:"6px"}}>📋 {mbResult.hinweis}</div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "mbUmgang") return (
    <div>
      <h4 style={u.modTitle}>🚗 Mehrbedarf Umgangskosten (§ 21 SGB II)</h4>
      {ext && ext.betreuungsmodell && <div style={u.infoBox}>Betreuungsmodell: <strong>{ext.betreuungsmodell}</strong></div>}
      <label style={u.sectionLabel}>Fahrtkosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="0" value={ukFahrt} onChange={e => setUkFahrt(e.target.value)} />
      <label style={u.sectionLabel}>Übernachtungskosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="0" value={ukUeber} onChange={e => setUkUeber(e.target.value)} />
      <label style={u.sectionLabel}>Sonstige Kosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="0" value={ukSonst} onChange={e => setUkSonst(e.target.value)} />
      <button style={u.btnPrimary} onClick={berechneUK}>Berechnen & In Akte speichern</button>
      {ukResult && (
        <div style={u.resultBox}>
          <div style={{...u.resRow,fontWeight:"bold",fontSize:"16px"}}><span>Umgangskosten gesamt:</span><span>{ukResult.gesamt} €/Monat</span></div>
          <div style={{ fontSize:"10px", color:"#999", marginTop:"6px" }}>Anerkennung liegt im Ermessen des Jobcenters.</div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "tbg") return (
    <div>
      <h4 style={u.modTitle}>🏠 Temporäre Bedarfsgemeinschaft (TBG)</h4>
      {ext && ext.betreuungsmodell && <div style={u.infoBox}>✅ Betreuungsmodell aus Akte: <strong>{ext.betreuungsmodell}</strong></div>}
      <label style={u.sectionLabel}>Betreuungsmodell:</label>
      <div style={{ display:"flex", flexDirection:"column", gap:"6px", marginBottom:"10px" }}>
        {[{v:"paritaetisch",l:"Paritätisches Wechselmodell (ca. 50:50)"},{v:"asymmetrisch",l:"Asymmetrisch / Residenz (weniger als 50%)"}].map(m => (
          <label key={m.v} style={{ display:"flex", gap:"8px", fontSize:"12px", cursor:"pointer", alignItems:"flex-start" }}>
            <input type="radio" checked={tbgModell===m.v} onChange={() => setTbgModell(m.v)} style={{ marginTop:"2px" }} />{m.l}
          </label>
        ))}
      </div>
      <div style={{ display:"flex", gap:"10px" }}>
        <div style={{ flex:1 }}><label style={u.sectionLabel}>Tage/Monat Antragsteller*in:</label><input type="number" style={u.input} value={tbgTageA} onChange={e => setTbgTageA(e.target.value)} /></div>
        <div style={{ flex:1 }}><label style={u.sectionLabel}>Tage/Monat and. Elternteil:</label><input type="number" style={u.input} value={tbgTageB} onChange={e => setTbgTageB(e.target.value)} /></div>
      </div>
      <label style={u.sectionLabel}>Wer bezieht das Kindergeld?</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[{v:"antragsteller",l:"Antragsteller*in"},{v:"anderer",l:"And. Elternteil"}].map(x => (
          <div key={x.v} onClick={() => setTbgKgEmpf(x.v)} style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", backgroundColor:tbgKgEmpf===x.v?"#003366":"#eee", color:tbgKgEmpf===x.v?"#fff":"#333" }}>{x.l}</div>
        ))}
      </div>
      <label style={u.sectionLabel}>Kindergeldbetrag (€/Monat):</label>
      <input type="number" style={u.input} value={tbgKgBetrag} onChange={e => setTbgKgBetrag(e.target.value)} />
      <button style={{...u.btnPrimary, opacity:tbgModell&&tbgKgEmpf?1:0.5}} disabled={!tbgModell||!tbgKgEmpf} onClick={berechneTBG}>Berechnen & In Akte speichern</button>
      {tbgResult && (
        <div style={u.resultBox}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
            <div style={u.compositionBox}>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"6px" }}>Antragsteller*in ({tbgResult.tageA} Tage)</div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>Regelbedarf Kind:</span><span>{tbgResult.regelA} €</span></div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>+ Mehrbedarf:</span><span>{tbgResult.mehrA} €</span></div>
              {parseFloat(tbgResult.kgA)>0 && <div style={u.calcStep}><span style={{fontSize:"11px"}}>– Kindergeld:</span><span>{tbgResult.kgA} €</span></div>}
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #003366",paddingTop:"4px",marginTop:"4px"}}><span>Netto-Anteil:</span><span>{tbgResult.nettoA} €</span></div>
            </div>
            <div style={u.compositionBox}>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"6px" }}>And. Elternteil ({tbgResult.tageB} Tage)</div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>Regelbedarf Kind:</span><span>{tbgResult.regelB} €</span></div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>+ Mehrbedarf:</span><span>{tbgResult.mehrB} €</span></div>
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #003366",paddingTop:"4px",marginTop:"4px"}}><span>Gesamt:</span><span>{(parseFloat(tbgResult.regelB)+parseFloat(tbgResult.mehrB)).toFixed(2)} €</span></div>
            </div>
          </div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis und neue Daten in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "buergergeld") return (
    <BuergergeldRechner ext={ext} onSaveErgebnis={onSaveErgebnis} changedFields={changedFields} changedDate={changedDate} />
  );

  if (rechner === "wohngeld") return (
    <div>
      <h4 style={u.modTitle}>🏡 Wohngeld (WoGG)</h4>
      {(netto||mieteW) && <div style={u.infoBox}>✅ Einkommen und/oder Miete aus Akte vorausgefüllt.</div>}
      <label style={u.sectionLabel}>Nettoeinkommen (€/Monat):</label>
      <input type="number" style={u.input} value={wgNetto} onChange={e => setWgNetto(e.target.value)} />
      <label style={u.sectionLabel}>Bruttomiete warm (€/Monat):</label>
      <input type="number" style={u.input} value={wgMiete} onChange={e => setWgMiete(e.target.value)} />
      <div style={{ display:"flex", gap:"10px" }}>
        <div style={{ flex:1 }}>
          <label style={u.sectionLabel}>Haushaltsgröße:</label>
          <select style={u.input} value={wgHH} onChange={e => setWgHH(e.target.value)}>
            {["1","2","3","4","5"].map(n => <option key={n} value={n}>{n} {n==="1"?"Person":"Personen"}</option>)}
          </select>
        </div>
        <div style={{ flex:1 }}>
          <label style={u.sectionLabel}>Mietenstufe:</label>
          <select style={u.input} value={wgStufe} onChange={e => setWgStufe(e.target.value)}>
            {["1","2","3","4","5","6"].map(s => <option key={s} value={s}>Stufe {s}</option>)}
          </select>
        </div>
      </div>
      <label style={u.sectionLabel}>Unterhaltstitel vorhanden und gezahlt?</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
        {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(x => (
          <div key={x.v} onClick={() => setWgUTitel(x.v)} style={{ padding:"6px 14px", borderRadius:"8px", fontSize:"12px", cursor:"pointer", backgroundColor:wgUTitel===x.v?"#003366":"#eee", color:wgUTitel===x.v?"#fff":"#333" }}>{x.l}</div>
        ))}
      </div>
      {wgUTitel==="ja" && (
        <>
          <label style={u.sectionLabel}>Unterhaltsbetrag (€/Monat):</label>
          <input type="number" style={u.input} value={wgUnterhalt} onChange={e => setWgUnterhalt(e.target.value)} />
        </>
      )}
      <button style={u.btnPrimary} onClick={berechneWG}>Berechnen & In Akte speichern</button>
      {wgResult && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Nettoeinkommen:</span><span>{wgResult.n} €</span></div>
          {parseFloat(wgResult.uAbzug)>0 && <div style={u.calcStep}><span>– Unterhalt:</span><span>{wgResult.uAbzug} €</span></div>}
          <div style={u.calcStep}><span>Verfügbar:</span><span>{wgResult.verf} €</span></div>
          <div style={u.calcStep}><span>– Freibetrag:</span><span>{wgResult.frei} €</span></div>
          <div style={{...u.calcStep,borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Anzurechnendes Einkommen:</span><span>{wgResult.anr} €</span></div>
          <div style={u.calcStep}><span>Anrechenbare Miete (max. {wgResult.hb} €):</span><span>{wgResult.mietAnr} €</span></div>
          {wgResult.kein
            ? <div style={{...u.warnung,marginTop:"8px"}}>⚠️ Kein Wohngeldanspruch. Ggf. Bürgergeld prüfen.</div>
            : <div style={u.compositionBox}><div style={{...u.resRow,fontWeight:"bold",fontSize:"16px",borderTop:"2px solid #003366",paddingTop:"4px"}}><span>Wohngeld ca.:</span><span>{wgResult.wohngeld} €/Monat</span></div></div>
          }
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Neue Daten und Ergebnis in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  return <div style={{ color:"#999", fontSize:"12px" }}>Rechner nicht gefunden.</div>;
}



// =============================================
// PDF-EXPORT – Berechnungsergebnisse
// =============================================
function exportPDF(member, ergebnisse, beraterName) {
  var jsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!jsPDF) { alert("PDF-Bibliothek nicht geladen. Bitte Seite neu laden."); return; }
  var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  var W = 210, H = 297;
  var margin = 16;
  var y = 0;

  // ── Kopfzeile ──
  doc.setFillColor(0, 51, 102);
  doc.rect(0, 0, W, 28, "F");
  doc.setFillColor(0, 175, 173);
  doc.rect(0, 28, W, 2, "F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("ISUV Anspruchslotse", margin, 11);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.setTextColor(180,210,240);
  doc.text("Beratungsergebnisse – vertraulich", margin, 18);
  var heute = new Date().toLocaleDateString("de-DE");
  doc.text("Erstellt: " + heute, W - margin, 18, {align:"right"});
  y = 38;

  // ── Mitglied ──
  doc.setFillColor(232, 240, 251);
  doc.roundedRect(margin, y, W - 2*margin, 22, 3, 3, "F");
  doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("👤 Mitglied", margin+4, y+7);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(40,40,40);
  var nameStr = ((member.vorname||"") + " " + (member.name||"")).trim() || "Unbekannt";
  doc.text(nameStr, margin+4, y+14);
  var kontakt = [member.tel, member.mail, member.ort].filter(Boolean).join("  ·  ");
  if(kontakt) doc.text(kontakt, margin+4, y+20, {maxWidth: W-2*margin-8});
  y += 28;

  // ── Berater ──
  if(beraterName) {
    doc.setFontSize(8); doc.setTextColor(120,120,120);
    doc.text("Berater/in: " + beraterName, margin, y);
    y += 6;
  }

  // ── Ergebnisse ──
  var alle = [...ergebnisse].reverse();
  alle.forEach(function(e, i) {
    // Seitenumbruch prüfen
    if(y > H - 50) { doc.addPage(); y = 20; }

    // Karte
    var rechtsbereich = e.rechtsbereich || "";
    var bgR = rechtsbereich === "Familienrecht" ? [232,240,251] : rechtsbereich === "Sozialrecht" ? [232,245,233] : [249,249,249];
    var borderR = rechtsbereich === "Familienrecht" ? [0,51,102] : [0,175,173];
    doc.setFillColor(bgR[0], bgR[1], bgR[2]);
    // Höhe der Karte schätzen
    var detailLines = 0;
    if(e.details) detailLines += 1;
    if(e.detailSchritte && e.detailSchritte.length) detailLines += Math.min(e.detailSchritte.length, 8);
    if(e.rechtsgrundlagen && e.rechtsgrundlagen.length) detailLines += 1;
    var cardH = 22 + detailLines * 5;
    if(y + cardH > H - 20) { doc.addPage(); y = 20; }
    doc.roundedRect(margin, y, W-2*margin, cardH, 2, 2, "F");
    doc.setDrawColor(borderR[0], borderR[1], borderR[2]);
    doc.setLineWidth(0.5);
    doc.roundedRect(margin, y, W-2*margin, cardH, 2, 2, "S");
    // Linker farbiger Balken
    doc.setFillColor(borderR[0], borderR[1], borderR[2]);
    doc.rect(margin, y, 3, cardH, "F");

    // Typ + Datum
    doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(e.typ || "Berechnung", margin+6, y+6);
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(160,160,160);
    doc.text(e.datum || "", W-margin-2, y+6, {align:"right"});
    if(rechtsbereich) {
      doc.setFillColor(borderR[0], borderR[1], borderR[2]);
      doc.roundedRect(margin+6, y+8, rechtsbereich.length*2.2+4, 5, 1.5, 1.5, "F");
      doc.setTextColor(255,255,255); doc.setFontSize(6.5);
      doc.text(rechtsbereich, margin+8, y+12);
    }

    // Ergebnis
    doc.setTextColor(0,175,173); doc.setFont("helvetica","bold"); doc.setFontSize(12);
    doc.text(e.ergebnis || "", margin+6, y+20);

    // Details
    var dy = y + 26;
    if(e.details) {
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
      doc.text(e.details, margin+6, dy, {maxWidth: W-2*margin-10});
      dy += 5;
    }

    // Detailschritte
    if(e.detailSchritte && e.detailSchritte.length > 0) {
      doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(0,51,102);
      doc.text("Detailrechnung:", margin+6, dy); dy += 4;
      e.detailSchritte.slice(0,8).forEach(function(s) {
        if(dy > H-25) return;
        doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(60,60,60);
        var label = s.label || s[0] || "";
        var wert  = s.wert  || s[1] || "";
        doc.text("• " + label, margin+8, dy);
        doc.text(wert, W-margin-4, dy, {align:"right"});
        dy += 4.5;
      });
    }

    // Rechtsgrundlagen
    if(e.rechtsgrundlagen && e.rechtsgrundlagen.length > 0) {
      if(dy > H-20) { doc.addPage(); dy = 20; }
      doc.setFont("helvetica","italic"); doc.setFontSize(7); doc.setTextColor(140,140,140);
      doc.text("Rechtsgrundlagen: " + e.rechtsgrundlagen.join(" · "), margin+6, dy, {maxWidth: W-2*margin-10});
      dy += 4;
    }

    y = dy + 4;
  });

  // ── Fußzeile letzte Seite ──
  var pageCount = doc.getNumberOfPages();
  for(var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFillColor(0,51,102);
    doc.rect(0, H-10, W, 10, "F");
    doc.setTextColor(180,210,240); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text("ISUV Anspruchslotse  ·  Vertraulich  ·  Nur für interne Beratungszwecke", W/2, H-4, {align:"center"});
    doc.setTextColor(255,255,255);
    doc.text("Seite " + p + " / " + pageCount, W-margin, H-4, {align:"right"});
  }

  // Speichern
  var filename = "ISUV_" + (nameStr.replace(/\s+/g,"_")) + "_Berechnungen_" + heute.replace(/\./g,"-") + ".pdf";
  doc.save(filename);
}


// =============================================
// EXPORT: MITGLIEDER-AKTE ALS PDF
// =============================================
function exportAktePDF(member, ext, ergebnisse, ausgangFormulare, abschnitte, beraterName) {
  var jsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!jsPDF) { alert("PDF-Bibliothek nicht geladen. Bitte Seite neu laden."); return null; }
  var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  var W = 210, H = 297, margin = 16, y = 0;

  function checkPage(needed) {
    if (y + (needed||20) > H - 18) { doc.addPage(); y = 22; }
  }
  function sectionHeader(icon, title) {
    checkPage(14);
    doc.setFillColor(232,240,251);
    doc.roundedRect(margin, y, W-2*margin, 9, 2, 2, "F");
    doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(8.5);
    doc.text(icon + "  " + title.toUpperCase(), margin+4, y+6);
    y += 13;
  }
  function row(label, value) {
    if (!value && value !== 0) return;
    checkPage(7);
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(100,100,100);
    doc.text(label, margin+2, y);
    doc.setTextColor(30,30,30); doc.setFont("helvetica","bold");
    doc.text(String(value), margin+55, y, {maxWidth: W-margin-55-margin});
    y += 6;
  }

  // ── Kopfzeile ──
  doc.setFillColor(0,51,102);
  doc.rect(0,0,W,28,"F");
  doc.setFillColor(0,175,173);
  doc.rect(0,28,W,2,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("ISUV Anspruchslotse", margin, 11);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(180,210,240);
  doc.text("Mitglieder-Akte – vertraulich", margin, 18);
  var heute = new Date().toLocaleDateString("de-DE");
  doc.text("Erstellt: " + heute, W-margin, 18, {align:"right"});
  y = 38;

  // Mitglieds-Header-Box
  doc.setFillColor(0,175,173);
  doc.roundedRect(margin, y, W-2*margin, 20, 3, 3, "F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(13);
  var nameStr = ((member.vorname||"") + " " + (member.name||"")).trim() || "Unbekannt";
  doc.text(nameStr, margin+5, y+8);
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  var kontaktStr = [member.tel, member.mail, member.ort].filter(Boolean).join("  ·  ");
  if (kontaktStr) doc.text(kontaktStr, margin+5, y+15);
  if (beraterName) doc.text("Berater/in: " + beraterName, W-margin-2, y+15, {align:"right"});
  y += 26;

  // ── 1. STAMMDATEN ──
  if (abschnitte.stammdaten) {
    sectionHeader("👤", "Stammdaten & Kontakt");
    row("Vorname", member.vorname);
    row("Nachname", member.name);
    row("Geburtsdatum", member.geburt || (ext && ext.geburtsdatum));
    row("Telefon", member.tel);
    row("E-Mail", member.mail);
    row("Straße", member.strasse);
    row("PLZ / Ort", [member.plz, member.ort].filter(Boolean).join(" "));
    if (ext) {
      row("Familienstand", ext.familienstand);
      row("Betreuungsmodell", ext.betreuungsmodell);
      row("Arbeitsstatus", ext.arbeitsstatus);
      row("Einkommen netto", ext.einkommenNetto ? ext.einkommenNetto + " €/Monat" : null);
      row("Einkommen brutto", ext.einkommenBrutto ? ext.einkommenBrutto + " €/Monat" : null);
      row("Kaltmiete", ext.mieteKalt ? ext.mieteKalt + " €/Monat" : null);
      row("Nebenkosten", ext.nebenkosten ? ext.nebenkosten + " €/Monat" : null);
      row("Heizkosten", ext.heizkosten ? ext.heizkosten + " €/Monat" : null);
      row("Alleinerziehend", ext.alleinerziehend ? "Ja" : null);
      row("Unterhalt", ext.unterhaltsTitel ? "Titel vorhanden" + (ext.unterhaltBetrag ? " · " + ext.unterhaltBetrag + " €" : "") : null);
      if (ext.kinder && ext.kinder.length > 0) {
        row("Kinder", ext.kinder.map(function(k){ return k.name + (k.alter ? " (" + k.alter + " J.)" : "") + (k.wohnort ? " – " + k.wohnort : ""); }).join(", "));
      }
    }
    y += 4;
  }

  // ── 2. EINGEGANGENE FORMULARE ──
  if (abschnitte.formulare) {
    var memberName = (member.vorname + " " + member.name).trim();
    var relevanteAusgang = (ausgangFormulare||[]).filter(function(af){ return af.mitglied === memberName; });
    if (relevanteAusgang.length > 0) {
      sectionHeader("📤", "Gesendete Formulare");
      relevanteAusgang.forEach(function(af) {
        checkPage(8);
        var statusLabel = af.status === "beantwortet" ? "✓ Beantwortet" : af.status === "geoeffnet" ? "Geöffnet" : "Unbeantwortet";
        doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(30,30,30);
        doc.text(af.typ || "Formular", margin+2, y);
        doc.setFont("helvetica","normal"); doc.setTextColor(100,100,100);
        doc.text(statusLabel, margin+55, y);
        doc.text(af.datum || "", W-margin-2, y, {align:"right"});
        y += 6;
      });
      y += 4;
    }
  }

  // ── 3. BERECHNUNGSERGEBNISSE ──
  if (abschnitte.berechnungen && ergebnisse && ergebnisse.length > 0) {
    sectionHeader("🧮", "Berechnungsergebnisse");
    var alle = [...ergebnisse].reverse();
    alle.forEach(function(e) {
      checkPage(24);
      var borderR = (e.rechtsbereich === "Familienrecht") ? [0,51,102] : [0,175,173];
      var bgR = (e.rechtsbereich === "Familienrecht") ? [232,240,251] : [232,245,233];
      doc.setFillColor(bgR[0],bgR[1],bgR[2]);
      doc.roundedRect(margin, y, W-2*margin, 18, 2, 2, "F");
      doc.setFillColor(borderR[0],borderR[1],borderR[2]);
      doc.rect(margin, y, 3, 18, "F");
      doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(0,51,102);
      doc.text(e.typ || "Berechnung", margin+6, y+6);
      doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(150,150,150);
      doc.text(e.datum || "", W-margin-2, y+6, {align:"right"});
      doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(0,175,173);
      doc.text(e.ergebnis || "", margin+6, y+14);
      if (e.details) {
        doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(80,80,80);
        doc.text(e.details, margin+6, y+14, {maxWidth: 80});
      }
      y += 22;
    });
    y += 2;
  }

  // ── 4. NOTIZEN ──
  if (abschnitte.notizen && ext && ext.notizen && ext.notizen.trim()) {
    sectionHeader("📋", "Interne Notizen");
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(40,40,40);
    var lines = doc.splitTextToSize(ext.notizen, W-2*margin-8);
    lines.forEach(function(line) {
      checkPage(7);
      doc.text(line, margin+4, y);
      y += 5.5;
    });
    y += 4;
  }

  // ── Fußzeile ──
  var pageCount = doc.getNumberOfPages();
  for (var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFillColor(0,51,102);
    doc.rect(0, H-10, W, 10, "F");
    doc.setTextColor(180,210,240); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text("ISUV Anspruchslotse  ·  Vertraulich  ·  Nur für interne Beratungszwecke", W/2, H-4, {align:"center"});
    doc.setTextColor(255,255,255);
    doc.text("Seite " + p + " / " + pageCount, W-margin, H-4, {align:"right"});
  }

  return { doc: doc, filename: "ISUV_Akte_" + nameStr.replace(/\s+/g,"_") + "_" + heute.replace(/\./g,"-") + ".pdf" };
}

// =============================================
// KINDERZUSCHLAG-RECHNER (§ 6a BKGG) – 2024/2025
// =============================================
function KinderzuschlagRechner({ ext, onSaveErgebnis }) {
  var u = rStyles;
  // Kinderzuschlag 2025: max 292 € je Kind (ab 01.01.2025)
  // 2024: 292 €, Mindestbruttogrenze: Alleinerziehend 645 €, Paar 955 €
  var KZG_MAX = 292;
  var KINDERGELD = 250;
  var REGELBEDARF_ALLEIN = 563;

  const [personen, setPersonen] = React.useState("allein"); // allein | paar
  const [kinder, setKinder] = React.useState([{id:1, alter:"8"}]);
  const [bruttoEinkommen, setBruttoEinkommen] = React.useState("");
  const [nettoEinkommen, setNettoEinkommen] = React.useState("");
  const [unterhalt, setUnterhalt] = React.useState("");
  const [wohngeld, setWohngeld] = React.useState("");
  const [kindergeldBezieher, setKindergeldBezieher] = React.useState("ich");
  const [result, setResult] = React.useState(null);
  const [showDetail, setShowDetail] = React.useState(false);

  function addKind() {
    setKinder(function(k){ return k.concat([{id:Date.now(), alter:"8"}]); });
  }
  function removeKind(id) {
    setKinder(function(k){ return k.filter(function(c){ return c.id!==id; }); });
  }
  function setKindAlter(id, val) {
    setKinder(function(k){ return k.map(function(c){ return c.id===id ? {...c, alter:val} : c; }); });
  }

  function berechne() {
    var brutto = parseFloat(bruttoEinkommen)||0;
    var netto  = parseFloat(nettoEinkommen)||0;
    var unt    = parseFloat(unterhalt)||0;
    var wg     = parseFloat(wohngeld)||0;
    var anzK   = kinder.length;

    // Mindesteinkommensgrenze
    var minBrutto = personen === "allein" ? 645 : 955;
    // Höchsteinkommensgrenze: Grundbedarf + KdK + KZG_MAX * anzK
    var bedarfEltern = personen === "allein" ? REGELBEDARF_ALLEIN : 1125; // § 20 SGB II Paar
    var kdk = anzK * 357; // Kinderbedarf SGB II (Ø Grundbedarf Kind)
    var maxBrutto = bedarfEltern + kdk + KZG_MAX * anzK;

    var mindestGrenze = brutto >= minBrutto;
    var hoechstGrenze = netto <= maxBrutto;

    // KZG-Berechnung
    // Elterneinkommen das anrechenbar ist: netto + Unterhalt + Wohngeld - Elterneigenbedarf
    var eigenbedarf = personen === "allein" ? REGELBEDARF_ALLEIN : 1125;
    var anrechenbaresEink = Math.max(0, netto + unt - eigenbedarf - wg);
    // KZG je Kind: max KZG_MAX, Minderung um 45% des übersteigenden Einkommens
    var kzgJeKind = Math.max(0, KZG_MAX - anrechenbaresEink * 0.45 / anzK);
    kzgJeKind = Math.min(kzgJeKind, KZG_MAX);
    var kzgGesamt = kzgJeKind * anzK;

    // Zusammenspiel mit Bürgergeld: KZG + Kindergeld deckt Kindesbedarf?
    var kgGesamt = kindergeldBezieher === "ich" ? KINDERGELD * anzK : 0;
    var gesamtFamLeistung = kzgGesamt + kgGesamt + wg;
    var buergergeldBesser = !mindestGrenze || kzgGesamt < 10;

    var detailSchritte = [
      { label:"Anzahl Kinder", wert: anzK + " Kind(er)" },
      { label:"Haushalt", wert: personen === "allein" ? "Alleinerziehend" : "Paar" },
      { label:"Brutto-Einkommen", wert: brutto.toFixed(2) + " €" },
      { label:"Netto-Einkommen", wert: netto.toFixed(2) + " €" },
      { label:"Mindesteinkommensgrenze", wert: minBrutto + " € " + (mindestGrenze?"✅ erfüllt":"❌ nicht erfüllt") },
      { label:"Elterneigenbedarf", wert: eigenbedarf.toFixed(0) + " €" },
      { label:"Anrechenbares Einkommen", wert: anrechenbaresEink.toFixed(2) + " €" },
      { label:"KZG je Kind (max " + KZG_MAX + " €)", wert: kzgJeKind.toFixed(2) + " €" },
      { label:"Kindergeld gesamt", wert: kgGesamt.toFixed(0) + " €" },
      { label:"KZG + Kindergeld gesamt", wert: (kzgGesamt + kgGesamt).toFixed(2) + " €" },
    ];

    setResult({ kzgJeKind, kzgGesamt, kgGesamt, gesamtFamLeistung,
      mindestGrenze, hoechstGrenze, buergergeldBesser,
      anrechenbaresEink, detailSchritte, anzK, brutto, minBrutto });

    if(onSaveErgebnis && (mindestGrenze && kzgGesamt > 0)) {
      onSaveErgebnis({
        typ: "Kinderzuschlag (§ 6a BKGG)",
        rechtsbereich: "Sozialrecht",
        ergebnis: kzgGesamt.toFixed(0) + " €/Monat (" + anzK + " Kind" + (anzK>1?"er":"") + ")",
        details: "KZG " + kzgJeKind.toFixed(0) + " €/Kind" + (kindergeldBezieher==="ich" ? " + KG " + KINDERGELD + " € = " + (kzgJeKind+KINDERGELD).toFixed(0) + " €/Kind" : " (ohne KG – anderer Elternteil)"),
        detailSchritte,
        rechtsgrundlagen: ["§ 6a BKGG", "§ 6b BKGG", "§ 20 SGB II"]
      });
    }
  }

  return (
    <div>
      <h4 style={u.modTitle}>👶 Kinderzuschlag-Rechner</h4>
      <InfoBox typ="recht" titel="§ 6a BKGG – Kinderzuschlag 2025"
        kinder={<span>Max. <strong>292 €/Monat je Kind</strong> zusätzlich zum Kindergeld (250 €). Ziel: Familien knapp über Bürgergeld-Grenze aus dem SGB-II-Bezug herausholen. Mindestbrutto: <strong>645 € (Allein) / 955 € (Paar)</strong>.</span>} />

      <label style={u.sectionLabel}>Haushalt:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[["allein","👤 Alleinerziehend"],["paar","👫 Paar"]].map(function([v,l]){
          return (
            <button key={v} onClick={function(){setPersonen(v); setResult(null);}}
              style={{ flex:1, padding:"9px", borderRadius:"8px", border:"2px solid "+(personen===v?"#003366":"#ddd"),
                backgroundColor:personen===v?"#e8f0fb":"#f9f9f9", fontWeight:personen===v?"bold":"normal",
                cursor:"pointer", fontSize:"12px" }}>
              {l}
            </button>
          );
        })}
      </div>

      <label style={u.sectionLabel}>Kinder:</label>
      {kinder.map(function(k){
        return (
          <div key={k.id} style={{ display:"flex", gap:"8px", alignItems:"center", marginBottom:"6px" }}>
            <span style={{ fontSize:"11px", color:"#666", whiteSpace:"nowrap" }}>Kind {kinder.indexOf(k)+1}, Alter:</span>
            <input type="number" min="0" max="24" style={{ ...u.inputMini, width:"60px" }}
              value={k.alter} onChange={function(e){ setKindAlter(k.id, e.target.value); }} />
            <span style={{ fontSize:"9px", color:"#999" }}>Jahre</span>
            {kinder.length > 1 && (
              <button onClick={function(){ removeKind(k.id); }} style={u.btnDel}>✕</button>
            )}
          </div>
        );
      })}
      {kinder.length < 5 && (
        <button onClick={addKind} style={{ ...u.btnAdd, marginBottom:"10px" }}>+ Kind hinzufügen</button>
      )}

      <label style={u.sectionLabel}>Kindergeld-Bezug:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[["ich","✅ Ich beziehe Kindergeld"],["anderer","❌ Anderer Elternteil bezieht es"]].map(function([v,l]){
          return (
            <button key={v} onClick={function(){ setKindergeldBezieher(v); setResult(null); }}
              style={{ flex:1, padding:"9px", borderRadius:"8px", border:"2px solid "+(kindergeldBezieher===v?"#003366":"#ddd"),
                backgroundColor:kindergeldBezieher===v?"#e8f0fb":"#f9f9f9", fontWeight:kindergeldBezieher===v?"bold":"normal",
                cursor:"pointer", fontSize:"11px" }}>
              {l}
            </button>
          );
        })}
      </div>
      {kindergeldBezieher==="anderer" && (
        <InfoBox typ="warnung" titel="§ 64 EStG – Kindergeld beim betreuenden Elternteil"
          kinder={<span>Kindergeld wird an den betreuenden Elternteil ausgezahlt. Kein Kindergeld wird für diese Berechnung berücksichtigt.</span>} />
      )}

      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Brutto-Einkommen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 1800"
            value={bruttoEinkommen} onChange={function(e){ setBruttoEinkommen(e.target.value); setResult(null); }} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Netto-Einkommen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 1350"
            value={nettoEinkommen} onChange={function(e){ setNettoEinkommen(e.target.value); setResult(null); }} />
        </div>
      </div>
      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Unterhalt erhalten (€/Monat):</label>
          <input type="number" style={u.input} placeholder="0"
            value={unterhalt} onChange={function(e){ setUnterhalt(e.target.value); setResult(null); }} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Wohngeld (€/Monat, falls vorhanden):</label>
          <input type="number" style={u.input} placeholder="0"
            value={wohngeld} onChange={function(e){ setWohngeld(e.target.value); setResult(null); }} />
        </div>
      </div>

      <button style={u.btnPrimary} onClick={berechne}>👶 Kinderzuschlag berechnen</button>

      {result && (
        <div style={u.resultBox}>
          {!result.mindestGrenze && (
            <InfoBox typ="warnung" titel={"Mindesteinkommensgrenze nicht erreicht"}
              kinder={<span>Brutto-Einkommen {result.brutto.toFixed(0)} € &lt; {result.minBrutto} € Mindestgrenze. Kein Kinderzuschlag möglich. Bürgergeld (SGB II) prüfen.</span>} />
          )}
          {result.mindestGrenze && result.kzgGesamt < 10 && (
            <InfoBox typ="warnung" titel="Kein Kinderzuschlag"
              kinder={<span>Einkommen zu hoch – KZG wird auf 0 € reduziert. Kein Anspruch.</span>} />
          )}
          {result.mindestGrenze && result.kzgGesamt >= 10 && (
            <div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"10px" }}>
                <div style={{ backgroundColor:"#e8f0fb", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
                  <div style={{ fontSize:"10px", color:"#003366" }}>KZG je Kind</div>
                  <div style={{ fontSize:"18px", fontWeight:"bold", color:"#003366" }}>{result.kzgJeKind.toFixed(0)} €</div>
                  <div style={{ fontSize:"9px", color:"#666" }}>max. {KZG_MAX} €</div>
                </div>
                <div style={{ backgroundColor:"#e8f5e9", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
                  <div style={{ fontSize:"10px", color:"#1b5e20" }}>KZG gesamt + KG</div>
                  <div style={{ fontSize:"18px", fontWeight:"bold", color:"#1b5e20" }}>{(result.kzgGesamt+result.kgGesamt).toFixed(0)} €/Monat</div>
                  <div style={{ fontSize:"9px", color:"#666" }}>{result.anzK} Kind(er) × {(result.kzgJeKind+KINDERGELD).toFixed(0)} €</div>
                </div>
              </div>
              <InfoBox typ="positiv" titel={null}
                kinder={<span>KZG <strong>{result.kzgGesamt.toFixed(0)} €</strong> + Kindergeld <strong>{result.kgGesamt.toFixed(0)} €</strong> = <strong>{result.gesamtFamLeistung.toFixed(0)} €</strong> Familienleistung gesamt (inkl. {parseFloat(wohngeld)||0} € Wohngeld).</span>} />
              <InfoBox typ="empf" titel="Tipp: Wohngeld-Plus prüfen"
                kinder={<span>Kinderzuschlag + Wohngeld kombinierbar! § 6b BKGG erlaubt Bezug von KZG und Wohngeld gleichzeitig – prüfen ob Wohngeldrechner einen Anspruch zeigt.</span>} />
            </div>
          )}
          {result.buergergeldBesser && result.mindestGrenze && (
            <InfoBox typ="warnung" titel="Bürgergeld möglicherweise günstiger"
              kinder={<span>Bei sehr niedrigem KZG kann SGB II (Bürgergeld) vorteilhafter sein – Vergleichsrechnung empfohlen.</span>} />
          )}

          <details open={showDetail} onToggle={function(e){ setShowDetail(e.target.open); }}>
            <summary style={{ fontSize:"10px", cursor:"pointer", color:"#003366", fontWeight:"bold", marginTop:"8px" }}>▶ Detailrechnung anzeigen</summary>
            <div style={{ backgroundColor:"#fff", border:"1px solid #ddd", borderRadius:"6px", padding:"8px", marginTop:"6px" }}>
              {result.detailSchritte.map(function(s,i){
                return (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:"11px", borderBottom:"1px solid #f5f5f5", padding:"3px 0" }}>
                    <span style={{ color:"#666" }}>{s.label}</span>
                    <span style={{ fontWeight:"bold" }}>{s.wert}</span>
                  </div>
                );
              })}
              <div style={{ fontSize:"9px", color:"#999", marginTop:"6px" }}>
                Rechtsgrundlagen: § 6a BKGG · § 6b BKGG · § 20 SGB II · Stand 01.01.2025
              </div>
            </div>
          </details>
        </div>
      )}
    </div>
  );
}

// =============================================
// BERECHNUNG MIT DATEN – Rechner vorausgefüllt
// =============================================
function MehrDatenView({ ext }) {
  if (!ext) return null;
  const sh = { fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"6px", letterSpacing:"0.5px" };
  const kb = { backgroundColor:"#f9f9f9", borderRadius:"8px", padding:"10px", marginBottom:"8px", borderLeft:"3px solid #00afad" };
  const kr = { display:"flex", justifyContent:"space-between", fontSize:"12px", paddingBottom:"3px", borderBottom:"1px solid #eee", marginBottom:"3px" };
  const dr = { display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #f5f5f5", fontSize:"13px" };
  const kinder = Array.isArray(ext.kinder) ? ext.kinder : [];
  return (
    <div style={{ marginTop:"12px" }}>
      <div style={sh}>👨‍👩‍👧 Familiensituation</div>
      {ext.familienstand && <div style={dr}><span>Familienstand:</span><strong>{ext.familienstand}</strong></div>}
      <div style={dr}><span>Alleinerziehend:</span><strong>{ext.alleinerziehend ? "Ja" : "Nein"}</strong></div>
      {ext.betreuungsmodell && <div style={dr}><span>Betreuungsmodell:</span><strong style={{ fontSize:"12px" }}>{ext.betreuungsmodell}</strong></div>}

      {kinder.length > 0 && (
        <div>
          <div style={sh}>👶 Kinder</div>
          {kinder.map((k, i) => (
            <div key={i} style={kb}>
              <div style={{ fontWeight:"bold", fontSize:"13px", marginBottom:"4px" }}>Kind {i+1}: {k.name}</div>
              {k.geburt && <div style={kr}><span>Geburtsdatum:</span><span>{k.geburt}</span></div>}
              {k.alter && <div style={kr}><span>Altersgruppe:</span><span>{k.alter}</span></div>}
              {k.wohnort && <div style={kr}><span>Wohnort:</span><span>{k.wohnort}</span></div>}
              <div style={kr}><span>UVG:</span><span>{k.uvg ? "✅ Ja" : "❌ Nein"}</span></div>
              <div style={kr}><span>Kindergeld:</span><span>{k.kg ? "✅ Ja" : "❌ Nein"}</span></div>
            </div>
          ))}
        </div>
      )}

      <div style={sh}>💶 Einkommen & Leistungen</div>
      {ext.einkommenNetto != null && <div style={dr}><span>Nettoeinkommen:</span><strong>{ext.einkommenNetto} EUR</strong></div>}
      {ext.einkommenGegenseite > 0 && <div style={dr}><span>Einkommen Gegenseite:</span><strong>{ext.einkommenGegenseite} EUR</strong></div>}
      {ext.einkommenArt && <div style={dr}><span>Art:</span><strong style={{ fontSize:"12px" }}>{ext.einkommenArt}</strong></div>}
      {ext.uvgBetrag > 0 && <div style={dr}><span>Unterhaltsvorschuss:</span><strong>{ext.uvgBetrag} EUR/Monat</strong></div>}
      {ext.kindergeldBetrag != null && <div style={dr}><span>Kindergeld:</span><strong>{ext.kindergeldBetrag} EUR/Monat</strong></div>}
      {ext.kindergeldEmpf && <div style={dr}><span>KG-Empfänger:</span><strong style={{ fontSize:"12px" }}>{ext.kindergeldEmpf}</strong></div>}

      {(ext.unterhaltsTitel != null || ext.unterhaltBetrag > 0) && (
        <div>
          <div style={sh}>⚖️ Unterhalt</div>
          <div style={dr}><span>Unterhaltstitel:</span><strong>{ext.unterhaltsTitel ? "✅ Vorhanden" : "❌ Kein Titel"}</strong></div>
          {ext.unterhaltBetrag > 0 && <div style={dr}><span>Betrag:</span><strong>{ext.unterhaltBetrag} EUR/Monat</strong></div>}
        </div>
      )}

      {(ext.wohnungGroesse || ext.mieteWarm || ext.mieteKalt || ext.heizkosten || ext.mietStufe) && (
        <div>
