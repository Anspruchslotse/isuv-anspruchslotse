                    + Mitglied
                  </div>
                  <span>{showMemberList ? "▲" : "▼"}</span>
                </div>
              </div>
              {showMemberList && (
                <div style={{ marginTop: "10px" }}>
                  <input style={styles.input} placeholder="Suchen nach Name, Ort, Tel..." onChange={e => setSearchTerm(e.target.value)} />
                  {(function() {
                    var term = searchTerm.toLowerCase();
                    var filtered = members.filter(function(m) {
                      return (m.vorname + " " + m.name + " " + m.ort + " " + m.tel + " " + m.plz).toLowerCase().includes(term) ||
                        ((memberExtras[m.id] && memberExtras[m.id].familienstand || "").toLowerCase().includes(term));
                    });
                    var pinned = filtered.filter(function(m) { return pinnedIds.includes(m.id); });
                    var unpinned = filtered.filter(function(m) { return !pinnedIds.includes(m.id); });

                    return sortedMembers.map(function(m) {

                      return (

                        <div onClick={() => { setActiveMember(m); setView("akte"); }} style={{ flex: 1, cursor: "pointer" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                            {isPinned && <span style={{ fontSize:"10px" }}>📌</span>}
                            <strong>{m.name}, {m.vorname}</strong>
                          </div>
                          <div style={{ fontSize: "11px", color: "#666" }}>📞 {m.tel} | ✉️ {m.mail}{m.ort ? " | 📍 "+m.ort : ""}</div>
                        </div>
                        <div style={{ position: "relative" }}>
                          <button style={styles.btnDots} onClick={() => setOpenActionMenuId(openActionMenuId === m.id ? null : m.id)}>⋮</button>
                          {openActionMenuId === m.id && (
                            <div style={styles.actionMenu}>
                              <div style={styles.menuItem} onClick={() => { setActiveMember(m); setView("akte"); setOpenActionMenuId(null); }}>📋 Akte</div>
                              <div style={styles.menuItem} onClick={() => { setFormularVersandDialogNeu({ member: m, formTyp: "stammdaten" }); setVersandFelder(null); setOpenActionMenuId(null); }}>✉️ Formular senden</div>
                              <div style={styles.menuItem} onClick={() => { setActiveMember(m); setView("berechnung"); setBerechnungRechner(null); setBerechnungKategorie(null); setOpenActionMenuId(null); }}>🧮 Berechnung</div>
                              <div style={styles.menuItem} onClick={function() { setPinnedIds(function(prev) { return isPinned ? prev.filter(function(x){return x!==m.id;}) : [...prev,m.id]; }); setOpenActionMenuId(null); }}>
                                {isPinned ? "📌 Entpinnen" : "📌 Anpinnen"}
                              </div>
                              <div style={{ ...styles.menuItem, color:"#e53935", borderBottom:"none" }} onClick={() => { if(window.confirm("Mitglied " + m.vorname + " " + m.name + " wirklich löschen?")) { setMembers(prev => prev.filter(x => x.id !== m.id)); setOpenActionMenuId(null); } }}>🗑️ Löschen</div>
                            </div>
                          )}
                        </div>
                      </div>
                      );
                    });
                  })()}
                </div>
              )}
            </div>

            {/* FORMULARE + EINGANG */}
            <div style={styles.card}>
              <div onClick={() => setShowFormulare(!showFormulare)} style={styles.reiterHeader}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <h3 style={{ margin:0, fontSize:"14px" }}>📄 Formulare</h3>
                  {eingangFormulare.length > 0 && (
                    <span style={{ backgroundColor:"#e53935", color:"#fff", borderRadius:"50%", width:"18px", height:"18px", fontSize:"10px", fontWeight:"bold", display:"flex", alignItems:"center", justifyContent:"center" }}>{eingangFormulare.length}</span>
                  )}
                  {ausgangFormulare.filter(function(a){ return a.status==="unbeantwortet"; }).length > 0 && (
                    <span style={{ backgroundColor:"#f57c00", color:"#fff", borderRadius:"50%", width:"18px", height:"18px", fontSize:"10px", fontWeight:"bold", display:"flex", alignItems:"center", justifyContent:"center" }}>{ausgangFormulare.filter(function(a){ return a.status==="unbeantwortet"; }).length}</span>
                  )}
                </div>
                <span>{showFormulare ? "▲" : "▼"}</span>
              </div>
              {showFormulare && (
                <div style={{ marginTop:"10px" }}>
                  {/* ── PDF Download aller Ausgangs-Formulare ── */}
                  {ausgangFormulare.length > 0 && (
                    <button
                      onClick={function() {
                        var jsPDF = getJsPDF();
                        if (!jsPDF) { alert("PDF-Bibliothek nicht geladen. Bitte Seite neu laden."); return; }
                        try {
                        var doc = new jsPDF();
                        var y = 20;
                        doc.setFontSize(14);
                        doc.setTextColor(0, 51, 102);
                        doc.text("ISUV Anspruchslotse – Formularübersicht", 20, y); y += 10;
                        doc.setFontSize(9);
                        doc.setTextColor(150);
                        doc.text("Erstellt: " + new Date().toLocaleDateString("de-DE"), 20, y); y += 14;
                        ausgangFormulare.forEach(function(af) {
                          if (y > 260) { doc.addPage(); y = 20; }
                          doc.setFontSize(11);
                          doc.setTextColor(0);
                          doc.text((af.typ || "Formular") + (af.mitglied ? " – " + af.mitglied : ""), 20, y); y += 7;
                          doc.setFontSize(9);
                          doc.setTextColor(80);
                          doc.text("Datum: " + (af.datum || "–") + " · Status: " + (af.status || "–") + " · Kanal: " + (af.kanal || "–"), 20, y); y += 5;
                          if (af.empfaenger) { doc.text("Empfänger: " + af.empfaenger, 20, y); y += 5; }
                          if (af.formLink) { doc.text("Link: " + af.formLink, 20, y); y += 5; }
                          y += 6;
                        });
                        doc.save("ISUV_Formulare_" + new Date().toISOString().slice(0,10) + ".pdf");
                        } catch(err) { alert("PDF-Fehler: " + err.message); }
                      }}
                      style={{ width:"100%", padding:"9px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"7px", cursor:"pointer", fontWeight:"bold", fontSize:"12px", marginBottom:"12px" }}>
                      📥 Alle Formulare als PDF herunterladen
                    </button>
                  )}
                  {/* ── SOZIALRECHT – ein-/ausklappbar ── */}
                  <div onClick={function(){ setShowSozialrechtFormulare(function(p){ return !p; }); }}
                    style={{ fontSize:"10px", fontWeight:"bold", color:"#1b5e20", textTransform:"uppercase", backgroundColor:"#e8f5e9", borderRadius:"5px", padding:"5px 8px", marginBottom:"8px", letterSpacing:"0.5px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span>🏛️ Sozialrecht (SGB II / WoGG)</span>
                    <span>{showSozialrechtFormulare ? "▲" : "▼"}</span>
                  </div>
                  {showSozialrechtFormulare && [
                    { id:"stammdaten", label:"📋 Stammdaten-Fragebogen", desc:"Persönliche Daten, Einkommen, Wohnen", farbe:"#1b5e20" },
                    { id:"buergergeld", label:"🏛️ Bürgergeld-Fragebogen", desc:"ALG II / SGB II – Bedarf & Einkommen", farbe:"#1b5e20" },
                    { id:"tbg", label:"📋 Anlage TBG (Bürgergeld)", desc:"Temporäre Bedarfsgemeinschaft", farbe:"#1b5e20" },
                  ].map(function(f) {
                    return (
                      <div key={f.id}
                        style={{ backgroundColor:"#f9f9f9", borderRadius:"8px", padding:"12px", marginBottom:"8px", borderLeft:"4px solid "+(f.farbe||"#003366"), cursor:"pointer", transition:"background-color 0.15s, box-shadow 0.15s" }}
                        onClick={function() {
                          if (f.id === "stammdaten") { setView("formular_ausfuellen"); setFormFelderDaten({}); }
                          else if (f.id === "buergergeld") { setView("buergergeld_form"); setFormFelderDaten({}); }
                          else { setView("tbg_form"); }
                        }}
                        onMouseEnter={function(e){ e.currentTarget.style.backgroundColor="#edf2fb"; e.currentTarget.style.boxShadow="0 2px 8px rgba(0,51,102,0.15)"; }}
                        onMouseLeave={function(e){ e.currentTarget.style.backgroundColor="#f9f9f9"; e.currentTarget.style.boxShadow="none"; }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <div style={{ fontWeight:"bold", fontSize:"13px" }}>{f.label}</div>
                            <div style={{ fontSize:"10px", color:"#999", marginTop:"2px" }}>{f.desc}</div>

                            <button

                              📤 Senden
                            </button>
                          </div>
                        </div>
                        {versandMail[f.id + "_sendDialog"] && (
                          <div style={{ marginTop:"10px", backgroundColor:"#e8f0fb", borderRadius:"6px", padding:"10px" }}>
                            <div style={{ fontSize:"11px", color:"#555", marginBottom:"6px", fontWeight:"bold" }}>✉️ An welche E-Mail-Adresse senden?</div>
                            <div style={{ display:"flex", gap:"6px" }}>
                              <input
                                style={{ flex:1, padding:"7px 10px", border:"1px solid #ddd", borderRadius:"6px", fontSize:"12px", boxSizing:"border-box" }}
                                placeholder="empfaenger@beispiel.de"
                                value={versandMail[f.id + "_sendMail"] || ""}
                                onChange={function(e) { setVersandMail(function(prev) { return Object.assign({}, prev, {[f.id + "_sendMail"]: e.target.value}); }); }}
                                autoFocus
                              />
                              <button
                                onClick={function() {

                                  var formLabel = f.label.replace("📋 ", "").replace("🏛️ ", "");

                                    return prev.concat([{ id: Date.now(), typ: formLabel, empfaenger: mail, mitglied: null, datum: ds, status: "unbeantwortet", kanal: "✉️ E-Mail", vorausgefuellt: false }]);

                              <button
                                onClick={function() { setVersandMail(function(prev) { return Object.assign({}, prev, {[f.id + "_sendDialog"]: false}); }); }}

                              </button>

          // Unterschriften-Canvas Komponente
          var SignatureCanvas = function(props) {
            var canvasRef = useRef(null);
            var drawing = useRef(false);
            var lastPos = useRef(null);
            var getPos = function(canvas, evt) {
              var rect = canvas.getBoundingClientRect();
              var scaleX = canvas.width / rect.width;
              var scaleY = canvas.height / rect.height;
              var src = evt.touches ? evt.touches[0] : evt;
              return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
            };
            var startDraw = function(e) {
              e.preventDefault();
              drawing.current = true;
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              var pos = getPos(canvas, e);
              ctx.beginPath();
              ctx.moveTo(pos.x, pos.y);
              lastPos.current = pos;
            };
            var draw = function(e) {
              e.preventDefault();
              if(!drawing.current) return;
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              ctx.lineWidth = 2.5;
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.strokeStyle = "#003366";
              var pos = getPos(canvas, e);
              ctx.lineTo(pos.x, pos.y);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(pos.x, pos.y);
              lastPos.current = pos;
            };
            var stopDraw = function(e) {
              if(!drawing.current) return;
              drawing.current = false;
              var canvas = canvasRef.current;
              props.onChange(canvas.toDataURL());
            };
            var clear = function() {
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              ctx.clearRect(0,0,canvas.width,canvas.height);
              props.onChange("");

              {/* ─── Kinder ─── */}

                  return m+v;

                  zeilen.push("Staatsangehörigkeit: "+(f.bgStaatsbuergerschaft||"–"));
                  zeilen.push("");
