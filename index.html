    body { margin: 0; background: #e8edf2; }

    @media (min-width: 600px) {

const rStyles = {
  modTitle: { fontSize: "14px", color: "#003366", fontWeight: "bold", margin: "0 0 12px 0", paddingBottom: "8px", borderBottom: "2px solid #00afad" },
  input: { width: "100%", padding: "10px", marginBottom: "10px", borderRadius: "6px", border: "1px solid #ddd", boxSizing: "border-box", fontSize: "13px" },

  filterSection: { backgroundColor: "#f0f4f7", padding: "10px", borderRadius: "10px", margin: "10px 0" },
  childBox: { backgroundColor: "#fff", padding: "10px", borderRadius: "6px", marginBottom: "8px" },
  tagCloud: { display: "flex", flexWrap: "wrap", gap: "5px", marginTop: "5px", marginBottom: "8px" },
  bedarfRow: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "4px" },

  inputMini: { padding: "4px", fontSize: "11px", borderRadius: "4px", border: "1px solid #ddd" },
  // PC-Optimierung: 2-Spalten Grid für Formulare
  pcGrid2: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" },

// Blau=Rechtliche Info, Gelb=Empfehlung,

var infoColors = {
  recht:   { bg:"#e8f0fb", border:"#3b6ec4", color:"#003366", icon:"⚖️", badge:"Rechtliche Info" },
  empf:    { bg:"#fffde7", border:"#f9a825", color:"#7a5800", icon:"💡", badge:"Tipp" },
  positiv: { bg:"#e8f5e9", border:"#43a047", color:"#1b5e20", icon:"✅", badge:"Gut zu wissen" },
  warnung: { bg:"#ffebee", border:"#e53935", color:"#b71c1c", icon:"⚠️", badge:"Wichtig" },
  vergl:   { bg:"#f3e5f5", border:"#8e24aa", color:"#4a148c", icon:"🔀", badge:"Rechtsvergleich" },
  frist:   { bg:"#fff3e0", border:"#ef6c00", color:"#bf360c", icon:"⏰", badge:"Frist" },
  sozial:  { bg:"#e0f2f1", border:"#00897b", color:"#004d40", icon:"🏛️", badge:"Sozialrecht" },
};
function InfoBox({ typ, titel, kinder, style, noBadge }) {
  var c2 = infoColors[typ] || infoColors.recht;
  return (

function MehrbedarfAlleinerziehende() {
  const [modell, setModell] = useState("");
  const [kinderKonf, setKinderKonf] = useState("1u7");
  const [result, setResult] = useState(null);
  const regelbedarf = 563;

  const konstellationen = [
    { id: "1u7", label: "1 Kind unter 7 Jahren (36%)", prozent: 36 },
    { id: "1ue7", label: "1 Kind über 7 Jahren (12%)", prozent: 12 },
    { id: "23u16", label: "2–3 Kinder unter 16 Jahren (36%)", prozent: 36 },
    { id: "2ue16", label: "2 Kinder über 16 Jahren (24%)", prozent: 24 },
    { id: "4k", label: "4 Kinder generell (48%)", prozent: 48 },
    { id: "5k", label: "Ab 5 Kinder (60%)", prozent: 60 },
  ];

  const berechne = () => {
    const kons = konstellationen.find(k => k.id === kinderKonf);
    if (!kons) return;
    let prozent = kons.prozent;
    let hinweis = "";
    if (modell === "paritaetisch") { prozent = prozent / 2; hinweis = "Beim paritätischen Wechselmodell wird der Mehrbedarf hälftig aufgeteilt (BA-Weisung Ziff. 21.11)."; }
    else if (modell === "asymmetrisch") { hinweis = "Beim asymmetrischen Modell erhält nur der hauptbetreuende Elternteil den vollen Mehrbedarf."; }
    setResult({ prozent: prozent.toFixed(1), betrag: (regelbedarf * prozent / 100).toFixed(2), hinweis });
  };

  const u = rStyles;
  return (
    <div>
      <h4 style={u.modTitle}>👨‍👧 Mehrbedarf Alleinerziehende (§ 21 Abs.3 SGB II)</h4>
      <div style={u.infoBox}>ℹ️ Bezugsgröße: Regelbedarf = 563,00 €. Mehrbedarf darf Regelbedarf nicht übersteigen.</div>
      <label style={u.sectionLabel}>Kinderkonstellation:</label>
      <select style={u.input} value={kinderKonf} onChange={e => setKinderKonf(e.target.value)}>
        {konstellationen.map(k => <option key={k.id} value={k.id}>{k.label}</option>)}
      </select>
      <label style={u.sectionLabel}>Betreuungsmodell:</label>
      <div style={{ display: "flex", flexDirection: "column", gap: "6px", marginBottom: "12px" }}>
        {[{ id: "paritaetisch", label: "Paritätisches Wechselmodell (ca. 50:50) → Mehrbedarf wird geteilt" }, { id: "asymmetrisch", label: "Asymmetrisches / Residenzmodell → voller Mehrbedarf" }].map(m => (
          <label key={m.id} style={{ display: "flex", alignItems: "flex-start", gap: "8px", fontSize: "12px", cursor: "pointer" }}>
            <input type="radio" name="modell_mb" value={m.id} checked={modell === m.id} onChange={() => setModell(m.id)} style={{ marginTop: "2px" }} />{m.label}
          </label>
        ))}
      </div>
      <button style={u.btnPrimary} onClick={berechne} disabled={!modell}>Berechnen</button>
      {result && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Regelbedarf:</span><span>563,00 €</span></div>
          <div style={u.calcStep}><span>Mehrbedarf-Prozentsatz:</span><span>{result.prozent} %</span></div>
          <div style={{ ...u.calcStep, borderTop: "1px solid #00afad", fontWeight: "bold", marginTop: "5px", paddingTop: "5px" }}><span>Mehrbedarf monatlich:</span><span>{result.betrag} €</span></div>
          {result.hinweis && <div style={{ ...u.infoBox, marginTop: "10px" }}>📋 {result.hinweis}</div>}
        </div>
      )}
    </div>
  );
}

// =============================================
// =============================================
// MODUL 5: FAHRTKOSTEN UMGANG – erweitert mit Rechtsprechung
// =============================================
function FahrtkostenUmgang({ ext, onSaveErgebnis, changedFields }) {
  var u = rStyles;
  // Intelligente Vorausfüllung aus Akte
  var initKm = ext && ext.fahrtkostenKm ? String(ext.fahrtkostenKm) : "";
  var initFahrten = ext && ext.fahrtkostenFahrtenProMonat ? String(ext.fahrtkostenFahrtenProMonat) : "";
  var initModell = ext && ext.betreuungsmodell ? (
    ext.betreuungsmodell.toLowerCase().includes("wechsel") ? "wechsel" :
    ext.betreuungsmodell.toLowerCase().includes("parit") ? "wechsel" : "umgang"
  ) : "umgang";

  const [modell, setModell] = React.useState(initModell);
  const [km, setKm] = React.useState(initKm);
  const [fahrtenProMonat, setFahrtenProMonat] = React.useState(initFahrten);
  const [kmSatz, setKmSatz] = React.useState("0.20");
  const [rechtsBasis, setRechtsBasis] = React.useState("jobcenter");
  const [uebernachtung, setUebernachtung] = React.useState("");
  const [telefon, setTelefon] = React.useState("");
  const [sonstige, setSonstige] = React.useState("");
  const [result, setResult] = React.useState(null);
  const [showDetail, setShowDetail] = React.useState(false);

  var rechtsBasisOptionen = [
    { id: "jobcenter", label: "Jobcenter (§ 21 VI SGB II)", kmSatz: "0.20",
      hinweis: "Jobcenter gewährt Fahrtkosten als Mehrbedarf nach § 21 Abs. 6 SGB II bei regelmäßigem Umgang. Einzelfallentscheidung, oft 0,20 €/km. Belege und Umgangsregelung erforderlich." },
    { id: "bgh", label: "Unterhalt BGH (XII ZB 234/15)", kmSatz: "0.25",
      hinweis: "BGH: Fahrtkosten für Umgang beim barunterhaltspflichtigen Elternteil als bereinigtes Einkommen abziehbar (0,20–0,30 €/km je nach OLG). Mindert Unterhaltspflicht." },
    { id: "olg", label: "OLG-Durchschnitt (Unterhaltsrecht)", kmSatz: "0.30",
      hinweis: "Viele OLG erkennen bis 0,30 €/km an, ggf. auch höher bei weiter Entfernung. Als Abzug beim bereinigten Einkommen oder direkte Aufteilung zwischen Eltern." },
    { id: "wohngeld", label: "Wohngeld (§ 16 WoGG)", kmSatz: "0.20",
      hinweis: "Bei Wohngeld: Fahrtkosten zum Umgang sind kein direkter Abzugsposten, können aber als außergewöhnliche Belastung das relevante Jahreseinkommen mindern." },
  ];

  var aktuelleBasis = rechtsBasisOptionen.find(function(r) { return r.id === rechtsBasis; }) || rechtsBasisOptionen[0];

  function berechne() {
    var kmZahl = parseFloat(km) || 0;
    var fahrten = parseFloat(fahrtenProMonat) || 0;
    var satz = parseFloat(kmSatz) || 0.20;
    // Hin- und Rückfahrt
    var kmProFahrt = kmZahl * 2;
    var kmGesamt = kmProFahrt * fahrten;
    var fahrtkostenMtl = kmGesamt * satz;
    var uebMtl = parseFloat(uebernachtung) || 0;
    var telMtl = parseFloat(telefon) || 0;
    var sonsMtl = parseFloat(sonstige) || 0;
    var gesamt = fahrtkostenMtl + uebMtl + telMtl + sonsMtl;
    // Jahreswert
    var jahrFahrt = fahrtkostenMtl * 12;
    var jahrGes = gesamt * 12;
    // Steuerlicher Wert (außergewöhnliche Belastung)
    var steuerWert = Math.max(0, jahrGes - 300); // vereinfacht

    var res = {
      kmZahl, fahrten, kmProFahrt, kmGesamt, satz,
      fahrtkostenMtl, uebMtl, telMtl, sonsMtl,
      gesamt, jahrFahrt, jahrGes, steuerWert,
      basis: aktuelleBasis
    };
    setResult(res);
    if (onSaveErgebnis) onSaveErgebnis({
      typ: "Fahrtkosten Umgang (" + aktuelleBasis.label + ")",
      ergebnis: gesamt.toFixed(2) + " €/Monat",
      details: kmGesamt.toFixed(0) + " km/Monat × " + satz.toFixed(2) + " €/km"
    });
  }

  var changedHint = changedFields && changedFields.length > 0 ? (
    <div style={{ backgroundColor:"#fff3cd", border:"1px solid #ffc107", borderRadius:"7px", padding:"8px 10px", marginBottom:"10px", fontSize:"11px", color:"#856404" }}>
      ⚠️ <strong>Daten geändert</strong> am {new Date().toLocaleDateString("de-DE")}: {changedFields.join(", ")} – Berechnung aktualisieren!
    </div>
  ) : null;

  return (
    <div>
      <h4 style={u.modTitle}>🚗 Fahrtkosten Umgang – Rechtsprechung</h4>
      {changedHint}
      {(ext && ext.betreuungsmodell) && (
        <div style={u.infoBox}>📂 Betreuungsmodell aus Akte: <strong>{ext.betreuungsmodell}</strong></div>
      )}

      <label style={u.sectionLabel}>Betreuungssituation:</label>
      <div style={{ display:"flex", gap:"6px", marginBottom:"12px", flexWrap:"wrap" }}>
        {[
          { id:"umgang", label:"Umgang (Residenz)" },
          { id:"wechsel", label:"Wechselmodell" },
          { id:"fern", label:"Fernkontakt (>100km)" }
        ].map(function(o) {
          return <div key={o.id} onClick={function(){ setModell(o.id); }}
            style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"11px", cursor:"pointer",
              backgroundColor: modell===o.id ? "#00afad" : "#eee",
              color: modell===o.id ? "#fff" : "#333" }}>{o.label}</div>;
        })}
      </div>

      <label style={u.sectionLabel}>Rechtliche Grundlage / Berechnung nach:</label>
      <div style={{ marginBottom:"12px" }}>
        {rechtsBasisOptionen.map(function(rb) {
          return (
            <label key={rb.id} style={{ display:"flex", gap:"8px", fontSize:"11px", cursor:"pointer", alignItems:"center", marginBottom:"6px", padding:"6px 8px", borderRadius:"6px", backgroundColor: rechtsBasis===rb.id ? "#e8f0fb" : "transparent", border: rechtsBasis===rb.id ? "1px solid #003366" : "1px solid transparent" }}>
              <input type="radio" name="rb" checked={rechtsBasis===rb.id} onChange={function(){ setRechtsBasis(rb.id); setKmSatz(rb.kmSatz); }} />
              <div>
                <div style={{ fontWeight:"bold" }}>{rb.label}</div>
              </div>
            </label>
          );
        })}
      </div>

      <div style={{ backgroundColor:"#e8f4fd", border:"1px solid #bee5f8", borderRadius:"7px", padding:"8px 10px", marginBottom:"12px", fontSize:"11px", color:"#003366" }}>
        ℹ️ {aktuelleBasis.hinweis}
      </div>

      <label style={u.sectionLabel}>Entfernung einfach (km):</label>
      <input type="number" style={u.input} placeholder="z.B. 45" value={km} onChange={function(e){ setKm(e.target.value); }} />
      {km && <div style={{ fontSize:"10px", color:"#666", marginBottom:"8px" }}>Hin- und Rückfahrt: {(parseFloat(km)||0)*2} km</div>}

      <label style={u.sectionLabel}>Fahrten pro Monat (Hin- und Rückfahrt = 1 Fahrt):</label>
      <input type="number" style={u.input} placeholder="z.B. 4" value={fahrtenProMonat} onChange={function(e){ setFahrtenProMonat(e.target.value); }} />
      {modell === "wechsel" && <div style={{ fontSize:"10px", color:"#00afad", marginBottom:"8px" }}>💡 Bei Wechselmodell: ca. 8–10 Fahrten/Monat typisch (14-tägig)</div>}
      {modell === "fern" && <div style={{ fontSize:"10px", color:"#e65100", marginBottom:"8px" }}>⚠️ Fernkontakt: OLG prüft Zumutbarkeit. BGH: Kosten können aufgeteilt werden.</div>}

      <label style={u.sectionLabel}>Kilometersatz (€/km):</label>
      <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
        {["0.20","0.25","0.30","0.35"].map(function(s) {

// =============================================
// MODUL 6: TEMPORÄRE BEDARFSGEMEINSCHAFT (TBG)
// =============================================
function TemporaereBedarfsgemeinschaft() {
  const [modell, setModell] = useState("");
  const [kalender, setKalender] = useState(Array(12).fill({ antragsteller: "", anderer: "" }));
  const [regelbedarf] = useState(563);
  const [kgEmpfänger, setKgEmpfänger] = useState("");
  const [kgBetrag, setKgBetrag] = useState("250");
  const [kgGeteilt, setKgGeteilt] = useState("");
  const [result, setResult] = useState(null);

  const monate = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];

  const updateKalender = (idx, seite, val) => {
    setKalender(kalender.map((m, i) => i === idx ? { ...m, [seite]: val } : m));
  };

  const kgFragenVollstaendig = () => {
    if (!kgEmpfänger) return false;
    if (modell === "paritaetisch" && kgEmpfänger === "anderer" && !kgGeteilt) return false;
    return true;
  };

  const berechne = () => {
    const tageA = kalender.reduce((s, m) => s + parseFloat(m.antragsteller || 0), 0);
    const tageB = kalender.reduce((s, m) => s + parseFloat(m.anderer || 0), 0);
    const gesamtTage = tageA + tageB;
    if (gesamtTage === 0) return;
    const anteilA = tageA / gesamtTage;
    const anteilB = tageB / gesamtTage;
    const regelbedarfKind = 390;
    const mbGesamt = regelbedarf * 36 / 100;
    let regelA = 0, regelB = 0, mehrA = 0, mehrB = 0, hinweis = "";
    if (modell === "paritaetisch") {
      regelA = regelbedarfKind * 0.5; regelB = regelbedarfKind * 0.5;
      mehrA = mbGesamt / 2; mehrB = mbGesamt / 2;
      hinweis = "Paritätisches Modell: Regelbedarf Kind und Mehrbedarf § 21 werden je hälftig aufgeteilt (BA-Weisung Ziff. 21.11).";
    } else {
      regelA = regelbedarfKind * anteilA; regelB = regelbedarfKind * anteilB;
      if (anteilA >= anteilB) { mehrA = mbGesamt; } else { mehrB = mbGesamt; }
      hinweis = "Asymmetrisches Modell: Regelbedarfsanteil tagesanteilig. Mehrbedarf § 21 nur für den hauptbetreuenden Elternteil.";
    }
    const kg = parseFloat(kgBetrag || 0);
    let kgAntragsteller = 0, kgHinweis = "";
    if (kgEmpfänger === "antragsteller") {
      kgAntragsteller = kg;
      kgHinweis = "Das Kindergeld wird beim Antragsteller als Einkommen angerechnet und mindert den Bürgergeld-Anspruch.";
    } else if (kgEmpfänger === "anderer") {
      if (modell === "paritaetisch" && kgGeteilt === "ja") {
        kgAntragsteller = kg / 2;
        kgHinweis = "Das Kindergeld wird hälftig geteilt. Der Anteil (" + (kg / 2).toFixed(2) + " €) wird angerechnet.";
      } else {
        kgHinweis = "Das Kindergeld verbleibt beim anderen Elternteil und wird beim Antragsteller nicht angerechnet.";
      }
    }
    setResult({
      tageA: tageA.toFixed(0), tageB: tageB.toFixed(0),
      anteilA: (anteilA * 100).toFixed(1), anteilB: (anteilB * 100).toFixed(1),
      regelA: regelA.toFixed(2), regelB: regelB.toFixed(2),
      mehrA: mehrA.toFixed(2), mehrB: mehrB.toFixed(2),
      gesamtB: (regelB + mehrB).toFixed(2),
      kgAntragsteller: kgAntragsteller.toFixed(2),
      kgHinweis, hinweis,
      nettoA: Math.max(0, regelA + mehrA - kgAntragsteller).toFixed(2)
    });
  };

  const u = rStyles;
  const bereit = modell && kgFragenVollstaendig();

  return (
    <div>
      <h4 style={u.modTitle}>🏠 Temporäre Bedarfsgemeinschaft (TBG)</h4>
      <div style={u.infoBox}>ℹ️ Berechnung der Leistungsaufteilung bei zeitweisem Aufenthalt des Kindes in beiden Haushalten.</div>

      <label style={u.sectionLabel}>Schritt 1 – Betreuungsmodell:</label>
      <div style={{ display: "flex", flexDirection: "column", gap: "6px", marginBottom: "12px" }}>
        <label style={{ display: "flex", alignItems: "flex-start", gap: "8px", fontSize: "12px", cursor: "pointer" }}>
          <input type="radio" name="tbg_m" checked={modell === "paritaetisch"} onChange={() => { setModell("paritaetisch"); setKgGeteilt(""); setResult(null); }} style={{ marginTop: "2px" }} />
          <span><strong>Paritätisches Wechselmodell</strong> – ca. 50:50 (13/17, 14/16 oder 15/15 Tage)</span>
        </label>
        <label style={{ display: "flex", alignItems: "flex-start", gap: "8px", fontSize: "12px", cursor: "pointer" }}>
          <input type="radio" name="tbg_m" checked={modell === "asymmetrisch"} onChange={() => { setModell("asymmetrisch"); setKgGeteilt(""); setResult(null); }} style={{ marginTop: "2px" }} />
          <span><strong>Asymmetrisches Wechselmodell / Residenzmodell</strong> – 2–12 Tage beim anderen Elternteil</span>
        </label>
      </div>

      {modell && (
        <>
          <label style={u.sectionLabel}>Schritt 2 – Kalender: Tage pro Monat (Übernachtungen):</label>
          <div style={{ backgroundColor: "#f0f4f7", borderRadius: "8px", padding: "10px", marginBottom: "12px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: "4px", marginBottom: "6px" }}>
              <span style={{ fontSize: "10px", fontWeight: "bold" }}>Monat</span>
              <span style={{ fontSize: "10px", fontWeight: "bold", textAlign: "center" }}>Antragsteller*in</span>
              <span style={{ fontSize: "10px", fontWeight: "bold", textAlign: "center" }}>And. Elternteil</span>
            </div>
            {monate.map((m, i) => (
              <div key={m} style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: "4px", marginBottom: "3px", alignItems: "center" }}>
                <span style={{ fontSize: "11px" }}>{m}</span>
                <input type="number" style={{ ...u.miniIn, width: "100%", textAlign: "center" }} placeholder="Tage" value={kalender[i].antragsteller} onChange={e => updateKalender(i, "antragsteller", e.target.value)} />
                <input type="number" style={{ ...u.miniIn, width: "100%", textAlign: "center" }} placeholder="Tage" value={kalender[i].anderer} onChange={e => updateKalender(i, "anderer", e.target.value)} />
              </div>
            ))}
          </div>

          <label style={u.sectionLabel}>Schritt 3 – Kindergeld:</label>
          <div style={{ ...u.infoBox, marginBottom: "10px" }}>
            ℹ️ Das Kindergeld erhält in der Regel der überwiegend betreuende Elternteil bzw. derjenige, bei dem das Kind gemeldet ist – nicht automatisch der Antragsteller.
          </div>
          <label style={{ fontSize: "12px", display: "block", marginBottom: "6px" }}>Wer bezieht das Kindergeld?</label>
          <div style={{ display: "flex", flexDirection: "column", gap: "6px", marginBottom: "12px" }}>
            <label style={{ display: "flex", alignItems: "center", gap: "8px", fontSize: "12px", cursor: "pointer" }}>
              <input type="radio" name="kg_e" checked={kgEmpfänger === "antragsteller"} onChange={() => { setKgEmpfänger("antragsteller"); setKgGeteilt(""); setResult(null); }} />
              Antragsteller*in bezieht das Kindergeld selbst
            </label>
            <label style={{ display: "flex", alignItems: "center", gap: "8px", fontSize: "12px", cursor: "pointer" }}>
              <input type="radio" name="kg_e" checked={kgEmpfänger === "anderer"} onChange={() => { setKgEmpfänger("anderer"); setKgGeteilt(""); setResult(null); }} />
              Anderer Elternteil bezieht das Kindergeld
            </label>
          </div>

          {modell === "paritaetisch" && kgEmpfänger === "anderer" && (
            <div style={{ backgroundColor: "#fff9e6", border: "1px solid #ffeeba", borderRadius: "8px", padding: "10px", marginBottom: "12px" }}>
              <label style={{ fontSize: "12px", display: "block", marginBottom: "6px", fontWeight: "bold" }}>
                Wird das Kindergeld beim paritätischen Modell hälftig geteilt / weitergeleitet?
              </label>
              <div style={{ display: "flex", gap: "8px" }}>
                <div onClick={() => { setKgGeteilt("ja"); setResult(null); }} style={{ padding: "6px 14px", borderRadius: "8px", fontSize: "12px", cursor: "pointer", backgroundColor: kgGeteilt === "ja" ? "#00afad" : "#eee", color: kgGeteilt === "ja" ? "#fff" : "#333" }}>Ja, wird geteilt</div>
                <div onClick={() => { setKgGeteilt("nein"); setResult(null); }} style={{ padding: "6px 14px", borderRadius: "8px", fontSize: "12px", cursor: "pointer", backgroundColor: kgGeteilt === "nein" ? "#003366" : "#eee", color: kgGeteilt === "nein" ? "#fff" : "#333" }}>Nein, verbleibt beim anderen</div>
              </div>
            </div>
          )}

          {kgEmpfänger && (modell !== "paritaetisch" || kgEmpfänger !== "anderer" || kgGeteilt) && (
            <>
              <label style={u.sectionLabel}>Kindergeldbetrag (€/Monat):</label>
              <input type="number" style={u.input} placeholder="z.B. 250" value={kgBetrag} onChange={e => setKgBetrag(e.target.value)} />
            </>
          )}
        </>
      )}

      <button style={{ ...u.btnPrimary, opacity: bereit ? 1 : 0.5 }} onClick={berechne} disabled={!bereit}>Berechnen</button>
      {!bereit && modell && <div style={{ fontSize: "11px", color: "#999", marginTop: "6px", textAlign: "center" }}>Bitte alle Fragen beantworten um die Berechnung zu starten.</div>}

      {result && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Tage Antragsteller*in:</span><span>{result.tageA} Tage ({result.anteilA}%)</span></div>
          <div style={{ ...u.calcStep, marginBottom: "10px" }}><span>Tage and. Elternteil:</span><span>{result.tageB} Tage ({result.anteilB}%)</span></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
            <div style={{ ...u.compositionBox, margin: 0 }}>
              <div style={{ fontSize: "11px", fontWeight: "bold", color: "#003366", marginBottom: "6px" }}>Antragsteller*in</div>
              <div style={u.calcStep}><span style={{ fontSize: "11px" }}>Regelbedarf Kind:</span><span>{result.regelA} €</span></div>
              <div style={u.calcStep}><span style={{ fontSize: "11px" }}>Mehrbedarf § 21:</span><span>{result.mehrA} €</span></div>
              {parseFloat(result.kgAntragsteller) > 0 && <div style={u.calcStep}><span style={{ fontSize: "11px" }}>– Kindergeld:</span><span>{result.kgAntragsteller} €</span></div>}
              <div style={{ ...u.calcStep, borderTop: "1px solid #003366", paddingTop: "4px", fontWeight: "bold" }}><span>Netto-Anspruch:</span><span>{result.nettoA} €</span></div>
            </div>
            <div style={{ ...u.compositionBox, margin: 0 }}>
              <div style={{ fontSize: "11px", fontWeight: "bold", color: "#003366", marginBottom: "6px" }}>And. Elternteil</div>
              <div style={u.calcStep}><span style={{ fontSize: "11px" }}>Regelbedarf Kind:</span><span>{result.regelB} €</span></div>
              <div style={u.calcStep}><span style={{ fontSize: "11px" }}>Mehrbedarf § 21:</span><span>{result.mehrB} €</span></div>
              <div style={{ ...u.calcStep, borderTop: "1px solid #003366", paddingTop: "4px", fontWeight: "bold" }}><span>Gesamt:</span><span>{result.gesamtB} €</span></div>
            </div>
          </div>
          {result.hinweis && <div style={{ ...u.infoBox, marginTop: "10px" }}>📋 {result.hinweis}</div>}
          {result.kgHinweis && <div style={{ backgroundColor: "#fff9e6", border: "1px solid #ffeeba", borderRadius: "6px", padding: "8px", marginTop: "8px", fontSize: "11px", color: "#856404" }}>💶 {result.kgHinweis}</div>}
        </div>
      )}
    </div>
  );
}

// MODUL 7: WOHNGELD-RECHNER
// =============================================
function WohngeldRechner() {
  const [haushaltGroesse, setHaushaltGroesse] = useState("1");
  const [bruttomiete, setBruttomiete] = useState("");
  const [bruttoEinkommen, setBruttoEinkommen] = useState("");
  const [steuerAbzug, setSteuerAbzug] = useState("");
  const [svAbzug, setSvAbzug] = useState("");
  const [unterhaltsTitel, setUnterhaltsTitel] = useState("nein");
  const [unterhaltHoehe, setUnterhaltHoehe] = useState("");
  const [unterhaltWirdBedient, setUnterhaltWirdBedient] = useState("ja");
  const [weitereAbzuege, setWeitereAbzuege] = useState("");
  const [fahrtkostenUmgang, setFahrtkostenUmgang] = useState("");
  const [mietStufe, setMietStufe] = useState("3");
  const [result, setResult] = useState(null);

  const hoechstbetraege = {
    "1": { "1": 404, "2": 449, "3": 502, "4": 548, "5": 591, "6": 660 },
    "2": { "1": 490, "2": 545, "3": 610, "4": 666, "5": 718, "6": 803 },
    "3": { "1": 585, "2": 651, "3": 729, "4": 796, "5": 859, "6": 960 },
    "4": { "1": 672, "2": 747, "3": 836, "4": 913, "5": 984, "6": 1100 },
    "5": { "1": 760, "2": 845, "3": 946, "4": 1032, "5": 1113, "6": 1245 },
  };

  const berechneFreibetrag = (netto) => {
    let frei = 0;
    if (netto <= 100) return netto;
    frei += 100;
    if (netto > 100) frei += Math.min(netto - 100, 420) * 0.20;
    if (netto > 520) frei += Math.min(netto - 520, 480) * 0.30;
    if (netto > 1000) frei += Math.min(netto - 1000, 500) * 0.10;
    return frei;
  };

  const berechne = () => {
    const brutto = parseFloat(bruttoEinkommen || 0);
    const steuer = parseFloat(steuerAbzug || 0);
    const sv = parseFloat(svAbzug || 0);
    let netto = Math.max(0, brutto - steuer - sv);
    let unterhaltAbzug = 0;
    if (unterhaltsTitel === "ja" && unterhaltWirdBedient === "ja") {
      unterhaltAbzug = parseFloat(unterhaltHoehe || 0);
      netto = Math.max(0, netto - unterhaltAbzug);
    }
    const fahrtkAbzug = parseFloat(fahrtkostenUmgang || 0);
    const verfuegbar = Math.max(0, netto - parseFloat(weitereAbzuege || 0) - fahrtkAbzug);
    const freibetrag = berechneFreibetrag(verfuegbar);
    const anzurechnendes = Math.max(0, verfuegbar - freibetrag);
    const miete = parseFloat(bruttomiete || 0);
    const hoechst = (hoechstbetraege[haushaltGroesse] && hoechstbetraege[haushaltGroesse][mietStufe]) ? hoechstbetraege[haushaltGroesse][mietStufe] : 502;
    const anrechenbareMiete = Math.min(miete, hoechst);
    const a = 0.04; const b = 0.46; const c = 0.000097;
    const wg = Math.max(0, 1.15 * (anrechenbareMiete - (a + b * haushaltGroesse) * anzurechnendes - c * anzurechnendes * anzurechnendes));
    const wohngeld = Math.round(Math.min(wg, anrechenbareMiete));
    setResult({ netto: netto.toFixed(2), unterhaltAbzug: unterhaltAbzug.toFixed(2), verfuegbar: verfuegbar.toFixed(2), freibetrag: freibetrag.toFixed(2), anzurechnendes: anzurechnendes.toFixed(2), anrechenbareMiete: anrechenbareMiete.toFixed(2), hoechst: hoechst.toFixed(2), wohngeld, keinAnspruch: wohngeld <= 0, unterhaltNichtAbgezogen: unterhaltsTitel === "ja" && unterhaltWirdBedient === "nein" });
  };

  const u = rStyles;
  return (
    <div>
      <h4 style={u.modTitle}>🏡 Wohngeld-Rechner (WoGG)</h4>
      <div style={u.infoBox}>ℹ️ Titulierter und tatsächlich gezahlter Unterhalt wird vom anrechenbaren Einkommen abgezogen. Orientierungsrechner – individuelle Prüfung empfohlen.</div>
      <label style={u.sectionLabel}>Haushaltsgröße:</label>
      <select style={u.input} value={haushaltGroesse} onChange={e => setHaushaltGroesse(e.target.value)}>
        {["1","2","3","4","5"].map(n => <option key={n} value={n}>{n} {n === "1" ? "Person" : "Personen"}</option>)}
      </select>
      <label style={u.sectionLabel}>Mietenstufe der Gemeinde:</label>
      <select style={u.input} value={mietStufe} onChange={e => setMietStufe(e.target.value)}>
        <option value="1">Stufe I (sehr günstig, ländlich)</option>
        <option value="2">Stufe II</option>
        <option value="3">Stufe III (Mittelstädte)</option>
        <option value="4">Stufe IV (Großstädte)</option>
        <option value="5">Stufe V (teure Städte)</option>
        <option value="6">Stufe VI (Hochpreislagen, z.B. München)</option>
      </select>
      <label style={u.sectionLabel}>Bruttomiete inkl. Heizkosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="z.B. 750" value={bruttomiete} onChange={e => setBruttomiete(e.target.value)} />

// MODUL: RECHTSVERGLEICH Familien- vs. Sozialrecht
// =============================================
function RechtsvergleichModul({ ext }) {
  var u = rStyles;
  const [netto, setNetto] = React.useState(ext ? String(ext.einkommenNetto||"") : "");
  const [mieteKalt, setMieteKalt] = React.useState(ext ? String(ext.mieteKalt||"") : "");
  const [nebenkosten, setNebenkosten] = React.useState(ext ? String(ext.nebenkosten||"") : "");
  const [heizkosten, setHeizkosten] = React.useState(ext ? String(ext.heizkosten||"") : "");
  const [anzPersonen, setAnzPersonen] = React.useState(ext && ext.kinder ? String(1+ext.kinder.length) : "1");
  const [anzKinder, setAnzKinder] = React.useState(ext && ext.kinder ? String(ext.kinder.length) : "0");
  const [unterhalt, setUnterhalt] = React.useState(ext ? String(ext.unterhaltBetrag||"") : "");
  const [wohnflaeche, setWohnflaeche] = React.useState(ext ? String(ext.wohnungGroesse||"") : "");
  const [result, setResult] = React.useState(null);

  function berechne() {
    var n = parseFloat(netto)||0;
    var mk = parseFloat(mieteKalt)||0;
    var nk = parseFloat(nebenkosten)||0;
    var hk = parseFloat(heizkosten)||0;
    var kdu = mk + nk + hk;
    var kinderAnz = parseInt(anzKinder)||0;

    // ── FAMILIENRECHT ──────────────────────────────────────
    // Selbstbehalt (Düsseldorfer Tabelle 2024)
    var selbstbehaltErwerb = 1450;  // erwerbstätig
    var selbstbehaltNE = 1200;      // nicht erwerbstätig
    // Angemessener Wohnbedarf Familienrecht
    var wohnFR_1 = 500;  // Einzelperson
    var wohnFR_2 = 650;  // 2 Personen
    var wohnFR_map = {1:500, 2:650, 3:800, 4:950, 5:1100};
    var wohnFR = wohnFR_map[parseInt(anzPersonen)] || 500;

    // ── SOZIALRECHT (SGB II / SGB XII) ─────────────────────
    // Regelbedarf 2024
    var REGEL = {allein:563, k05:357, k613:390, k1417:471, k18:451};
    var regelAllein = REGEL.allein;
    // Mehrbedarf Alleinerziehend (wenn Kinder)
    var mbAE = kinderAnz > 0 ? Math.round(regelAllein * 0.36) : 0;
    // KdU-Angemessenheit (Richtwerte je nach Personenanzahl)
    var kduAngemessen_map = {1:500, 2:680, 3:820, 4:960, 5:1100};
    var kduSR = kduAngemessen_map[parseInt(anzPersonen)] || 500;
    // Gesamtbedarf Sozialrecht
    var kinderRegel = 0;
    for(var i=0; i<kinderAnz; i++) kinderRegel += REGEL.k613; // Mittelwert
    var gesamtbedarfSR = regelAllein + mbAE + kinderRegel + Math.min(kdu, kduSR);

    // Sozialrechtlicher Bedarf ohne Einkommen
    var einkAnrechSR = Math.max(0, n - (n<=100?n : 100 + Math.min(n-100,900)*0.20));
    var unterhaltsEink = parseFloat(unterhalt)||0;
    var anspruchSR = Math.max(0, gesamtbedarfSR - einkAnrechSR - unterhaltsEink);

    // Wohnflächen-Angemessenheit Sozialrecht vs. Familienrecht
    var wohnSR_map = {1:50, 2:60, 3:75, 4:85, 5:95};
    var wohnSR_qm = wohnSR_map[parseInt(anzPersonen)] || 50;
    var wohnFR_qm_map = {1:45, 2:55, 3:65, 4:75, 5:85};
    var wohnFR_qm = wohnFR_qm_map[parseInt(anzPersonen)] || 45;

    // Selbstbehalt vs. SGB II Bedarf
    var diffSelbstbehalt = gesamtbedarfSR - selbstbehaltNE;
    var diffWohn = kduSR - wohnFR;

    setResult({
      n, kdu, kinderAnz,
      // Familienrecht
      selbstbehaltNE, selbstbehaltErwerb, wohnFR, wohnFR_qm,
      // Sozialrecht
      regelAllein, mbAE, kinderRegel, kduSR, gesamtbedarfSR,
      einkAnrechSR, anspruchSR, wohnSR_qm,
      // Vergleiche
      diffSelbstbehalt, diffWohn,
      kduDeckung: kdu <= kduSR ? "angemessen" : "über Grenze",
      srHoeherAlsFR: gesamtbedarfSR > selbstbehaltNE
    });
  }

  return (
    <div>
      <h4 style={u.modTitle}>⚖️ Rechtsvergleich: Familienrecht vs. Sozialrecht</h4>
      <InfoBox typ="vergl" titel="Was wird verglichen?"
        kinder={<span>Dieser Rechner zeigt Unterschiede zwischen familienrechtlichem Selbstbehalt und sozialrechtlichem Bedarf (SGB II). Oft ist der sozialrechtliche Anspruch <strong>höher</strong> als der familienrechtliche Selbstbehalt — das kann strategisch wichtig sein.</span>} />

      <label style={u.sectionLabel}>Nettoeinkommen (€/Monat):</label>
      <input type="number" style={u.input} placeholder="z.B. 1200" value={netto} onChange={e=>setNetto(e.target.value)} />
      <label style={u.sectionLabel}>Anzahl Personen im Haushalt:</label>
      <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
        {["1","2","3","4","5"].map(function(v){
          return <div key={v} onClick={function(){setAnzPersonen(v); setAnzKinder(String(Math.max(0,parseInt(v)-1)));}}
            style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"12px", cursor:"pointer",
              backgroundColor:anzPersonen===v?"#003366":"#eee", color:anzPersonen===v?"#fff":"#333" }}>{v}</div>;
        })}
      </div>
      <label style={u.sectionLabel}>Davon Kinder:</label>
      <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
        {["0","1","2","3","4"].map(function(v){
          return <div key={v} onClick={function(){setAnzKinder(v);}}
            style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"12px", cursor:"pointer",
              backgroundColor:anzKinder===v?"#00afad":"#eee", color:anzKinder===v?"#fff":"#333" }}>{v}</div>;
        })}
      </div>
      <div style={u.row}>
        <input type="number" style={u.input} placeholder="Kaltmiete (€)" value={mieteKalt} onChange={e=>setMieteKalt(e.target.value)} />
        <input type="number" style={u.input} placeholder="Nebenkosten (€)" value={nebenkosten} onChange={e=>setNebenkosten(e.target.value)} />
      </div>
      <input type="number" style={u.input} placeholder="Heizkosten (€)" value={heizkosten} onChange={e=>setHeizkosten(e.target.value)} />
      <input type="number" style={u.input} placeholder="Erhaltener Unterhalt (€, falls vorhanden)" value={unterhalt} onChange={e=>setUnterhalt(e.target.value)} />
      <button style={u.btnPrimary} onClick={berechne}>🔀 Vergleich berechnen</button>

      {result && (
        <div>
          {/* Ampel-Übersicht */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", margin:"12px 0" }}>
            <div style={{ backgroundColor:"#e8f0fb", border:"1px solid #4a7bbf", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#003366", fontWeight:"bold", marginBottom:"4px" }}>⚖️ FAMILIENRECHT</div>
              <div style={{ fontSize:"11px", color:"#555" }}>Selbstbehalt (n.e.)</div>
              <div style={{ fontSize:"18px", fontWeight:"bold", color:"#003366" }}>{result.selbstbehaltNE} €</div>
              <div style={{ fontSize:"10px", color:"#777" }}>erw.: {result.selbstbehaltErwerb} €</div>
            </div>
            <div style={{ backgroundColor: result.srHoeherAlsFR ? "#e8f5e9" : "#fff9e6", border:"1px solid "+(result.srHoeherAlsFR?"#4caf50":"#ffc107"), borderRadius:"8px", padding:"10px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color: result.srHoeherAlsFR?"#1b5e20":"#856404", fontWeight:"bold", marginBottom:"4px" }}>🏛️ SOZIALRECHT</div>
              <div style={{ fontSize:"11px", color:"#555" }}>Gesamtbedarf SGB II</div>
              <div style={{ fontSize:"18px", fontWeight:"bold", color: result.srHoeherAlsFR?"#2e7d32":"#e65100" }}>{result.gesamtbedarfSR.toFixed(0)} €</div>
              <div style={{ fontSize:"10px", color:"#777" }}>Anspruch: {result.anspruchSR.toFixed(0)} €</div>
            </div>
          </div>

          {result.srHoeherAlsFR && (
            <InfoBox typ="positiv" titel={"Sozialrechtlicher Bedarf übersteigt familienrechtlichen Selbstbehalt um " + result.diffSelbstbehalt.toFixed(0) + " €"}
              kinder={<span>Dies kann bedeuten: Trotz Unterhaltspflicht kann Bürgergeld beantragt werden. Der Selbstbehalt im Familienrecht schützt nicht vor SGB II-Ansprüchen — beide Systeme sind unabhängig zu prüfen.</span>} />
          )}

          {/* Wohnraum-Vergleich */}
          <div style={{ backgroundColor:"#f3e5f5", border:"1px solid #ce93d8", borderRadius:"8px", padding:"10px", marginBottom:"10px" }}>
            <div style={{ fontWeight:"bold", color:"#4a148c", fontSize:"11px", marginBottom:"6px" }}>🏠 Wohnraumvergleich</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px", fontSize:"11px" }}>
              <div>
                <div style={{ color:"#003366", fontWeight:"bold" }}>Familienrecht</div>
                <div>Angemessen: ca. {result.wohnFR_qm} m²</div>
                <div>KdU-Grenze ca.: {result.wohnFR} €</div>
              </div>
              <div>
                <div style={{ color:"#1b5e20", fontWeight:"bold" }}>Sozialrecht (SGB II)</div>
                <div>Angemessen: ca. {result.wohnSR_qm} m²</div>
                <div>KdU-Grenze ca.: {result.kduSR} €</div>
              </div>
            </div>
            {result.diffWohn !== 0 && (
              <div style={{ marginTop:"6px", fontSize:"10px", color:"#4a148c", fontWeight:"bold" }}>
                {result.diffWohn > 0
                  ? "✅ Sozialrecht gewährt " + result.diffWohn + " € mehr Wohnkostenübernahme als familienrechtlich angemessen"
                  : "⚠️ Familienrecht großzügiger beim Wohnraum in diesem Fall"}
              </div>
            )}
            {result.kinderAnz > 0 && (
              <div style={{ marginTop:"4px", fontSize:"10px", color:"#4a148c" }}>

              </div>
            )}
          </div>

          {/* Detailtabelle */}
          <details>
            <summary style={{ fontSize:"11px", color:"#003366", cursor:"pointer", fontWeight:"bold", marginBottom:"6px" }}>▶ Vollständige Vergleichstabelle</summary>
            <div style={u.resultBox}>
              <div style={{ fontWeight:"bold", fontSize:"11px", color:"#003366", marginBottom:"6px" }}>Familienrecht:</div>
              <div style={u.calcStep}><span>Selbstbehalt (nicht erwerbstätig):</span><span>{result.selbstbehaltNE} €</span></div>

              <div style={{ fontWeight:"bold", fontSize:"11px", color:"#1b5e20", margin:"8px 0 4px" }}>Sozialrecht (SGB II):</div>

              <div style={u.calcStep}><span>+ KdU (max. angemessen):</span><span>{Math.min(result.kdu||0, result.kduSR).toFixed(2)} €</span></div>

              <div style={u.calcStep}><span>- Anrechenbares Einkommen:</span><span>- {result.einkAnrechSR.toFixed(2)} €</span></div>

              </div>

          <InfoBox typ="recht" titel="Rechtsprechung Sozialgerichte"

        </div>
      )}

}

var DT2024 = {
  // [einkommensgruppe][altersgruppe] = unterhalt
  gruppen: [
    {bis:1900, name:"Gruppe 1"},
    {bis:2300, name:"Gruppe 2"},
    {bis:2700, name:"Gruppe 3"},
    {bis:3100, name:"Gruppe 4"},
    {bis:3700, name:"Gruppe 5"},
    {bis:4300, name:"Gruppe 6"},
    {bis:5100, name:"Gruppe 7"},
    {bis:5900, name:"Gruppe 8"},
    {bis:6700, name:"Gruppe 9"},
    {bis:7500, name:"Gruppe 10"},
  ],
  tabelle: [
    // 0-5, 6-11, 12-17, ab18
    [480,551,645,688],[506,581,681,725],[532,611,716,763],
    [565,647,759,809],[618,709,832,886],[672,771,904,964],
    [745,855,1003,1069],[818,938,1102,1174],[891,1022,1199,1278],[964,1106,1298,1383]
  ],
  selbstbehalt: { erwerb:1450, nErwerb:1200 }
};
function getDTUnterhalt(einkommen, alter) {
  var gruppe = DT2024.gruppen.findIndex(function(g){ return einkommen <= g.bis; });
  if(gruppe < 0) gruppe = 9;
  var alterIdx = alter < 6 ? 0 : alter < 12 ? 1 : alter < 18 ? 2 : 3;
  return DT2024.tabelle[gruppe][alterIdx];
}

function KindesunterhaltsRechnerNeu({ ext, onSaveErgebnis }) {
  var u = rStyles;
  const [rolle, setRolle] = React.useState("");
  const [einkommenPflichtig, setEinkommenPflichtig] = React.useState(ext ? String(ext.einkommenNetto||"") : "");
  const [einkommenBerechtigt, setEinkommenBerechtigt] = React.useState(ext ? String(ext.einkommenGegenseite||"") : "");
  const [erwerbstaetig, setErwerbstaetig] = React.useState("ja");
  const [kinder, setKinder] = React.useState(
    ext && ext.kinder && ext.kinder.length > 0
      ? ext.kinder.map(function(k,i){
          var alter = 10;
          if(k.geburt){ var d=new Date(k.geburt); alter=Math.floor((new Date()-d)/(365.25*24*3600*1000)); }
          return {id:i, name:k.name||("Kind "+(i+1)), alter:String(alter), wohnort:k.wohnort||"beim anderen Elternteil"};
        })
      : [{id:0, name:"Kind 1", alter:"8", wohnort:"beim anderen Elternteil"}]
  );
  const [result, setResult] = React.useState(null);

  function addKind(){ setKinder(function(p){ return p.concat([{id:Date.now(),name:"Kind "+(p.length+1),alter:"8",wohnort:"beim anderen Elternteil"}]); }); }
  function updK(id,f,v){ setKinder(function(p){ return p.map(function(k){ return k.id===id?Object.assign({},k,{[f]:v}):k; }); }); }
  function remK(id){ setKinder(function(p){ return p.filter(function(k){ return k.id!==id; }); }); }

  function berechne() {
    var ep = parseFloat(einkommenPflichtig)||0;
    var selbst = erwerbstaetig==="ja" ? DT2024.selbstbehalt.erwerb : DT2024.selbstbehalt.nErwerb;
    var verfuegbar = ep - selbst;

    var berechnungen = kinder.map(function(k){
      var alter = parseInt(k.alter)||8;
      var tabellenwert = getDTUnterhalt(ep, alter);
      var gruppe = DT2024.gruppen.findIndex(function(g){ return ep <= g.bis; });
      if(gruppe<0)gruppe=9;
      var kg = 125; // halbes Kindergeld abzuziehen wenn nicht beim Pflichtigen wohnend
      var nettounterhalt = tabellenwert - kg;
      return { name:k.name, alter:alter, tabellenwert:tabellenwert, kg:kg, netto:nettounterhalt, gruppe:gruppe, wohnort:k.wohnort };
    });

    var gesamtUnterhalt = berechnungen.reduce(function(s,b){ return s+b.netto; }, 0);
    var mangelfall = verfuegbar < gesamtUnterhalt;

    var res = { ep, selbst, verfuegbar, berechnungen, gesamtUnterhalt, mangelfall, rolle };
    setResult(res);
    if(onSaveErgebnis) onSaveErgebnis({
      typ:"Kindesunterhalt (Düsseldorfer Tabelle)",
      rechtsbereich:"Familienrecht",
      ergebnis: mangelfall ? "Mangelfall – " + gesamtUnterhalt.toFixed(0)+"€ nicht voll zahlbar" : gesamtUnterhalt.toFixed(0) + " €/Monat",
      details: kinder.length + " Kind(er), Einkommen " + ep + " €",
      detailSchritte: [
        {label:"Nettoeinkommen Unterhaltspflichtiger", wert: ep.toFixed(2)+" €"},
        {label:"Selbstbehalt ("+( erwerbstaetig==="ja"?"erwerbstätig":"nicht erwerbstätig")+")", wert:"- "+selbst+" €"},
        {label:"Verfügbar für Unterhalt", wert: verfuegbar.toFixed(2)+" €", bold:true},
        ...berechnungen.map(function(b){ return {label:b.name+" ("+b.alter+"J, Gruppe "+(b.gruppe+1)+")", wert:b.tabellenwert+"€ - "+b.kg+"€ KG = "+b.netto+"€"}; }),
        {label:"Gesamtunterhalt", wert:gesamtUnterhalt.toFixed(2)+" €/Monat", bold:true},
      ],
      rechtsgrundlagen:"§§ 1601 ff. BGB · Düsseldorfer Tabelle 2024 · § 1612b BGB (Kindergeldanrechnung)"
    });
  }

  return (
    <div>
      <h4 style={u.modTitle}>👶 Kindesunterhalt (Düsseldorfer Tabelle 2024)</h4>

      <InfoBox typ="recht" titel="Ihre Rolle"
        kinder={<span>Die Berechnung unterscheidet sich je nach Rolle: <strong>Unterhaltspflichtig</strong> = zahlt Unterhalt. <strong>Unterhaltsberechtigt</strong> = erhält Unterhalt (Kind/betreuender Elternteil).</span>} />

      <label style={u.sectionLabel}>Ihre Rolle:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
        {[{id:"pflichtig",label:"💸 Unterhaltspflichtig (zahlend)"},{id:"berechtigt",label:"💰 Unterhaltsberechtigt (empfangend)"}].map(function(r){
          return <div key={r.id} onClick={function(){setRolle(r.id);}}
            style={{ flex:1, padding:"8px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", textAlign:"center",
              backgroundColor:rolle===r.id?"#003366":"#f0f4f7", color:rolle===r.id?"#fff":"#333",
              border:"2px solid "+(rolle===r.id?"#003366":"#ddd"), fontWeight:"bold" }}>{r.label}</div>;
        })}
      </div>

      {rolle && (
        <div>
          {rolle==="pflichtig" && (
            <InfoBox typ="warnung" titel="Selbstbehalt schützt Sie"
              kinder={<span>Als Unterhaltspflichtiger müssen Sie den Selbstbehalt nicht unterschreiten: {erwerbstaetig==="ja"?"1.450":"1.200"} €/Monat. Was darüber bleibt, ist für Unterhalt verfügbar.</span>} />
          )}
          {rolle==="berechtigt" && (
            <InfoBox typ="empf" titel="Tipp: Sozialrechtliche Alternativen prüfen"
              kinder={<span>Falls Unterhalt nicht oder zu wenig gezahlt wird: <strong>Unterhaltsvorschuss (UVG)</strong> beantragen (bis 18 Jahre). Zusätzlich <strong>Bürgergeld aufstocken</strong> möglich — der Unterhalt wird dort als Einkommen angerechnet, aber Mehrbedarf bleibt.</span>} />
          )}

          <label style={u.sectionLabel}>Nettoeinkommen des Unterhaltspflichtigen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 2200" value={einkommenPflichtig} onChange={e=>setEinkommenPflichtig(e.target.value)} />
          <label style={u.sectionLabel}>Erwerbsstatus:</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{id:"ja",label:"Erwerbstätig (SB: 1.450 €)"},{id:"nein",label:"Nicht erwerbstätig (SB: 1.200 €)"}].map(function(v){
              return <div key={v.id} onClick={function(){setErwerbstaetig(v.id);}}
                style={{ flex:1, padding:"6px", borderRadius:"7px", fontSize:"11px", cursor:"pointer", textAlign:"center",
                  backgroundColor:erwerbstaetig===v.id?"#00afad":"#eee", color:erwerbstaetig===v.id?"#fff":"#333" }}>{v.label}</div>;
            })}
          </div>

          <label style={u.sectionLabel}>Kinder:</label>
          {kinder.map(function(k){
            return (
              <div key={k.id} style={{ backgroundColor:"#f9f9f9", borderRadius:"8px", padding:"10px", marginBottom:"8px", borderLeft:"3px solid #003366" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"6px" }}>
                  <strong style={{ fontSize:"12px" }}>{k.name}</strong>
                  {kinder.length > 1 && <button onClick={function(){remK(k.id);}} style={{ background:"none", border:"none", color:"#e53935", cursor:"pointer", fontSize:"16px" }}>×</button>}
                </div>
                <div style={{ display:"flex", gap:"8px" }}>
                  <div style={{ flex:1 }}>
                    <label style={{ fontSize:"10px", color:"#666", display:"block" }}>Name</label>
                    <input style={u.input} value={k.name} onChange={function(e){updK(k.id,"name",e.target.value);}} />
                  </div>
                  <div style={{ flex:1 }}>
                    <label style={{ fontSize:"10px", color:"#666", display:"block" }}>Alter</label>
                    <input type="number" style={u.input} value={k.alter} onChange={function(e){updK(k.id,"alter",e.target.value);}} />
                  </div>
                </div>
                {einkommenPflichtig && k.alter && (
                  <div style={{ fontSize:"11px", color:"#003366", marginTop:"4px" }}>
                    Tabellenwert: {getDTUnterhalt(parseFloat(einkommenPflichtig)||0, parseInt(k.alter)||8)} €/Monat (Gruppe {Math.min(9,DT2024.gruppen.findIndex(function(g){return (parseFloat(einkommenPflichtig)||0)<=g.bis;})>=0?DT2024.gruppen.findIndex(function(g){return (parseFloat(einkommenPflichtig)||0)<=g.bis;})+1:10)})
                  </div>
                )}
              </div>
            );
          })}
          <button onClick={addKind} style={{ width:"100%", padding:"8px", backgroundColor:"#f0f4f7", border:"1px dashed #003366", borderRadius:"8px", cursor:"pointer", fontSize:"12px", color:"#003366", marginBottom:"12px" }}>+ Kind hinzufügen</button>
          <button style={u.btnPrimary} onClick={berechne}>🧮 Berechnen</button>

      )}

      {result && (
        <div style={u.resultBox}>

          )}

          <div style={u.calcStep}><span>- Selbstbehalt:</span><span>- {result.selbst} €</span></div>
          <div style={{ ...u.calcStep, fontWeight:"bold" }}><span>= Verfügbar:</span><span>{result.verfuegbar.toFixed(2)} €</span></div>
          {result.berechnungen.map(function(b,i){
            return (
              <div key={i} style={{ marginTop:"8px", borderTop:"1px solid #eee", paddingTop:"8px" }}>

                <div style={{ ...u.calcStep, fontWeight:"bold" }}><span>= Zahlbetrag:</span><span style={{ color:"#00afad" }}>{b.netto} €/Monat</span></div>
              </div>
            );
          })}
          <div style={{ ...u.calcStep, borderTop:"2px solid #003366", marginTop:"8px", paddingTop:"8px", fontWeight:"bold", fontSize:"14px" }}>

          </div>
          <div style={{ fontSize:"10px", color:"#888", marginTop:"6px" }}>§§ 1601 ff. BGB · Düsseldorfer Tabelle 2024 · § 1612b BGB</div>
        </div>
      )}
    </div>
  );
}

// =============================================
// MODUL: EHEGATTENUNTERHALT (Trennungs + Nachehelich)
// =============================================
function EhegattenUnterhaltsRechner({ ext, onSaveErgebnis, defaultTyp }) {
  var u = rStyles;
  const [typ, setTyp] = React.useState(defaultTyp || "trennung"); // trennung | nachehelich
  const [rolle, setRolle] = React.useState(""); // pflichtig | berechtigt
  const [einPflichtig, setEinPflichtig] = React.useState(ext ? String(ext.einkommenNetto||"") : "");
  const [einBerechtigt, setEinBerechtigt] = React.useState(ext ? String(ext.einkommenGegenseite||"") : "");
  const [ehedauer, setEhedauer] = React.useState("");
  const [kinderAnz, setKinderAnz] = React.useState(ext && ext.kinder ? String(ext.kinder.length) : "0");
  const [erwerbslos, setErwerbslos] = React.useState("nein");
  const [grund, setGrund] = React.useState("");
  const [result, setResult] = React.useState(null);
  const [showDetail, setShowDetail] = React.useState(false);

  function berechne() {
    var ep = parseFloat(einPflichtig)||0;
    var eb = parseFloat(einBerechtigt)||0;
    var kinder = parseInt(kinderAnz)||0;

    // Bereinigtes Einkommen (Erwerbstätigenbonus 1/7 bei Erwerbstätigkeit)
    var bonus = 1/7;
    var berEp = ep * (1 - bonus); // wenn erwerbstätig
    var berEb = eb > 0 ? eb * (1 - bonus) : 0;

    // Halbteilungsgrundsatz § 1578 BGB
    var differenz = berEp - berEb;
    var anspruchBrutto = differenz / 2;

    // Selbstbehalt beim Unterhaltspflichtigen: 1.475 € (2024)
    var selbstbehalt = 1475;
    var verfuegbarNachSB = Math.max(0, ep - selbstbehalt);
    var anspruchNachSB = Math.min(anspruchBrutto, verfuegbarNachSB);
    var anspruch = Math.max(0, anspruchNachSB);

    // Nachehelich: Begrenzung nach § 1578b BGB möglich
    var begrenzung = "";
    if(typ === "nachehelich") {
      var edJahre = parseInt(ehedauer)||0;
      if(edJahre < 3) begrenzung = "Kurze Ehe (< 3 Jahre): Begrenzung sehr wahrscheinlich (§ 1578b BGB)";
      else if(edJahre < 10) begrenzung = "Mittlere Ehedauer: Begrenzung/Befristung möglich nach § 1578b BGB";
      else begrenzung = "Lange Ehe: Unbefristeter Unterhalt eher möglich, Einzelfall prüfen";
    }

    // Kinderbonus: bei Kinder erhöhter Bedarf des betreuenden Elternteils
    var kinderZuschlag = kinder > 0 ? kinder * 100 : 0; // vereinfacht

    // Sozialrecht-Vergleich
    var regelbedarfSR = 563 + (kinder > 0 ? Math.round(563*0.36) : 0) + kinder * 390;
    var diffSR = regelbedarfSR - selbstbehalt;

    setResult({ ep, eb, berEp, berEb, differenz, anspruchBrutto, selbstbehalt,
      verfuegbarNachSB, anspruch, begrenzung, kinder, kinderZuschlag,
      regelbedarfSR, diffSR, typ, rolle });
    if(onSaveErgebnis) onSaveErgebnis({
      typ: typ==="trennung" ? "Trennungsunterhalt" : "Nachehelicher Unterhalt",
      rechtsbereich: "Familienrecht",
      ergebnis: anspruch > 0 ? anspruch.toFixed(0) + " €/Monat (Richtwert)" : "Kein Anspruch",
      details: "EP: " + ep + "€ · EB: " + eb + "€ · Halbteilung",
      detailSchritte: [
        {label:"Einkommen Unterhaltspflichtiger (EP)", wert: ep.toFixed(2)+" €"},
        {label:"Bereinigt EP (–1/7 Erwerbsbonus)", wert: berEp.toFixed(2)+" €"},
        {label:"Einkommen Unterhaltsberechtiger (EB)", wert: eb.toFixed(2)+" €"},
        {label:"Bereinigt EB", wert: berEb.toFixed(2)+" €"},
        {label:"Differenz", wert: differenz.toFixed(2)+" €"},
        {label:"÷ 2 (Halbteilungsgrundsatz)", wert: anspruchBrutto.toFixed(2)+" €"},
        {label:"Selbstbehalt EP (2024)", wert: selbstbehalt+" €"},
        {label:"Verfügbar nach Selbstbehalt", wert: verfuegbarNachSB.toFixed(2)+" €"},
        {label:"Unterhalt (nach Selbstbehalt)", wert: anspruch.toFixed(2)+" €", bold:true},
      ],
      rechtsgrundlagen: "§§ 1361, 1569 ff. BGB · § 1578 BGB (Halbteilung) · § 1578b BGB (Begrenzung) · BGH XII ZR 281/09"
    });
  }

  return (
    <div>
      <h4 style={u.modTitle}>💍 Ehegattenunterhalt</h4>
      <InfoBox typ="recht" titel={null}
        kinder={<span><strong>§§ 1361, 1569 ff. BGB:</strong> Trennungsunterhalt sichert den bisherigen Lebensstandard. Nachehelicher Unterhalt nach Scheidung ist an Unterhaltstatbestände geknüpft (§ 1570 ff. BGB) und kann nach § 1578b BGB begrenzt/befristet werden.</span>} />

      <label style={u.sectionLabel}>Art des Unterhalts:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
        {[{id:"trennung",label:"👫 Trennungsunterhalt (§ 1361 BGB)"},{id:"nachehelich",label:"📄 Nachehelich (§§ 1569 ff. BGB)"}].map(function(t){
          return <div key={t.id} onClick={function(){setTyp(t.id);}}
            style={{ flex:1, padding:"8px", borderRadius:"8px", fontSize:"10px", cursor:"pointer", textAlign:"center",
              backgroundColor:typ===t.id?"#003366":"#f0f4f7", color:typ===t.id?"#fff":"#333",
              border:"2px solid "+(typ===t.id?"#003366":"#ddd"), fontWeight:"bold" }}>{t.label}</div>;
        })}
      </div>

      <label style={u.sectionLabel}>Ihre Rolle:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
        {[{id:"pflichtig",label:"💸 Unterhaltspflichtig"},{id:"berechtigt",label:"💰 Unterhaltsberechtigt"}].map(function(r){
          return <div key={r.id} onClick={function(){setRolle(r.id);}}
            style={{ flex:1, padding:"8px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", textAlign:"center",
              backgroundColor:rolle===r.id?"#003366":"#f0f4f7", color:rolle===r.id?"#fff":"#333",
              border:"2px solid "+(rolle===r.id?"#003366":"#ddd"), fontWeight:"bold" }}>{r.label}</div>;
        })}
      </div>

      {rolle === "pflichtig" && (
        <InfoBox typ="warnung" titel="Selbstbehalt 2024"
          kinder={<span>Als Unterhaltspflichtiger schützt Sie der Selbstbehalt: <strong>1.475 €/Monat</strong> (gegenüber Ehegatten). Darunter müssen Sie nichts zahlen. Beachten: Unterhaltsansprüche von Kindern haben Vorrang!</span>} />
      )}
      {rolle === "berechtigt" && (
        <InfoBox typ="empf" titel="Sozialrechtliche Alternative prüfen"
          kinder={<span>Wenn Unterhalt nicht gezahlt wird oder zu niedrig ist: <strong>Bürgergeld aufstocken</strong> (Unterhalt wird als Einkommen angerechnet, aber Regelbedarf + KdU bleiben). Bei Kinderbetreuung: § 1615l BGB (Betreuungsunterhalt) zusätzlich prüfen.</span>} />
      )}

      <label style={u.sectionLabel}>Nettoeinkommen Unterhaltspflichtiger (€/Monat):</label>
      <input type="number" style={u.input} placeholder="z.B. 2800" value={einPflichtig} onChange={e=>setEinPflichtig(e.target.value)} />
      <label style={u.sectionLabel}>Nettoeinkommen Unterhaltsberechtiger (€/Monat, 0 = keins):</label>
      <input type="number" style={u.input} placeholder="z.B. 800 oder 0" value={einBerechtigt} onChange={e=>setEinBerechtigt(e.target.value)} />
      <label style={u.sectionLabel}>Anzahl gemeinsamer Kinder:</label>
      <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
        {["0","1","2","3","4"].map(function(v){ return (
          <div key={v} onClick={function(){setKinderAnz(v);}}
            style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"12px", cursor:"pointer",
              backgroundColor:kinderAnz===v?"#00afad":"#eee", color:kinderAnz===v?"#fff":"#333" }}>{v}</div>
        ); })}
      </div>
      {typ === "nachehelich" && (
        <div>
          <label style={u.sectionLabel}>Ehedauer (Jahre):</label>
          <input type="number" style={u.input} placeholder="z.B. 12" value={ehedauer} onChange={e=>setEhedauer(e.target.value)} />
          <label style={u.sectionLabel}>Unterhaltstatbestand (§§ 1570-1576 BGB):</label>
          <select style={u.input} value={grund} onChange={e=>setGrund(e.target.value)}>
            <option value="">– bitte wählen –</option>
            <option value="betreuung">§ 1570 Kinderbetreuung</option>
            <option value="alter">§ 1571 Alter/Krankheit</option>
            <option value="erwerbslos">§ 1573 Erwerbslosigkeit</option>
            <option value="aufstockung">§ 1573 Aufstockungsunterhalt</option>
            <option value="ausbildung">§ 1575 Ausbildung/Umschulung</option>
          </select>
        </div>
      )}
      <button style={u.btnPrimary} onClick={berechne}>🧮 Berechnen</button>

      {result && (
        <div style={u.resultBox}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"8px" }}>
            <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", textTransform:"uppercase" }}>Ergebnis</div>
            <button onClick={function(){setShowDetail(!showDetail);}} style={{ fontSize:"10px", padding:"3px 8px", border:"1px solid #ddd", borderRadius:"5px", background:"#f5f5f5", cursor:"pointer" }}>{showDetail?"▲ Weniger":"▼ Details"}</button>
          </div>

          {showDetail && (
            <div style={{ backgroundColor:"#f9f9f9", borderRadius:"7px", padding:"10px", marginBottom:"10px", fontSize:"11px" }}>
              <div style={u.calcStep}><span>Einkommen EP:</span><span>{result.ep.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>Bereinigt EP (–1/7):</span><span>{result.berEp.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>Einkommen EB:</span><span>{result.eb.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>Bereinigt EB (–1/7):</span><span>{result.berEb.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>Differenz:</span><span>{result.differenz.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>÷ 2 Halbteilung:</span><span style={{fontWeight:"bold"}}>{result.anspruchBrutto.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>Selbstbehalt EP:</span><span>– {result.selbstbehalt} €</span></div>
              <div style={u.calcStep}><span>Verfügbar:</span><span>{result.verfuegbarNachSB.toFixed(2)} €</span></div>
              <div style={{ marginTop:"6px", fontSize:"10px", color:"#888" }}>§§ 1361/1578 BGB · Halbteilungsgrundsatz · BGH XII ZR 281/09</div>
            </div>
          )}

          <div style={{ ...u.calcStep, borderTop:"2px solid #00afad", paddingTop:"8px", fontWeight:"bold", fontSize:"15px" }}>
            <span>Unterhalt Richtwert:</span>
            <span style={{ color: result.anspruch>0?"#00afad":"#e53935" }}>{result.anspruch>0 ? result.anspruch.toFixed(0)+" €/Monat" : "Kein Anspruch"}</span>
          </div>

          {result.begrenzung && (
            <InfoBox typ={result.begrenzung.includes("wahrscheinlich")?"warnung":"empf"} titel={null}
              kinder={<span>{result.begrenzung}</span>} style={{ marginTop:"8px" }} />
          )}

          {result.diffSR > 0 && (
            <InfoBox typ="vergl" titel={"Sozialrecht-Vergleich"}
              kinder={<span>SGB II Gesamtbedarf ({result.regelbedarfSR} €) übersteigt den familienrechtlichen Selbstbehalt ({result.selbstbehalt} €) um <strong>{result.diffSR} €</strong>. Trotz Unterhaltspflicht kann Bürgergeld beantragt werden.</span>} style={{ marginTop:"8px" }} />
          )}

          <InfoBox typ="recht" titel={null} style={{ marginTop:"8px" }}
            kinder={<span>⚠️ Orientierungsrechnung. Steuerliche Aspekte (Realsplitting § 10 EStG), Kindergeld-Anrechnung und individuelle Abzüge nicht berücksichtigt. Fachanwalt für Familienrecht empfohlen.</span>} />
        </div>
      )}
    </div>
  );
}

// MODUL: WECHSELMODELL-UNTERHALT (BGH XII ZB 234/15)
// =============================================
function WechselmodellRechner({ ext, onSaveErgebnis }) {
  var u = rStyles;
  const [rolle, setRolle] = React.useState("");
  const [einElt1, setEinElt1] = React.useState(ext ? String(ext.einkommenNetto||"") : "");
  const [einElt2, setEinElt2] = React.useState(ext ? String(ext.einkommenGegenseite||"") : "");
  const [betreuungElt1, setBetreuungElt1] = React.useState("50");
  const [kmEinfach, setKmEinfach] = React.useState(ext ? String(ext.fahrtkostenKm||"") : "");
  const [fahrtenProMonat, setFahrtenProMonat] = React.useState(ext ? String(ext.fahrtkostenFahrtenProMonat||"") : "");
  const [kinder, setKinder] = React.useState(
    ext && ext.kinder && ext.kinder.length > 0
      ? ext.kinder.map(function(k,i){ var a=10; if(k.geburt){var d=new Date(k.geburt);a=Math.floor((new Date()-d)/(365.25*24*3600*1000));} return {id:i,name:k.name||("Kind "+(i+1)),alter:String(a)}; })
      : [{id:0,name:"Kind 1",alter:"8"}]
  );
  const [result, setResult] = React.useState(null);
  const [showDetail, setShowDetail] = React.useState(false);

  function addKind(){ setKinder(function(p){ return p.concat([{id:Date.now(),name:"Kind "+(p.length+1),alter:"8"}]); }); }
  function updK(id,f,v){ setKinder(function(p){ return p.map(function(k){ return k.id===id?Object.assign({},k,{[f]:v}):k; }); }); }
  function remK(id){ setKinder(function(p){ return p.filter(function(k){ return k.id!==id; }); }); }

  function berechne() {
    var e1 = parseFloat(einElt1)||0;
    var e2 = parseFloat(einElt2)||0;
    var ant1 = parseFloat(betreuungElt1)||50;
    var ant2 = 100 - ant1;
    var gesamtEink = e1 + e2;
    var quote1 = gesamtEink > 0 ? e1 / gesamtEink : 0.5;
    var quote2 = 1 - quote1;

    // Kindesbedarf nach DT2024 berechnen
    var kinderBedarf = kinder.map(function(k){
      var alter = parseInt(k.alter)||8;
      var tabellenUnterhalt = getDTUnterhalt(gesamtEink / Math.max(1,kinder.length), alter);
      // Im Wechselmodell: Barunterhalt angepasst nach Betreuungsquote
      var zahlungElternteil1 = 0, zahlungElternteil2 = 0;
      // BGH: Mehrkostenbedarf wird nach Einkommensquoten aufgeteilt
      var mehrkosten = tabellenUnterhalt * 0.2; // ca. 20% Mehrkosten im Wechselmodell
      var gesamtBedarf = tabellenUnterhalt + mehrkosten;
      zahlungElternteil1 = gesamtBedarf * quote1 * (ant2/100); // Elternteil 1 zahlt anteilig
      zahlungElternteil2 = gesamtBedarf * quote2 * (ant1/100);
      var nettoZahlung = zahlungElternteil1 - zahlungElternteil2; // >0: Elt1 zahlt an Elt2
      return { name:k.name, alter:alter, tabellenUnterhalt, mehrkosten, gesamtBedarf,
               zahlungElternteil1, zahlungElternteil2, nettoZahlung };
    });

    // Fahrtkosten nach BGH XII ZB 234/15
    var km = parseFloat(kmEinfach)||0;
    var fahrten = parseFloat(fahrtenProMonat)||0;
    var fahrtkostenMtl = km * 2 * fahrten * 0.25; // BGH-Satz ~0,25 €/km
    // Fahrtkostenaufteilung nach Einkommensquoten
    var fkElt1 = fahrtkostenMtl * quote1;
    var fkElt2 = fahrtkostenMtl * quote2;

    // Kindergeld: wird aufgeteilt (§ 1612b BGB im Wechselmodell)
    var kgProKind = 250; // 2024
    var kgElt1 = kgProKind * kinder.length * (ant1/100);
    var kgElt2 = kgProKind * kinder.length * (ant2/100);

    // Sozialrecht TBG-Hinweis: Wer hat TBG-Anspruch?
    var tbgHinweis = ant2 > 25 ? "Elternteil 2 (" + ant2 + "%) hat möglicherweise TBG-Anspruch beim Jobcenter" : "TBG-Anspruch erst ab ca. 25% Betreuungsanteil realistisch";

    setResult({ e1, e2, ant1, ant2, quote1, quote2, kinderBedarf,
      fahrtkostenMtl, fkElt1, fkElt2, kgElt1, kgElt2, tbgHinweis, rolle });

    var gesamtNetto = kinderBedarf.reduce(function(s,k){ return s+k.nettoZahlung; }, 0);
    if(onSaveErgebnis) onSaveErgebnis({
      typ: "Wechselmodell-Unterhalt (BGH XII ZB 234/15)",
      rechtsbereich: "Familienrecht",
      ergebnis: Math.abs(gesamtNetto) < 5 ? "Ausgewogen – kein Zahlbetrag" : Math.abs(gesamtNetto).toFixed(0) + " €/Monat (" + (gesamtNetto > 0 ? "Elt.1 zahlt" : "Elt.2 zahlt") + ")",
      details: ant1+"% / "+ant2+"% · "+kinder.length+" Kind(er) · FK "+fahrtkostenMtl.toFixed(0)+"€/Monat",
      detailSchritte: [
        {label:"Einkommen Elternteil 1", wert:e1.toFixed(2)+" €"},
        {label:"Einkommen Elternteil 2", wert:e2.toFixed(2)+" €"},
        {label:"Einkommensquote Elt.1 / Elt.2", wert:(quote1*100).toFixed(0)+"% / "+(quote2*100).toFixed(0)+"%"},
        {label:"Betreuungsanteil Elt.1 / Elt.2", wert:ant1+"% / "+ant2+"%"},
        {label:"Fahrtkosten gesamt", wert:fahrtkostenMtl.toFixed(2)+" €/Monat"},
        {label:"Fahrtkosten Elt.1 (Anteil)", wert:fkElt1.toFixed(2)+" €/Monat"},
        ...kinderBedarf.map(function(k){ return {label:"Zahlbetrag "+k.name, wert:k.nettoZahlung.toFixed(0)+" €/Monat", bold:true}; }),
      ],
      rechtsgrundlagen: "BGH XII ZB 234/15 · § 1606 Abs. 3 BGB · § 1612b BGB · § 21 VI SGB II (Fahrtkosten)"
    });
  }

  return (
    <div>
      <h4 style={u.modTitle}>🔄 Wechselmodell-Unterhalt</h4>

      <InfoBox typ="recht" titel="BGH XII ZB 234/15"
        kinder={<span>Beim Wechselmodell trägt jeder Elternteil den Barunterhalt entsprechend seiner Einkommensquote. Fahrtkosten werden nach § 21 Abs. 6 SGB II als Mehrbedarf anerkannt (Jobcenter) und nach BGH als bereinigtes Einkommen abgezogen (Unterhalt). <strong>Mehrkosten des Wechselmodells</strong> (~20% Aufschlag auf Tabellenwert) werden ebenfalls quotal aufgeteilt.</span>} />

      <InfoBox typ="empf" titel="TBG + Wohngeld-Tipp"
        kinder={<span>Wenn der andere Elternteil SGB II erhält: <strong>Wohngeld/Kinderzuschlag ist günstiger</strong>, da mehr Umgang <em>nicht</em> zu Wohngeldkürzung führt (§ 5 Abs. 3 WoGG). TBG-Antrag bei Jobcenter stellen wenn Betreuungsanteil &gt; 25%.</span>} />

      <label style={u.sectionLabel}>Ihre Rolle:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
        {[{id:"pflichtig",label:"💸 Hauptverdiener"},{id:"berechtigt",label:"💰 Geringverdiener"}].map(function(r){
          return <div key={r.id} onClick={function(){setRolle(r.id);}}
            style={{ flex:1, padding:"8px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", textAlign:"center",
              backgroundColor:rolle===r.id?"#003366":"#f0f4f7", color:rolle===r.id?"#fff":"#333",
              border:"2px solid "+(rolle===r.id?"#003366":"#ddd"), fontWeight:"bold" }}>{r.label}</div>;
        })}
      </div>

      <div style={u.row}>
        <input type="number" style={u.input} placeholder="Netto Elternteil 1 (€)" value={einElt1} onChange={e=>setEinElt1(e.target.value)} />
        <input type="number" style={u.input} placeholder="Netto Elternteil 2 (€)" value={einElt2} onChange={e=>setEinElt2(e.target.value)} />
      </div>

      <label style={u.sectionLabel}>Betreuungsanteil Elternteil 1 (%):</label>
      <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
        {["50","60","40","70","30"].map(function(v){ return (
          <div key={v} onClick={function(){setBetreuungElt1(v);}}
            style={{ padding:"6px 10px", borderRadius:"8px", fontSize:"11px", cursor:"pointer",
              backgroundColor:betreuungElt1===v?"#003366":"#eee", color:betreuungElt1===v?"#fff":"#333",
              fontWeight:"bold" }}>{v}/{100-parseInt(v)}</div>
        ); })}
        <input type="number" style={{ ...u.input, width:"60px", marginBottom:0 }} value={betreuungElt1} onChange={e=>setBetreuungElt1(e.target.value)} />
      </div>

      <label style={u.sectionLabel}>Kinder:</label>
      {kinder.map(function(k){ return (
        <div key={k.id} style={{ backgroundColor:"#f9f9f9", borderRadius:"8px", padding:"8px", marginBottom:"6px", borderLeft:"3px solid #003366", display:"flex", gap:"8px", alignItems:"center" }}>
          <input style={{ ...u.input, flex:1, marginBottom:0 }} placeholder="Name" value={k.name} onChange={function(e){updK(k.id,"name",e.target.value);}} />
          <input type="number" style={{ ...u.input, width:"60px", marginBottom:0 }} placeholder="Alter" value={k.alter} onChange={function(e){updK(k.id,"alter",e.target.value);}} />
          {kinder.length>1 && <button onClick={function(){remK(k.id);}} style={{ background:"none", border:"none", color:"#e53935", cursor:"pointer", fontSize:"16px" }}>×</button>}
        </div>
      ); })}
      <button onClick={addKind} style={{ width:"100%", padding:"7px", backgroundColor:"#f0f4f7", border:"1px dashed #003366", borderRadius:"8px", cursor:"pointer", fontSize:"12px", color:"#003366", marginBottom:"10px" }}>+ Kind hinzufügen</button>

      <label style={u.sectionLabel}>Fahrtkosten (BGH: als bereinigtes Einkommen abziehbar):</label>
      <div style={u.row}>
        <input type="number" style={u.input} placeholder="km einfach" value={kmEinfach} onChange={e=>setKmEinfach(e.target.value)} />
        <input type="number" style={u.input} placeholder="Fahrten/Monat" value={fahrtenProMonat} onChange={e=>setFahrtenProMonat(e.target.value)} />
      </div>
      {kmEinfach && fahrtenProMonat && (
        <div style={{ fontSize:"11px", color:"#003366", marginBottom:"10px" }}>
          Fahrtkosten: {((parseFloat(kmEinfach)||0)*2*(parseFloat(fahrtenProMonat)||0)*0.25).toFixed(2)} €/Monat (0,25 €/km BGH-Satz)
        </div>
      )}

      <button style={u.btnPrimary} onClick={berechne}>🧮 Berechnen</button>

      {result && (
        <div style={u.resultBox}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"8px" }}>
            <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", textTransform:"uppercase" }}>Ergebnis</div>
            <button onClick={function(){setShowDetail(!showDetail);}} style={{ fontSize:"10px", padding:"3px 8px", border:"1px solid #ddd", borderRadius:"5px", background:"#f5f5f5", cursor:"pointer" }}>{showDetail?"▲ Weniger":"▼ Details"}</button>
          </div>

          {/* Einkommensquoten-Übersicht */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"10px" }}>
            <div style={{ backgroundColor:"#e8f0fb", borderRadius:"7px", padding:"8px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#003366", fontWeight:"bold" }}>Elternteil 1</div>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#003366" }}>{(result.quote1*100).toFixed(0)}%</div>
              <div style={{ fontSize:"10px", color:"#666" }}>{result.ant1}% Betreuung · {result.e1} €</div>
            </div>
            <div style={{ backgroundColor:"#e8f5e9", borderRadius:"7px", padding:"8px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#1b5e20", fontWeight:"bold" }}>Elternteil 2</div>
              <div style={{ fontSize:"16px", fontWeight:"bold", color:"#1b5e20" }}>{(result.quote2*100).toFixed(0)}%</div>
              <div style={{ fontSize:"10px", color:"#666" }}>{result.ant2}% Betreuung · {result.e2} €</div>
            </div>
          </div>

          {showDetail && (
            <div style={{ backgroundColor:"#f9f9f9", borderRadius:"7px", padding:"10px", marginBottom:"10px", fontSize:"11px" }}>
              {result.kinderBedarf.map(function(k,i){ return (
                <div key={i} style={{ borderBottom:"1px solid #eee", paddingBottom:"6px", marginBottom:"6px" }}>
                  <div style={{ fontWeight:"bold", color:"#003366", marginBottom:"3px" }}>{k.name} ({k.alter} J.)</div>
                  <div style={u.calcStep}><span>Tabellenwert:</span><span>{k.tabellenUnterhalt.toFixed(0)} €</span></div>
                  <div style={u.calcStep}><span>+ Mehrkosten WM (+20%):</span><span>{k.mehrkosten.toFixed(0)} €</span></div>
                  <div style={u.calcStep}><span>= Gesamtbedarf:</span><span style={{fontWeight:"bold"}}>{k.gesamtBedarf.toFixed(0)} €</span></div>
                  <div style={u.calcStep}><span>Netto-Zahlbetrag:</span><span style={{fontWeight:"bold",color:k.nettoZahlung>0?"#e53935":"#2e7d32"}}>{k.nettoZahlung > 0 ? "Elt.1 → Elt.2: " : "Elt.2 → Elt.1: "}{Math.abs(k.nettoZahlung).toFixed(0)} €</span></div>
                </div>
              ); })}
              <div style={u.calcStep}><span>Fahrtkosten gesamt:</span><span>{result.fahrtkostenMtl.toFixed(2)} €/Monat</span></div>
              <div style={u.calcStep}><span>Anteil Elt.1:</span><span>{result.fkElt1.toFixed(2)} €</span></div>
              <div style={u.calcStep}><span>Anteil Elt.2:</span><span>{result.fkElt2.toFixed(2)} €</span></div>
              <div style={{ fontSize:"10px", color:"#888", marginTop:"6px" }}>BGH XII ZB 234/15 · § 1606 Abs. 3 BGB · § 1612b BGB</div>
            </div>
          )}

          <InfoBox typ="empf" titel={result.tbgHinweis} kinder={<span>Bei Bürgergeld-Bezug: TBG-Anlage beim Jobcenter einreichen. Fahrtkosten als Mehrbedarf § 21 VI SGB II beantragen.</span>} style={{ marginTop:"8px" }} />
          <InfoBox typ="recht" titel={null} kinder={<span>⚠️ Orientierungsrechnung. BGH-Rechtsprechung zum Wechselmodell wird durch Instanzgerichte unterschiedlich angewandt. Familienrechtliche Beratung empfohlen.</span>} style={{ marginTop:"8px" }} />
        </div>
      )}
    </div>
  );
}

function DuesseldorferTabelleNachschlag() {
  var u = rStyles;
  const [alter, setAlter] = React.useState("8");
  const [einkommen, setEinkommen] = React.useState("");
  const [showTabelle, setShowTabelle] = React.useState(false);
  var alterKat = parseInt(alter)<6?0:parseInt(alter)<12?1:parseInt(alter)<18?2:3;
  var ep = parseFloat(einkommen)||0;
  var gruppe = ep>0 ? DT2024.gruppen.findIndex(function(g){return ep<=g.bis;}) : -1;
  if(gruppe<0&&ep>0) gruppe=9;
  var tv = gruppe>=0 ? DT2024.tabelle[gruppe][alterKat] : null;

  return (
    <div>
      <h4 style={u.modTitle}>📊 Düsseldorfer Tabelle 2024</h4>
      <InfoBox typ="recht" titel={null} kinder={<span>Richtwerte für Kindesunterhalt §§ 1601 ff. BGB. Stand 01.01.2024.</span>} />
      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Alter des Kindes:</label>

        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Nettoeinkommen Pflichtig (€):</label>
          <input type="number" style={u.input} placeholder="z.B. 2200" value={einkommen} onChange={e=>setEinkommen(e.target.value)} />
        </div>
      </div>
      {tv && (
        <div style={u.resultBox}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"8px" }}>
            <div style={{ backgroundColor:"#e8f0fb", borderRadius:"7px", padding:"8px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#003366" }}>Gruppe {gruppe+1}</div>
              <div style={{ fontSize:"14px", fontWeight:"bold", color:"#003366" }}>{tv} €</div>
              <div style={{ fontSize:"10px", color:"#666" }}>Tabellenwert</div>
            </div>
            <div style={{ backgroundColor:"#e8f5e9", borderRadius:"7px", padding:"8px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#1b5e20" }}>Zahlbetrag</div>

          <details>

              {["0–5 J.","6–11 J.","12–17 J.","ab 18 J."].map(function(l,ai){

                return <div key={ai} style={{ ...u.calcStep, backgroundColor:ai===alterKat?"#e8f0fb":"transparent", padding:"2px 4px", borderRadius:"3px" }}>

                </div>;

      <button onClick={function(){setShowTabelle(!showTabelle);}}
        style={{ width:"100%", padding:"7px", marginTop:"8px", backgroundColor:"#f0f4f7", border:"1px solid #003366", borderRadius:"8px", cursor:"pointer", fontSize:"12px", color:"#003366" }}>

var FRIST_TYPEN = [
  {id:"widerspruch",label:"📋 Widerspruch Bescheid",tage:28,rg:"§ 84 SGG",h:"Widerspruch gegen Jobcenter-Bescheid: 1 Monat ab Zugang. Fristversäumnis → Bestandskraft!"},
  {id:"klage_sg",label:"🏛️ Klage Sozialgericht",tage:28,rg:"§ 87 SGG",h:"Nach Widerspruchsbescheid: 1 Monat Klagefrist. Beginnt mit Zugang des Widerspruchsbescheids."},
  {id:"unterhalt_verjahr",label:"⚖️ Unterhaltsverjährung",tage:1095,rg:"§ 195 BGB",h:"Unterhaltsansprüche verjähren nach 3 Jahren. Rückwirkend nur ab Mahnung/Klage."},
  {id:"uvg",label:"👶 UVG-Antrag",tage:0,rg:"§ 9 UVG",h:"Unterhaltsvorschuss ab Antragmonat — keine Rückwirkung. Antrag sofort stellen!"},
  {id:"vollstreckung",label:"⚡ Vollstr.-Verjährung",tage:10950,rg:"§ 197 BGB",h:"Titulierte Unterhaltsansprüche verjähren erst nach 30 Jahren."},
];
function FristenRechner() {
  var u = rStyles;
  const [typ, setTyp] = React.useState("widerspruch");
  const [datum, setDatum] = React.useState("");
  const [result, setResult] = React.useState(null);
  var akt = FRIST_TYPEN.find(function(f){return f.id===typ;});
  function berechne() {
    if(!datum) return;
    var start = new Date(datum);
    var ende = new Date(start); ende.setDate(ende.getDate()+(akt.tage||0));
    var rest = Math.round((ende-new Date())/(1000*60*60*24));
    setResult({ende, rest, abgelaufen:rest<0});
  }
  return (
    <div>
      <h4 style={u.modTitle}>⏰ Fristenrechner</h4>
      <InfoBox typ="warnung" titel="Fristen können Ansprüche vernichten!" kinder={<span>Verpasste Widerspruchs- und Klagefristen führen zur Bestandskraft. Immer sofort handeln!</span>} />
      <label style={u.sectionLabel}>Fristtyp:</label>
      <select style={u.input} value={typ} onChange={e=>setTyp(e.target.value)}>
        {FRIST_TYPEN.map(function(f){return <option key={f.id} value={f.id}>{f.label}</option>;})}
      </select>
      {akt && <InfoBox typ="recht" titel={akt.rg} kinder={<span>{akt.h}</span>} />}
      {akt && akt.tage>0 && (
        <div>
          <label style={u.sectionLabel}>Bescheiddatum / Zugangsdatum:</label>
          <input type="date" style={u.input} value={datum} onChange={e=>setDatum(e.target.value)} />
          <button style={u.btnPrimary} onClick={berechne}>⏰ Frist berechnen</button>
        </div>
      )}
      {result && (
        <div style={{ ...u.resultBox, borderColor:result.abgelaufen?"#e53935":result.rest<=7?"#f9a825":"#43a047" }}>
          <div style={{ textAlign:"center", marginBottom:"8px", fontWeight:"bold" }}>Fristende: {result.ende.toLocaleDateString("de-DE")}</div>
          {result.abgelaufen
            ? <InfoBox typ="warnung" titel={"Frist abgelaufen vor "+Math.abs(result.rest)+" Tagen!"} kinder={<span>Prüfen: Wiedereinsetzung § 27 SGB X / § 67 SGG</span>} />
            : <InfoBox typ={result.rest<=7?"warnung":"positiv"} titel={"Noch "+result.rest+" Tage"} kinder={<span>{result.rest<=7?"⚡ Sofort handeln!":"Einschreiben mit Rückschein empfohlen."}</span>} />
          }
        </div>
      )}
    </div>
  );
}
