// Safe jsPDF loader
function getJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return window.jspdf.jsPDF;
  if (window.jsPDF) return window.jsPDF;
  return null;
}

function SigPadModal({ onSave, onClose }) {
  var canvasRef = React.useRef(null);
  var drawing = React.useRef(false);
  var lastPos = React.useRef(null);
  var getPos = function(canvas, evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var src = evt.touches ? evt.touches[0] : evt;
    return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
  };
  var startDraw = function(e) { e.preventDefault(); drawing.current = true; var cv = canvasRef.current; if (cv) lastPos.current = getPos(cv, e.nativeEvent||e); };
  var draw = function(e) {
    e.preventDefault(); if (!drawing.current) return;
    var cv = canvasRef.current; if (!cv) return;
    var ctx = cv.getContext("2d");
    var pos = getPos(cv, e.nativeEvent||e);
    ctx.beginPath(); ctx.strokeStyle = "#003366"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  var stopDraw = function(e) { if (e) e.preventDefault(); drawing.current = false; };
  var clear = function() { var cv = canvasRef.current; if (cv) cv.getContext("2d").clearRect(0,0,cv.width,cv.height); };
  var save = function() { var cv = canvasRef.current; if (cv) onSave(cv.toDataURL("image/png")); };
  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.6)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <div style={{ backgroundColor:"#fff", borderRadius:"14px", padding:"20px", width:"100%", maxWidth:"420px" }}>
        <div style={{ fontWeight:"bold", fontSize:"14px", color:"#003366", marginBottom:"6px" }}>✍️ Unterschrift des Antragstellers</div>
        <div style={{ fontSize:"11px", color:"#666", marginBottom:"12px" }}>Mit Finger oder Maus im Feld unterschreiben:</div>
        <canvas ref={canvasRef} width={560} height={160}
          style={{ border:"2px solid #003366", borderRadius:"8px", width:"100%", height:"120px", touchAction:"none", backgroundColor:"#fafcff", display:"block" }}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
        />
        <div style={{ display:"flex", gap:"8px", marginTop:"12px" }}>
          <button onClick={clear} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>🗑️ Löschen</button>
          <button onClick={onClose} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>Abbrechen</button>
          <button onClick={save} style={{ flex:2, padding:"10px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>✅ Übernehmen</button>
        </div>
      </div>
    </div>
  );
}

  const updateTermin = (id, field, value) => setTermine(termine.map(t => t.id === id ? { ...t, [field]: value } : t));
  const activeTermin = termine.find(t => t.id === selectedTerminId);


  // ── Supabase Helpers ─────────────────────────────────────
  const sbHeaders = () => ({
    "Content-Type": "application/json",
    "apikey": loginDaten.supabaseKey,
    "Authorization": "Bearer " + loginDaten.supabaseKey
  });

  const sbReady = () => loginDaten.supabaseUrl && loginDaten.supabaseKey;

  // Formular in Supabase speichern → gibt { id, url } zurück
  const sbSaveFormular = async (formTyp, formLabel, member, vorausgefuellt) => {
    if (!sbReady()) return null;
    const id = Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    const baseUrl = loginDaten.supabaseUrl.replace("/rest/v1", "");
    const payload = {
      formular_id: id,
      typ: formTyp,
      label: formLabel,
      mitglied_name: member ? (member.vorname + " " + member.name).trim() : null,
      mitglied_mail: member ? member.mail || null : null,
      mitglied_tel: member ? member.tel || null : null,
      vorausgefuellt: JSON.stringify(vorausgefuellt || {}),
      status: "gesendet"
    };
    try {
      const res = await fetch(loginDaten.supabaseUrl + "/formulare", {
        method: "POST", headers: { ...sbHeaders(), "Prefer": "return=minimal" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        let errText = await res.text();
        try { const j = JSON.parse(errText); errText = j.message || j.hint || j.details || errText; } catch(x) {}
        alert("Supabase Fehler " + res.status + ":\n" + errText.slice(0, 400));
        return null;
      }
      const cleanBase = baseUrl.replace(/\/+$/, "");
      const formularUrl = "https://anspruchslotse.github.io/isuv-anspruchslotse/formular.html?id=" + id +
        "&sb=" + encodeURIComponent(cleanBase) +
        "&key=" + encodeURIComponent(loginDaten.supabaseKey);
      return { id, url: formularUrl };
    } catch(e) { alert("Netzwerkfehler: " + e.message); return null; }
  };

  const [neueEingaengeCount, setNeueEingaengeCount] = useState(0);
  const [geseheneEingangIds, setGeseheneEingangIds] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("isuv_gesehen_ids") || "[]")); } catch(e) { return new Set(); }
  });
  const [geloeschteEingangIds, setGeloeschteEingangIds] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("isuv_geloeschte_ids") || "[]")); } catch(e) { return new Set(); }
  });

  // Ausgefüllte Formulare aus Supabase laden
  // ── AUTO-TRANSFER: beantwortete Formulare direkt in Akte ──
  const sbAutoTransfer = function(formulare, currentMembers) {
    formulare.forEach(function(f) {
      // BUGFIX: Nicht erneut übertragen wenn bereits verarbeitet
      if (transferrierteIds.has(f.id)) return;
      var fd = f.felder || {};
      var match = currentMembers.find(function(m) {
        return (fd.mail && m.mail && m.mail.toLowerCase()===fd.mail.toLowerCase()) ||
               (fd.bgMail && m.mail && m.mail.toLowerCase()===fd.bgMail.toLowerCase()) ||
               ((m.vorname+" "+m.name).toLowerCase()===(f.name||"").toLowerCase());
      });
      if (!match) return;
      var mUpd={};
      ["vorname","name","tel","mail","strasse","plz","ort"].forEach(function(k){ if(fd[k]) mUpd[k]=fd[k]; });
      if(fd.bgVorname) mUpd.vorname=fd.bgVorname; if(fd.bgName) mUpd.name=fd.bgName;
      if(fd.bgTel) mUpd.tel=fd.bgTel; if(fd.bgMail) mUpd.mail=fd.bgMail;
      if(fd.bgStrasse) mUpd.strasse=fd.bgStrasse; if(fd.bgPlz) mUpd.plz=fd.bgPlz; if(fd.bgOrt) mUpd.ort=fd.bgOrt;
      if(Object.keys(mUpd).length>0){
        setMembers(function(prev){return prev.map(function(x){return x.id===match.id?Object.assign({},x,mUpd):x;});});
        try{var sv=JSON.parse(localStorage.getItem("isuv_members")||"[]");localStorage.setItem("isuv_members",JSON.stringify(sv.map(function(x){return x.id===match.id?Object.assign({},x,mUpd):x;})));}catch(e){}
      }
      var upd={};
      if(fd.familienstand) upd.familienstand=fd.familienstand;
      if(fd.einkommenNetto) upd.einkommenNetto=parseFloat(fd.einkommenNetto);
      if(fd.einkommenBrutto) upd.einkommenBrutto=parseFloat(fd.einkommenBrutto);
      if(fd.mieteWarm) upd.mieteWarm=parseFloat(fd.mieteWarm);
      if(fd.mieteKalt) upd.mieteKalt=parseFloat(fd.mieteKalt);
      if(fd.heizkosten) upd.heizkosten=parseFloat(fd.heizkosten);
      if(fd.nebenkosten) upd.nebenkosten=parseFloat(fd.nebenkosten);
      if(fd.wohnungGroesse) upd.wohnungGroesse=parseFloat(fd.wohnungGroesse);
      if(fd.notizen) upd.notizen=fd.notizen; if(fd.titel) upd.titel=fd.titel;
      if(fd.beschaeftigungsart) upd.beschaeftigungsart=fd.beschaeftigungsart;
      if(fd.arbeitgeber) upd.arbeitgeber=fd.arbeitgeber;
      if(fd.steuerklasse) upd.steuerklasse=fd.steuerklasse;
      if(fd.trennungSeit) upd.trennungSeit=fd.trennungSeit;
      if(fd.bgFamilienstand) upd.familienstand=fd.bgFamilienstand;
      if(fd.bgErwerbsstatus) upd.beschaeftigungsart=fd.bgErwerbsstatus;
      if(fd.bgArbeitgeber) upd.arbeitgeber=fd.bgArbeitgeber;
      if(fd.bgEinkommenNetto) upd.einkommenNetto=parseFloat(fd.bgEinkommenNetto);
      if(fd.bgMieteKalt) upd.mieteKalt=parseFloat(fd.bgMieteKalt);
      if(fd.bgHeizkosten) upd.heizkosten=parseFloat(fd.bgHeizkosten);
      if(fd.bgNebenkosten) upd.nebenkosten=parseFloat(fd.bgNebenkosten);
      if(fd.bgWohnflaeche) upd.wohnungGroesse=parseFloat(fd.bgWohnflaeche);
      if(fd.bgNotizen) upd.notizen=fd.bgNotizen;
      // Anwalt-Daten aus Stammdaten-Formular
      if(fd.anwaltName) upd.anwaltName=fd.anwaltName;
      if(fd.anwaltAdresse) upd.anwaltAdresse=fd.anwaltAdresse;
      if(fd.anwaltTel) upd.anwaltTel=fd.anwaltTel;
      if(fd.anwaltMail) upd.anwaltMail=fd.anwaltMail;
      // Alleinerziehend nur setzen wenn explizit im Fragebogen angegeben, nicht automatisch bei Kindern
      if(fd.alleinerziehend !== undefined) upd.alleinerziehend = fd.alleinerziehend === true || fd.alleinerziehend === "ja";
      if(fd.hatKinder === "nein") { upd.alleinerziehend = false; upd.kinder = []; }
      if(Array.isArray(fd.kinder)&&fd.kinder.length>0){
        upd.kinder=fd.kinder.map(function(k){
          var geb=k.geburt?new Date(k.geburt):null;
          var age=geb?Math.floor((new Date()-geb)/(365.25*24*3600*1000)):0;
          var ag=age>=18?"18+ J.":age>=12?"12-17 J.":age>=6?"6-11 J.":"0-5 J.";
          return{name:(k.nachname||"")+", "+(k.vorname||""),geburt:k.geburt||"",alter:ag,wohnort:k.wohnort||"bei Antragsteller",uvg:k.uvg==="ja",kg:true,unterhaltsTitel:k.unterhaltsTitel||"",unterhaltsTitelBetrag:k.unterhaltsTitelBetrag||"",unterhaltGezahlt:k.unterhaltGezahlt||"",unterhaltTatsaechlich:k.unterhaltTatsaechlich||"",unterhaltAusgefallenSeit:k.unterhaltAusgefallenSeit||"",unterhaltEmpfaenger:k.unterhaltEmpfaenger||""};
        });
      }
      // Versionshistorie: Änderung mit Zeitstempel speichern
      var jetzt=new Date().toLocaleString("de-DE");
      var eintrag={datum:jetzt,quelle:"Fragebogen: "+f.typ,felder:Object.keys(upd).concat(Object.keys(mUpd))};
      upd._historie=(((currentMembers.find(function(x){return x.id===match.id;})||{}).extras||{})._historie||[]).concat([eintrag]).slice(-20);
      if(Object.keys(upd).length>0){
        setMemberExtras(function(prev){var n=Object.assign({},prev);n[match.id]=Object.assign({},prev[match.id]||{},upd);return n;});
      }
      setAusgangFormulare(function(prev){return prev.map(function(af){
        if(af.mitglied===(match.vorname+" "+match.name)&&af.status==="unbeantwortet")return Object.assign({},af,{status:"beantwortet"});
        return af;
      });});
      // BUGFIX: ID als transferriert markieren damit Polling nicht erneut überträgt
      setTransferrierteIds(function(prev){
        var next=new Set(prev); next.add(f.id);
        try{localStorage.setItem("isuv_transfer_ids",JSON.stringify([...next].slice(-200)));}catch(e){}
        return next;
      });
    });
  };

  const sbLadeEingaenge = async () => {
    if (!sbReady()) return;
    try {
      const res = await fetch(loginDaten.supabaseUrl + "/formulare?status=eq.beantwortet&order=beantwortet_am.desc", {
        headers: sbHeaders()
      });
      if (!res.ok) return;
      const rows = await res.json();
      const neu = rows.map(r => ({
        id: r.id,
        datum: r.beantwortet_am ? new Date(r.beantwortet_am).toLocaleString("de-DE") : "–",
        typ: r.label,
        absender: r.mitglied_mail || "–",
        name: r.mitglied_name || "Unbekannt",
        felder: JSON.parse(r.antwort_daten || "{}")
      }));
      const neuF=rows.map(function(r){return{id:r.id,datum:r.beantwortet_am?new Date(r.beantwortet_am).toLocaleString("de-DE"):"",typ:r.label||r.typ||"Formular",absender:r.mitglied_mail||"",name:r.mitglied_name||"",felder:JSON.parse(r.antwort_daten||"{}")};}); sbAutoTransfer(neuF,members);
      // FIX 3: WA-Bestätigungen werden NICHT mehr automatisch beim Polling geöffnet.
      // Popup-Blocker würde das unterdrücken; bei mehreren neuen Eingängen würden mehrere Tabs aufgehen.
      // Stattdessen: neue Eingänge werden im neuF-Array gesammelt und können manuell bestätigt werden.
      // (WA-Bestätigungsbutton im Eingang-Detail-View verfügbar)
      setEingangFormulare(prev => {
        const existIds = new Set(prev.map(x => x.id));
        const wirklichNeu = neu.filter(x => !existIds.has(x.id) && !geloeschteEingangIds.has(x.id));
        if (wirklichNeu.length > 0) {
          setNeueEingaengeCount(c => c + wirklichNeu.length);
        }
        return wirklichNeu.length > 0 ? [...wirklichNeu, ...prev] : prev;
      });
    } catch(e) { console.error("Supabase load error", e); }
  };

  // Auto-Polling: alle 60 Sekunden neue Eingänge prüfen wenn Supabase konfiguriert
  useEffect(() => {
    if (!sbReady()) return;
    // Sofort beim Start laden
    sbLadeEingaenge();
    const interval = setInterval(() => {
      sbLadeEingaenge();
    }, 60000);
    return () => clearInterval(interval);
  }, [loginDaten.supabaseUrl, loginDaten.supabaseKey]);

  if (!isLoggedIn) return (
    <div style={{ minHeight:"100vh", backgroundColor:"#f4f7f9", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <img src={window.ISUV_LOGO} alt="ISUV Logo" style={{ width:"220px", height:"auto", marginBottom:"24px" }} />
      <div style={{ backgroundColor:"#fff", borderRadius:"16px", padding:"24px 20px", width:"100%", maxWidth:"340px", boxShadow:"0 4px 20px rgba(0,0,0,0.08)" }}>
        <div style={{ fontSize:"14px", color:"#003366", fontWeight:"bold", textAlign:"center", marginBottom:"18px", letterSpacing:"0.3px" }}>Anspruchslotse – Anmeldung</div>
        <input style={styles.input} placeholder="Leiter (Name)" value={loginDaten.leiter}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{leiter:e.target.value}); })} />
        <input style={styles.input} placeholder="Ortsgruppe / Ort" value={loginDaten.ort}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{ort:e.target.value}); })} />
        <input style={styles.input} type="email" placeholder="E-Mail-Adresse (Absender)" value={loginDaten.email}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{email:e.target.value}); })} />
        <input style={styles.input} type="password" placeholder="Passwort" value={loginDaten.passwort}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{passwort:e.target.value}); })} />
        <input style={styles.input} type="tel" placeholder="WhatsApp-Nummer (z.B. +49170...)" value={loginDaten.whatsapp}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{whatsapp:e.target.value}); })} />
        <div style={{ fontSize:"10px", color:"#999", marginBottom:"12px", textAlign:"center" }}>
          📱 WhatsApp-Nummer wird für Formular-Versand genutzt
        </div>
        <button style={styles.btnPrimary} onClick={() => {
          try { var ohnePasswort = Object.assign({}, loginDaten, {passwort:""}); localStorage.setItem("isuv_profil", JSON.stringify(ohnePasswort)); } catch(e) {}
          setIsLoggedIn(true);
        }}>Software starten</button>
        {(loginDaten.email || loginDaten.whatsapp) && (
          <div style={{ fontSize:"10px", color:"#00afad", textAlign:"center", marginTop:"8px" }}>
            {loginDaten.email && <div>✉️ E-Mail: {loginDaten.email}</div>}
            {loginDaten.whatsapp && <div>📱 WhatsApp: {loginDaten.whatsapp}</div>}
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div style={styles.appFrame}>
      <header style={styles.header}>
        <div style={{ display: "flex", alignItems: "center", cursor: "pointer" }} onClick={() => setView("dashboard")}>
          <img src={window.ISUV_LOGO} alt="ISUV" style={{ height:"32px", width:"auto", display:"block" }} />
          <div style={{ marginLeft:"8px" }}>
            <strong style={{ display:"block", fontSize:"13px" }}>ANSPRUCHSLOTSE</strong>
            {(loginDaten.leiter || loginDaten.ort) && (
              <span style={{ fontSize:"10px", color:"#666" }}>{loginDaten.leiter}{loginDaten.leiter && loginDaten.ort ? " · " : ""}{loginDaten.ort}</span>
            )}
          </div>
        </div>
        <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
          {eingangFormulare.filter(f => !geseheneEingangIds.has(f.id)).length > 0 && (
            <div onClick={() => { setView("dashboard"); setShowFormulare(true); setShowEingang(true); setGeseheneEingangIds(prev => { const next = new Set([...prev, ...eingangFormulare.map(f => f.id)]); try { localStorage.setItem("isuv_gesehen_ids", JSON.stringify([...next])); } catch(e){} return next; }); }}
              style={{ cursor:"pointer", backgroundColor:"#e53935", color:"#fff", borderRadius:"20px", padding:"5px 10px", fontSize:"11px", fontWeight:"bold" }}>
              📥 {eingangFormulare.filter(f => !geseheneEingangIds.has(f.id)).length}
            </div>
          )}
          {(function() {
            var heute = new Date();
            var heuteTermine = termine.filter(function(t) {
              return t.tag === heute.getDate() && t.monat === heute.getMonth() && (!t.jahr || t.jahr === heute.getFullYear());
            });
            if (heuteTermine.length > 0) {
              return (
                <div onClick={() => { setView("dashboard"); setShowCalendar(true); }}
                  style={{ cursor:"pointer", backgroundColor:"#f57c00", color:"#fff", borderRadius:"20px", padding:"5px 10px", fontSize:"11px", fontWeight:"bold" }}
                  title={heuteTermine.map(function(t){ return t.zeit + " " + t.text; }).join(", ")}>
                  📅 {heuteTermine.length}
                </div>
              );
            }
            return null;
          })()}
          <button onClick={() => setView("profil")} style={{ ...styles.btnLogout, backgroundColor:"#e8f0fb", color:"#003366" }}>⚙️ Profil</button>
          <button onClick={() => setIsLoggedIn(false)} style={styles.btnLogout}>Abmelden</button>
        </div>
      </header>

      <main style={["formular_ausfuellen","tbg_form","buergergeld_form","eingang_detail","sorgerecht_form"].includes(view) ? {...styles.main, padding:"0", maxWidth:"800px"} : styles.main} className="app-main">
        {view === "dashboard" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>

            {/* MITGLIEDER */}
            <div style={styles.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }} onClick={() => setShowMemberList(!showMemberList)}>
                <h3 style={{ margin: 0, fontSize: "14px" }}>👥 Mitglieder</h3>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <div onClick={e => { e.stopPropagation(); setShowNeuesMitglied(true); setView("neues_mitglied"); }}
                    style={{ backgroundColor:"#00afad", color:"#fff", border:"none", borderRadius:"6px", padding:"4px 10px", fontSize:"11px", cursor:"pointer", fontWeight:"bold" }}>
                    + Mitglied
                  </div>
                  <span>{showMemberList ? "▲" : "▼"}</span>
                </div>
              </div>
              {showMemberList && (
                <div style={{ marginTop: "10px" }}>
                  <input style={styles.input} placeholder="Suchen nach Name, Ort, Tel..." onChange={e => setSearchTerm(e.target.value)} />
                  {(function() {
                    var term = searchTerm.toLowerCase();
                    var filtered = members.filter(function(m) {
                      return (m.vorname + " " + m.name + " " + m.ort + " " + m.tel + " " + m.plz).toLowerCase().includes(term) ||
                        ((memberExtras[m.id] && memberExtras[m.id].familienstand || "").toLowerCase().includes(term));
                    });
                    var pinned = filtered.filter(function(m) { return pinnedIds.includes(m.id); });
                    var unpinned = filtered.filter(function(m) { return !pinnedIds.includes(m.id); });
                    var sortedMembers = pinned.concat(unpinned);
                    return sortedMembers.map(function(m) {
                      var isPinned = pinnedIds.includes(m.id);
                      return (
                      <div key={m.id} style={{ ...styles.memberRow, backgroundColor: isPinned ? "#fff8e1" : "#fff", borderLeft: isPinned ? "3px solid #f57c00" : "3px solid transparent" }}>
                        <div onClick={() => { setActiveMember(m); setView("akte"); }} style={{ flex: 1, cursor: "pointer" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                            {isPinned && <span style={{ fontSize:"10px" }}>📌</span>}
                            <strong>{m.name}, {m.vorname}</strong>
                          </div>
                          <div style={{ fontSize: "11px", color: "#666" }}>📞 {m.tel} | ✉️ {m.mail}{m.ort ? " | 📍 "+m.ort : ""}</div>
                        </div>
                        <div style={{ position: "relative" }}>
                          <button style={styles.btnDots} onClick={() => setOpenActionMenuId(openActionMenuId === m.id ? null : m.id)}>⋮</button>
                          {openActionMenuId === m.id && (
                            <div style={styles.actionMenu}>

                              <div style={styles.menuItem} onClick={() => { setFormularVersandDialogNeu({ member: m, formTyp: "stammdaten" }); setVersandFelder(null); setOpenActionMenuId(null); }}>✉️ Formular senden</div>
                              <div style={styles.menuItem} onClick={() => { setActiveMember(m); setView("berechnung"); setBerechnungRechner(null); setBerechnungKategorie(null); setOpenActionMenuId(null); }}>🧮 Berechnung</div>
                              <div style={styles.menuItem} onClick={function() { setPinnedIds(function(prev) { return isPinned ? prev.filter(function(x){return x!==m.id;}) : [...prev,m.id]; }); setOpenActionMenuId(null); }}>

                            </div>
                          )}
                        </div>
                      </div>
                      );
                    });
                  })()}
                </div>

            </div>

            {/* FORMULARE + EINGANG */}
            <div style={styles.card}>
              <div onClick={() => setShowFormulare(!showFormulare)} style={styles.reiterHeader}>

                  )}

                  doc.setFont("helvetica","bold"); doc.setFontSize(8);
                  doc.text("Unterschrift Antragsteller*in:", margin, y); y += 3;
                  doc.addImage(fd.sigAntragsteller, "PNG", margin, y, 80, 20);
                  doc.line(margin, y+21, margin+80, y+21);
                  y += 25;
                } catch(e) {}
              }
              if(fd.sigAndererElternteil) {
                try {
                  doc.setFont("helvetica","bold"); doc.setFontSize(8);
                  doc.text("Unterschrift and. Elternteil:", margin, y); y += 3;
                  doc.addImage(fd.sigAndererElternteil, "PNG", margin, y, 80, 20);
                  doc.line(margin, y+21, margin+80, y+21);
                  y += 25;
                } catch(e) {}
              }
              // Footer
              doc.setFontSize(7); doc.setTextColor(150,150,150);
              doc.text("Erstellt mit ISUV Anspruchslotse · " + new Date().toLocaleDateString("de-DE"), margin, 290);
              doc.save("Anlage_TBG_" + (fd.antNachname||"").replace(/ /g,"_") + "_" + (fd.kinder&&fd.kinder[0]&&fd.kinder[0].kalenderjahr||new Date().getFullYear()) + ".pdf");
            };
            if(!window.jspdf) {
              var s = document.createElement("script");
              s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
              s.onload = doExport;
              document.head.appendChild(s);
            } else { doExport(); }
          };

          // Feld-Stil
          var fi = { width:"100%", padding:"9px 10px", border:"1px solid #ccc", borderRadius:"6px", fontSize:"13px", boxSizing:"border-box", marginBottom:"8px", backgroundColor:"#fff" };
          var fi2 = { width:"100%", padding:"7px 8px", border:"1px solid #ccc", borderRadius:"5px", fontSize:"12px", boxSizing:"border-box", backgroundColor:"#fff" };
          var sHead = { fontSize:"11px", fontWeight:"bold", color:"#fff", backgroundColor:"#003366", borderRadius:"5px", padding:"5px 10px", marginTop:"14px", marginBottom:"8px", letterSpacing:"0.4px", textTransform:"uppercase" };

          // Unterschriften-Canvas Komponente
          var SignatureCanvas = function(props) {
            var canvasRef = useRef(null);
            var drawing = useRef(false);
            var lastPos = useRef(null);
            var getPos = function(canvas, evt) {
              var rect = canvas.getBoundingClientRect();
              var scaleX = canvas.width / rect.width;
              var scaleY = canvas.height / rect.height;
              var src = evt.touches ? evt.touches[0] : evt;
              return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
            };
            var startDraw = function(e) {
              e.preventDefault();
              drawing.current = true;
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              var pos = getPos(canvas, e);
              ctx.beginPath();
              ctx.moveTo(pos.x, pos.y);
              lastPos.current = pos;
            };
            var draw = function(e) {
              e.preventDefault();
              if(!drawing.current) return;
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              ctx.lineWidth = 2.5;
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.strokeStyle = "#003366";
              var pos = getPos(canvas, e);
              ctx.lineTo(pos.x, pos.y);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(pos.x, pos.y);
              lastPos.current = pos;
            };
            var stopDraw = function(e) {
              if(!drawing.current) return;
              drawing.current = false;
              var canvas = canvasRef.current;
              props.onChange(canvas.toDataURL());
            };
            var clear = function() {
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              ctx.clearRect(0,0,canvas.width,canvas.height);
              props.onChange("");
            };
            return (
              <div style={{ marginBottom:"8px" }}>
                <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"4px" }}>{props.label}</div>
                <div style={{ border:"2px solid #003366", borderRadius:"8px", backgroundColor:"#f9faff", position:"relative", overflow:"hidden", touchAction:"none" }}>
                  <canvas ref={canvasRef} width={560} height={100} style={{ width:"100%", height:"80px", display:"block", cursor:"crosshair", touchAction:"none" }}
                    onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
                    onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw} />
                  {!props.value && <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#bbb", fontSize:"12px", pointerEvents:"none", textAlign:"center" }}>✍️ Hier unterschreiben</div>}
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"3px" }}>
                  <div style={{ fontSize:"10px", color:"#888" }}>Mit Finger oder Maus unterschreiben</div>
                  <button onClick={clear} style={{ fontSize:"10px", color:"#e53935", background:"none", border:"1px solid #e53935", borderRadius:"4px", padding:"2px 8px", cursor:"pointer" }}>✕ Löschen</button>
                </div>
                {props.value && <div style={{ fontSize:"10px", color:"#2e7d32", marginTop:"2px" }}>✅ Unterschrift vorhanden</div>}
              </div>
            );
          };

              <div style={infoBox}>

              {/* TBG Wohngeld/Kinderzuschlag Hinweis */}
              <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"8px", padding:"10px 12px", marginBottom:"10px", fontSize:"11px", color:"#1b5e20" }}>
                💡 <strong>Tipp für den anderen Elternteil:</strong> Wenn der andere Elternteil Wohngeld oder Kinderzuschlag beantragt, hat dieser <strong>keinen Nachteil</strong> durch mehr Umgang — im Gegenteil: Wohngeld wird nicht gekürzt, wenn das Kind zeitweise beim anderen Elternteil lebt (§ 5 Abs. 3 WoGG). Kinderzuschlag bleibt bei Wechselmodell ebenfalls bestehen.

                  📅 Nächstes Jahr
                </button>
                <button onClick={function(){ if(window.confirm("Formular komplett leeren?")) { setTbgFormDaten(function(p){ return Object.assign({}, p, { antNachname:"",antVorname:"",antStrasse:"",antPlz:"",antOrt:"",antGeburt:"",antBGNr:"",antTel:"",antMail:"",antAktenzeichen:"",ortDatum:"",datumISO:"",sigAntragsteller:"",sigAndererElternteil:"", kinder:[{kNachname:"",kVorname:"",kGeburt:"",epNachname:"",epVorname:"",epStrasse:"",epPlz:"",epOrt:"",epGeburt:"",aufteilungsWunsch:"",kalender:{antragsteller:Array(12).fill(""),anderer:Array(12).fill("")},kalenderjahr:String(new Date().getFullYear()),kgBerechtigt:"",kgWeiterleitung:"",kgBetrag:"",einkommenWeiterleitung:"",einkommenBetrag:"",sonstigeAngaben:""}] }); }); } }}
                  style={{ padding:"9px 10px", backgroundColor:"#ffebee", color:"#c62828", border:"1px solid #ef9a9a", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"12px", whiteSpace:"nowrap" }}>
                  🗑️ Leeren

              </div>

              {/* ─── (1) Antragsteller*in ─── */}

                  <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Vorname *</label><input style={fi2} value={fd.antVorname||""} onChange={function(e){tbgUpd("antVorname",e.target.value);}} placeholder="Vorname" /></div>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px" }}>
                  <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>PLZ</label><input style={fi2} value={fd.antPlz||""} onChange={function(e){tbgUpd("antPlz",e.target.value);}} placeholder="12345" /></div>
                  <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Ort</label><input style={fi2} value={fd.antOrt||""} onChange={function(e){tbgUpd("antOrt",e.target.value);}} placeholder="Stadt" /></div>

                  <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>E-Mail</label><input style={fi2} type="email" value={fd.antMail||""} onChange={function(e){tbgUpd("antMail",e.target.value);}} placeholder="name@mail.de" /></div>

              </div>

              {/* ─── Kinder ─── */}
              {kinder.map(function(kind, idx) {
                var kal = kind.kalender || { antragsteller:Array(12).fill(""), anderer:Array(12).fill("") };
                var gesTage = MONATE.map(function(_,i){
                  var m = parseInt(kal.antragsteller[i]||"0")||0;
                  var v = parseInt(kal.anderer[i]||"0")||0;
                  return m+v;
                });
                var sumAnt = (kal.antragsteller||[]).reduce(function(s,x){ return s+(parseInt(x)||0); },0);
                var sumAnd  = (kal.anderer||[]).reduce(function(s,x){ return s+(parseInt(x)||0); },0);
                var sumGes = sumAnt+sumAnd;
                var anteilAnt = sumGes>0 ? Math.round(sumAnt/sumGes*100) : 0;
                var anteilAnd = sumGes>0 ? Math.round(sumAnt/sumGes*100) === 0 ? 100 : 100-Math.round(sumAnt/sumGes*100) : 0;
                var istParit = anteilAnt>=43 && anteilAnt<=57;

                return (
                  <div key={idx} style={{ border:"2px solid #00afad", borderRadius:"10px", padding:"14px", marginTop:"16px" }}>

                        <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Vorname Kind *</label><input style={fi2} value={kind.kVorname||""} onChange={function(e){tbgKindUpd(idx,"kVorname",e.target.value);}} placeholder="Vorname" /></div>
                      </div>
                      <label style={{ fontSize:"11px", color:"#555", display:"block", marginTop:"4px", marginBottom:"3px" }}>Geburtsdatum Kind *</label>
                      <input style={fi} type="date" value={kind.kGeburt||""} onChange={function(e){tbgKindUpd(idx,"kGeburt",e.target.value);}} />

                      <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginTop:"10px", marginBottom:"6px", borderTop:"1px dashed #ddd", paddingTop:"8px" }}>Anderer Elternteil (außerhalb der Bedarfsgemeinschaft)</div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                        <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Nachname</label><input style={fi2} value={kind.epNachname||""} onChange={function(e){tbgKindUpd(idx,"epNachname",e.target.value);}} placeholder="Nachname" /></div>
                        <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Vorname</label><input style={fi2} value={kind.epVorname||""} onChange={function(e){tbgKindUpd(idx,"epVorname",e.target.value);}} placeholder="Vorname" /></div>
                      </div>
                      <label style={{ fontSize:"11px", color:"#555", display:"block", marginTop:"4px", marginBottom:"3px" }}>Straße und Hausnummer</label>
                      <input style={fi} value={kind.epStrasse||""} onChange={function(e){tbgKindUpd(idx,"epStrasse",e.target.value);}} placeholder="Straße, Hausnummer" />
                      <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px" }}>
                        <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>PLZ</label><input style={fi2} value={kind.epPlz||""} onChange={function(e){tbgKindUpd(idx,"epPlz",e.target.value);}} placeholder="PLZ" /></div>
                        <div><label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Ort</label><input style={fi2} value={kind.epOrt||""} onChange={function(e){tbgKindUpd(idx,"epOrt",e.target.value);}} placeholder="Ort" /></div>
                      </div>
                      <label style={{ fontSize:"11px", color:"#555", display:"block", marginTop:"4px", marginBottom:"3px" }}>Geburtsdatum anderer Elternteil</label>
                      <input style={fi} type="date" value={kind.epGeburt||""} onChange={function(e){tbgKindUpd(idx,"epGeburt",e.target.value);}} />
                    </div>

                    {/* (3) Aufteilung Betreuungszeiten */}
                    <div style={sHead}>③ Aufteilung der Betreuungszeiten</div>

                        <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.aufteilungsWunsch==="keine"?"#003366":"#fff", flexShrink:0, marginTop:"1px", display:"flex", alignItems:"center", justifyContent:"center" }}>

                        </div>

                      </label>
                      <label style={checkRow} onClick={function(){tbgKindUpd(idx,"aufteilungsWunsch","paritaetisch");}}>
                        <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.aufteilungsWunsch==="paritaetisch"?"#003366":"#fff", flexShrink:0, marginTop:"1px", display:"flex", alignItems:"center", justifyContent:"center" }}>

                        {MONATE.map(function(m, mi){
                          var tagM = parseInt((kal.antragsteller||[])[mi]||"0")||0;
                          var tagV = parseInt((kal.anderer||[])[mi]||"0")||0;
                          var ges  = tagM+tagV;

                          return (
                            <React.Fragment key={m}>

                              </div>
                              <input type="number" min="0" max="31" style={{ ...fi2, textAlign:"center", padding:"4px" }} value={(kal.antragsteller||[])[mi]||""} onChange={function(e){tbgKalUpd(idx,"antragsteller",mi,e.target.value);}} placeholder="–" />
                              <input type="number" min="0" max="31" style={{ ...fi2, textAlign:"center", padding:"4px" }} value={(kal.anderer||[])[mi]||""} onChange={function(e){tbgKalUpd(idx,"anderer",mi,e.target.value);}} placeholder="–" />
                            </React.Fragment>
                          );
                        })}
                        {/* Summe */}
                        <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>Gesamt</div>
                        <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnt}</div>
                        <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnd}</div>
                      </div>
                      {sumGes > 0 && (
                        <div style={{ marginTop:"10px", backgroundColor: istParit ? "#e8f5e9" : "#fff3e0", border:"1px solid "+(istParit?"#a5d6a7":"#ffcc02"), borderRadius:"7px", padding:"8px 10px", fontSize:"11px" }}>
                          <strong>Auswertung:</strong> Antragsteller*in {anteilAnt}% ({sumAnt} Tage) · And. Elternteil {anteilAnd}% ({sumAnd} Tage)
                          <br/>{istParit ? "✅ Paritätisches Wechselmodell erkannt (43–57 %)" : "📊 Asymmetrisches Modell – tagesanteilige Berechnung"}
                        </div>
                      )}
                    </div>

                    {/* (5) Einkommen des Kindes */}

              {f.bgHatKinder==="ja" && (

                          })}
                        </div>
                      </div>
                    );

                  <button onClick={function(){ setFormFelderDaten(function(p){ var k=(p.bgKinder||[]).concat([{vorname:"",nachname:"",geburt:"",wohnort:"",kindergeld:"",uvg:""}]); return Object.assign({},p,{bgKinder:k}); }); }}

                <option value="Erwerbsminderungsrente">Erwerbsminderungsrente</option>
                <option value="Krankengeld / AU">Krankengeld / Krankschreibung (AU)</option>

              </select>

                </div>
              )}
              <label style={styles.label}>Weitere Einnahmen (Unterhalt, Rente, Sonstige in €/Monat)</label>
              <input style={styles.input} type="number" value={f.bgWeitereEinkuenfte||""} onChange={e=>upd("bgWeitereEinkuenfte",e.target.value)} placeholder="0" />
              <label style={styles.label}>Vermögen (Konten, Sparbücher, Depot in €)</label>
              <input style={styles.input} type="number" value={f.bgVermoegen||""} onChange={e=>upd("bgVermoegen",e.target.value)} placeholder="z.B. 3500" />

                  <input style={styles.input} type="number" value={f.bgNebenkosten||""} onChange={e=>upd("bgNebenkosten",e.target.value)} placeholder="z.B. 150" />

                </div>

              {/* 6. Besondere Bedarfe */}

                })}

                <div>
                  <label style={styles.label}>Grad der Behinderung (GdB)</label>
                  <input style={styles.input} value={f.bgGdB||""} onChange={e=>upd("bgGdB",e.target.value)} placeholder="z.B. 50, 70, 100" />

                  <input style={styles.input} value={f.bgMerkzeichen||""} onChange={e=>upd("bgMerkzeichen",e.target.value)} placeholder="z.B. G, H" />
                </div>

                })}

              {/* 7. Jobcenter / Verfahren */}

                          backgroundColor:f.bgWiderspruch===v?"#003366":"#eee", color:f.bgWiderspruch===v?"#fff":"#333" }}>{v}</div>;

                })}
              </div>

                                    kinder: (ext_m.kinder || []).map(function(k) { return { vorname:(k.name||"").split(", ")[1]||"", nachname:(k.name||"").split(", ")[0]||"", geburt:k.geburt||"", wohnort:k.wohnort||"", uvg:k.uvg?"ja":"nein" }; })
                                  } : { versandFelder: versandFelder };
                                  sbResult = await sbSaveFormular(fTyp, fLabel, m, vorausgefuellt_data);
                                } catch(err) {
                                  alert("Supabase Fehler: " + err.message);
                                }
                                if (sbResult) {
                                  formLink = "\n\n🔗 Formular-Link (direkt im Browser ausfüllen):\n" + sbResult.url;
                                } else if (sbReady()) {
                                  alert("Supabase konnte Formular nicht speichern. Prüfen Sie URL und Key im Profil.");
                                  return;
                                }
                              }
                              // Kein Supabase: kein klickbarer Link möglich
                              if (!formLink) {
                                formLink = "\n\n📋 Bitte füllen Sie den beiliegenden Fragebogen aus und senden Sie ihn zurück.\n(Für einen direkten Online-Link: Supabase im Profil einrichten.)";
                              }
                              var betreff = "ISUV Anspruchslotse – " + fLabel + (m ? " für " + m.vorname + " " + m.name : "");
                              var body = linkText + formLink + "\n\nMit freundlichen Grüßen\n" + (loginDaten.leiter || "ISUV") + (loginDaten.ort ? " · " + loginDaten.ort : "");
                              var mailtoUrl = "mailto:" + encodeURIComponent(empfMail) + "?subject=" + encodeURIComponent(betreff) + "&body=" + encodeURIComponent(body);
                              window.open(mailtoUrl);
                              var jetzt = new Date();
                              var ds = jetzt.toLocaleDateString("de-DE") + " " + String(jetzt.getHours()).padStart(2,"0") + ":" + String(jetzt.getMinutes()).padStart(2,"0");
                              setAusgangFormulare(function(prev) {
                                return prev.concat([{ id: sbResult ? sbResult.id : Date.now(), typ: fLabel, empfaenger: empfMail, mitglied: m ? m.vorname + " " + m.name : null, datum: ds, status:"unbeantwortet", kanal:"✉️ E-Mail", formLink: sbResult ? sbResult.url : null }]);
                              });
                              setFormularVersandDialogNeu(null);
                              setShowAusgang(true);
                            }}
                            style={{ width:"100%", padding:"10px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"12px" }}>
                            ✉️ Per E-Mail senden & im Ausgang speichern
                          </button>
                        </div>
                      ) : (
                        <div style={{ backgroundColor:"#fff9e6", border:"1px solid #ffeeba", borderRadius:"8px", padding:"10px", fontSize:"11px", color:"#856404" }}>
                          ⚠️ Keine E-Mail-Adresse hinterlegt. <span style={{ cursor:"pointer", textDecoration:"underline" }} onClick={() => { setFormularVersandDialogNeu(null); setView("profil"); }}>Jetzt im Profil einrichten →</span>
                        </div>
                      )}

                      {/* WhatsApp Versand */}
                      {loginDaten.whatsapp ? (
                        <div style={{ backgroundColor:"#f0f7f0", borderRadius:"10px", padding:"12px" }}>
                          <div style={{ fontWeight:"bold", fontSize:"12px", color:"#1a7a1a", marginBottom:"8px" }}>📱 Per WhatsApp senden</div>
                          {m && m.tel ? (
                            <div style={{ fontSize:"11px", color:"#555", marginBottom:"8px", backgroundColor:"#e8f5e9", borderRadius:"6px", padding:"6px 10px" }}>
                              Wird gesendet an: <strong>{m.tel}</strong>
                            </div>
                          ) : (
                            <div style={{ fontSize:"11px", color:"#e65100", marginBottom:"8px" }}>
                              ⚠️ Keine Telefonnummer in der Akte.
                              <input style={{ ...styles.input, marginTop:"6px" }} type="tel" placeholder="+49170 Nummer eingeben"
                                value={formularVersandDialogNeu.empfaengerWA || ""}
                                onChange={e => setFormularVersandDialogNeu(p => ({...p, empfaengerWA: e.target.value}))} />
                            </div>
                          )}
                          <button
                            onClick={async function() {
                              var empfTel = (formularVersandDialogNeu.empfaengerWA || (m && m.tel ? m.tel : "")).replace(/[^0-9]/g, "").replace(/^0/, "49");
                              if (!empfTel) { alert("Bitte Telefonnummer eingeben."); return; }
                              var formLink = "";
                              var sbResult = null;
                              if (sbReady()) {
                                var ext_m2 = m ? (memberExtras[m.id] || {}) : {};
                                var vorausgefuellt_wa = m ? {
                                  vorname: m.vorname || "", name: m.name || "", tel: m.tel || "", mail: m.mail || "",
                                  strasse: m.strasse || "", plz: m.plz || "", ort: m.ort || "",
                                  familienstand: ext_m2.familienstand || "", einkommenNetto: ext_m2.einkommenNetto ? String(ext_m2.einkommenNetto) : "",
                                  einkommenBrutto: ext_m2.einkommenBrutto ? String(ext_m2.einkommenBrutto) : "",
                                  mieteWarm: ext_m2.mieteWarm ? String(ext_m2.mieteWarm) : "",
                                  mieteKalt: ext_m2.mieteKalt ? String(ext_m2.mieteKalt) : "",
                                  heizkosten: ext_m2.heizkosten ? String(ext_m2.heizkosten) : "",
                                  wohnungGroesse: ext_m2.wohnungGroesse ? String(ext_m2.wohnungGroesse) : "",
                                  steuerklasse: ext_m2.steuerklasse || "",
                                  beschaeftigungsart: ext_m2.beschaeftigungsart || ext_m2.einkommenArt || "",
                                  titel: ext_m2.titel || "",
                                  versandFelder: versandFelder,
                                  hatKinder: (ext_m2.kinder && ext_m2.kinder.length > 0) ? "ja" : "",
                                  kinder: (ext_m2.kinder || []).map(function(k) { return { vorname:(k.name||"").split(", ")[1]||"", nachname:(k.name||"").split(", ")[0]||"", geburt:k.geburt||"", wohnort:k.wohnort||"", uvg:k.uvg?"ja":"nein" }; })
                                } : { versandFelder: versandFelder };
                                sbResult = await sbSaveFormular(fTyp, fLabel, m, vorausgefuellt_wa);
                                if (sbResult) {
                                  formLink = "\n\n🔗 Formular-Link (direkt im Browser ausfüllen):\n" + sbResult.url;
                                }
                              }
                              // Kein Supabase: kein klickbarer Link möglich
                              if (!formLink) {
                                formLink = "\n\n📋 Bitte füllen Sie den Fragebogen aus und senden Sie ihn zurück.\n(Für einen direkten Online-Link: Supabase im Profil einrichten.)";
                              }
                              var waMsg = "Hallo" + (m ? " " + m.vorname : "") + ",\n\n" + linkText + formLink + "\n\nNach dem Ausfüllen bitte zurücksenden an:\n📱 " + loginDaten.whatsapp + "\n\nVielen Dank!\n" + (loginDaten.leiter || "ISUV") + (loginDaten.ort ? " · " + loginDaten.ort : "");
                              var waUrl = "https://wa.me/" + empfTel + "?text=" + encodeURIComponent(waMsg);
                              window.open(waUrl);
                              var jetzt = new Date();
                              var ds = jetzt.toLocaleDateString("de-DE") + " " + String(jetzt.getHours()).padStart(2,"0") + ":" + String(jetzt.getMinutes()).padStart(2,"0");
                              setAusgangFormulare(function(prev) {
                                return prev.concat([{ id: sbResult ? sbResult.id : Date.now(), typ: fLabel, empfaenger: empfTel, mitglied: m ? m.vorname + " " + m.name : null, datum: ds, status:"unbeantwortet", kanal:"📱 WhatsApp", formLink: sbResult ? sbResult.url : null }]);
                              });
                              setFormularVersandDialogNeu(null);
                              setShowAusgang(true);
                            }}
                            style={{ width:"100%", padding:"10px", backgroundColor:"#25d366", color:"#fff", border:"none", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"12px" }}>
                            📱 Per WhatsApp senden & im Ausgang speichern
                          </button>
                        </div>
                      ) : (
                        <div style={{ backgroundColor:"#fff9e6", border:"1px solid #ffeeba", borderRadius:"8px", padding:"10px", fontSize:"11px", color:"#856404" }}>
                          ⚠️ Keine WhatsApp-Nummer hinterlegt. <span style={{ cursor:"pointer", textDecoration:"underline" }} onClick={() => { setFormularVersandDialogNeu(null); setView("profil"); }}>Jetzt im Profil einrichten →</span>
                        </div>
                      )}
                    </div>
                    </div>
                    )}
                  </div>
                );
              })()}
            </div>
          </div>
        )}

      </main>

      {/* ── PDF-Akte senden Dialog ── */}
      {aktePdfDialog && (function() {
        var d = aktePdfDialog;
        var abschn = d.abschnitte;
        var toggleAbschn = function(key) {
          setAktePdfDialog(function(p) { return Object.assign({}, p, { abschnitte: Object.assign({}, p.abschnitte, { [key]: !p.abschnitte[key] }) }); });
        };
        var checkboxRow = function(key, label) {
          return (
            <div onClick={function(){ toggleAbschn(key); }}
              style={{ display:"flex", alignItems:"center", gap:"10px", padding:"8px 10px", borderRadius:"7px", cursor:"pointer", backgroundColor: abschn[key] ? "#e8f0fb" : "#f7f7f7", marginBottom:"5px", border: abschn[key] ? "1px solid #003366" : "1px solid #eee" }}>
              <div style={{ width:"18px", height:"18px", borderRadius:"4px", border:"2px solid " + (abschn[key] ? "#003366" : "#bbb"), backgroundColor: abschn[key] ? "#003366" : "#fff", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                {abschn[key] && <span style={{ color:"#fff", fontSize:"12px", lineHeight:1 }}>✓</span>}
              </div>
              <span style={{ fontSize:"13px", fontWeight: abschn[key] ? "bold" : "normal", color: abschn[key] ? "#003366" : "#555" }}>{label}</span>
            </div>
          );
        };
        var noneSelected = !abschn.stammdaten && !abschn.formulare && !abschn.berechnungen && !abschn.notizen;
        var rawWA = (d.empfaengerWA||"").replace(/[^0-9]/g,"").replace(/^0/,"49");
        var hasWA = rawWA.length >= 7;
        return (
          <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.55)", zIndex:600, display:"flex", alignItems:"flex-end", justifyContent:"center", padding:"0" }}>
            <div style={{ backgroundColor:"#fff", borderRadius:"16px 16px 0 0", padding:"20px 16px 32px", width:"100%", maxWidth:"520px", maxHeight:"90vh", overflowY:"auto" }}>

              {/* Header */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
                <div>
                  <div style={{ fontWeight:"bold", fontSize:"15px", color:"#003366" }}>📄 PDF-Akte senden</div>
                  <div style={{ fontSize:"11px", color:"#888", marginTop:"2px" }}>{d.member.vorname} {d.member.name}</div>
                </div>
                <button onClick={function(){ setAktePdfDialog(null); }} style={{ background:"none", border:"none", fontSize:"22px", cursor:"pointer", color:"#999", lineHeight:1 }}>×</button>
              </div>

              {/* Abschnitte wählen */}
              <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:"8px" }}>Abschnitte auswählen</div>
              {checkboxRow("stammdaten", "👤 Stammdaten & Kontakt")}
              {checkboxRow("formulare",  "📤 Gesendete Formulare")}
              {checkboxRow("berechnungen","🧮 Berechnungsergebnisse")}
              {checkboxRow("notizen",    "📋 Interne Notizen")}
              {noneSelected && (
                <div style={{ fontSize:"11px", color:"#e53935", padding:"6px 8px", backgroundColor:"#fff5f5", borderRadius:"6px", marginTop:"4px" }}>
                  Bitte mindestens einen Abschnitt auswählen.
                </div>
              )}

              {/* Empfänger */}
              <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", letterSpacing:"0.5px", marginTop:"16px", marginBottom:"8px" }}>Empfänger</div>
              <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
                {["mitglied","andere"].map(function(opt) {
                  var sel = d.empfaenger === opt;
                  return (
                    <div key={opt} onClick={function(){ setAktePdfDialog(function(p){ return Object.assign({},p,{empfaenger:opt, empfaengerMail: opt==="mitglied" ? (d.member.mail||"") : "", empfaengerWA: opt==="mitglied" ? (d.member.tel||"") : ""}); }); }}
                      style={{ flex:1, padding:"8px", textAlign:"center", borderRadius:"7px", cursor:"pointer", fontSize:"12px", fontWeight:"bold", backgroundColor: sel ? "#003366" : "#f0f4f7", color: sel ? "#fff" : "#555", border: sel ? "none" : "1px solid #ddd" }}>
                      {opt === "mitglied" ? "👤 Mitglied" : "✏️ Andere Person"}
                    </div>
                  );
                })}
              </div>
              {d.empfaenger === "andere" && (
                <div>
                  <label style={{ fontSize:"11px", color:"#555", fontWeight:"bold", display:"block", marginBottom:"3px" }}>E-Mail-Adresse</label>
                  <input style={{ width:"100%", padding:"9px 11px", border:"1px solid #ccc", borderRadius:"7px", fontSize:"13px", marginBottom:"8px", boxSizing:"border-box" }}
                    type="email" placeholder="empfaenger@beispiel.de"
                    value={d.empfaengerMail||""}
                    onChange={function(e){ var v=e.target.value; setAktePdfDialog(function(p){ return Object.assign({},p,{empfaengerMail:v}); }); }} />
                  <label style={{ fontSize:"11px", color:"#555", fontWeight:"bold", display:"block", marginBottom:"3px" }}>WhatsApp-Nummer</label>
                  <input style={{ width:"100%", padding:"9px 11px", border:"1px solid #ccc", borderRadius:"7px", fontSize:"13px", marginBottom:"8px", boxSizing:"border-box" }}
                    type="tel" placeholder="+49 170 1234567"
                    value={d.empfaengerWA||""}
                    onChange={function(e){ var v=e.target.value; setAktePdfDialog(function(p){ return Object.assign({},p,{empfaengerWA:v}); }); }} />
                </div>
              )}
              {d.empfaenger === "mitglied" && (
                <div style={{ backgroundColor:"#f5f7fa", borderRadius:"7px", padding:"8px 10px", fontSize:"11px", color:"#555", marginBottom:"10px" }}>
                  {d.member.mail ? <div>✉️ {d.member.mail}</div> : <div style={{ color:"#e53935" }}>⚠️ Keine E-Mail hinterlegt</div>}
                  {d.member.tel  ? <div style={{ marginTop:"3px" }}>📱 {d.member.tel}</div> : <div style={{ color:"#aaa", marginTop:"3px" }}>Keine Telefonnummer hinterlegt</div>}
                </div>
              )}

              {/* Trennlinie */}
              <div style={{ borderTop:"1px solid #eee", margin:"12px 0" }} />

              {/* Aktions-Buttons */}
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>

                {/* PDF herunterladen */}
                <button disabled={noneSelected} onClick={function() {
                    if (noneSelected) return;
                    var res = exportAktePDF(d.member, d.ext, d.ergebnisse, d.ausgangFormulare, d.abschnitte, (loginDaten&&loginDaten.name)||"");
                    if (res) res.doc.save(res.filename);
                  }}
                  style={{ width:"100%", padding:"11px", backgroundColor: noneSelected ? "#bbb" : "#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor: noneSelected ? "not-allowed" : "pointer" }}>
                  ⬇️ PDF herunterladen
                </button>

                {/* Per E-Mail senden */}
                {(function() {
                  var mail = d.empfaengerMail || (d.empfaenger==="mitglied" ? d.member.mail : "");
                  var disabled = noneSelected || !mail;
                  return (
                    <button disabled={disabled} onClick={function() {
                        if (disabled) return;
                        var res = exportAktePDF(d.member, d.ext, d.ergebnisse, d.ausgangFormulare, d.abschnitte, (loginDaten&&loginDaten.name)||"");
                        if (res) res.doc.save(res.filename);
                        var betreff = encodeURIComponent("ISUV Anspruchslotse – Ihre Akte (" + d.member.vorname + " " + d.member.name + ")");
                        var body = encodeURIComponent("Guten Tag,\n\nim Anhang finden Sie Ihre ISUV-Akte als PDF.\n\nMit freundlichen Grüßen\n" + ((loginDaten&&loginDaten.leiter)||"ISUV") + (loginDaten&&loginDaten.ort ? "\n" + loginDaten.ort : ""));
                        setTimeout(function(){ window.open("mailto:" + encodeURIComponent(mail) + "?subject=" + betreff + "&body=" + body); }, 300);
                      }}
                      style={{ width:"100%", padding:"11px", backgroundColor: disabled ? "#e0e0e0" : "#1976d2", color: disabled ? "#aaa" : "#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor: disabled ? "not-allowed" : "pointer" }}>
                      ✉️ Per E-Mail senden{!mail && !noneSelected ? " (keine Adresse)" : ""}
                    </button>
                  );
                })()}

                {/* Per WhatsApp senden */}
                {(function() {
                  var rawNum = (d.empfaengerWA || (d.empfaenger==="mitglied" ? d.member.tel : "")).replace(/[^0-9]/g,"").replace(/^0/,"49");
                  var disabled = noneSelected || rawNum.length < 7;
                  return (
                    <button disabled={disabled} onClick={function() {
                        if (disabled) return;
                        var res = exportAktePDF(d.member, d.ext, d.ergebnisse, d.ausgangFormulare, d.abschnitte, (loginDaten&&loginDaten.name)||"");
                        if (res) res.doc.save(res.filename);
                        var msg = encodeURIComponent("Hallo " + d.member.vorname + ", ich habe Ihre ISUV-Akte als PDF gespeichert und sende sie Ihnen hiermit zu.\n\n– " + ((loginDaten&&loginDaten.leiter)||"ISUV"));
                        setTimeout(function(){ window.open("https://wa.me/" + rawNum + "?text=" + msg, "_blank"); }, 300);
                      }}
                      style={{ width:"100%", padding:"11px", backgroundColor: disabled ? "#e0e0e0" : "#25D366", color: disabled ? "#aaa" : "#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor: disabled ? "not-allowed" : "pointer" }}>
                      💬 Per WhatsApp senden{rawNum.length < 7 && !noneSelected ? " (keine Nummer)" : ""}
                    </button>
                  );
                })()}

              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Unterschrift-Modal Sorgerecht ── */}
      {sorgerechtSigModal && (
        <SigPadModal
          onSave={function(dataUrl){ setSorgerechtSigData(dataUrl); setSorgerechtSigModal(false); }}
          onClose={function(){ setSorgerechtSigModal(false); }}
        />
      )}
    </div>
  );
}

  reiterHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" },
  input: { width: "100%", padding: "10px", marginBottom: "10px", borderRadius: "6px", border: "1px solid #ddd", fontSize: "13px", boxSizing: "border-box" },
  miniInput: { width: "100%", padding: "5px", textAlign: "center", border: "1px solid #eee", fontSize: "11px", borderRadius: "4px" },
  btnPrimary: { width: "100%", padding: "12px", backgroundColor: "#003366", color: "#fff", border: "none", borderRadius: "10px", cursor: "pointer", fontWeight: "bold" },
  btnSecondary: { padding: "12px", backgroundColor: "#eee", border: "none", borderRadius: "10px", cursor: "pointer" },
  btnLogout: { border: "none", background: "#f0f0f0", padding: "5px 10px", borderRadius: "5px", cursor: "pointer", fontSize: "11px" },

  formSection: { marginTop: "15px" },

  label: { fontSize: "12px", fontWeight: "bold", display: "block", marginBottom: "5px" },

  dayGrid: { display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "5px" },
  day: { height: "30px", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "4px", fontSize: "11px", cursor: "pointer" },

  terminItem: { display: "flex", alignItems: "center", gap: "10px", fontSize: "12px", padding: "8px", borderBottom: "1px solid #f9f9f9", cursor: "pointer" },
  terminTag: { backgroundColor: "#00afad", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontWeight: "bold", fontSize: "10px" },
  dataRow: { display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid #f5f5f5", fontSize: "14px" },
  btnBack: { background: "none", border: "none", color: "#00afad", cursor: "pointer", marginBottom: "15px", fontWeight: "bold" },
  calGridTBG: { display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: "5px", alignItems: "center" },
  loginPage: { height: "100vh", display: "flex", justifyContent: "center", alignItems: "center", backgroundColor: "#f0f4f7" },
  loginCard: { width: "min(320px, 90vw)", padding: "30px", backgroundColor: "#fff", borderRadius: "20px", boxShadow: "0 4px 24px rgba(0,0,0,0.12)" },
