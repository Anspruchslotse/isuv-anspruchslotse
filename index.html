                      {sumGes > 0 && (
                        <div style={{ marginTop:"10px", backgroundColor: istParit ? "#e8f5e9" : "#fff3e0", border:"1px solid "+(istParit?"#a5d6a7":"#ffcc02"), borderRadius:"7px", padding:"8px 10px", fontSize:"11px" }}>
                          <strong>Auswertung:</strong> Antragsteller*in {anteilAnt}% ({sumAnt} Tage) · And. Elternteil {anteilAnd}% ({sumAnd} Tage)
                          <br/>{istParit ? "✅ Paritätisches Wechselmodell erkannt (43–57 %)" : "📊 Asymmetrisches Modell – tagesanteilige Berechnung"}
                        </div>
                      )}
                    </div>

                    {/* (5) Einkommen des Kindes */}
                    <div style={sHead}>⑤ Angaben zum Einkommen des Kindes</div>
                    <div style={sBox}>

                      <label style={checkRow} style={{ marginTop:"4px" }} onClick={function(){tbgKindUpd(idx,"kgWeiterleitung", kind.kgWeiterleitung==="ja"?"":"ja");}}>

                      </label>

                      <label style={checkRow} onClick={function(){tbgKindUpd(idx,"einkommenWeiterleitung", kind.einkommenWeiterleitung==="ja"?"":"ja");}}>
                        <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.einkommenWeiterleitung==="ja"?"#003366":"#fff", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                          {kind.einkommenWeiterleitung==="ja" && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"bold" }}>✓</span>}
                        </div>
                        <span>Einkommen des Kindes wird an anderen Elternteil in Höhe von</span>
                      </label>
                      {kind.einkommenWeiterleitung==="ja" && (

                      <div style={{ fontSize:"10px", color:"#888", marginTop:"2px" }}>Einkommen z.B. Ausbildungsvergütung, Unterhaltsvorschuss</div>

                      <label style={{ fontSize:"11px", color:"#555", display:"block", marginTop:"10px", marginBottom:"3px" }}>Sonstige Angaben / abweichende monatliche Ausgaben</label>

                        value={kind.sonstigeAngaben||""} onChange={function(e){tbgKindUpd(idx,"sonstigeAngaben",e.target.value);}}
                        placeholder="Weitere Angaben, z.B. besondere Ausgaben, Besonderheiten zum Betreuungsmodell..." />
                    </div>
                  </div>
                );
              })}

              <button onClick={addTbgKindNeu} style={{ width:"100%", padding:"11px", backgroundColor:"#e8f4fd", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"13px", marginTop:"14px" }}>
                + Weiteres Kind hinzufügen
              </button>

              {/* ─── (6) Unterschriften – Umgangsvereinbarung ─── */}
              <div style={{ ...sHead, backgroundColor:"#6a1b9a" }}>⑥ Unterschriften & Umgangsvereinbarung</div>

                <div style={{ backgroundColor:"#f3e5f5", border:"1px solid #ce93d8", borderRadius:"7px", padding:"10px 12px", fontSize:"11px", color:"#4a148c", marginBottom:"14px", lineHeight:"1.6" }}>
                  📋 <strong>Hinweis:</strong> Diese Erklärung kann zugleich als <strong>formlose Umgangsvereinbarung</strong> dienen, wenn beide Elternteile unterschreiben. Die Unterschriften bestätigen die oben gemachten Angaben zur Aufteilung der Betreuungszeiten und sind rechtlich als Vereinbarung im Sinne von § 1684 BGB verwertbar.
                </div>

                <label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"3px" }}>Ort und Datum</label>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"12px" }}>
                  <input style={fi2} value={fd.ortDatum||""} onChange={function(e){tbgUpd("ortDatum",e.target.value);}} placeholder={"z.B. München, "+new Date().toLocaleDateString("de-DE")} />
                  <input style={fi2} type="date" value={fd.datumISO||""} onChange={function(e){tbgUpd("datumISO",e.target.value);}} />
                </div>

                <SignatureCanvas
                  label={"✍️ Unterschrift Antragsteller*in: " + (fd.antVorname||"") + " " + (fd.antNachname||"")}
                  value={fd.sigAntragsteller||""}
                  onChange={function(v){tbgUpd("sigAntragsteller",v);}}
                />
                <SignatureCanvas
                  label={"✍️ Unterschrift anderer Elternteil: " + (kinder.length>0 ? (kinder[0].epVorname||"") + " " + (kinder[0].epNachname||"") : "– Name eintragen –")}

                  onChange={function(v){tbgUpd("sigAndererElternteil",v);}}
                />
                <div style={{ backgroundColor:"#fff9e6", border:"1px solid #ffd54f", borderRadius:"6px", padding:"8px 10px", fontSize:"10px", color:"#6d4c00", marginTop:"8px" }}>
                  ⚠️ <strong>Rechtlicher Hinweis:</strong> Eine digitale Unterschrift auf diesem Formular ersetzt nicht eine notarielle Beurkundung oder gerichtliche Genehmigung. Für vollstreckbare Umgangsvereinbarungen wird eine Beurkundung beim Jugendamt oder Gericht empfohlen.
                </div>
              </div>

              {/* Aktionen */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginTop:"16px" }}>
                <button
                  onClick={function(){
                    var fehlend=[];
                    if(!fd.antNachname||!fd.antVorname) fehlend.push("Name Antragsteller*in");
                    if(kinder.length===0) fehlend.push("Mindestens 1 Kind");
                    else kinder.forEach(function(k,i){ if(!k.kNachname||!k.kVorname) fehlend.push("Name Kind #"+(i+1)); });
                    if(fehlend.length>0){ alert("Bitte ausfüllen:\n- "+fehlend.join("\n- ")); return; }
                    if(activeMember) {
                      var upd = { betreuungsmodell: kinder[0]&&kinder[0].aufteilungsWunsch==="paritaetisch" ? "Paritätisches Wechselmodell" : kinder[0]&&kinder[0].aufteilungsWunsch==="asymmetrisch" ? "Asymmetrisches Wechselmodell" : "Residenzmodell" };
                      if(kinder[0]&&kinder[0].kalender) {
                        var sumA = (kinder[0].kalender.antragsteller||[]).reduce(function(s,x){return s+(parseInt(x)||0);},0);
                        var sumE = (kinder[0].kalender.anderer||[]).reduce(function(s,x){return s+(parseInt(x)||0);},0);
                        upd._tbgTage = { antragsteller:sumA, anderer:sumE };
                      }
                      setMemberExtras(function(prev){ var n=Object.assign({},prev); n[activeMember.id]=Object.assign({},prev[activeMember.id]||{},upd); return n; });
                    }
                    alert("✅ TBG-Anlage gespeichert" + (activeMember ? " und in Akte übernommen." : ".")); setView("dashboard");
                  }}
                  style={{ padding:"13px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", fontSize:"13px" }}>
                  💾 Speichern{activeMember ? " & Akte" : ""}
                </button>
                <button onClick={exportPDF}
                  style={{ padding:"13px", backgroundColor:"#6a1b9a", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", fontSize:"13px" }}>
                  📄 PDF exportieren
                </button>
                <button onClick={function(){ window.print(); }}
                  style={{ padding:"11px", backgroundColor:"#fff", color:"#003366", border:"2px solid #003366", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", fontSize:"12px" }}>
                  🖨️ Drucken
                </button>
                <button onClick={jahreskopie}
                  style={{ padding:"11px", backgroundColor:"#fff3e0", color:"#e65100", border:"2px solid #ffcc02", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", fontSize:"12px" }}>
                  📅 Nächstes Jahr
                </button>
              </div>
              <div style={{ fontSize:"10px", color:"#aaa", textAlign:"center", marginTop:"8px", marginBottom:"20px" }}>* Pflichtfelder · PDF enthält Unterschriften als Bild · Daten werden lokal gespeichert</div>
            </div>
          );
        })()}

        {(view === "fr_kindesunterhalt" || view === "fr_wechselmodell" || view === "fr_rechtsvergleich") && (

                    var mid = activeMember.id;
                    var jetzt = new Date().toLocaleDateString("de-DE");
                    setMemberErgebnisse(function(prev) {
                      var liste = (prev[mid] || []).slice(-19);
                      return Object.assign({}, prev, { [mid]: liste.concat([Object.assign({datum:jetzt}, ergebnis)]) });

              {view === "fr_wechselmodell" && (
                <div>
                  <FahrtkostenUmgang
                    ext={activeMember ? (memberExtras[activeMember.id] || null) : null}
                    onSaveErgebnis={activeMember ? function(ergebnis) {
                      var mid = activeMember.id;
                      var jetzt = new Date().toLocaleDateString("de-DE");
                      setMemberErgebnisse(function(prev) {
                        var liste = (prev[mid] || []).slice(-19);
                        return Object.assign({}, prev, { [mid]: liste.concat([Object.assign({datum:jetzt}, ergebnis)]) });
                      });

                  />
                  <div style={{ marginTop:"16px" }}>
                    <RechtsvergleichModul ext={activeMember ? (memberExtras[activeMember.id] || null) : null} />
                  </div>
                </div>
              )}
            </div>
          </div>

            <input style={styles.input} value={loginDaten.ort} onChange={e => setLoginDaten(p => ({...p, ort: e.target.value}))} placeholder="z.B. München" />

                  style={{padding:"5px 12px",borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontWeight:"bold",backgroundColor:erinnerungTage===t?"#003366":"#eee",color:erinnerungTage===t?"#fff":"#333"}}>

        var loading = document.getElementById("loading");
        if (loading) loading.style.display = "none";
      }, 800);
    });
  </script>
