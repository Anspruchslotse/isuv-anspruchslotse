  var alterKat = parseInt(alter)<6?0:parseInt(alter)<12?1:parseInt(alter)<18?2:3;
  var ep = parseFloat(einkommen)||0;
  var gruppe = ep>0 ? DT2024.gruppen.findIndex(function(g){return ep<=g.bis;}) : -1;
  if(gruppe<0&&ep>0) gruppe=9;
  var tv = gruppe>=0 ? DT2024.tabelle[gruppe][alterKat] : null;
  var kg2 = alterKat<3?125:250;
  return (
    <div>
      <h4 style={u.modTitle}>📊 Düsseldorfer Tabelle 2024</h4>
      <InfoBox typ="recht" titel={null} kinder={<span>Richtwerte für Kindesunterhalt §§ 1601 ff. BGB. Stand 01.01.2024.</span>} />
      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Alter des Kindes:</label>
          <input type="number" style={u.input} placeholder="z.B. 10" value={alter} onChange={e=>setAlter(e.target.value)} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Nettoeinkommen Pflichtig (€):</label>
          <input type="number" style={u.input} placeholder="z.B. 2200" value={einkommen} onChange={e=>setEinkommen(e.target.value)} />
        </div>
      </div>
      {tv && (
        <div style={u.resultBox}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"8px" }}>
            <div style={{ backgroundColor:"#e8f0fb", borderRadius:"7px", padding:"8px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#003366" }}>Gruppe {gruppe+1}</div>
              <div style={{ fontSize:"14px", fontWeight:"bold", color:"#003366" }}>{tv} €</div>
              <div style={{ fontSize:"10px", color:"#666" }}>Tabellenwert</div>
            </div>
            <div style={{ backgroundColor:"#e8f5e9", borderRadius:"7px", padding:"8px", textAlign:"center" }}>
              <div style={{ fontSize:"10px", color:"#1b5e20" }}>Zahlbetrag</div>
              <div style={{ fontSize:"14px", fontWeight:"bold", color:"#1b5e20" }}>{tv-kg2} €/Monat</div>
              <div style={{ fontSize:"10px", color:"#666" }}>– KG {kg2}€ (§ 1612b)</div>
            </div>
          </div>
          <details>
            <summary style={{ fontSize:"10px", cursor:"pointer", color:"#003366", fontWeight:"bold" }}>▶ Alle Altersgruppen</summary>
            <div style={{ marginTop:"6px" }}>
              {["0–5 J.","6–11 J.","12–17 J.","ab 18 J."].map(function(l,ai){
                var v=DT2024.tabelle[gruppe][ai]; var kg3=ai<3?125:250;
                return <div key={ai} style={{ ...u.calcStep, backgroundColor:ai===alterKat?"#e8f0fb":"transparent", padding:"2px 4px", borderRadius:"3px" }}>
                  <span style={{fontWeight:ai===alterKat?"bold":"normal"}}>{l}</span>
                  <span>{v}€ – {kg3}€ KG = <strong>{v-kg3}€</strong></span>
                </div>;
              })}
            </div>
          </details>
        </div>
      )}
      <button onClick={function(){setShowTabelle(!showTabelle);}}
        style={{ width:"100%", padding:"7px", marginTop:"8px", backgroundColor:"#f0f4f7", border:"1px solid #003366", borderRadius:"8px", cursor:"pointer", fontSize:"12px", color:"#003366" }}>
        {showTabelle?"▲ Tabelle ausblenden":"▼ Vollständige Tabelle anzeigen"}
      </button>
      {showTabelle && (
        <div style={{ overflowX:"auto", marginTop:"8px" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"10px" }}>
            <thead><tr style={{ backgroundColor:"#003366", color:"#fff" }}>
              <th style={{ padding:"4px 6px", textAlign:"left" }}>Gruppe</th>
              <th style={{ padding:"4px", textAlign:"center" }}>0–5</th>
              <th style={{ padding:"4px", textAlign:"center" }}>6–11</th>
              <th style={{ padding:"4px", textAlign:"center" }}>12–17</th>
              <th style={{ padding:"4px", textAlign:"center" }}>ab 18</th>
            </tr></thead>
            <tbody>
              {DT2024.gruppen.map(function(g,gi){
                return <tr key={gi} style={{ backgroundColor:gi===gruppe?"#e8f0fb":gi%2===0?"#f9f9f9":"#fff" }}>
                  <td style={{ padding:"3px 6px", color:"#003366", fontSize:"9px", fontWeight:gi===gruppe?"bold":"normal" }}>{g.name}<br/>bis {g.bis}€</td>
                  {DT2024.tabelle[gi].map(function(v,ai){
                    return <td key={ai} style={{ padding:"3px 4px", textAlign:"center", fontWeight:gi===gruppe&&ai===alterKat?"bold":"normal" }}>{v}</td>;
                  })}
                </tr>;
              })}
            </tbody>
          </table>
          <div style={{ fontSize:"9px", color:"#999", marginTop:"3px" }}>SB: 1.450€ (erw.) / 1.200€ (n.erw.) · KG 2024: 250€/Kind</div>
        </div>
      )}
    </div>
  );
}

var FRIST_TYPEN = [
  {id:"widerspruch",label:"📋 Widerspruch Bescheid",tage:28,rg:"§ 84 SGG",h:"Widerspruch gegen Jobcenter-Bescheid: 1 Monat ab Zugang. Fristversäumnis → Bestandskraft!"},
  {id:"klage_sg",label:"🏛️ Klage Sozialgericht",tage:28,rg:"§ 87 SGG",h:"Nach Widerspruchsbescheid: 1 Monat Klagefrist. Beginnt mit Zugang des Widerspruchsbescheids."},
  {id:"unterhalt_verjahr",label:"⚖️ Unterhaltsverjährung",tage:1095,rg:"§ 195 BGB",h:"Unterhaltsansprüche verjähren nach 3 Jahren. Rückwirkend nur ab Mahnung/Klage."},
  {id:"uvg",label:"👶 UVG-Antrag",tage:0,rg:"§ 9 UVG",h:"Unterhaltsvorschuss ab Antragmonat — keine Rückwirkung. Antrag sofort stellen!"},
  {id:"vollstreckung",label:"⚡ Vollstr.-Verjährung",tage:10950,rg:"§ 197 BGB",h:"Titulierte Unterhaltsansprüche verjähren erst nach 30 Jahren."},
];
function FristenRechner() {
  var u = rStyles;
  const [typ, setTyp] = React.useState("widerspruch");
  const [datum, setDatum] = React.useState("");
  const [result, setResult] = React.useState(null);
  var akt = FRIST_TYPEN.find(function(f){return f.id===typ;});
  function berechne() {
    if(!datum) return;
    var start = new Date(datum);
    var ende = new Date(start); ende.setDate(ende.getDate()+(akt.tage||0));
    var rest = Math.round((ende-new Date())/(1000*60*60*24));
    setResult({ende, rest, abgelaufen:rest<0});
  }
  return (
    <div>
      <h4 style={u.modTitle}>⏰ Fristenrechner</h4>
      <InfoBox typ="warnung" titel="Fristen können Ansprüche vernichten!" kinder={<span>Verpasste Widerspruchs- und Klagefristen führen zur Bestandskraft. Immer sofort handeln!</span>} />
      <label style={u.sectionLabel}>Fristtyp:</label>
      <select style={u.input} value={typ} onChange={e=>setTyp(e.target.value)}>
        {FRIST_TYPEN.map(function(f){return <option key={f.id} value={f.id}>{f.label}</option>;})}
      </select>
      {akt && <InfoBox typ="recht" titel={akt.rg} kinder={<span>{akt.h}</span>} />}
      {akt && akt.tage>0 && (
        <div>
          <label style={u.sectionLabel}>Bescheiddatum / Zugangsdatum:</label>
          <input type="date" style={u.input} value={datum} onChange={e=>setDatum(e.target.value)} />
          <button style={u.btnPrimary} onClick={berechne}>⏰ Frist berechnen</button>
        </div>
      )}
      {result && (
        <div style={{ ...u.resultBox, borderColor:result.abgelaufen?"#e53935":result.rest<=7?"#f9a825":"#43a047" }}>
          <div style={{ textAlign:"center", marginBottom:"8px", fontWeight:"bold" }}>Fristende: {result.ende.toLocaleDateString("de-DE")}</div>
          {result.abgelaufen
            ? <InfoBox typ="warnung" titel={"Frist abgelaufen vor "+Math.abs(result.rest)+" Tagen!"} kinder={<span>Prüfen: Wiedereinsetzung § 27 SGB X / § 67 SGG</span>} />
            : <InfoBox typ={result.rest<=7?"warnung":"positiv"} titel={"Noch "+result.rest+" Tage"} kinder={<span>{result.rest<=7?"⚡ Sofort handeln!":"Einschreiben mit Rückschein empfohlen."}</span>} />
          }
        </div>
      )}
    </div>
  );
}

function FamilienrechtView({ view, activeMember, memberExtras, setView, setMemberErgebnisse }) {
  var INFO = {
    "fr_kindesunterhalt":{ titel:"👶 Kindesunterhalt 2024", sub:"Düsseldorfer Tabelle · Rolle · Mangelfall" },
    "fr_ehegatten":      { titel:"💍 Ehegattenunterhalt", sub:"§§ 1361 / 1569 ff. BGB · Halbteilung" },
    "fr_wechselmodell":  { titel:"🔄 Wechselmodell-Unterhalt", sub:"BGH XII ZB 234/15 · Fahrtkosten · TBG" },
    "fr_rechtsvergleich":{ titel:"⚖️ Rechtsvergleich", sub:"Familienrecht vs. Sozialrecht · BSG · OLG" },
    "fr_dtTabelle":      { titel:"📊 Düsseldorfer Tabelle 2024", sub:"Nachschlagewerk · Vollständige Tabelle" },
    "fr_fristen":        { titel:"⏰ Fristenrechner", sub:"Widerspruch · Klage · Verjährung" },
  };
  var info = INFO[view] || {titel:"Familienrecht", sub:""};

    if(!activeMember) return;

      return Object.assign({},prev,{[mid]:(prev[mid]||[]).slice(-29).concat([Object.assign({datum:jetzt},ergebnis)])});
    });
  }
  return (
    <div style={{ background:"#f5f7fa", minHeight:"100vh" }}>
      <div style={{ textAlign:"center", padding:"20px 16px 12px", backgroundColor:"#fff", borderBottom:"1px solid #eee" }}>

        <div style={{ fontSize:"14px", fontWeight:"bold", color:"#003366" }}>{info.titel}</div>
        <div style={{ fontSize:"11px", color:"#666" }}>{info.sub}</div>

        <button onClick={function(){setView("dashboard");}} style={{ background:"none", border:"none", color:"#003366", fontWeight:"bold", fontSize:"13px", cursor:"pointer", padding:0, marginBottom:"8px" }}>‹ Zurück</button>
        {!activeMember && <InfoBox typ="empf" titel={null} kinder={<span>Kein Mitglied geöffnet – Ergebnisse nicht gespeichert.</span>} />}
        {aend && <InfoBox typ="warnung" titel={"Akte geändert am "+aend.datum} kinder={<span>Felder: {(aend.felder||[]).join(", ")}</span>} />}
      </div>
      <div style={{ padding: window && window.innerWidth >= 600 ? "0 24px 32px" : "0 16px 24px" }}>
        {view==="fr_kindesunterhalt" && <KindesunterhaltsRechnerNeu ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
        {view==="fr_ehegatten" && <EhegattenUnterhaltsRechner ext={ext} onSaveErgebnis={activeMember?saveErg:null} />}
        {view==="fr_wechselmodell" && <div><WechselmodellRechner ext={ext} onSaveErgebnis={activeMember?saveErg:null} /><div style={{marginTop:"20px",borderTop:"2px solid #e8f0fb",paddingTop:"16px"}}><RechtsvergleichModul ext={ext} /></div></div>}
        {view==="fr_rechtsvergleich" && <RechtsvergleichModul ext={ext} />}
        {view==="fr_dtTabelle" && <DuesseldorferTabelleNachschlag />}
        {view==="fr_fristen" && <FristenRechner />}
      </div>
    </div>
  );
}

          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "trennung") return (
    <div>
      <h4 style={u.modTitle}>👫 Trennungsunterhalt (§ 1361 BGB)</h4>
      {(netto||nettoG) && <div style={u.infoBox}>✅ {netto ? "Einkommen Antragsteller*in" : ""}{netto && nettoG ? " und " : ""}{nettoG ? "Einkommen Gegenseite" : ""} aus Akte vorausgefüllt.</div>}
      <label style={u.sectionLabel}>Einkommen Antragsteller*in (€):</label>
      <input type="number" style={u.input} value={tuEinA} onChange={e => setTuEinA(e.target.value)} />
      <label style={u.sectionLabel}>Einkommen Verpflichteter (€):</label>
      <input type="number" style={u.input} placeholder="Bitte eingeben" value={tuEinV} onChange={e => setTuEinV(e.target.value)} />
      <button style={u.btnPrimary} onClick={berechneTU}>Berechnen & In Akte speichern</button>
      {tuResult && (
        <div style={u.resultBox}>
          {tuResult.kein ? <div style={u.warnung}>⚠️ Kein Unterhaltsanspruch.</div> : (
            <>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"4px", textTransform:"uppercase" }}>Einkommensbereinigung:</div>
              <div style={u.calcStep}><span>Netto Antragsteller*in:</span><span>{tuResult.n1} €</span></div>
              <div style={u.calcStep}><span>– Berufspauschale:</span><span>– {tuResult.pauschaleA} €</span></div>
              <div style={u.calcStep}><span>– 1/7 Erwerbstätigenbonus:</span><span></span></div>
              <div style={{...u.calcStep,marginBottom:"6px"}}><span>= Bereinigt Antragsteller*in:</span><span style={{fontWeight:"bold"}}>{tuResult.bereA} €</span></div>
              <div style={u.calcStep}><span>Netto Verpflichteter:</span><span>{tuResult.n2} €</span></div>
              <div style={u.calcStep}><span>– Berufspauschale:</span><span>– {tuResult.pauschaleV} €</span></div>
              <div style={{...u.calcStep,marginBottom:"8px"}}><span>= Bereinigt Verpflichteter:</span><span style={{fontWeight:"bold"}}>{tuResult.bereV} €</span></div>
              <div style={u.calcStep}><span>– Selbstbehalt gegenüber Ehegatte:</span><span>1.200 €</span></div>
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Masse für Unterhalt:</span><span>{tuResult.masse} €</span></div>
              <div style={u.compositionBox}><div style={{...u.resRow,fontWeight:"bold",fontSize:"16px",borderTop:"2px solid #003366",paddingTop:"4px"}}><span>Trennungsunterhalt:</span><span>{tuResult.anspruch} €/Monat</span></div></div>
            </>
          )}
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "nachehelich") return (
    <div>
      <h4 style={u.modTitle}>💍 Nachehelicher Unterhalt (§§ 1569 ff.)</h4>
      {(netto||nettoG) && <div style={u.infoBox}>✅ {netto ? "Einkommen Antragsteller*in" : ""}{netto && nettoG ? " und " : ""}{nettoG ? "Einkommen Gegenseite" : ""} aus Akte vorausgefüllt.</div>}
      <label style={u.sectionLabel}>Einkommen berechtigte Person (€):</label>
      <input type="number" style={u.input} value={nuEinA} onChange={e => setNuEinA(e.target.value)} />
      <label style={u.sectionLabel}>Einkommen Verpflichteter (€):</label>
      <input type="number" style={u.input} placeholder="Bitte eingeben" value={nuEinV} onChange={e => setNuEinV(e.target.value)} />
      <button style={u.btnPrimary} onClick={berechneNU}>Berechnen & In Akte speichern</button>
      {nuResult && (
        <div style={u.resultBox}>
          {nuResult.kein ? <div style={u.warnung}>⚠️ Kein Anspruch.</div> : (
            <>
              <div style={u.calcStep}><span>Bereinigt Verpflichteter:</span><span>{nuResult.bereV} €</span></div>
              <div style={u.calcStep}><span>– Selbstbehalt Ex-Ehegatte:</span><span>1.300 €</span></div>
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Masse:</span><span>{nuResult.masse} €</span></div>
              <div style={u.compositionBox}><div style={{...u.resRow,fontWeight:"bold",fontSize:"16px",borderTop:"2px solid #003366",paddingTop:"4px"}}><span>Nachehelicher Unterhalt:</span><span>{nuResult.anspruch} €/Monat</span></div></div>
            </>
          )}
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "mbAlleinerziehende") return (
    <div>
      <h4 style={u.modTitle}>👨‍👧 Mehrbedarf Alleinerziehende (§ 21 Abs.3 SGB II)</h4>
      {ext && ext.betreuungsmodell && <div style={u.infoBox}>✅ Betreuungsmodell aus Akte: <strong>{ext.betreuungsmodell}</strong></div>}
      <div style={{ fontSize:"12px", marginBottom:"8px" }}>Kinderkonstellation: <strong>{mbKonf}</strong> ({anzK} Kind{anzK!==1?"er":""})</div>
      <label style={u.sectionLabel}>Betreuungsmodell bestätigen:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
        {["paritaetisch","asymmetrisch"].map(v => (
          <div key={v} onClick={() => setMbModell(v)} style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", backgroundColor:mbModell===v?"#00afad":"#eee", color:mbModell===v?"#fff":"#333" }}>
            {v==="paritaetisch" ? "Paritätisch" : "Residenz / Asymm."}
          </div>
        ))}
      </div>
      <button style={{...u.btnPrimary, opacity:mbModell?1:0.5}} disabled={!mbModell} onClick={berechneMB}>Berechnen & In Akte speichern</button>
      {mbResult && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Regelbedarf:</span><span>563,00 €</span></div>
          <div style={u.calcStep}><span>Prozentsatz:</span><span>{mbResult.proz} %</span></div>
          <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Mehrbedarf / Monat:</span><span>{mbResult.betrag} €</span></div>
          <div style={{...u.infoBox,marginTop:"6px"}}>📋 {mbResult.hinweis}</div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "mbUmgang") return (
    <div>
      <h4 style={u.modTitle}>🚗 Mehrbedarf Umgangskosten (§ 21 SGB II)</h4>
      {ext && ext.betreuungsmodell && <div style={u.infoBox}>Betreuungsmodell: <strong>{ext.betreuungsmodell}</strong></div>}
      <label style={u.sectionLabel}>Fahrtkosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="0" value={ukFahrt} onChange={e => setUkFahrt(e.target.value)} />
      <label style={u.sectionLabel}>Übernachtungskosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="0" value={ukUeber} onChange={e => setUkUeber(e.target.value)} />
      <label style={u.sectionLabel}>Sonstige Kosten (€/Monat):</label>
      <input type="number" style={u.input} placeholder="0" value={ukSonst} onChange={e => setUkSonst(e.target.value)} />
      <button style={u.btnPrimary} onClick={berechneUK}>Berechnen & In Akte speichern</button>
      {ukResult && (
        <div style={u.resultBox}>
          <div style={{...u.resRow,fontWeight:"bold",fontSize:"16px"}}><span>Umgangskosten gesamt:</span><span>{ukResult.gesamt} €/Monat</span></div>
          <div style={{ fontSize:"10px", color:"#999", marginTop:"6px" }}>Anerkennung liegt im Ermessen des Jobcenters.</div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis wurde in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "tbg") return (
    <div>
      <h4 style={u.modTitle}>🏠 Temporäre Bedarfsgemeinschaft (TBG)</h4>
      {ext && ext.betreuungsmodell && <div style={u.infoBox}>✅ Betreuungsmodell aus Akte: <strong>{ext.betreuungsmodell}</strong></div>}
      <label style={u.sectionLabel}>Betreuungsmodell:</label>
      <div style={{ display:"flex", flexDirection:"column", gap:"6px", marginBottom:"10px" }}>
        {[{v:"paritaetisch",l:"Paritätisches Wechselmodell (ca. 50:50)"},{v:"asymmetrisch",l:"Asymmetrisch / Residenz (weniger als 50%)"}].map(m => (
          <label key={m.v} style={{ display:"flex", gap:"8px", fontSize:"12px", cursor:"pointer", alignItems:"flex-start" }}>
            <input type="radio" checked={tbgModell===m.v} onChange={() => setTbgModell(m.v)} style={{ marginTop:"2px" }} />{m.l}
          </label>
        ))}
      </div>
      <div style={{ display:"flex", gap:"10px" }}>
        <div style={{ flex:1 }}><label style={u.sectionLabel}>Tage/Monat Antragsteller*in:</label><input type="number" style={u.input} value={tbgTageA} onChange={e => setTbgTageA(e.target.value)} /></div>
        <div style={{ flex:1 }}><label style={u.sectionLabel}>Tage/Monat and. Elternteil:</label><input type="number" style={u.input} value={tbgTageB} onChange={e => setTbgTageB(e.target.value)} /></div>
      </div>
      <label style={u.sectionLabel}>Wer bezieht das Kindergeld?</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[{v:"antragsteller",l:"Antragsteller*in"},{v:"anderer",l:"And. Elternteil"}].map(x => (
          <div key={x.v} onClick={() => setTbgKgEmpf(x.v)} style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", backgroundColor:tbgKgEmpf===x.v?"#003366":"#eee", color:tbgKgEmpf===x.v?"#fff":"#333" }}>{x.l}</div>
        ))}
      </div>
      <label style={u.sectionLabel}>Kindergeldbetrag (€/Monat):</label>
      <input type="number" style={u.input} value={tbgKgBetrag} onChange={e => setTbgKgBetrag(e.target.value)} />
      <button style={{...u.btnPrimary, opacity:tbgModell&&tbgKgEmpf?1:0.5}} disabled={!tbgModell||!tbgKgEmpf} onClick={berechneTBG}>Berechnen & In Akte speichern</button>
      {tbgResult && (
        <div style={u.resultBox}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
            <div style={u.compositionBox}>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"6px" }}>Antragsteller*in ({tbgResult.tageA} Tage)</div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>Regelbedarf Kind:</span><span>{tbgResult.regelA} €</span></div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>+ Mehrbedarf:</span><span>{tbgResult.mehrA} €</span></div>
              {parseFloat(tbgResult.kgA)>0 && <div style={u.calcStep}><span style={{fontSize:"11px"}}>– Kindergeld:</span><span>{tbgResult.kgA} €</span></div>}
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #003366",paddingTop:"4px",marginTop:"4px"}}><span>Netto-Anteil:</span><span>{tbgResult.nettoA} €</span></div>
            </div>
            <div style={u.compositionBox}>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"6px" }}>And. Elternteil ({tbgResult.tageB} Tage)</div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>Regelbedarf Kind:</span><span>{tbgResult.regelB} €</span></div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>+ Mehrbedarf:</span><span>{tbgResult.mehrB} €</span></div>
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #003366",paddingTop:"4px",marginTop:"4px"}}><span>Gesamt:</span><span>{(parseFloat(tbgResult.regelB)+parseFloat(tbgResult.mehrB)).toFixed(2)} €</span></div>
            </div>
          </div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis und neue Daten in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "buergergeld") return (
    <BuergergeldRechner ext={ext} onSaveErgebnis={onSaveErgebnis} changedFields={changedFields} changedDate={changedDate} />
  );

  if (rechner === "wohngeld") return (
    <div>
      <h4 style={u.modTitle}>🏡 Wohngeld (WoGG)</h4>
      {(netto||mieteW) && <div style={u.infoBox}>✅ Einkommen und/oder Miete aus Akte vorausgefüllt.</div>}
      <label style={u.sectionLabel}>Nettoeinkommen (€/Monat):</label>
      <input type="number" style={u.input} value={wgNetto} onChange={e => setWgNetto(e.target.value)} />
      <label style={u.sectionLabel}>Bruttomiete warm (€/Monat):</label>
      <input type="number" style={u.input} value={wgMiete} onChange={e => setWgMiete(e.target.value)} />
      <div style={{ display:"flex", gap:"10px" }}>
        <div style={{ flex:1 }}>
          <label style={u.sectionLabel}>Haushaltsgröße:</label>
          <select style={u.input} value={wgHH} onChange={e => setWgHH(e.target.value)}>
            {["1","2","3","4","5"].map(n => <option key={n} value={n}>{n} {n==="1"?"Person":"Personen"}</option>)}
          </select>
        </div>
        <div style={{ flex:1 }}>
          <label style={u.sectionLabel}>Mietenstufe:</label>
          <select style={u.input} value={wgStufe} onChange={e => setWgStufe(e.target.value)}>
            {["1","2","3","4","5","6"].map(s => <option key={s} value={s}>Stufe {s}</option>)}
          </select>
        </div>
      </div>
      <label style={u.sectionLabel}>Unterhaltstitel vorhanden und gezahlt?</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
        {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(x => (
          <div key={x.v} onClick={() => setWgUTitel(x.v)} style={{ padding:"6px 14px", borderRadius:"8px", fontSize:"12px", cursor:"pointer", backgroundColor:wgUTitel===x.v?"#003366":"#eee", color:wgUTitel===x.v?"#fff":"#333" }}>{x.l}</div>
        ))}
      </div>
      {wgUTitel==="ja" && (
        <>
          <label style={u.sectionLabel}>Unterhaltsbetrag (€/Monat):</label>
          <input type="number" style={u.input} value={wgUnterhalt} onChange={e => setWgUnterhalt(e.target.value)} />
        </>
      )}
      <button style={u.btnPrimary} onClick={berechneWG}>Berechnen & In Akte speichern</button>
      {wgResult && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Nettoeinkommen:</span><span>{wgResult.n} €</span></div>
          {parseFloat(wgResult.uAbzug)>0 && <div style={u.calcStep}><span>– Unterhalt:</span><span>{wgResult.uAbzug} €</span></div>}
          <div style={u.calcStep}><span>Verfügbar:</span><span>{wgResult.verf} €</span></div>
          <div style={u.calcStep}><span>– Freibetrag:</span><span>{wgResult.frei} €</span></div>
          <div style={{...u.calcStep,borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Anzurechnendes Einkommen:</span><span>{wgResult.anr} €</span></div>
          <div style={u.calcStep}><span>Anrechenbare Miete (max. {wgResult.hb} €):</span><span>{wgResult.mietAnr} €</span></div>
          {wgResult.kein
            ? <div style={{...u.warnung,marginTop:"8px"}}>⚠️ Kein Wohngeldanspruch. Ggf. Bürgergeld prüfen.</div>
            : <div style={u.compositionBox}><div style={{...u.resRow,fontWeight:"bold",fontSize:"16px",borderTop:"2px solid #003366",paddingTop:"4px"}}><span>Wohngeld ca.:</span><span>{wgResult.wohngeld} €/Monat</span></div></div>
          }
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Neue Daten und Ergebnis in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  return <div style={{ color:"#999", fontSize:"12px" }}>Rechner nicht gefunden.</div>;
}



// =============================================
// PDF-EXPORT – Berechnungsergebnisse
// =============================================
function exportPDF(member, ergebnisse, beraterName) {
  var doc = new window.jspdf.jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  var W = 210, H = 297;
  var margin = 16;
  var y = 0;

  // ── Kopfzeile ──
  doc.setFillColor(0, 51, 102);
  doc.rect(0, 0, W, 28, "F");
  doc.setFillColor(0, 175, 173);
  doc.rect(0, 28, W, 2, "F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("ISUV Anspruchslotse", margin, 11);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.setTextColor(180,210,240);
  doc.text("Beratungsergebnisse – vertraulich", margin, 18);
  var heute = new Date().toLocaleDateString("de-DE");
  doc.text("Erstellt: " + heute, W - margin, 18, {align:"right"});
  y = 38;

  // ── Mitglied ──
  doc.setFillColor(232, 240, 251);
  doc.roundedRect(margin, y, W - 2*margin, 22, 3, 3, "F");
  doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("👤 Mitglied", margin+4, y+7);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(40,40,40);
  var nameStr = ((member.vorname||"") + " " + (member.name||"")).trim() || "Unbekannt";
  doc.text(nameStr, margin+4, y+14);
  var kontakt = [member.tel, member.mail, member.ort].filter(Boolean).join("  ·  ");
  if(kontakt) doc.text(kontakt, margin+4, y+20, {maxWidth: W-2*margin-8});
  y += 28;

  // ── Berater ──
  if(beraterName) {
    doc.setFontSize(8); doc.setTextColor(120,120,120);
    doc.text("Berater/in: " + beraterName, margin, y);
    y += 6;
  }

  // ── Ergebnisse ──
  var alle = [...ergebnisse].reverse();
  alle.forEach(function(e, i) {
    // Seitenumbruch prüfen
    if(y > H - 50) { doc.addPage(); y = 20; }

    // Karte
    var rechtsbereich = e.rechtsbereich || "";
    var bgR = rechtsbereich === "Familienrecht" ? [232,240,251] : rechtsbereich === "Sozialrecht" ? [232,245,233] : [249,249,249];
    var borderR = rechtsbereich === "Familienrecht" ? [0,51,102] : [0,175,173];
    doc.setFillColor(bgR[0], bgR[1], bgR[2]);
    // Höhe der Karte schätzen
    var detailLines = 0;
    if(e.details) detailLines += 1;
    if(e.detailSchritte && e.detailSchritte.length) detailLines += Math.min(e.detailSchritte.length, 8);
    if(e.rechtsgrundlagen && e.rechtsgrundlagen.length) detailLines += 1;
    var cardH = 22 + detailLines * 5;
    if(y + cardH > H - 20) { doc.addPage(); y = 20; }
    doc.roundedRect(margin, y, W-2*margin, cardH, 2, 2, "F");
    doc.setDrawColor(borderR[0], borderR[1], borderR[2]);
    doc.setLineWidth(0.5);
    doc.roundedRect(margin, y, W-2*margin, cardH, 2, 2, "S");
    // Linker farbiger Balken
    doc.setFillColor(borderR[0], borderR[1], borderR[2]);
    doc.rect(margin, y, 3, cardH, "F");

    // Typ + Datum
    doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(e.typ || "Berechnung", margin+6, y+6);
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(160,160,160);
    doc.text(e.datum || "", W-margin-2, y+6, {align:"right"});
    if(rechtsbereich) {
      doc.setFillColor(borderR[0], borderR[1], borderR[2]);
      doc.roundedRect(margin+6, y+8, rechtsbereich.length*2.2+4, 5, 1.5, 1.5, "F");
      doc.setTextColor(255,255,255); doc.setFontSize(6.5);
      doc.text(rechtsbereich, margin+8, y+12);
    }

    // Ergebnis
    doc.setTextColor(0,175,173); doc.setFont("helvetica","bold"); doc.setFontSize(12);
    doc.text(e.ergebnis || "", margin+6, y+20);

    // Details
    var dy = y + 26;
    if(e.details) {
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
      doc.text(e.details, margin+6, dy, {maxWidth: W-2*margin-10});
      dy += 5;
    }

    // Detailschritte
    if(e.detailSchritte && e.detailSchritte.length > 0) {
      doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(0,51,102);
      doc.text("Detailrechnung:", margin+6, dy); dy += 4;
      e.detailSchritte.slice(0,8).forEach(function(s) {
        if(dy > H-25) return;
        doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(60,60,60);
        var label = s.label || s[0] || "";
        var wert  = s.wert  || s[1] || "";
        doc.text("• " + label, margin+8, dy);
        doc.text(wert, W-margin-4, dy, {align:"right"});
        dy += 4.5;
      });
    }

    // Rechtsgrundlagen
    if(e.rechtsgrundlagen && e.rechtsgrundlagen.length > 0) {
      if(dy > H-20) { doc.addPage(); dy = 20; }
      doc.setFont("helvetica","italic"); doc.setFontSize(7); doc.setTextColor(140,140,140);
      doc.text("Rechtsgrundlagen: " + e.rechtsgrundlagen.join(" · "), margin+6, dy, {maxWidth: W-2*margin-10});
      dy += 4;
    }

    y = dy + 4;
  });

  // ── Fußzeile letzte Seite ──
  var pageCount = doc.getNumberOfPages();
  for(var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFillColor(0,51,102);
    doc.rect(0, H-10, W, 10, "F");
    doc.setTextColor(180,210,240); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text("ISUV Anspruchslotse  ·  Vertraulich  ·  Nur für interne Beratungszwecke", W/2, H-4, {align:"center"});
    doc.setTextColor(255,255,255);
    doc.text("Seite " + p + " / " + pageCount, W-margin, H-4, {align:"right"});
  }

  // Speichern
  var filename = "ISUV_" + (nameStr.replace(/\s+/g,"_")) + "_Berechnungen_" + heute.replace(/\./g,"-") + ".pdf";
  doc.save(filename);
}


// =============================================
// KINDERZUSCHLAG-RECHNER (§ 6a BKGG) – 2024/2025
// =============================================
function KinderzuschlagRechner({ ext, onSaveErgebnis }) {
  var u = rStyles;
  // Kinderzuschlag 2025: max 292 € je Kind (ab 01.01.2025)
  // 2024: 292 €, Mindestbruttogrenze: Alleinerziehend 645 €, Paar 955 €
  var KZG_MAX = 292;
  var KINDERGELD = 250;
  var REGELBEDARF_ALLEIN = 563;

  const [personen, setPersonen] = React.useState("allein"); // allein | paar
  const [kinder, setKinder] = React.useState([{id:1, alter:"8"}]);
  const [bruttoEinkommen, setBruttoEinkommen] = React.useState("");
  const [nettoEinkommen, setNettoEinkommen] = React.useState("");
  const [unterhalt, setUnterhalt] = React.useState("");
  const [wohngeld, setWohngeld] = React.useState("");
  const [result, setResult] = React.useState(null);
  const [showDetail, setShowDetail] = React.useState(false);

  function addKind() {
    setKinder(function(k){ return k.concat([{id:Date.now(), alter:"8"}]); });
  }
  function removeKind(id) {
    setKinder(function(k){ return k.filter(function(c){ return c.id!==id; }); });
  }
  function setKindAlter(id, val) {
    setKinder(function(k){ return k.map(function(c){ return c.id===id ? {...c, alter:val} : c; }); });
  }

  function berechne() {
    var brutto = parseFloat(bruttoEinkommen)||0;
    var netto  = parseFloat(nettoEinkommen)||0;
    var unt    = parseFloat(unterhalt)||0;
    var wg     = parseFloat(wohngeld)||0;
    var anzK   = kinder.length;

    // Mindesteinkommensgrenze
    var minBrutto = personen === "allein" ? 645 : 955;
    // Höchsteinkommensgrenze: Grundbedarf + KdK + KZG_MAX * anzK
    var bedarfEltern = personen === "allein" ? REGELBEDARF_ALLEIN : 1125; // § 20 SGB II Paar
    var kdk = anzK * 357; // Kinderbedarf SGB II (Ø Grundbedarf Kind)
    var maxBrutto = bedarfEltern + kdk + KZG_MAX * anzK;

    var mindestGrenze = brutto >= minBrutto;
    var hoechstGrenze = netto <= maxBrutto;

    // KZG-Berechnung
    // Elterneinkommen das anrechenbar ist: netto + Unterhalt + Wohngeld - Elterneigenbedarf
    var eigenbedarf = personen === "allein" ? REGELBEDARF_ALLEIN : 1125;
    var anrechenbaresEink = Math.max(0, netto + unt - eigenbedarf - wg);
    // KZG je Kind: max KZG_MAX, Minderung um 45% des übersteigenden Einkommens
    var kzgJeKind = Math.max(0, KZG_MAX - anrechenbaresEink * 0.45 / anzK);
    kzgJeKind = Math.min(kzgJeKind, KZG_MAX);
    var kzgGesamt = kzgJeKind * anzK;

    // Zusammenspiel mit Bürgergeld: KZG + Kindergeld deckt Kindesbedarf?
    var kgGesamt = KINDERGELD * anzK;
    var gesamtFamLeistung = kzgGesamt + kgGesamt + wg;
    var buergergeldBesser = !mindestGrenze || kzgGesamt < 10;

    var detailSchritte = [
      { label:"Anzahl Kinder", wert: anzK + " Kind(er)" },
      { label:"Haushalt", wert: personen === "allein" ? "Alleinerziehend" : "Paar" },
      { label:"Brutto-Einkommen", wert: brutto.toFixed(2) + " €" },
      { label:"Netto-Einkommen", wert: netto.toFixed(2) + " €" },
      { label:"Mindesteinkommensgrenze", wert: minBrutto + " € " + (mindestGrenze?"✅ erfüllt":"❌ nicht erfüllt") },
      { label:"Elterneigenbedarf", wert: eigenbedarf.toFixed(0) + " €" },
      { label:"Anrechenbares Einkommen", wert: anrechenbaresEink.toFixed(2) + " €" },
      { label:"KZG je Kind (max " + KZG_MAX + " €)", wert: kzgJeKind.toFixed(2) + " €" },
      { label:"Kindergeld gesamt", wert: kgGesamt.toFixed(0) + " €" },
      { label:"KZG + Kindergeld gesamt", wert: (kzgGesamt + kgGesamt).toFixed(2) + " €" },
    ];

    setResult({ kzgJeKind, kzgGesamt, kgGesamt, gesamtFamLeistung,
      mindestGrenze, hoechstGrenze, buergergeldBesser,
      anrechenbaresEink, detailSchritte, anzK, brutto, minBrutto });

    if(onSaveErgebnis && (mindestGrenze && kzgGesamt > 0)) {
      onSaveErgebnis({
        typ: "Kinderzuschlag (§ 6a BKGG)",
        rechtsbereich: "Sozialrecht",
        ergebnis: kzgGesamt.toFixed(0) + " €/Monat (" + anzK + " Kind" + (anzK>1?"er":"") + ")",
        details: "KZG " + kzgJeKind.toFixed(0) + " €/Kind + KG " + KINDERGELD + " € = " + (kzgJeKind+KINDERGELD).toFixed(0) + " €/Kind",
        detailSchritte,
        rechtsgrundlagen: ["§ 6a BKGG", "§ 6b BKGG", "§ 20 SGB II"]
      });
    }
  }

  return (
    <div>
      <h4 style={u.modTitle}>👶 Kinderzuschlag-Rechner</h4>
      <InfoBox typ="recht" titel="§ 6a BKGG – Kinderzuschlag 2025"
        kinder={<span>Max. <strong>292 €/Monat je Kind</strong> zusätzlich zum Kindergeld (250 €). Ziel: Familien knapp über Bürgergeld-Grenze aus dem SGB-II-Bezug herausholen. Mindestbrutto: <strong>645 € (Allein) / 955 € (Paar)</strong>.</span>} />

      <label style={u.sectionLabel}>Haushalt:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[["allein","👤 Alleinerziehend"],["paar","👫 Paar"]].map(function([v,l]){
          return (
            <button key={v} onClick={function(){setPersonen(v); setResult(null);}}
              style={{ flex:1, padding:"9px", borderRadius:"8px", border:"2px solid "+(personen===v?"#003366":"#ddd"),
                backgroundColor:personen===v?"#e8f0fb":"#f9f9f9", fontWeight:personen===v?"bold":"normal",
                cursor:"pointer", fontSize:"12px" }}>
              {l}
            </button>
          );
        })}
      </div>

      <label style={u.sectionLabel}>Kinder:</label>
      {kinder.map(function(k){
        return (
          <div key={k.id} style={{ display:"flex", gap:"8px", alignItems:"center", marginBottom:"6px" }}>
            <span style={{ fontSize:"11px", color:"#666", whiteSpace:"nowrap" }}>Kind {kinder.indexOf(k)+1}, Alter:</span>
            <input type="number" min="0" max="24" style={{ ...u.inputMini, width:"60px" }}
              value={k.alter} onChange={function(e){ setKindAlter(k.id, e.target.value); }} />
            <span style={{ fontSize:"9px", color:"#999" }}>Jahre</span>
            {kinder.length > 1 && (
              <button onClick={function(){ removeKind(k.id); }} style={u.btnDel}>✕</button>
            )}
          </div>
        );
      })}
      {kinder.length < 5 && (
        <button onClick={addKind} style={{ ...u.btnAdd, marginBottom:"10px" }}>+ Kind hinzufügen</button>
      )}

      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Brutto-Einkommen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 1800"
            value={bruttoEinkommen} onChange={function(e){ setBruttoEinkommen(e.target.value); setResult(null); }} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Netto-Einkommen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 1350"
            value={nettoEinkommen} onChange={function(e){ setNettoEinkommen(e.target.value); setResult(null); }} />
        </div>
      </div>
      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Unterhalt erhalten (€/Monat):</label>
          <input type="number" style={u.input} placeholder="0"
            value={unterhalt} onChange={function(e){ setUnterhalt(e.target.value); setResult(null); }} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Wohngeld (€/Monat, falls vorhanden):</label>
          <input type="number" style={u.input} placeholder="0"
            value={wohngeld} onChange={function(e){ setWohngeld(e.target.value); setResult(null); }} />
        </div>
      </div>

      <button style={u.btnPrimary} onClick={berechne}>👶 Kinderzuschlag berechnen</button>

      {result && (
        <div style={u.resultBox}>
          {!result.mindestGrenze && (
            <InfoBox typ="warnung" titel={"Mindesteinkommensgrenze nicht erreicht"}
              kinder={<span>Brutto-Einkommen {result.brutto.toFixed(0)} € &lt; {result.minBrutto} € Mindestgrenze. Kein Kinderzuschlag möglich. Bürgergeld (SGB II) prüfen.</span>} />
          )}
          {result.mindestGrenze && result.kzgGesamt < 10 && (
            <InfoBox typ="warnung" titel="Kein Kinderzuschlag"
              kinder={<span>Einkommen zu hoch – KZG wird auf 0 € reduziert. Kein Anspruch.</span>} />
          )}
          {result.mindestGrenze && result.kzgGesamt >= 10 && (
            <div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"10px" }}>
                <div style={{ backgroundColor:"#e8f0fb", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
                  <div style={{ fontSize:"10px", color:"#003366" }}>KZG je Kind</div>
                  <div style={{ fontSize:"18px", fontWeight:"bold", color:"#003366" }}>{result.kzgJeKind.toFixed(0)} €</div>
                  <div style={{ fontSize:"9px", color:"#666" }}>max. {KZG_MAX} €</div>
                </div>
                <div style={{ backgroundColor:"#e8f5e9", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
                  <div style={{ fontSize:"10px", color:"#1b5e20" }}>KZG gesamt + KG</div>
                  <div style={{ fontSize:"18px", fontWeight:"bold", color:"#1b5e20" }}>{(result.kzgGesamt+result.kgGesamt).toFixed(0)} €/Monat</div>
                  <div style={{ fontSize:"9px", color:"#666" }}>{result.anzK} Kind(er) × {(result.kzgJeKind+KINDERGELD).toFixed(0)} €</div>
                </div>
              </div>
              <InfoBox typ="positiv" titel={null}
                kinder={<span>KZG <strong>{result.kzgGesamt.toFixed(0)} €</strong> + Kindergeld <strong>{result.kgGesamt.toFixed(0)} €</strong> = <strong>{result.gesamtFamLeistung.toFixed(0)} €</strong> Familienleistung gesamt (inkl. {parseFloat(wohngeld)||0} € Wohngeld).</span>} />
              <InfoBox typ="empf" titel="Tipp: Wohngeld-Plus prüfen"
                kinder={<span>Kinderzuschlag + Wohngeld kombinierbar! § 6b BKGG erlaubt Bezug von KZG und Wohngeld gleichzeitig – prüfen ob Wohngeldrechner einen Anspruch zeigt.</span>} />
            </div>
          )}
          {result.buergergeldBesser && result.mindestGrenze && (
            <InfoBox typ="warnung" titel="Bürgergeld möglicherweise günstiger"
              kinder={<span>Bei sehr niedrigem KZG kann SGB II (Bürgergeld) vorteilhafter sein – Vergleichsrechnung empfohlen.</span>} />
          )}

          <details open={showDetail} onToggle={function(e){ setShowDetail(e.target.open); }}>
            <summary style={{ fontSize:"10px", cursor:"pointer", color:"#003366", fontWeight:"bold", marginTop:"8px" }}>▶ Detailrechnung anzeigen</summary>
            <div style={{ backgroundColor:"#fff", border:"1px solid #ddd", borderRadius:"6px", padding:"8px", marginTop:"6px" }}>
              {result.detailSchritte.map(function(s,i){
                return (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:"11px", borderBottom:"1px solid #f5f5f5", padding:"3px 0" }}>
                    <span style={{ color:"#666" }}>{s.label}</span>
                    <span style={{ fontWeight:"bold" }}>{s.wert}</span>
                  </div>
                );
              })}
              <div style={{ fontSize:"9px", color:"#999", marginTop:"6px" }}>
                Rechtsgrundlagen: § 6a BKGG · § 6b BKGG · § 20 SGB II · Stand 01.01.2025
              </div>
            </div>
          </details>
        </div>
      )}
    </div>
  );
}

        <div style={{ display: "flex", alignItems: "center", cursor: "pointer" }} onClick={() => setView("dashboard")}>
          <img src={window.ISUV_LOGO} alt="ISUV" style={{ height:"32px", width:"auto", display:"block" }} />
          <div style={{ marginLeft:"8px" }}>
            <strong style={{ display:"block", fontSize:"13px" }}>ANSPRUCHSLOTSE</strong>
            {(loginDaten.leiter || loginDaten.ort) && (
              <span style={{ fontSize:"10px", color:"#666" }}>{loginDaten.leiter}{loginDaten.leiter && loginDaten.ort ? " · " : ""}{loginDaten.ort}</span>
            )}
          </div>
        </div>
        <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
          {eingangFormulare.filter(f => !geseheneEingangIds.has(f.id)).length > 0 && (
            <div onClick={() => { setView("dashboard"); setShowFormulare(true); setShowEingang(true); setGeseheneEingangIds(prev => { const next = new Set([...prev, ...eingangFormulare.map(f => f.id)]); try { localStorage.setItem("isuv_gesehen_ids", JSON.stringify([...next])); } catch(e){} return next; }); }}

              📥 {eingangFormulare.filter(f => !geseheneEingangIds.has(f.id)).length}
            </div>
          )}
          {(function() {
            var heute = new Date();
            var heuteTermine = termine.filter(function(t) {
              return t.tag === heute.getDate() && t.monat === heute.getMonth();
            });
            if (heuteTermine.length > 0) {
              return (
                <div onClick={() => { setView("dashboard"); setShowCalendar(true); }}
                  style={{ cursor:"pointer", backgroundColor:"#f57c00", color:"#fff", borderRadius:"20px", padding:"5px 10px", fontSize:"11px", fontWeight:"bold" }}
                  title={heuteTermine.map(function(t){ return t.zeit + " " + t.text; }).join(", ")}>
                  📅 {heuteTermine.length}
                </div>
              );
            }
            return null;
          })()}
          <button onClick={() => setView("profil")} style={{ ...styles.btnLogout, backgroundColor:"#e8f0fb", color:"#003366" }}>⚙️ Profil</button>
          <button onClick={() => setIsLoggedIn(false)} style={styles.btnLogout}>Abmelden</button>
        </div>
      </header>

      <main style={["formular_ausfuellen","tbg_form","buergergeld_form","eingang_detail"].includes(view) ? {...styles.main, padding:"0", maxWidth:"800px"} : styles.main} className="app-main">
        {view === "dashboard" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>

            {/* MITGLIEDER */}
            <div style={styles.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }} onClick={() => setShowMemberList(!showMemberList)}>
                <h3 style={{ margin: 0, fontSize: "14px" }}>👥 Mitglieder</h3>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <div onClick={e => { e.stopPropagation(); setShowNeuesMitglied(true); setView("neues_mitglied"); }}
                    style={{ backgroundColor:"#00afad", color:"#fff", border:"none", borderRadius:"6px", padding:"4px 10px", fontSize:"11px", cursor:"pointer", fontWeight:"bold" }}>
                    + Mitglied
                  </div>
                  <span>{showMemberList ? "▲" : "▼"}</span>
                </div>
              </div>
              {showMemberList && (
                <div style={{ marginTop: "10px" }}>
                  <input style={styles.input} placeholder="Suchen nach Name, Ort, Tel..." onChange={e => setSearchTerm(e.target.value)} />
                  {(function() {
                    var term = searchTerm.toLowerCase();
                    var filtered = members.filter(function(m) {
                      return (m.vorname + " " + m.name + " " + m.ort + " " + m.tel + " " + m.plz).toLowerCase().includes(term) ||
                        ((memberExtras[m.id] && memberExtras[m.id].familienstand || "").toLowerCase().includes(term));
                    });
                    var pinned = filtered.filter(function(m) { return pinnedIds.includes(m.id); });
                    var unpinned = filtered.filter(function(m) { return !pinnedIds.includes(m.id); });
                    var sortedMembers = pinned.concat(unpinned);
                    return sortedMembers.map(function(m) {
                      var isPinned = pinnedIds.includes(m.id);
                      return (
                      <div key={m.id} style={{ ...styles.memberRow, backgroundColor: isPinned ? "#fff8e1" : "#fff", borderLeft: isPinned ? "3px solid #f57c00" : "3px solid transparent" }}>
                        <div onClick={() => { setActiveMember(m); setView("akte"); }} style={{ flex: 1, cursor: "pointer" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                            {isPinned && <span style={{ fontSize:"10px" }}>📌</span>}
                            <strong>{m.name}, {m.vorname}</strong>
                          </div>
                          <div style={{ fontSize: "11px", color: "#666" }}>📞 {m.tel} | ✉️ {m.mail}{m.ort ? " | 📍 "+m.ort : ""}</div>
                        </div>
                        <div style={{ position: "relative" }}>
                          <button style={styles.btnDots} onClick={() => setOpenActionMenuId(openActionMenuId === m.id ? null : m.id)}>⋮</button>
                          {openActionMenuId === m.id && (
                            <div style={styles.actionMenu}>
                              <div style={styles.menuItem} onClick={() => { setActiveMember(m); setView("akte"); setOpenActionMenuId(null); }}>📋 Akte</div>
                              <div style={styles.menuItem} onClick={() => { setFormularVersandDialogNeu({ member: m, formTyp: "stammdaten" }); setVersandFelder(null); setOpenActionMenuId(null); }}>✉️ Formular senden</div>
                              <div style={styles.menuItem} onClick={() => { setActiveMember(m); setView("berechnung"); setBerechnungRechner(null); setBerechnungKategorie(null); setOpenActionMenuId(null); }}>🧮 Berechnung</div>
                              <div style={styles.menuItem} onClick={function() { setPinnedIds(function(prev) { return isPinned ? prev.filter(function(x){return x!==m.id;}) : [...prev,m.id]; }); setOpenActionMenuId(null); }}>
                                {isPinned ? "📌 Entpinnen" : "📌 Anpinnen"}
                              </div>
                              <div style={{ ...styles.menuItem, color:"#e53935", borderBottom:"none" }} onClick={() => { if(window.confirm("Mitglied " + m.vorname + " " + m.name + " wirklich löschen?")) { setMembers(prev => prev.filter(x => x.id !== m.id)); setOpenActionMenuId(null); } }}>🗑️ Löschen</div>
                            </div>
                          )}
                        </div>
                      </div>
                      );
                    });
                  })()}
                </div>
              )}
            </div>

            {/* FORMULARE + EINGANG */}
            <div style={styles.card}>
              <div onClick={() => setShowFormulare(!showFormulare)} style={styles.reiterHeader}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <h3 style={{ margin:0, fontSize:"14px" }}>📄 Formulare</h3>
                  {eingangFormulare.length > 0 && (
                    <span style={{ backgroundColor:"#e53935", color:"#fff", borderRadius:"50%", width:"18px", height:"18px", fontSize:"10px", fontWeight:"bold", display:"flex", alignItems:"center", justifyContent:"center" }}>{eingangFormulare.length}</span>
                  )}
                  {ausgangFormulare.filter(function(a){ return a.status==="unbeantwortet"; }).length > 0 && (
                    <span style={{ backgroundColor:"#f57c00", color:"#fff", borderRadius:"50%", width:"18px", height:"18px", fontSize:"10px", fontWeight:"bold", display:"flex", alignItems:"center", justifyContent:"center" }}>{ausgangFormulare.filter(function(a){ return a.status==="unbeantwortet"; }).length}</span>
                  )}
                </div>
                <span>{showFormulare ? "▲" : "▼"}</span>
              </div>
              {showFormulare && (
                <div style={{ marginTop:"10px" }}>
                  {/* ── SOZIALRECHT ── */}
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#1b5e20", textTransform:"uppercase", backgroundColor:"#e8f5e9", borderRadius:"5px", padding:"4px 8px", marginBottom:"8px", letterSpacing:"0.5px" }}>🏛️ Sozialrecht (SGB II / WoGG)</div>
                  {[
                    { id:"stammdaten", label:"📋 Stammdaten-Fragebogen", desc:"Persönliche Daten, Einkommen, Wohnen", farbe:"#1b5e20" },
                    { id:"buergergeld", label:"🏛️ Bürgergeld-Fragebogen", desc:"ALG II / SGB II – Bedarf & Einkommen", farbe:"#1b5e20" },
                    { id:"tbg", label:"📋 Anlage TBG (Bürgergeld)", desc:"Temporäre Bedarfsgemeinschaft", farbe:"#1b5e20" },
                  ].map(function(f) {
                    return (
                      <div key={f.id}
                        style={{ backgroundColor:"#f9f9f9", borderRadius:"8px", padding:"12px", marginBottom:"8px", borderLeft:"4px solid "+(f.farbe||"#003366"), cursor:"pointer", transition:"background-color 0.15s, box-shadow 0.15s" }}
                        onClick={function() {
                          if (f.id === "stammdaten") { setView("formular_ausfuellen"); setFormFelderDaten({}); }
                          else if (f.id === "buergergeld") { setView("buergergeld_form"); setFormFelderDaten({}); }
                          else { setView("tbg_form"); }
                        }}
                        onMouseEnter={function(e){ e.currentTarget.style.backgroundColor="#edf2fb"; e.currentTarget.style.boxShadow="0 2px 8px rgba(0,51,102,0.15)"; }}
                        onMouseLeave={function(e){ e.currentTarget.style.backgroundColor="#f9f9f9"; e.currentTarget.style.boxShadow="none"; }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <div style={{ fontWeight:"bold", fontSize:"13px" }}>{f.label}</div>
                            <div style={{ fontSize:"10px", color:"#999", marginTop:"2px" }}>{f.desc}</div>
                            <div style={{ fontSize:"10px", color:"#003366", marginTop:"3px", opacity:0.7 }}>👆 Antippen zum Öffnen</div>
                          </div>
                          <div style={{ display:"flex", gap:"6px" }} onClick={function(e){ e.stopPropagation(); }}>
                            <button
                              onClick={function() { setFormularVersandDialogNeu({ member: null, formTyp: f.id }); setVersandFelder(null); }}
                              style={{ backgroundColor:"#003366", color:"#fff", border:"none", cursor:"pointer", fontSize:"11px", fontWeight:"bold", padding:"5px 10px", borderRadius:"5px" }}>
                              📤 Senden
                            </button>
                          </div>
                        </div>
                        {versandMail[f.id + "_sendDialog"] && (
                          <div style={{ marginTop:"10px", backgroundColor:"#e8f0fb", borderRadius:"6px", padding:"10px" }}>
                            <div style={{ fontSize:"11px", color:"#555", marginBottom:"6px", fontWeight:"bold" }}>✉️ An welche E-Mail-Adresse senden?</div>
                            <div style={{ display:"flex", gap:"6px" }}>
                              <input
                                style={{ flex:1, padding:"7px 10px", border:"1px solid #ddd", borderRadius:"6px", fontSize:"12px", boxSizing:"border-box" }}
                                placeholder="empfaenger@beispiel.de"
                                value={versandMail[f.id + "_sendMail"] || ""}
                                onChange={function(e) { setVersandMail(function(prev) { return Object.assign({}, prev, {[f.id + "_sendMail"]: e.target.value}); }); }}
                                autoFocus
                              />
                              <button
                                onClick={function() {
                                  var mail = (versandMail[f.id + "_sendMail"] || "").trim();
                                  if (!mail.includes("@")) { return; }
                                  var jetzt = new Date();
                                  var ds = jetzt.toLocaleDateString("de-DE") + " " + String(jetzt.getHours()).padStart(2,"0") + ":" + String(jetzt.getMinutes()).padStart(2,"0");
                                  var formLabel = f.label.replace("📋 ", "");
                                  setAusgangFormulare(function(prev) {
                                    return prev.concat([{ id: Date.now(), typ: formLabel, empfaenger: mail, mitglied: null, datum: ds, status: "unbeantwortet", kanal: "✉️ E-Mail", vorausgefuellt: false }]);
                                  });
                                  setVersandMail(function(prev) { return Object.assign({}, prev, {[f.id + "_sendDialog"]: false, [f.id + "_sendMail"]: "", [f.id + "_gesendet"]: mail}); });
                                  setShowAusgang(true);
                                }}
                                style={{ backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"6px", padding:"7px 12px", fontSize:"12px", cursor:"pointer", fontWeight:"bold" }}>
                                ✓ Senden
                              </button>
                              <button
                                onClick={function() { setVersandMail(function(prev) { return Object.assign({}, prev, {[f.id + "_sendDialog"]: false}); }); }}
                                style={{ backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"6px", padding:"7px 10px", fontSize:"12px", cursor:"pointer" }}>
                                ✕
                              </button>
                            </div>
                            {versandMail[f.id + "_sendMail"] && !versandMail[f.id + "_sendMail"].includes("@") && (
                              <div style={{ fontSize:"10px", color:"#e53935", marginTop:"4px" }}>Bitte gültige E-Mail-Adresse eingeben.</div>
                            )}
                          </div>
                        )}
                        {versandMail[f.id + "_gesendet"] && !versandMail[f.id + "_sendDialog"] && (
                          <div style={{ marginTop:"8px", backgroundColor:"#e8f5e9", borderRadius:"6px", padding:"8px 10px", fontSize:"11px", color:"#2e7d32" }}>
                            ✅ Gesendet an {versandMail[f.id + "_gesendet"]} · im Ausgang als <strong>unbeantwortet</strong> gespeichert
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {/* ── FAMILIENRECHT ── */}
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"4px 8px", marginBottom:"8px", marginTop:"12px", letterSpacing:"0.5px" }}>⚖️ Familienrecht (BGB / Unterhaltsrecht)</div>
                  {[
                    { id:"fr_kindesunterhalt", label:"👶 Kindesunterhalt-Fragebogen", desc:"Düsseldorfer Tabelle, Selbstbehalt, Mangelfall", farbe:"#003366" },
                    { id:"fr_wechselmodell", label:"🔄 Wechselmodell-Fragebogen", desc:"Betreuungsaufteilung, Fahrtkosten, BGH XII ZB 234/15", farbe:"#003366" },
                    { id:"fr_rechtsvergleich", label:"⚖️ Familienrecht vs. Sozialrecht", desc:"Vergleich Selbstbehalt / SGB II Bedarf / Wohnraum", farbe:"#6a1b9a" },
                  ].map(function(f) {
                    return (
                      <div key={f.id}
                        style={{ backgroundColor:"#f9f9f9", borderRadius:"8px", padding:"12px", marginBottom:"8px", borderLeft:"4px solid "+(f.farbe||"#003366"), cursor:"pointer" }}
                        onClick={function() { setView(f.id); }}
                        onMouseEnter={function(e){ e.currentTarget.style.backgroundColor="#edf2fb"; }}
                        onMouseLeave={function(e){ e.currentTarget.style.backgroundColor="#f9f9f9"; }}>
                        <div style={{ fontWeight:"bold", fontSize:"13px" }}>{f.label}</div>
                        <div style={{ fontSize:"10px", color:"#999", marginTop:"2px" }}>{f.desc}</div>
                      </div>
                    );
                  })}

                  {/* EINGANG FORMULARE – Unterkategorie */}
                  <div style={{ marginTop:"14px", borderTop:"2px solid #e8f0fb", paddingTop:"12px" }}>
                    <div onClick={() => setShowEingang(!showEingang)}
                      style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", padding:"6px 0", marginBottom: showEingang ? "8px" : "0" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                        <span style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>📥 Eingang Formulare</span>
                        {eingangFormulare.length > 0 && (
                          <span style={{ backgroundColor:"#e53935", color:"#fff", borderRadius:"50%", width:"18px", height:"18px", fontSize:"10px", fontWeight:"bold", display:"flex", alignItems:"center", justifyContent:"center" }}>{eingangFormulare.length}</span>
                        )}
                      </div>
                      <span style={{ fontSize:"11px", color:"#999" }}>{showEingang ? "▲" : "▼"}</span>
                    </div>
                    {showEingang && (
                      <div>

                        {eingangFormulare.length === 0 && (
                          <div style={{ fontSize:"12px", color:"#999", textAlign:"center", padding:"12px 0" }}>Keine eingegangenen Formulare.</div>
                        )}
                        {eingangFormulare.map(f => (
                          <div key={f.id} style={{ backgroundColor:"#f0fdfd", borderRadius:"8px", padding:"12px", marginBottom:"8px", borderLeft:"4px solid #00afad", position:"relative", cursor:"pointer", transition:"background-color 0.15s, box-shadow 0.15s" }}
                            onMouseEnter={e => { e.currentTarget.style.backgroundColor="#c8f4f4"; e.currentTarget.style.boxShadow="0 2px 8px rgba(0,175,173,0.25)"; }}
                            onMouseLeave={e => { e.currentTarget.style.backgroundColor="#f0fdfd"; e.currentTarget.style.boxShadow="none"; }}
                            onClick={() => { setAktivesEingangFormular(f); setView("eingang_detail"); setGeseheneEingangIds(prev => { const next = new Set([...prev, f.id]); try { localStorage.setItem("isuv_gesehen_ids", JSON.stringify([...next])); } catch(e){} return next; }); }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                              <div style={{ flex:1 }}>
                                <div style={{ fontWeight:"bold", fontSize:"13px" }}>{f.typ}</div>
                                <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Von: {f.name}</div>
                                <div style={{ fontSize:"10px", color:"#999", marginTop:"1px" }}>{f.datum}</div>
                                {!geseheneEingangIds.has(f.id) && <span style={{ backgroundColor:"#e53935", color:"#fff", borderRadius:"10px", padding:"1px 7px", fontSize:"9px", fontWeight:"bold", display:"inline-block", marginTop:"4px" }}>NEU</span>}
                              </div>
                              <button onClick={e => { e.stopPropagation(); setOpenEingangMenuId(openEingangMenuId === f.id ? null : f.id); }}
                                style={{ background:"none", border:"none", fontSize:"22px", cursor:"pointer", padding:"0 4px", lineHeight:1, color:"#666", fontWeight:"bold" }}>⋮</button>
                            </div>
                            {openEingangMenuId === f.id && (
                              <div onClick={e => e.stopPropagation()} style={{ position:"absolute", right:"8px", top:"40px", backgroundColor:"#fff", boxShadow:"0 4px 16px rgba(0,0,0,0.15)", borderRadius:"8px", zIndex:200, minWidth:"180px", overflow:"hidden", border:"1px solid #eee" }}>
                                <div style={{ padding:"10px 14px", cursor:"pointer", fontSize:"12px", borderBottom:"1px solid #f0f0f0" }}
                                  onClick={() => { setEingangDatenTransferDialog(f); setOpenEingangMenuId(null); }}>
                                  👤 In Akte übertragen
                                </div>
                                <div style={{ padding:"10px 14px", cursor:"pointer", fontSize:"12px", color:"#e53935" }}
                                  onClick={() => { setOpenEingangMenuId(null); if(window.confirm("Eingang von " + f.name + " löschen?")) { setGeloeschteEingangIds(prev => { const next = new Set([...prev, f.id]); try { localStorage.setItem("isuv_geloeschte_ids", JSON.stringify([...next])); } catch(e){} return next; }); setEingangFormulare(prev => prev.filter(x => x.id !== f.id)); } }}>
                                  🗑️ Löschen
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* EINGANG DATEN-TRANSFER DIALOG */}
                  {eingangDatenTransferDialog && (
                    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.5)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
                      <div style={{ backgroundColor:"#fff", borderRadius:"12px", padding:"20px", width:"100%", maxWidth:"380px", maxHeight:"80vh", overflowY:"auto" }} className="modal-scroll">
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px" }}>
                          <div style={{ fontWeight:"bold", fontSize:"14px", color:"#003366" }}>👤 Daten in Akte übertragen</div>
                          <button onClick={() => setEingangDatenTransferDialog(null)} style={{ background:"none", border:"none", fontSize:"20px", cursor:"pointer", color:"#999" }}>×</button>
                        </div>
                        <div style={{ backgroundColor:"#e8f0fb", borderRadius:"8px", padding:"10px", marginBottom:"14px", fontSize:"12px" }}>
                          <strong>Formular von:</strong> {eingangDatenTransferDialog.name}<br/>
                          <strong>Typ:</strong> {eingangDatenTransferDialog.typ}
                        </div>
                        {(function() {
                          var f = eingangDatenTransferDialog;
                          var passendesMitglied = members.find(function(m) {
                            return (m.mail && f.absender && m.mail.toLowerCase() === f.absender.toLowerCase()) ||
                              (m.vorname + " " + m.name).toLowerCase() === (f.name||"").toLowerCase();
                          });
                          if (!passendesMitglied) {
                            return (
                              <div style={{ fontSize:"12px", color:"#856404", backgroundColor:"#fff9e6", border:"1px solid #ffeeba", borderRadius:"8px", padding:"10px" }}>
                                ⚠️ Kein passendes Mitglied gefunden für &ldquo;{f.name || f.absender}&rdquo;. Bitte prüfen Sie, ob das Mitglied angelegt ist und E-Mail/Name übereinstimmen.
                              </div>
                            );
                          }
                          return (
                            <div>
                              <div style={{ fontSize:"11px", color:"#555", marginBottom:"10px" }}>
                                Die Daten werden in die Akte von <strong>{passendesMitglied.name}, {passendesMitglied.vorname}</strong> übertragen.
                              </div>
                              <button
                                onClick={function() {
                                  var felder = eingangDatenTransferDialog.felder || {};
                                  var updates = {};

                                  // Stammdaten-Felder (Stammdaten-Fragebogen)
                                  if (felder.familienstand) updates.familienstand = felder.familienstand;
                                  if (felder.einkommenNetto) updates.einkommenNetto = parseFloat(felder.einkommenNetto);
                                  if (felder.mieteWarm) updates.mieteWarm = parseFloat(felder.mieteWarm);
                                  if (felder.mieteKalt) updates.mieteKalt = parseFloat(felder.mieteKalt);
                                  if (felder.heizkosten) updates.heizkosten = parseFloat(felder.heizkosten);
                                  if (felder.wohnungGroesse) updates.wohnungGroesse = parseFloat(felder.wohnungGroesse);
                                  if (felder.notizen) updates.notizen = felder.notizen;
                                  if (felder.titel) updates.titel = felder.titel;
                                  if (felder.beschaeftigungsart) updates.beschaeftigungsart = felder.beschaeftigungsart;
                                  if (felder.arbeitgeber) updates.arbeitgeber = felder.arbeitgeber;
                                  if (felder.einkommenBrutto) updates.einkommenBrutto = parseFloat(felder.einkommenBrutto);
                                  if (felder.steuerklasse) updates.steuerklasse = felder.steuerklasse;
                                  if (felder.trennungSeit) updates.trennungSeit = felder.trennungSeit;
                                  if (felder.gegenseiteVorname) updates.gegenseiteVorname = felder.gegenseiteVorname;
                                  if (felder.gegenseiteName) updates.gegenseiteName = felder.gegenseiteName;
                                  if (felder.hatKinder === "nein") { updates.alleinerziehend = false; updates.kinder = []; }
                                  if (felder.kinder && felder.kinder.length > 0) {
                                    updates.alleinerziehend = true;
                                    updates.kinder = felder.kinder.map(function(k) {
                                      var heute = new Date(); var geb = k.geburt ? new Date(k.geburt) : null;
                                      var alterJahre = geb ? Math.floor((heute-geb)/(365.25*24*3600*1000)) : 0;
                                      var alterGruppe = alterJahre>=18?"18+ J.":alterJahre>=12?"12-17 J.":alterJahre>=6?"6-11 J.":"0-5 J.";

                doc.setTextColor(0,0,0); y += 10;

                zeile("And. Elternteil", (k.epVorname||"") + " " + (k.epNachname||""));
                zeile("Anschrift And. ET", (k.epStrasse||"") + (k.epPlz?" · "+k.epPlz+" "+k.epOrt:""));

                // Kalender
                if(y > 250) { doc.addPage(); y = 15; }
                doc.setFillColor(230,240,251); doc.rect(margin, y, cw, 7, "F");
                doc.setFont("helvetica","bold"); doc.text("Kalender " + (k.kalenderjahr||""), margin+3, y+5);
                y += 9;
                var colW = cw/3;
                doc.setFontSize(8);
                doc.setFillColor(220,230,241);
                doc.rect(margin, y, colW, 6, "F"); doc.rect(margin+colW, y, colW, 6, "F"); doc.rect(margin+colW*2, y, colW, 6, "F");
                doc.setFont("helvetica","bold");
                doc.text("Monat", margin+2, y+4);
                doc.text("Antragsteller*in", margin+colW+2, y+4);
                doc.text("And. Elternteil", margin+colW*2+2, y+4);
                y += 7;
                doc.setFont("helvetica","normal");
                MONATE.forEach(function(m, mi) {
                  if(y > 275) { doc.addPage(); y = 15; }
                  var bg = mi%2===0 ? [248,250,252] : [255,255,255];
                  doc.setFillColor(bg[0],bg[1],bg[2]);
                  doc.rect(margin, y, cw, 5.5, "F");
                  doc.text(m, margin+2, y+4);
                  doc.text(String((k.kalender&&k.kalender.antragsteller&&k.kalender.antragsteller[mi])||"–"), margin+colW+2, y+4);
                  doc.text(String((k.kalender&&k.kalender.anderer&&k.kalender.anderer[mi])||"–"), margin+colW*2+2, y+4);
                  y += 5.5;
                });
                y += 3;

              // Unterschriften
              if(y > 230) { doc.addPage(); y = 15; }
              doc.setFillColor(106,27,154); doc.rect(margin, y, cw, 7, "F");
              doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
              doc.text("Unterschriften & Umgangsvereinbarung", margin+3, y+5);
              doc.setTextColor(0,0,0); y += 10;
              doc.setFontSize(8); doc.setFont("helvetica","normal");
              doc.text("Ort/Datum: " + (fd.ortDatum||"–"), margin, y); y += 10;
              // Unterschrift Antragsteller*in als Bild
              if(fd.sigAntragsteller) {

              }
              if(fd.sigAndererElternteil) {
                try {

                  doc.text("Unterschrift and. Elternteil:", margin, y); y += 3;

              // Footer
              doc.setFontSize(7); doc.setTextColor(150,150,150);
              doc.text("Erstellt mit ISUV Anspruchslotse · " + new Date().toLocaleDateString("de-DE"), margin, 290);
              doc.save("Anlage_TBG_" + (fd.antNachname||"").replace(/ /g,"_") + "_" + (fd.kinder&&fd.kinder[0]&&fd.kinder[0].kalenderjahr||new Date().getFullYear()) + ".pdf");
            };
            if(!window.jspdf) {

          // Unterschriften-Canvas Komponente
          var SignatureCanvas = function(props) {
            var canvasRef = useRef(null);
            var drawing = useRef(false);
            var lastPos = useRef(null);
            var getPos = function(canvas, evt) {
              var rect = canvas.getBoundingClientRect();
              var scaleX = canvas.width / rect.width;
              var scaleY = canvas.height / rect.height;
              var src = evt.touches ? evt.touches[0] : evt;
              return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
            };
            var startDraw = function(e) {
              e.preventDefault();
              drawing.current = true;
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              var pos = getPos(canvas, e);
              ctx.beginPath();
              ctx.moveTo(pos.x, pos.y);
              lastPos.current = pos;
            };
            var draw = function(e) {
              e.preventDefault();
              if(!drawing.current) return;
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              ctx.lineWidth = 2.5;
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.strokeStyle = "#003366";
              var pos = getPos(canvas, e);
              ctx.lineTo(pos.x, pos.y);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(pos.x, pos.y);
              lastPos.current = pos;
            };
            var stopDraw = function(e) {
              if(!drawing.current) return;
              drawing.current = false;
              var canvas = canvasRef.current;
              props.onChange(canvas.toDataURL());
            };
            var clear = function() {
              var canvas = canvasRef.current;
              var ctx = canvas.getContext("2d");
              ctx.clearRect(0,0,canvas.width,canvas.height);
              props.onChange("");
            };
            return (

                <div style={{ border:"2px solid #003366", borderRadius:"8px", backgroundColor:"#f9faff", position:"relative", overflow:"hidden", touchAction:"none" }}>
                  <canvas ref={canvasRef} width={560} height={100} style={{ width:"100%", height:"80px", display:"block", cursor:"crosshair", touchAction:"none" }}
                    onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}

                  {!props.value && <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#bbb", fontSize:"12px", pointerEvents:"none", textAlign:"center" }}>✍️ Hier unterschreiben</div>}

                </div>
                {props.value && <div style={{ fontSize:"10px", color:"#2e7d32", marginTop:"2px" }}>✅ Unterschrift vorhanden</div>}
              </div>
            );
          };

                </button>
                <button onClick={function(){ if(window.confirm("Formular komplett leeren?")) { setTbgFormDaten(function(p){ return Object.assign({}, p, { antNachname:"",antVorname:"",antStrasse:"",antPlz:"",antOrt:"",antGeburt:"",antBGNr:"",antTel:"",antMail:"",antAktenzeichen:"",ortDatum:"",datumISO:"",sigAntragsteller:"",sigAndererElternteil:"", kinder:[{kNachname:"",kVorname:"",kGeburt:"",epNachname:"",epVorname:"",epStrasse:"",epPlz:"",epOrt:"",epGeburt:"",aufteilungsWunsch:"",kalender:{antragsteller:Array(12).fill(""),anderer:Array(12).fill("")},kalenderjahr:String(new Date().getFullYear()),kgBerechtigt:"",kgWeiterleitung:"",kgBetrag:"",einkommenWeiterleitung:"",einkommenBetrag:"",sonstigeAngaben:""}] }); }); } }}
                  style={{ padding:"9px 10px", backgroundColor:"#ffebee", color:"#c62828", border:"1px solid #ef9a9a", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"12px", whiteSpace:"nowrap" }}>

              {/* ─── Kinder ─── */}
              {kinder.map(function(kind, idx) {

                        <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.aufteilungsWunsch==="paritaetisch"?"#003366":"#fff", flexShrink:0, marginTop:"1px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                          {kind.aufteilungsWunsch==="paritaetisch" && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"bold" }}>✓</span>}
                        </div>
                        <span><strong>Paritätisches Wechselmodell</strong> – annähernd hälftige Betreuung (13/17, 14/16, 15/15 Tage). Pauschaler halber Regelbedarf und halber Mehrbedarf für beide Elternteile.</span>
                      </label>
                      <label style={checkRow} onClick={function(){tbgKindUpd(idx,"aufteilungsWunsch","asymmetrisch");}}>

                    </div>

                      </div>
                      <label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"6px" }}>Kalenderjahr</label>

                        {MONATE.map(function(m, mi){
                          var tagM = parseInt((kal.antragsteller||[])[mi]||"0")||0;
                          var tagV = parseInt((kal.anderer||[])[mi]||"0")||0;
                          var ges  = tagM+tagV;
                          var warn = ges>0 && (ges < 28 || ges > 31);
                          return (
                            <React.Fragment key={m}>
                              <div style={{ fontSize:"12px", padding:"4px 6px", borderBottom:"1px solid #f0f0f0", display:"flex", alignItems:"center", gap:"4px" }}>
                                {m}
                                {warn && <span style={{ fontSize:"9px", color:"#e53935" }} title={"Summe "+ges+" Tage – prüfen"}>⚠️</span>}
                              </div>
                              <input type="number" min="0" max="31" style={{ ...fi2, textAlign:"center", padding:"4px" }} value={(kal.antragsteller||[])[mi]||""} onChange={function(e){tbgKalUpd(idx,"antragsteller",mi,e.target.value);}} placeholder="–" />
                              <input type="number" min="0" max="31" style={{ ...fi2, textAlign:"center", padding:"4px" }} value={(kal.anderer||[])[mi]||""} onChange={function(e){tbgKalUpd(idx,"anderer",mi,e.target.value);}} placeholder="–" />

                          );

                        <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnt}</div>
                        <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnd}</div>
