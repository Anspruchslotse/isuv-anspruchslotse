      + "<div class='sect'>Vermögen & Schulden</div>"
      + "<div class='row'><span class='label'>Gemeinsame Wohnung / Immobilie:</span><span class='val'>"+(daten.gemeinsame_wohnung==="ja"?"Ja, Wert: "+(daten.wohnung_wert||"?")+", Eigentümer: "+(daten.wohnung_eigentuemer||"?")+(daten.wohnung_kredit?" (Kredit: "+daten.wohnung_kredit+"€)":""):"Nein")+"</span></div>"
      + "<div class='row'><span class='label'>Gemeinsame Konten:</span><span class='val'>"+(daten.gemeinsame_konten==="ja"?"Ja, Guthaben: "+(daten.konten_guthaben||"?"):"Nein")+"</span></div>"
      + (daten.sonstige_vermoegenswerte ? "<div class='row'><span class='label'>Sonstige Vermögenswerte:</span><span class='val'>"+daten.sonstige_vermoegenswerte+"</span></div>" : "")
      + "<div class='row'><span class='label'>Gemeinsame Schulden:</span><span class='val'>"+(daten.schulden==="ja"?"Ja, "+daten.schulden_betrag+" € ("+daten.schulden_art+")":"Nein")+"</span></div>"
      + "<div class='sect'>Unterhalt</div>"
      + "<div class='row'><span class='label'>Ehegattenunterhalt:</span><span class='val'>"+(daten.ehegattenunterhalt_gewuenscht==="ja"?"Ja, "+(daten.unterhalt_art||"Art offen"):(daten.ehegattenunterhalt_gewuenscht==="nein"?"Nicht gewünscht":"Noch unklar"))+"</span></div>"
      + (daten.trennungsunterhalt_betrag ? "<div class='row'><span class='label'>Trennungsunterhalt (§ 1361 BGB):</span><span class='val'>"+daten.trennungsunterhalt_betrag+" €/Monat</span></div>" : "")
      + (daten.nachehelicher_betrag ? "<div class='row'><span class='label'>Nachehelicher Unterhalt (§ 1569 ff.):</span><span class='val'>"+daten.nachehelicher_betrag+" €/Monat</span></div>" : "")
      + "<div class='sect'>Sonstiges</div>"
      + "<div class='row'><span class='label'>Anwalt beauftragt:</span><span class='val'>"+(daten.anwalt_beauftragt==="ja"?"Ja":"Nein")+"</span></div>"
      + "<div class='row'><span class='label'>Interesse an Mediation:</span><span class='val'>"+(daten.mediation_interesse==="ja"?"Ja":"Nein")+"</span></div>"
      + (daten.besondere_umstaende ? "<div class='row'><span class='label'>Besondere Umstände:</span><span class='val'>"+daten.besondere_umstaende+"</span></div>" : "")
      + (daten.notizen ? "<div class='row'><span class='label'>Notizen:</span><span class='val'>"+daten.notizen+"</span></div>" : "")
      + "<p style='font-size:10px;color:#888;margin-top:24px;border-top:1px solid #eee;padding-top:8px'>Erstellt am " + new Date().toLocaleDateString("de-DE") + " · ISUV Anspruchslotse · Rechtsgrundlagen: §§ 1361, 1569 ff., 1626a, 1684 BGB, §§ 1 ff. VersAusglG</p>"
      + "<div class='noprint' style='margin-top:20px;text-align:center'><button onclick='window.print()' style='padding:10px 24px;background:#003366;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px'>Drucken / Als PDF speichern</button></div>"
      + "</body></html>";
    var w = window.open("","_blank","width=800,height=1000");
    w.document.write(html);
    w.document.close();
    setGedruckt(true);
    if (onSaveErgebnis) onSaveErgebnis({ typ:"Trennungs-/Scheidungsfragebogen", ergebnis:"Erstellt am "+new Date().toLocaleDateString("de-DE"), rechtsbereich:"Familienrecht", details:"Trennung: "+(daten.trennung_datum||"?") });
  };

  return (
    <div>
      <div style={u.modHeader}><span style={u.modIcon}>📄</span><div><div style={u.modTitle}>Trennungs-/Scheidungsfragebogen</div><div style={u.modSub}>Strukturierte Erfassung aller relevanten Daten für die Beratung</div></div></div>

      {/* Abschnitts-Navigation */}
      <div style={{ display:"flex", gap:"4px", marginBottom:"16px", flexWrap:"wrap" }}>
        {abschnitte.map(function(a,i){
          return <div key={i} onClick={function(){setAbschnitt(i);}}
            style={{ padding:"5px 10px", borderRadius:"6px", fontSize:"11px", fontWeight:"bold", cursor:"pointer",
              backgroundColor:abschnitt===i?"#003366":"#e8f0fb",
              color:abschnitt===i?"#fff":"#003366" }}>{a}</div>;
        })}
      </div>

      {abschnitt===0 && (
        <div>
          <div style={u.modSection}>👤 Person 1 (Ratsuchende/r)</div>
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Name</label><input style={u.input} value={daten.p1_name} onChange={function(e){set("p1_name",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Geburtsdatum</label><input type="date" style={u.input} value={daten.p1_geburt} onChange={function(e){set("p1_geburt",e.target.value);}} /></div>
          </div>
          <label style={u.label}>Anschrift</label>
          <input style={u.input} placeholder="Straße, PLZ Ort" value={daten.p1_anschrift} onChange={function(e){set("p1_anschrift",e.target.value);}} />
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Beruf</label><input style={u.input} value={daten.p1_beruf} onChange={function(e){set("p1_beruf",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Nettoeinkommen (€/Mo)</label><input type="number" style={u.input} value={daten.p1_einkommen} onChange={function(e){set("p1_einkommen",e.target.value);}} /></div>
          </div>
          <div style={u.modSection}>👤 Person 2 (Ehepartner/in)</div>
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Name</label><input style={u.input} value={daten.p2_name} onChange={function(e){set("p2_name",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Geburtsdatum</label><input type="date" style={u.input} value={daten.p2_geburt} onChange={function(e){set("p2_geburt",e.target.value);}} /></div>
          </div>
          <label style={u.label}>Anschrift</label>
          <input style={u.input} placeholder="Straße, PLZ Ort" value={daten.p2_anschrift} onChange={function(e){set("p2_anschrift",e.target.value);}} />
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Beruf</label><input style={u.input} value={daten.p2_beruf} onChange={function(e){set("p2_beruf",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Nettoeinkommen (€/Mo)</label><input type="number" style={u.input} value={daten.p2_einkommen} onChange={function(e){set("p2_einkommen",e.target.value);}} /></div>
          </div>
        </div>
      )}

      {abschnitt===1 && (
        <div>
          <div style={u.modSection}>💍 Ehe</div>
          <div style={{ display:"flex", gap:"8px" }}>
            <div style={{ flex:1 }}><label style={u.label}>Heiratsdatum</label><input type="date" style={u.input} value={daten.heirat_datum} onChange={function(e){set("heirat_datum",e.target.value);}} /></div>
            <div style={{ flex:1 }}><label style={u.label}>Heiratsort</label><input style={u.input} value={daten.heirat_ort} onChange={function(e){set("heirat_ort",e.target.value);}} /></div>
          </div>
          <div style={u.modSection}>💔 Trennung</div>
          <label style={u.label}>Trennungsdatum (§ 1567 BGB)</label>
          <input type="date" style={u.input} value={daten.trennung_datum} onChange={function(e){set("trennung_datum",e.target.value);}} />
          <label style={u.label}>Trennungsjahr (1 Jahr) bereits abgelaufen?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("trennungsjahr_abgelaufen",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.trennungsjahr_abgelaufen===o.v?"#003366":"#eee",
                  color:daten.trennungsjahr_abgelaufen===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Scheidung bereits beantragt?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("scheidung_beantragt",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.scheidung_beantragt===o.v?"#003366":"#eee",
                  color:daten.scheidung_beantragt===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Versorgungsausgleich gewünscht? (§ 1 ff. VersAusglG)</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"},{v:"unklar",l:"Noch unklar"}].map(function(o){
              return <div key={o.v} onClick={function(){set("versorgungsausgleich_gewuenscht",o.v);}}
                style={{ padding:"6px 12px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.versorgungsausgleich_gewuenscht===o.v?"#003366":"#eee",
                  color:daten.versorgungsausgleich_gewuenscht===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <div style={{ backgroundColor:"#e8f0fb", borderRadius:"6px", padding:"8px 10px", fontSize:"11px", color:"#003366" }}>
            ℹ️ Der Versorgungsausgleich (Rentenausgleich) wird im Scheidungsverfahren automatisch durchgeführt, sofern nicht beide Parteien auf ihn verzichten (§ 6 VersAusglG).
          </div>
        </div>
      )}

      {abschnitt===2 && (
        <div>
          <label style={u.label}>Gibt es gemeinsame Kinder?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("hat_kinder",o.v);}}
                style={{ padding:"7px 20px", borderRadius:"8px", cursor:"pointer", fontWeight:"bold",
                  backgroundColor:daten.hat_kinder===o.v?"#003366":"#eee",
                  color:daten.hat_kinder===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          {daten.hat_kinder==="ja" && (
            <div>
              {daten.kinder.map(function(k,idx){
                var upd=function(f,v){setDaten(function(p){var nk=p.kinder.map(function(x,i){return i===idx?Object.assign({},x,{[f]:v}):x;});return Object.assign({},p,{kinder:nk});});};
                return (
                  <div key={idx} style={{ backgroundColor:"#f0f7ff", borderRadius:"8px", padding:"10px", marginBottom:"8px", borderLeft:"3px solid #003366" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"6px" }}>
                      <strong style={{ fontSize:"12px" }}>Kind {idx+1}</strong>
                      <button onClick={function(){setDaten(function(p){return Object.assign({},p,{kinder:p.kinder.filter(function(_,i){return i!==idx;})});});}}
                        style={{ background:"none", border:"none", color:"#e53935", cursor:"pointer", fontSize:"16px" }}>×</button>
                    </div>
                    <div style={{ display:"flex", gap:"6px" }}>
                      <div style={{ flex:1 }}><label style={u.label}>Name</label><input style={u.input} value={k.name||""} onChange={function(e){upd("name",e.target.value);}} /></div>
                      <div style={{ flex:1 }}><label style={u.label}>Geburtsdatum</label><input type="date" style={u.input} value={k.geburt||""} onChange={function(e){upd("geburt",e.target.value);}} /></div>
                    </div>
                  </div>
                );
              })}
              <button onClick={function(){setDaten(function(p){return Object.assign({},p,{kinder:p.kinder.concat([{name:"",geburt:""}])});});}}
                style={{ width:"100%", padding:"6px", backgroundColor:"#e8f0fb", color:"#003366", border:"1px dashed #003366", borderRadius:"6px", cursor:"pointer", fontSize:"11px", marginBottom:"12px" }}>
                + Kind hinzufügen
              </button>
              <label style={u.label}>Betreuungsmodell</label>
              <select style={u.input} value={daten.kinder_betreuung} onChange={function(e){set("kinder_betreuung",e.target.value);}}>
                <option value="">– wählen –</option>
                <option value="Residenzmodell bei Mutter">Residenzmodell bei Mutter</option>
                <option value="Residenzmodell bei Vater">Residenzmodell bei Vater</option>
                <option value="Wechselmodell paritätisch">Wechselmodell (paritätisch)</option>
                <option value="Wechselmodell asymmetrisch">Wechselmodell (asymmetrisch)</option>
                <option value="Kein Umgang">Kein Umgang</option>
              </select>
              <label style={u.label}>Kindesunterhalt bereits geregelt?</label>
              <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
                {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
                  return <div key={o.v} onClick={function(){set("kinder_unterhalt_geregelt",o.v);}}
                    style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                      backgroundColor:daten.kinder_unterhalt_geregelt===o.v?"#003366":"#eee",
                      color:daten.kinder_unterhalt_geregelt===o.v?"#fff":"#333" }}>{o.l}</div>;
                })}
              </div>
              {daten.kinder_unterhalt_geregelt==="ja" && (
                <div><label style={u.label}>Unterhaltsbetrag (€/Monat)</label>
                <input type="number" style={u.input} value={daten.kinder_unterhalt_betrag} onChange={function(e){set("kinder_unterhalt_betrag",e.target.value);}} /></div>
              )}
            </div>
          )}
        </div>
      )}

      {abschnitt===3 && (
        <div>
          <div style={u.modSection}>🏠 Immobilien / Gemeinsame Wohnung</div>
          <label style={u.label}>Gemeinsame Wohnung oder Immobilie vorhanden?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("gemeinsame_wohnung",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.gemeinsame_wohnung===o.v?"#003366":"#eee",
                  color:daten.gemeinsame_wohnung===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          {daten.gemeinsame_wohnung==="ja" && (
            <div>
              <div style={{ display:"flex", gap:"8px" }}>
                <div style={{ flex:1 }}><label style={u.label}>Verkehrswert (€)</label><input type="number" style={u.input} value={daten.wohnung_wert} onChange={function(e){set("wohnung_wert",e.target.value);}} /></div>
                <div style={{ flex:1 }}><label style={u.label}>Noch offener Kredit (€)</label><input type="number" style={u.input} value={daten.wohnung_kredit} onChange={function(e){set("wohnung_kredit",e.target.value);}} /></div>
              </div>
              <label style={u.label}>Eigentümer</label>
              <select style={u.input} value={daten.wohnung_eigentuemer} onChange={function(e){set("wohnung_eigentuemer",e.target.value);}}>
                <option value="">– wählen –</option>
                <option value="beide gemeinsam">Beide gemeinsam</option>
                <option value="Person 1">Person 1 allein</option>
                <option value="Person 2">Person 2 allein</option>
              </select>
            </div>
          )}
          <div style={u.modSection}>🏦 Konten & Vermögen</div>
          <label style={u.label}>Gemeinsame Bankkonten?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("gemeinsame_konten",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.gemeinsame_konten===o.v?"#003366":"#eee",
                  color:daten.gemeinsame_konten===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          {daten.gemeinsame_konten==="ja" && (
            <div><label style={u.label}>Gesamtguthaben (€)</label><input type="number" style={u.input} value={daten.konten_guthaben} onChange={function(e){set("konten_guthaben",e.target.value);}} /></div>
          )}
          <label style={u.label}>Sonstige Vermögenswerte (Autos, Aktien, etc.)</label>
          <textarea style={Object.assign({},u.input,{height:"60px"})} value={daten.sonstige_vermoegenswerte} onChange={function(e){set("sonstige_vermoegenswerte",e.target.value);}} />
          <div style={u.modSection}>💳 Schulden</div>
          <label style={u.label}>Gemeinsame Schulden (außer Immobilienkredit)?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("schulden",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.schulden===o.v?"#003366":"#eee",
                  color:daten.schulden===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          {daten.schulden==="ja" && (
            <div style={{ display:"flex", gap:"8px" }}>
              <div style={{ flex:1 }}><label style={u.label}>Betrag (€)</label><input type="number" style={u.input} value={daten.schulden_betrag} onChange={function(e){set("schulden_betrag",e.target.value);}} /></div>
              <div style={{ flex:1 }}><label style={u.label}>Art der Schulden</label><input style={u.input} placeholder="z.B. Ratenkredit, Dispo" value={daten.schulden_art} onChange={function(e){set("schulden_art",e.target.value);}} /></div>
            </div>
          )}
        </div>
      )}

      {abschnitt===4 && (
        <div>
          <label style={u.label}>Ehegattenunterhalt gewünscht?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"},{v:"unklar",l:"Noch unklar"}].map(function(o){
              return <div key={o.v} onClick={function(){set("ehegattenunterhalt_gewuenscht",o.v);}}
                style={{ padding:"6px 12px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.ehegattenunterhalt_gewuenscht===o.v?"#003366":"#eee",
                  color:daten.ehegattenunterhalt_gewuenscht===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          {daten.ehegattenunterhalt_gewuenscht==="ja" && (
            <div>
              <label style={u.label}>Art des Unterhalts</label>
              <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"8px" }}>
                {["Trennungsunterhalt (§ 1361 BGB)","Nachehelicher Unterhalt (§ 1569 ff. BGB)","Beides"].map(function(v){
                  return <div key={v} onClick={function(){set("unterhalt_art",v);}}
                    style={{ padding:"5px 10px", borderRadius:"6px", cursor:"pointer", fontSize:"11px",
                      backgroundColor:daten.unterhalt_art===v?"#003366":"#eee",
                      color:daten.unterhalt_art===v?"#fff":"#333" }}>{v}</div>;
                })}
              </div>
              <div style={{ display:"flex", gap:"8px" }}>
                <div style={{ flex:1 }}><label style={u.label}>Trennungsunterhalt (€/Mo)</label><input type="number" style={u.input} value={daten.trennungsunterhalt_betrag} onChange={function(e){set("trennungsunterhalt_betrag",e.target.value);}} /></div>
                <div style={{ flex:1 }}><label style={u.label}>Nachehelicher Unterhalt (€/Mo)</label><input type="number" style={u.input} value={daten.nachehelicher_betrag} onChange={function(e){set("nachehelicher_betrag",e.target.value);}} /></div>
              </div>
            </div>
          )}
          <div style={{ backgroundColor:"#e8f0fb", borderRadius:"6px", padding:"8px 10px", marginTop:"8px", fontSize:"11px", color:"#003366" }}>
            ℹ️ <strong>§ 1361 BGB</strong> (Trennungsunterhalt): Während der Trennungszeit. <strong>§§ 1569 ff. BGB</strong> (Nachehelicher Unterhalt): Nach rechtskräftiger Scheidung, z.B. wegen Kinderbetreuung (§ 1570), Alter (§ 1571), Krankheit (§ 1572), Erwerbslosigkeit (§ 1573).
          </div>
        </div>
      )}

      {abschnitt===5 && (
        <div>
          <label style={u.label}>Anwalt/Anwältin beauftragt?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("anwalt_beauftragt",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.anwalt_beauftragt===o.v?"#003366":"#eee",
                  color:daten.anwalt_beauftragt===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Interesse an Mediation / außergerichtlicher Einigung?</label>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(function(o){
              return <div key={o.v} onClick={function(){set("mediation_interesse",o.v);}}
                style={{ padding:"6px 16px", borderRadius:"6px", cursor:"pointer", fontSize:"12px",
                  backgroundColor:daten.mediation_interesse===o.v?"#1b5e20":"#eee",
                  color:daten.mediation_interesse===o.v?"#fff":"#333" }}>{o.l}</div>;
            })}
          </div>
          <label style={u.label}>Besondere Umstände / Konflikte</label>
          <textarea style={Object.assign({},u.input,{height:"70px",resize:"vertical"})} placeholder="Häusliche Gewalt, Sucht, psychische Erkrankungen, laufende Gerichtsverfahren etc." value={daten.besondere_umstaende} onChange={function(e){set("besondere_umstaende",e.target.value);}} />
          <label style={u.label}>Weitere Notizen für die Beratung</label>
          <textarea style={Object.assign({},u.input,{height:"70px",resize:"vertical"})} value={daten.notizen} onChange={function(e){set("notizen",e.target.value);}} />

function BuergergeldRechnerCore({ ext, onSaveErgebnis, changedFields, changedDate }) {
  var u = rStyles;
  var REGEL = { allein:563, partner:506, k05:357, k613:390, k1417:471, k18:451 };
  function getKR(a) { var age=parseInt(a)||10; return age<6?REGEL.k05:age<14?REGEL.k613:age<18?REGEL.k1417:REGEL.k18; }
  function calcFB(b,hatK) { b=parseFloat(b)||0; if(b<=100)return b; var f=100; if(b>100)f+=(Math.min(b,1000)-100)*0.20; if(b>1000)f+=(Math.min(b,1200)-1000)*0.10; return Math.min(f,hatK?352:302); }
  var initK=(ext&&ext.kinder)?ext.kinder.map(function(k,i){var age=10;if(k.geburt){var d=new Date(k.geburt);age=Math.floor((new Date()-d)/(365.25*24*3600*1000));}return{id:i+1,name:k.name||("Kind "+(i+1)),alter:String(age),kg:"250",uvg:k.uvg?"ja":"nein"};}):[]; 
  const [schritt,setSchritt]=React.useState(1);
  const [hatPartner,setHatPartner]=React.useState(false);
  const [kinder,setKinder]=React.useState(initK);
  const [mbA,setMbA]=React.useState(false);const [mbS,setMbS]=React.useState(false);const [mbB,setMbB]=React.useState(false);
  const [einNetto,setEinNetto]=React.useState(ext?String(ext.einkommenNetto||""):"");
  const [einBrutto,setEinBrutto]=React.useState(ext?String(ext.einkommenBrutto||""):"");
  const [einPartner,setEinPartner]=React.useState("");
  const [alg1,setAlg1]=React.useState("");const [rente,setRente]=React.useState("");const [weitereEink,setWeitereEink]=React.useState("");const [vermoegen,setVermoegen]=React.useState("");
  const [fahrtkostenUmg,setFahrtkostenUmg]=React.useState(ext?String(ext.fahrtkostenUmgang||""):"");
  const [fahrtkostenKm,setFahrtkostenKm]=React.useState(ext?String(ext.fahrtkostenKm||""):"");
  const [fahrtkostenFahrten,setFahrtkostenFahrten]=React.useState(ext?String(ext.fahrtkostenFahrtenProMonat||""):"");
  const [showBgDetail,setShowBgDetail]=React.useState(false);
  const [mieteKalt,setMieteKalt]=React.useState(ext?String(ext.mieteKalt||""):"");
  const [nebenkosten,setNebenkosten]=React.useState(ext?String(ext.nebenkosten||""):"");
  const [heizkosten,setHeizkosten]=React.useState(ext?String(ext.heizkosten||""):"");
  const [result,setResult]=React.useState(null);
  function addK(){setKinder(function(p){return[...p,{id:Date.now(),name:"",alter:"10",kg:"250",uvg:"nein"}];});}
  function remK(id){setKinder(function(p){return p.filter(function(k){return k.id!==id;});});}
  function updK(id,f,v){setKinder(function(p){return p.map(function(k){return k.id===id?Object.assign({},k,{[f]:v}):k;});});}
  function berechne(){
    var rbH=hatPartner?REGEL.partner:REGEL.allein,rbP=hatPartner?REGEL.partner:0;
    var rbK=kinder.reduce(function(s,k){return s+getKR(k.alter);},0);
    var rb=rbH+rbP+rbK,mb=0,mbD=[];
    if(mbA&&kinder.length>0){var bA=Math.round(rbH*0.36);mb+=bA;mbD.push({l:"Mehrbedarf Alleinerziehend (36%)",b:bA});}
    // Fahrtkosten Umgang als Mehrbedarf § 21 VI SGB II
    var fkKm=parseFloat(fahrtkostenKm)||0,fkFahrten=parseFloat(fahrtkostenFahrten)||0;
    var fkMtl=parseFloat(fahrtkostenUmg)||0;
    if(fkKm>0&&fkFahrten>0){fkMtl=Math.max(fkMtl,fkKm*2*fkFahrten*0.20);}
    if(fkMtl>0){mb+=fkMtl;mbD.push({l:"Fahrtkosten Umgang § 21 VI SGB II",b:fkMtl});}
    if(mbS){var bS=Math.round(rbH*0.17);mb+=bS;mbD.push({l:"Mehrbedarf Schwangerschaft (17%)",b:bS});}
    if(mbB){var bB=Math.round(rbH*0.35);mb+=bB;mbD.push({l:"Mehrbedarf Schwerbehinderung (35%)",b:bB});}
    var kduK=parseFloat(mieteKalt)||0,kduN=parseFloat(nebenkosten)||0,kduH=parseFloat(heizkosten)||0,kdu=kduK+kduN+kduH;
    var bedarf=rb+mb+kdu;
    var netto=parseFloat(einNetto)||0,brutto=parseFloat(einBrutto)||netto;
    var fb=calcFB(brutto,kinder.length>0),einAnr=Math.max(0,netto-fb);
    var nP=parseFloat(einPartner)||0,pAnr=hatPartner?Math.max(0,nP-calcFB(nP,false)):0;
    var a1=parseFloat(alg1)||0,ren=parseFloat(rente)||0,we=parseFloat(weitereEink)||0;
    var kg=kinder.reduce(function(s,k){return s+(parseFloat(k.kg)||0);},0);
    var einGes=einAnr+pAnr+a1+ren+we+kg;
    var anspruch=Math.max(0,bedarf-einGes);
    var anzP=1+(hatPartner?1:0)+kinder.length,vFreig=anzP*15000,vB=parseFloat(vermoegen)||0;
    var res={rbH,rbP,rbK,rb,mb,mbD,kdu,bedarf,fb,einAnr,pAnr,a1,ren,we,kg,einGes,anspruch,kein:anspruch===0,vB,vFreig,vUeber:Math.max(0,vB-vFreig)};
    setResult(res);
    if(onSaveErgebnis)onSaveErgebnis({typ:"Buergergeld",ergebnis:anspruch===0?"Kein Anspruch":anspruch.toFixed(2)+" EUR/Monat",details:anzP+" Personen, Bedarf "+bedarf.toFixed(2)+" EUR"});
    setSchritt(4);
  }
  var inp={...u.input,marginBottom:"8px"};
  var sH={fontSize:"10px",fontWeight:"bold",color:"#003366",textTransform:"uppercase",backgroundColor:"#e8f0fb",borderRadius:"5px",padding:"5px 8px",marginBottom:"10px",letterSpacing:"0.5px"};

      </div>
      {schritt===1&&(<div>
        <div style={sH}>Bedarfsgemeinschaft</div>
        {[{v:false,l:"Alleinstehend / Alleinerziehend"},{v:true,l:"Mit Partner*in in BG"}].map(function(o){return <label key={String(o.v)} style={{display:"flex",gap:"8px",fontSize:"12px",cursor:"pointer",alignItems:"center",marginBottom:"8px"}}><input type="radio" checked={hatPartner===o.v} onChange={function(){setHatPartner(o.v);}} />{o.l}</label>;})}
        <label style={u.sectionLabel}>Kinder in der BG:</label>

            <input style={{...inp,marginBottom:"4px"}} placeholder="Name (optional)" value={k.name} onChange={function(e){updK(k.id,"name",e.target.value);}} />
            <div style={{display:"flex",gap:"8px"}}>
              <div style={{flex:1}}><label style={{fontSize:"10px",color:"#666"}}>Alter:</label><input type="number" style={inp} value={k.alter} onChange={function(e){updK(k.id,"alter",e.target.value);}} /></div>

            </div>
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>

            </div>
          </div>

        <button onClick={addK} style={{width:"100%",padding:"8px",backgroundColor:"#f0f4f7",border:"1px dashed #00afad",borderRadius:"8px",cursor:"pointer",fontSize:"12px",color:"#00afad",marginBottom:"10px"}}>+ Kind hinzufuegen</button>

        <div style={{ flex:1 }}><label style={u.sectionLabel}>Tage/Monat and. Elternteil:</label><input type="number" style={u.input} value={tbgTageB} onChange={e => setTbgTageB(e.target.value)} /></div>
      </div>
      <label style={u.sectionLabel}>Wer bezieht das Kindergeld?</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[{v:"antragsteller",l:"Antragsteller*in"},{v:"anderer",l:"And. Elternteil"}].map(x => (
          <div key={x.v} onClick={() => setTbgKgEmpf(x.v)} style={{ padding:"6px 12px", borderRadius:"8px", fontSize:"11px", cursor:"pointer", backgroundColor:tbgKgEmpf===x.v?"#003366":"#eee", color:tbgKgEmpf===x.v?"#fff":"#333" }}>{x.l}</div>
        ))}
      </div>
      <label style={u.sectionLabel}>Kindergeldbetrag (€/Monat):</label>
      <input type="number" style={u.input} value={tbgKgBetrag} onChange={e => setTbgKgBetrag(e.target.value)} />
      <button style={{...u.btnPrimary, opacity:tbgModell&&tbgKgEmpf?1:0.5}} disabled={!tbgModell||!tbgKgEmpf} onClick={berechneTBG}>Berechnen & In Akte speichern</button>
      {tbgResult && (
        <div style={u.resultBox}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
            <div style={u.compositionBox}>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"6px" }}>Antragsteller*in ({tbgResult.tageA} Tage)</div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>Regelbedarf Kind:</span><span>{tbgResult.regelA} €</span></div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>+ Mehrbedarf:</span><span>{tbgResult.mehrA} €</span></div>
              {parseFloat(tbgResult.kgA)>0 && <div style={u.calcStep}><span style={{fontSize:"11px"}}>– Kindergeld:</span><span>{tbgResult.kgA} €</span></div>}
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #003366",paddingTop:"4px",marginTop:"4px"}}><span>Netto-Anteil:</span><span>{tbgResult.nettoA} €</span></div>
            </div>
            <div style={u.compositionBox}>
              <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"6px" }}>And. Elternteil ({tbgResult.tageB} Tage)</div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>Regelbedarf Kind:</span><span>{tbgResult.regelB} €</span></div>
              <div style={u.calcStep}><span style={{fontSize:"11px"}}>+ Mehrbedarf:</span><span>{tbgResult.mehrB} €</span></div>
              <div style={{...u.calcStep,fontWeight:"bold",borderTop:"1px solid #003366",paddingTop:"4px",marginTop:"4px"}}><span>Gesamt:</span><span>{(parseFloat(tbgResult.regelB)+parseFloat(tbgResult.mehrB)).toFixed(2)} €</span></div>
            </div>
          </div>
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Ergebnis und neue Daten in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  if (rechner === "buergergeld") return (
    <BuergergeldRechner ext={ext} onSaveErgebnis={onSaveErgebnis} changedFields={changedFields} changedDate={changedDate} />
  );

  if (rechner === "wohngeld") return (
    <div>
      <h4 style={u.modTitle}>🏡 Wohngeld (WoGG)</h4>
      {(netto||mieteW) && <div style={u.infoBox}>✅ Einkommen und/oder Miete aus Akte vorausgefüllt.</div>}
      <label style={u.sectionLabel}>Nettoeinkommen (€/Monat):</label>
      <input type="number" style={u.input} value={wgNetto} onChange={e => setWgNetto(e.target.value)} />
      <label style={u.sectionLabel}>Bruttomiete warm (€/Monat):</label>
      <input type="number" style={u.input} value={wgMiete} onChange={e => setWgMiete(e.target.value)} />
      <div style={{ display:"flex", gap:"10px" }}>
        <div style={{ flex:1 }}>
          <label style={u.sectionLabel}>Haushaltsgröße:</label>
          <select style={u.input} value={wgHH} onChange={e => setWgHH(e.target.value)}>
            {["1","2","3","4","5"].map(n => <option key={n} value={n}>{n} {n==="1"?"Person":"Personen"}</option>)}
          </select>
        </div>
        <div style={{ flex:1 }}>
          <label style={u.sectionLabel}>Mietenstufe:</label>
          <select style={u.input} value={wgStufe} onChange={e => setWgStufe(e.target.value)}>
            {["1","2","3","4","5","6"].map(s => <option key={s} value={s}>Stufe {s}</option>)}
          </select>
        </div>
      </div>
      <label style={u.sectionLabel}>Unterhaltstitel vorhanden und gezahlt?</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
        {[{v:"ja",l:"Ja"},{v:"nein",l:"Nein"}].map(x => (
          <div key={x.v} onClick={() => setWgUTitel(x.v)} style={{ padding:"6px 14px", borderRadius:"8px", fontSize:"12px", cursor:"pointer", backgroundColor:wgUTitel===x.v?"#003366":"#eee", color:wgUTitel===x.v?"#fff":"#333" }}>{x.l}</div>
        ))}
      </div>
      {wgUTitel==="ja" && (
        <>
          <label style={u.sectionLabel}>Unterhaltsbetrag (€/Monat):</label>
          <input type="number" style={u.input} value={wgUnterhalt} onChange={e => setWgUnterhalt(e.target.value)} />
        </>
      )}
      <button style={u.btnPrimary} onClick={berechneWG}>Berechnen & In Akte speichern</button>
      {wgResult && (
        <div style={u.resultBox}>
          <div style={u.calcStep}><span>Nettoeinkommen:</span><span>{wgResult.n} €</span></div>
          {parseFloat(wgResult.uAbzug)>0 && <div style={u.calcStep}><span>– Unterhalt:</span><span>{wgResult.uAbzug} €</span></div>}
          <div style={u.calcStep}><span>Verfügbar:</span><span>{wgResult.verf} €</span></div>
          <div style={u.calcStep}><span>– Freibetrag:</span><span>{wgResult.frei} €</span></div>
          <div style={{...u.calcStep,borderTop:"1px solid #00afad",paddingTop:"4px",marginTop:"4px"}}><span>Anzurechnendes Einkommen:</span><span>{wgResult.anr} €</span></div>
          <div style={u.calcStep}><span>Anrechenbare Miete (max. {wgResult.hb} €):</span><span>{wgResult.mietAnr} €</span></div>
          {wgResult.kein
            ? <div style={{...u.warnung,marginTop:"8px"}}>⚠️ Kein Wohngeldanspruch. Ggf. Bürgergeld prüfen.</div>
            : <div style={u.compositionBox}><div style={{...u.resRow,fontWeight:"bold",fontSize:"16px",borderTop:"2px solid #003366",paddingTop:"4px"}}><span>Wohngeld ca.:</span><span>{wgResult.wohngeld} €/Monat</span></div></div>
          }
          <div style={{...u.infoBox,marginTop:"8px",color:"#0a4a0a",backgroundColor:"#e8f5e9",borderColor:"#a5d6a7"}}>✅ Neue Daten und Ergebnis in der Akte gespeichert.</div>
        </div>
      )}
    </div>
  );

  return <div style={{ color:"#999", fontSize:"12px" }}>Rechner nicht gefunden.</div>;
}



// =============================================
// PDF-EXPORT – Berechnungsergebnisse
// =============================================
function exportPDF(member, ergebnisse, beraterName, ext) {
  var jsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!jsPDF) { alert("PDF-Bibliothek nicht geladen. Bitte Seite neu laden."); return; }
  var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  var W = 210, H = 297;
  var margin = 16;
  var y = 0;

  // ── Kopfzeile ──
  doc.setFillColor(0, 51, 102);
  doc.rect(0, 0, W, 28, "F");
  doc.setFillColor(0, 175, 173);
  doc.rect(0, 28, W, 2, "F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("ISUV Anspruchslotse", margin, 11);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.setTextColor(180,210,240);
  doc.text("Beratungsergebnisse – vertraulich", margin, 18);
  var heute = new Date().toLocaleDateString("de-DE");
  doc.text("Erstellt:" + heute, W - margin, 18, {align:"right"});
  y = 38;

  // ── Mitglied ──
  doc.setFillColor(232, 240, 251);
  doc.roundedRect(margin, y, W - 2*margin, 22, 3, 3, "F");
  doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("Mitglied", margin+4, y+7);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(40,40,40);
  var nameStr = ((member.vorname||"") + " " + (member.name||"")).trim() || "Unbekannt";
  doc.text(nameStr, margin+4, y+14);
  var kontakt = [member.tel, member.mail, member.ort].filter(Boolean).join("  ·  ");
  if(kontakt) doc.text(kontakt, margin+4, y+20, {maxWidth: W-2*margin-8});
  y += 28;

  // ── Berater ──
  if(beraterName) {
    doc.setFontSize(8); doc.setTextColor(120,120,120);
    doc.text("Berater/in:" + beraterName, margin, y);
    y += 6;
  }

  // ── Stammdaten / Aktendaten ──
  if (ext) {
    // ext kann sein: { data: {...}, member: {...}, felder: [...] } (neu) oder direkt das ext-Objekt (alt)
    var extData = ext.data || ext;
    var extMember = ext.member || member;
    var felder = ext.felder; // null = alle, array = nur ausgewählte

    var has = function(id) { return !felder || felder.includes(id); };

    if(y > H - 60) { doc.addPage(); y = 20; }
    var stamFelder = [];

    // Mitgliedsnummer
    if(has("sd_mitgliedsnummer")) {
      var mnr = extMember.mitgliedsnummer || extData.mitgliedsnummer;
      if(mnr) stamFelder.push(["ISUV Mitgl.-Nr.", String(mnr)]);
    }
    // Name & Kontakt
    if(has("sd_name")) {
      if(extMember.tel) stamFelder.push(["Telefon", extMember.tel]);
      if(extMember.mail) stamFelder.push(["E-Mail", extMember.mail]);
    }
    // Adresse
    if(has("sd_adresse") && (extMember.strasse || extMember.plz || extMember.ort))
      stamFelder.push(["Adresse", [extMember.strasse, (extMember.plz||"") + " " + (extMember.ort||"")].filter(Boolean).join(", ")]);
    // Geburtsdatum
    if(has("sd_geburt") && (extMember.geburt || extData.geburtsdatum))
      stamFelder.push(["Geburtsdatum", extMember.geburt || extData.geburtsdatum]);
    // Familienstand
    if(has("sd_familienstand")) {
      if(extData.familienstand) stamFelder.push(["Familienstand", extData.familienstand]);
      if(extData.trennungSeit) stamFelder.push(["Getrennt seit", extData.trennungSeit]);
    }
    // Gegenseite
    if(has("sd_gegenseite") && (extData.gegenseiteVorname || extData.gegenseiteName))
      stamFelder.push(["Gegenseite", ((extData.gegenseiteVorname||"") + " " + (extData.gegenseiteName||"")).trim() + (extData.gegenseiteAdresse ? ", " + extData.gegenseiteAdresse : "")]);
    // Einkommen
    if(has("sd_einkommen")) {
      if(extData.einkommenNetto) stamFelder.push(["Nettoeinkommen", extData.einkommenNetto + " €/Monat"]);
      if(extData.einkommenBrutto) stamFelder.push(["Bruttoeinkommen", extData.einkommenBrutto + " €/Monat"]);
      if(extData.steuerklasse) stamFelder.push(["Steuerklasse", extData.steuerklasse]);
    }
    // Beschäftigung
    if(has("sd_beschaeftigung")) {
      if(extData.beschaeftigungsart || extData.einkommenArt) stamFelder.push(["Beschäftigung", extData.beschaeftigungsart || extData.einkommenArt]);
      if(extData.arbeitgeber) stamFelder.push(["Arbeitgeber", extData.arbeitgeber]);
    }
    // Wohnen
    if(has("sd_wohnen")) {
      if(extData.mieteKalt) stamFelder.push(["Kaltmiete", extData.mieteKalt + " €/Monat"]);
      if(extData.nebenkosten) stamFelder.push(["Nebenkosten", extData.nebenkosten + " €/Monat"]);
      if(extData.mieteWarm) stamFelder.push(["Warmmiete", extData.mieteWarm + " €/Monat"]);
      if(extData.heizkosten) stamFelder.push(["Heizkosten", extData.heizkosten + " €/Monat"]);
      if(extData.wohnungGroesse) stamFelder.push(["Wohnfläche", extData.wohnungGroesse + " m²"]);
    }
    // Kinder & anderer Elternteil
    if(has("sd_kinder") && Array.isArray(extData.kinder) && extData.kinder.length > 0) {
      if(extData.betreuungsmodell) stamFelder.push(["Betreuungsmodell", extData.betreuungsmodell]);
      extData.kinder.forEach(function(k, ki) {
        var kLabel = "Kind " + (ki+1) + (k.name ? " – " + k.name : "");
        var kVal = [k.geburt, k.wohnort].filter(Boolean).join(" · ");
        stamFelder.push([kLabel, kVal || "–"]);
        if(k.epVorname || k.epNachname)
          stamFelder.push(["  EP", ((k.epVorname||"") + " " + (k.epNachname||"")).trim() + (k.epStrasse ? ", " + k.epStrasse : "") + (k.epOrt ? " " + k.epOrt : "")]);
        if(k.epTel) stamFelder.push(["  EP Tel.", k.epTel]);
        if(k.epMail) stamFelder.push(["  EP Mail", k.epMail]);
        if(k.epEinkommen) stamFelder.push(["  EP Einkommen", k.epEinkommen + " €/Monat" + (k.epErwerbsstatus ? " (" + k.epErwerbsstatus + ")" : "")]);
        if(k.unterhaltsTitel==="ja" && k.unterhaltsTitelBetrag) stamFelder.push(["  Unterhaltstitel", k.unterhaltsTitelBetrag + " €/Monat"]);
        if(k.unterhaltGezahlt) stamFelder.push(["  Unterhalt gezahlt", k.unterhaltGezahlt]);
        if(k.unterhaltAusgefallenSeit) stamFelder.push(["  Ausgefallen seit", k.unterhaltAusgefallenSeit]);
      });
    }
    // Umgang / Fahrtkosten
    if(has("sd_umgang")) {
      if(extData.fahrtkostenKm && extData.fahrtkostenFahrtenProMonat)
        stamFelder.push(["Fahrtkosten Umgang", extData.fahrtkostenKm + " km · " + extData.fahrtkostenFahrtenProMonat + " Fahrten → " + ((parseFloat(extData.fahrtkostenKm)||0)*2*(parseFloat(extData.fahrtkostenFahrtenProMonat)||0)*0.20).toFixed(2) + " €/Monat"]);
    }
    // Kindergeld & UVG
    if(has("sd_kindergeld")) {
      if(extData.kindergeldBetrag) stamFelder.push(["Kindergeld", extData.kindergeldBetrag + " €/Monat"]);
      if(extData.kindergeldEmpf) stamFelder.push(["KG-Empfänger", extData.kindergeldEmpf]);
      if(extData.uvgBetrag > 0) stamFelder.push(["Unterhaltsvorschuss", extData.uvgBetrag + " €/Monat"]);
    }
    // Anwalt
    if(has("sd_anwalt") && (extData.anwaltName || extData.anwaltTel || extData.anwaltMail)) {
      if(extData.anwaltName) stamFelder.push(["Eigene/r Anwalt", extData.anwaltName]);
      if(extData.anwaltAdresse) stamFelder.push(["  Adresse", extData.anwaltAdresse]);
      if(extData.anwaltTel) stamFelder.push(["  Tel.", extData.anwaltTel]);
      if(extData.anwaltMail) stamFelder.push(["  Mail", extData.anwaltMail]);
    }
    if(has("sd_gegenseiteAnwalt") && (extData.gegenseiteAnwaltName || extData.gegenseiteAnwaltTel || extData.gegenseiteAnwaltMail)) {
      if(extData.gegenseiteAnwaltName) stamFelder.push(["Anwalt Gegenseite", extData.gegenseiteAnwaltName]);
      if(extData.gegenseiteAnwaltAdresse) stamFelder.push(["  Adresse", extData.gegenseiteAnwaltAdresse]);
      if(extData.gegenseiteAnwaltTel) stamFelder.push(["  Tel.", extData.gegenseiteAnwaltTel]);
      if(extData.gegenseiteAnwaltMail) stamFelder.push(["  Mail", extData.gegenseiteAnwaltMail]);
    }

    if(stamFelder.length === 0 && !extData.notizen) {
      // nichts ausgewählt
    } else {
      var sdH = 12 + stamFelder.length * 5.5 + (has("sd_notizen") && extData.notizen ? 12 : 0);
      if(y + sdH > H - 20) { doc.addPage(); y = 20; }
      doc.setFillColor(240, 244, 251);
      doc.roundedRect(margin, y, W-2*margin, sdH, 2, 2, "F");
      doc.setFillColor(0, 51, 102);
      doc.rect(margin, y, 3, sdH, "F");
      doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text("Stammdaten & Aktendaten", margin+6, y+7);
      var dy2 = y + 13;

      stamFelder.forEach(function(f) {
        if(dy2 > H-25) { doc.addPage(); dy2 = 20; }
        doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(100,100,100);
        doc.text(f[0] + ":", margin+6, dy2);
        doc.setTextColor(30,30,30); doc.setFont("helvetica","bold");
        doc.text(String(f[1]||""), margin+52, dy2, {maxWidth: W-margin-58});
        dy2 += 5.5;
      });

      if(has("sd_notizen") && extData.notizen) {
        if(dy2 > H-20) { doc.addPage(); dy2 = 20; }
        doc.setFont("helvetica","italic"); doc.setFontSize(7.5); doc.setTextColor(80,80,80);
        doc.text("Notizen:" + extData.notizen, margin+6, dy2+2, {maxWidth: W-2*margin-10});
        dy2 += 10;
      }
      y = dy2 + 6;
    }
  }

  // Hilfsfunktion: Emojis entfernen (jsPDF kann sie nicht rendern)
  function stripEmoji(str) {
    var s = String(str || "");
    var result = "";
    for (var i = 0; i < s.length; i++) {
      var code = s.codePointAt(i);
      if (code > 0xFFFF) { i++; continue; } // skip surrogate pairs (emoji)
      if ((code >= 0x2600 && code <= 0x27FF) ||
          (code >= 0x2B00 && code <= 0x2BFF) ||
          (code >= 0xFE00 && code <= 0xFEFF)) continue;
      result += s[i];
    }
    return result.replace(/\s+/g," ").trim();
  }

  // ── Ergebnisse ──
  var alle = [...ergebnisse].reverse();
  alle.forEach(function(e, i) {

    var rechtsbereich = e.rechtsbereich || "";
    var bgR = rechtsbereich === "Familienrecht" ? [232,240,251] : rechtsbereich === "Sozialrecht" ? [232,245,233] : [249,249,249];
    var borderR = rechtsbereich === "Familienrecht" ? [0,51,102] : [0,175,173];

    // Kartenhöhe berechnen
    var numSchritte = (e.detailSchritte && e.detailSchritte.length) ? e.detailSchritte.length : 0;
    var detailLines = (e.details ? 1 : 0) + (numSchritte > 0 ? numSchritte + 1 : 0) + (e.rechtsgrundlagen ? 1 : 0);
    var cardH = 28 + detailLines * 5.5;

    // Seitenumbruch VOR der Karte
    if(y + cardH > H - 15) { doc.addPage(); y = 20; }

    // Hintergrund der Karte (FillColor vor jedem Rect zurücksetzen!)
    doc.setFillColor(bgR[0], bgR[1], bgR[2]);
    doc.roundedRect(margin, y, W-2*margin, cardH, 2, 2, "F");

    // Rahmen
    doc.setDrawColor(borderR[0], borderR[1], borderR[2]);
    doc.setLineWidth(0.4);
    doc.roundedRect(margin, y, W-2*margin, cardH, 2, 2, "S");

    // Linker farbiger Balken
    doc.setFillColor(borderR[0], borderR[1], borderR[2]);
    doc.rect(margin, y, 3, cardH, "F");

    // Typ (Emoji entfernt)
    var typText = stripEmoji(e.typ || "Berechnung");
    doc.setTextColor(0,51,102); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(typText, margin+6, y+7);

    // Datum
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(150,150,150);
    doc.text(e.datum || "", W-margin-2, y+7, {align:"right"});

    // Rechtsbereich-Badge
    if(rechtsbereich) {
      doc.setFillColor(borderR[0], borderR[1], borderR[2]);
      doc.roundedRect(margin+6, y+9, rechtsbereich.length*2.3+4, 5, 1.5, 1.5, "F");
      doc.setTextColor(255,255,255); doc.setFontSize(6.5); doc.setFont("helvetica","normal");
      doc.text(rechtsbereich, margin+8, y+13);
    }

    // Ergebnis
    doc.setTextColor(0,140,138); doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text(stripEmoji(e.ergebnis || ""), margin+6, y+22);

    // Details Kurztext
    var dy = y + 28;
    if(e.details) {
      doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(90,90,90);
      doc.text(stripEmoji(e.details), margin+6, dy, {maxWidth: W-2*margin-10});
      dy += 5.5;
    }

    // Rechenweg
    if(e.detailSchritte && e.detailSchritte.length > 0) {
      doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(0,51,102);
      doc.text("Rechenweg:", margin+6, dy);
      dy += 5.5;
      e.detailSchritte.forEach(function(s) {
        if(dy > H-20) { doc.addPage(); dy = 20; }
        var label = stripEmoji(s.label || s[0] || "");
        var wert  = stripEmoji(s.wert  || s[1] || "");
        if(s.bold) {
          // Trennlinie VOR dem Ergebnis
          doc.setDrawColor(0,175,173); doc.setLineWidth(0.25);
          doc.line(margin+8, dy-2, W-margin-4, dy-2);
          doc.setFont("helvetica","bold"); doc.setTextColor(0,51,102);
        } else {
          doc.setFont("helvetica","normal"); doc.setTextColor(70,70,70);
        }
        doc.setFontSize(7.5);
        doc.text(label, margin+8, dy);
        doc.text(wert, W-margin-4, dy, {align:"right"});
        dy += 5.5;
      });
    }

    // Rechtsgrundlagen
    if(e.rechtsgrundlagen) {
      if(dy > H-15) { doc.addPage(); dy = 20; }
      doc.setFont("helvetica","italic"); doc.setFontSize(6.5); doc.setTextColor(150,150,150);
      var rgText = Array.isArray(e.rechtsgrundlagen) ? e.rechtsgrundlagen.join(" · ") : String(e.rechtsgrundlagen);
      doc.text("Rechtsgrundlagen:" + rgText, margin+6, dy, {maxWidth: W-2*margin-10});
      dy += 4;
    }

    y = dy + 8;
  });

  // ── Fußzeile letzte Seite ──
  var pageCount = doc.getNumberOfPages();
  for(var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFillColor(0,51,102);
    doc.rect(0, H-10, W, 10, "F");
    doc.setTextColor(180,210,240); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text("ISUV Anspruchslotse  ·  Vertraulich  ·  Nur für interne Beratungszwecke", W/2, H-4, {align:"center"});
    doc.setTextColor(255,255,255);
    doc.text("Seite" + p + " / " + pageCount, W-margin, H-4, {align:"right"});
  }

  // Speichern
  var filename = "ISUV_" + (nameStr.replace(/\s+/g,"_")) + "_Berechnungen_" + heute.replace(/\./g,"-") + ".pdf";
  doc.save(filename);
}


// =============================================
// KINDERZUSCHLAG-RECHNER (§ 6a BKGG) – 2024/2025
// =============================================
function KinderzuschlagRechner({ ext, onSaveErgebnis }) {
  var u = rStyles;
  // Kinderzuschlag 2025: max 292 € je Kind (ab 01.01.2025)
  // 2024: 292 €, Mindestbruttogrenze: Alleinerziehend 645 €, Paar 955 €
  var KZG_MAX = 292;
  var KINDERGELD = 250;
  var REGELBEDARF_ALLEIN = 563;

  const [personen, setPersonen] = React.useState("allein"); // allein | paar
  const [kinder, setKinder] = React.useState([{id:1, alter:"8"}]);
  const [bruttoEinkommen, setBruttoEinkommen] = React.useState("");
  const [nettoEinkommen, setNettoEinkommen] = React.useState("");
  const [unterhalt, setUnterhalt] = React.useState("");
  const [wohngeld, setWohngeld] = React.useState("");
  const [kindergeldBezieher, setKindergeldBezieher] = React.useState("ich");
  const [result, setResult] = React.useState(null);
  const [showDetail, setShowDetail] = React.useState(false);

  function addKind() {
    setKinder(function(k){ return k.concat([{id:Date.now(), alter:"8"}]); });
  }
  function removeKind(id) {
    setKinder(function(k){ return k.filter(function(c){ return c.id!==id; }); });
  }
  function setKindAlter(id, val) {
    setKinder(function(k){ return k.map(function(c){ return c.id===id ? {...c, alter:val} : c; }); });
  }

  function berechne() {
    var brutto = parseFloat(bruttoEinkommen)||0;
    var netto  = parseFloat(nettoEinkommen)||0;
    var unt    = parseFloat(unterhalt)||0;
    var wg     = parseFloat(wohngeld)||0;
    var anzK   = kinder.length;

    // Mindesteinkommensgrenze
    var minBrutto = personen === "allein" ? 645 : 955;
    // Höchsteinkommensgrenze: Grundbedarf + KdK + KZG_MAX * anzK
    var bedarfEltern = personen === "allein" ? REGELBEDARF_ALLEIN : 1125; // § 20 SGB II Paar
    var kdk = anzK * 357; // Kinderbedarf SGB II (Ø Grundbedarf Kind)
    var maxBrutto = bedarfEltern + kdk + KZG_MAX * anzK;

    var mindestGrenze = brutto >= minBrutto;
    var hoechstGrenze = netto <= maxBrutto;

    // KZG-Berechnung
    // Elterneinkommen das anrechenbar ist: netto + Unterhalt + Wohngeld - Elterneigenbedarf
    var eigenbedarf = personen === "allein" ? REGELBEDARF_ALLEIN : 1125;
    var anrechenbaresEink = Math.max(0, netto + unt - eigenbedarf - wg);
    // KZG je Kind: max KZG_MAX, Minderung um 45% des übersteigenden Einkommens
    var kzgJeKind = Math.max(0, KZG_MAX - anrechenbaresEink * 0.45 / anzK);
    kzgJeKind = Math.min(kzgJeKind, KZG_MAX);
    var kzgGesamt = kzgJeKind * anzK;

    // Zusammenspiel mit Bürgergeld: KZG + Kindergeld deckt Kindesbedarf?
    var kgGesamt = kindergeldBezieher === "ich" ? KINDERGELD * anzK : 0;
    var gesamtFamLeistung = kzgGesamt + kgGesamt + wg;
    var buergergeldBesser = !mindestGrenze || kzgGesamt < 10;

    var detailSchritte = [
      { label:"Anzahl Kinder", wert: anzK + " Kind(er)" },
      { label:"Haushalt", wert: personen === "allein" ? "Alleinerziehend" : "Paar" },
      { label:"Brutto-Einkommen", wert: brutto.toFixed(2) + " €" },
      { label:"Netto-Einkommen", wert: netto.toFixed(2) + " €" },
      { label:"Mindesteinkommensgrenze", wert: minBrutto + " € " + (mindestGrenze?"✅ erfüllt":"❌ nicht erfüllt") },
      { label:"Elterneigenbedarf", wert: eigenbedarf.toFixed(0) + " €" },
      { label:"Anrechenbares Einkommen", wert: anrechenbaresEink.toFixed(2) + " €" },
      { label:"KZG je Kind (max " + KZG_MAX + " €)", wert: kzgJeKind.toFixed(2) + " €" },
      { label:"Kindergeld gesamt", wert: kgGesamt.toFixed(0) + " €" },
      { label:"KZG + Kindergeld gesamt", wert: (kzgGesamt + kgGesamt).toFixed(2) + " €" },
    ];

    setResult({ kzgJeKind, kzgGesamt, kgGesamt, gesamtFamLeistung,
      mindestGrenze, hoechstGrenze, buergergeldBesser,
      anrechenbaresEink, detailSchritte, anzK, brutto, minBrutto });

    if(onSaveErgebnis && (mindestGrenze && kzgGesamt > 0)) {
      onSaveErgebnis({
        typ: "Kinderzuschlag (§ 6a BKGG)",
        rechtsbereich: "Sozialrecht",
        ergebnis: kzgGesamt.toFixed(0) + " €/Monat (" + anzK + " Kind" + (anzK>1?"er":"") + ")",
        details: "KZG " + kzgJeKind.toFixed(0) + " €/Kind" + (kindergeldBezieher==="ich" ? " + KG " + KINDERGELD + " € = " + (kzgJeKind+KINDERGELD).toFixed(0) + " €/Kind" : " (ohne KG – anderer Elternteil)"),
        detailSchritte,
        rechtsgrundlagen: ["§ 6a BKGG", "§ 6b BKGG", "§ 20 SGB II"]
      });
    }
  }

  return (
    <div>
      <h4 style={u.modTitle}>👶 Kinderzuschlag-Rechner</h4>
      <InfoBox typ="recht" titel="§ 6a BKGG – Kinderzuschlag 2025"
        kinder={<span>Max. <strong>292 €/Monat je Kind</strong> zusätzlich zum Kindergeld (250 €). Ziel: Familien knapp über Bürgergeld-Grenze aus dem SGB-II-Bezug herausholen. Mindestbrutto: <strong>645 € (Allein) / 955 € (Paar)</strong>.</span>} />

      <label style={u.sectionLabel}>Haushalt:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[["allein","👤 Alleinerziehend"],["paar","👫 Paar"]].map(function([v,l]){
          return (
            <button key={v} onClick={function(){setPersonen(v); setResult(null);}}
              style={{ flex:1, padding:"9px", borderRadius:"8px", border:"2px solid "+(personen===v?"#003366":"#ddd"),
                backgroundColor:personen===v?"#e8f0fb":"#f9f9f9", fontWeight:personen===v?"bold":"normal",
                cursor:"pointer", fontSize:"12px" }}>
              {l}
            </button>
          );
        })}
      </div>

      <label style={u.sectionLabel}>Kinder:</label>
      {kinder.map(function(k){
        return (
          <div key={k.id} style={{ display:"flex", gap:"8px", alignItems:"center", marginBottom:"6px" }}>
            <span style={{ fontSize:"11px", color:"#666", whiteSpace:"nowrap" }}>Kind {kinder.indexOf(k)+1}, Alter:</span>
            <input type="number" min="0" max="24" style={{ ...u.inputMini, width:"60px" }}
              value={k.alter} onChange={function(e){ setKindAlter(k.id, e.target.value); }} />
            <span style={{ fontSize:"9px", color:"#999" }}>Jahre</span>
            {kinder.length > 1 && (
              <button onClick={function(){ removeKind(k.id); }} style={u.btnDel}>✕</button>
            )}
          </div>
        );
      })}
      {kinder.length < 5 && (
        <button onClick={addKind} style={{ ...u.btnAdd, marginBottom:"10px" }}>+ Kind hinzufügen</button>
      )}

      <label style={u.sectionLabel}>Kindergeld-Bezug:</label>
      <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
        {[["ich","✅ Ich beziehe Kindergeld"],["anderer","❌ Anderer Elternteil bezieht es"]].map(function([v,l]){
          return (
            <button key={v} onClick={function(){ setKindergeldBezieher(v); setResult(null); }}
              style={{ flex:1, padding:"9px", borderRadius:"8px", border:"2px solid "+(kindergeldBezieher===v?"#003366":"#ddd"),
                backgroundColor:kindergeldBezieher===v?"#e8f0fb":"#f9f9f9", fontWeight:kindergeldBezieher===v?"bold":"normal",
                cursor:"pointer", fontSize:"11px" }}>
              {l}
            </button>
          );
        })}
      </div>
      {kindergeldBezieher==="anderer" && (
        <InfoBox typ="warnung" titel="§ 64 EStG – Kindergeld beim betreuenden Elternteil"
          kinder={<span>Kindergeld wird an den betreuenden Elternteil ausgezahlt. Kein Kindergeld wird für diese Berechnung berücksichtigt.</span>} />
      )}

      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Brutto-Einkommen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 1800"
            value={bruttoEinkommen} onChange={function(e){ setBruttoEinkommen(e.target.value); setResult(null); }} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Netto-Einkommen (€/Monat):</label>
          <input type="number" style={u.input} placeholder="z.B. 1350"
            value={nettoEinkommen} onChange={function(e){ setNettoEinkommen(e.target.value); setResult(null); }} />
        </div>
      </div>
      <div style={u.row}>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Unterhalt erhalten (€/Monat):</label>
          <input type="number" style={u.input} placeholder="0"
            value={unterhalt} onChange={function(e){ setUnterhalt(e.target.value); setResult(null); }} />
        </div>
        <div style={{flex:1}}>
          <label style={u.sectionLabel}>Wohngeld (€/Monat, falls vorhanden):</label>
          <input type="number" style={u.input} placeholder="0"
            value={wohngeld} onChange={function(e){ setWohngeld(e.target.value); setResult(null); }} />
        </div>
      </div>

      <button style={u.btnPrimary} onClick={berechne}>👶 Kinderzuschlag berechnen</button>

      {result && (
        <div style={u.resultBox}>
          {!result.mindestGrenze && (
            <InfoBox typ="warnung" titel={"Mindesteinkommensgrenze nicht erreicht"}
              kinder={<span>Brutto-Einkommen {result.brutto.toFixed(0)} € &lt; {result.minBrutto} € Mindestgrenze. Kein Kinderzuschlag möglich. Bürgergeld (SGB II) prüfen.</span>} />
          )}
          {result.mindestGrenze && result.kzgGesamt < 10 && (
            <InfoBox typ="warnung" titel="Kein Kinderzuschlag"
              kinder={<span>Einkommen zu hoch – KZG wird auf 0 € reduziert. Kein Anspruch.</span>} />
          )}
          {result.mindestGrenze && result.kzgGesamt >= 10 && (
            <div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"10px" }}>
                <div style={{ backgroundColor:"#e8f0fb", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
                  <div style={{ fontSize:"10px", color:"#003366" }}>KZG je Kind</div>
                  <div style={{ fontSize:"18px", fontWeight:"bold", color:"#003366" }}>{result.kzgJeKind.toFixed(0)} €</div>
                  <div style={{ fontSize:"9px", color:"#666" }}>max. {KZG_MAX} €</div>
                </div>
                <div style={{ backgroundColor:"#e8f5e9", borderRadius:"8px", padding:"10px", textAlign:"center" }}>
                  <div style={{ fontSize:"10px", color:"#1b5e20" }}>KZG gesamt + KG</div>
                  <div style={{ fontSize:"18px", fontWeight:"bold", color:"#1b5e20" }}>{(result.kzgGesamt+result.kgGesamt).toFixed(0)} €/Monat</div>
                  <div style={{ fontSize:"9px", color:"#666" }}>{result.anzK} Kind(er) × {(result.kzgJeKind+KINDERGELD).toFixed(0)} €</div>
                </div>
              </div>
              <InfoBox typ="positiv" titel={null}
                kinder={<span>KZG <strong>{result.kzgGesamt.toFixed(0)} €</strong> + Kindergeld <strong>{result.kgGesamt.toFixed(0)} €</strong> = <strong>{result.gesamtFamLeistung.toFixed(0)} €</strong> Familienleistung gesamt (inkl. {parseFloat(wohngeld)||0} € Wohngeld).</span>} />
              <InfoBox typ="empf" titel="Tipp: Wohngeld-Plus prüfen"
                kinder={<span>Kinderzuschlag + Wohngeld kombinierbar! § 6b BKGG erlaubt Bezug von KZG und Wohngeld gleichzeitig – prüfen ob Wohngeldrechner einen Anspruch zeigt.</span>} />
            </div>
          )}
          {result.buergergeldBesser && result.mindestGrenze && (
            <InfoBox typ="warnung" titel="Bürgergeld möglicherweise günstiger"
              kinder={<span>Bei sehr niedrigem KZG kann SGB II (Bürgergeld) vorteilhafter sein – Vergleichsrechnung empfohlen.</span>} />
          )}

          <details open={showDetail} onToggle={function(e){ setShowDetail(e.target.open); }}>
            <summary style={{ fontSize:"10px", cursor:"pointer", color:"#003366", fontWeight:"bold", marginTop:"8px" }}>▶ Detailrechnung anzeigen</summary>
            <div style={{ backgroundColor:"#fff", border:"1px solid #ddd", borderRadius:"6px", padding:"8px", marginTop:"6px" }}>
              {result.detailSchritte.map(function(s,i){
                return (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:"11px", borderBottom:"1px solid #f5f5f5", padding:"3px 0" }}>
                    <span style={{ color:"#666" }}>{s.label}</span>
                    <span style={{ fontWeight:"bold" }}>{s.wert}</span>
                  </div>
                );
              })}
              <div style={{ fontSize:"9px", color:"#999", marginTop:"6px" }}>
                Rechtsgrundlagen: § 6a BKGG · § 6b BKGG · § 20 SGB II · Stand 01.01.2025
              </div>
            </div>
          </details>
        </div>
      )}
    </div>
  );
}

function SigPadModal({ onSave, onClose }) {
  var canvasRef = React.useRef(null);
  var drawing = React.useRef(false);
  var lastPos = React.useRef(null);
  var getPos = function(canvas, evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var src = evt.touches ? evt.touches[0] : evt;
    return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
  };
  var startDraw = function(e) { e.preventDefault(); drawing.current = true; var cv = canvasRef.current; if (cv) lastPos.current = getPos(cv, e.nativeEvent||e); };
  var draw = function(e) {
    e.preventDefault(); if (!drawing.current) return;
    var cv = canvasRef.current; if (!cv) return;
    var ctx = cv.getContext("2d");
    var pos = getPos(cv, e.nativeEvent||e);
    ctx.beginPath(); ctx.strokeStyle = "#003366"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  var stopDraw = function(e) { if (e) e.preventDefault(); drawing.current = false; };
  var clear = function() { var cv = canvasRef.current; if (cv) cv.getContext("2d").clearRect(0,0,cv.width,cv.height); };
  var save = function() { var cv = canvasRef.current; if (cv) onSave(cv.toDataURL("image/png")); };
  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.6)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>

        <div style={{ fontWeight:"bold", fontSize:"14px", color:"#003366", marginBottom:"6px" }}>✍️ Unterschrift des Antragstellers</div>
        <div style={{ fontSize:"11px", color:"#666", marginBottom:"12px" }}>Mit Finger oder Maus im Feld unterschreiben:</div>
        <canvas ref={canvasRef} width={560} height={160}
          style={{ border:"2px solid #003366", borderRadius:"8px", width:"100%", height:"120px", touchAction:"none", backgroundColor:"#fafcff", display:"block" }}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
        />
        <div style={{ display:"flex", gap:"8px", marginTop:"12px" }}>
          <button onClick={clear} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>🗑️ Löschen</button>

          <button onClick={save} style={{ flex:2, padding:"10px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>✅ Übernehmen</button>
        </div>
      </div>
    </div>
  );
}


// ── SignatureCanvas – top-level component for tbg_form ──
var TBGSignatureCanvas = React.memo(function TBGSignatureCanvas(props) {
  var canvasRef = React.useRef(null);
  var drawing = React.useRef(false);
  var lastPos = React.useRef(null);

  // Restore signature image onto canvas when value changes externally
  React.useEffect(function() {
    var canvas = canvasRef.current;
    if (!canvas) return;
    var ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (props.value) {
      var img = new Image();
      img.onload = function() { ctx.drawImage(img, 0, 0); };
      img.src = props.value;
    }
  }, [props.value]);

  var getPos = function(canvas, evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var src = evt.touches ? evt.touches[0] : evt;
    return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
  };
  var startDraw = function(e) {
    e.preventDefault();
    drawing.current = true;
    var canvas = canvasRef.current;
    var ctx = canvas.getContext("2d");
    var pos = getPos(canvas, e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    lastPos.current = pos;
  };
  var draw = function(e) {
    e.preventDefault();
    if(!drawing.current) return;
    var canvas = canvasRef.current;
    var ctx = canvas.getContext("2d");
    ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#003366";
    var pos = getPos(canvas, e);
    ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
    lastPos.current = pos;
  };
  var stopDraw = function(e) {
    if(!drawing.current) return;
    drawing.current = false;
    var canvas = canvasRef.current;
    props.onChange(canvas.toDataURL());
  };
  var clear = function() {
    var canvas = canvasRef.current;
    canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
    props.onChange("");
  };
  return (
    <div style={{ marginBottom:"8px" }}>
      <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginBottom:"4px" }}>{props.label}</div>
      <div style={{ border:"2px solid #003366", borderRadius:"8px", backgroundColor:"#f9faff", position:"relative", overflow:"hidden", touchAction:"none" }}>
        <canvas ref={canvasRef} width={560} height={100} style={{ width:"100%", height:"80px", display:"block", cursor:"crosshair", touchAction:"none" }}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw} />
        {!props.value && <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#bbb", fontSize:"12px", pointerEvents:"none", textAlign:"center" }}>✍️ Hier unterschreiben</div>}
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"3px" }}>
        <div style={{ fontSize:"10px", color:"#888" }}>Mit Finger oder Maus unterschreiben</div>
        <button onClick={clear} style={{ fontSize:"10px", color:"#e53935", background:"none", border:"1px solid #e53935", borderRadius:"4px", padding:"2px 8px", cursor:"pointer" }}>✕ Löschen</button>
      </div>
      {props.value && <div style={{ fontSize:"10px", color:"#2e7d32", marginTop:"2px" }}>✅ Unterschrift vorhanden</div>}
    </div>
  );
});

        });

      // Versionshistorie: Änderung mit Zeitstempel speichern
      var jetzt=new Date().toLocaleString("de-DE");
      var eintrag={datum:jetzt,quelle:"Fragebogen: "+f.typ,felder:Object.keys(upd).filter(function(k){return k.charAt(0)!=="_";}).concat(Object.keys(mUpd))};
      upd._historie=((memberExtrasRef.current[match.id]||{})._historie||[]).concat([eintrag]).slice(-20);
      if(Object.keys(upd).filter(function(k){return k!=="id"&&k.charAt(0)!=="_";}).length>0){
        upd._letzteAenderung={datum:new Date().toLocaleDateString("de-DE"),felder:Object.keys(upd).filter(function(k){return k.charAt(0)!=="_";})};
      }
      if(Object.keys(upd).length>0){
        setMemberExtras(function(prev){var n=Object.assign({},prev);n[match.id]=Object.assign({},prev[match.id]||{},upd);return n;});
      }
      setAusgangFormulare(function(prev){return prev.map(function(af){
        if(af.mitglied===(match.vorname+" "+match.name)&&af.status==="unbeantwortet")return Object.assign({},af,{status:"beantwortet"});
        return af;
      });});
      // BUGFIX: ID als transferriert markieren damit Polling nicht erneut überträgt
      setTransferrierteIds(function(prev){
        var next=new Set(prev); next.add(f.id);
        try{localStorage.setItem("isuv_transfer_ids",JSON.stringify([...next].slice(-200)));}catch(e){}
        return next;
      });
    });
  };

  const sbLadeEingaenge = async () => {
    if (!sbReady()) return;
    try {
      const res = await fetch(loginDaten.supabaseUrl + "/formulare?status=eq.beantwortet&order=beantwortet_am.desc", {
        headers: sbHeaders()
      });
      if (!res.ok) return;
      const rows = await res.json();
      const neu = rows.map(r => ({
        id: r.id,
        datum: r.beantwortet_am ? new Date(r.beantwortet_am).toLocaleString("de-DE") : "–",
        typ: r.label,
        absender: r.mitglied_mail || "–",
        name: r.mitglied_name || "Unbekannt",
        felder: JSON.parse(r.antwort_daten || "{}")
      }));
      const neuF=rows.map(function(r){return{id:r.id,datum:r.beantwortet_am?new Date(r.beantwortet_am).toLocaleString("de-DE"):"",typ:r.label||r.typ||"Formular",absender:r.mitglied_mail||"",name:r.mitglied_name||"",felder:JSON.parse(r.antwort_daten||"{}")};}); sbAutoTransfer(neuF,membersRef.current);
      // FIX 3: WA-Bestätigungen werden NICHT mehr automatisch beim Polling geöffnet.
      // Popup-Blocker würde das unterdrücken; bei mehreren neuen Eingängen würden mehrere Tabs aufgehen.
      // Stattdessen: neue Eingänge werden im neuF-Array gesammelt und können manuell bestätigt werden.
      // (WA-Bestätigungsbutton im Eingang-Detail-View verfügbar)
      setEingangFormulare(prev => {
        // Immer aktuell aus localStorage lesen um Stale-Closure zu vermeiden
        var aktuelleGeloeschteIds;
        try { aktuelleGeloeschteIds = new Set(JSON.parse(localStorage.getItem("isuv_geloeschte_ids") || "[]")); } catch(e) { aktuelleGeloeschteIds = new Set(); }
        const existIds = new Set(prev.map(x => x.id));
        const wirklichNeu = neu.filter(x => !existIds.has(x.id) && !aktuelleGeloeschteIds.has(x.id));
        // Bereits vorhandene, aber inzwischen gelöschte Einträge auch entfernen
        const gefiltertPrev = prev.filter(x => !aktuelleGeloeschteIds.has(x.id));
        if (wirklichNeu.length > 0) {
          setNeueEingaengeCount(c => c + wirklichNeu.length);
        }
        return wirklichNeu.length > 0 ? [...wirklichNeu, ...gefiltertPrev] : gefiltertPrev;
      });
    } catch(e) { console.error("Supabase load error", e); }
  };

  // Auto-Polling: alle 60 Sekunden neue Eingänge prüfen wenn Supabase konfiguriert
  useEffect(() => {
    if (!sbReady()) return;
    // Sofort beim Start laden
    sbLadeEingaenge();
    const interval = setInterval(() => {
      sbLadeEingaenge();
    }, 60000);
    return () => clearInterval(interval);
  }, [loginDaten.supabaseUrl, loginDaten.supabaseKey]);

  if (!isLoggedIn) return (
    <div style={{ minHeight:"100vh", backgroundColor:"#f4f7f9", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <img src={window.ISUV_LOGO} alt="ISUV Logo" style={{ width:"220px", height:"auto", marginBottom:"24px" }} />
      <div style={{ backgroundColor:"#fff", borderRadius:"16px", padding:"24px 20px", width:"100%", maxWidth:"340px", boxShadow:"0 4px 20px rgba(0,0,0,0.08)" }}>
        <div style={{ fontSize:"14px", color:"#003366", fontWeight:"bold", textAlign:"center", marginBottom:"18px", letterSpacing:"0.3px" }}>Anspruchslotse – Anmeldung</div>
        <input style={styles.input} placeholder="Leiter (Name)" value={loginDaten.leiter}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{leiter:e.target.value}); })} />
        <input style={styles.input} placeholder="Ortsgruppe / Ort" value={loginDaten.ort}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{ort:e.target.value}); })} />
        <input style={styles.input} type="email" placeholder="E-Mail-Adresse (Absender)" value={loginDaten.email}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{email:e.target.value}); })} />
        <input style={styles.input} type="password" placeholder="Passwort" value={loginDaten.passwort}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{passwort:e.target.value}); })} />
        <input style={styles.input} type="tel" placeholder="WhatsApp-Nummer (z.B. +49170...)" value={loginDaten.whatsapp}
          onChange={e => setLoginDaten(function(p){ return Object.assign({},p,{whatsapp:e.target.value}); })} />
        <div style={{ fontSize:"10px", color:"#999", marginBottom:"12px", textAlign:"center" }}>
          📱 WhatsApp-Nummer wird für Formular-Versand genutzt
        </div>
        <button style={styles.btnPrimary} onClick={() => {
          try { var ohnePasswort = Object.assign({}, loginDaten, {passwort:""}); localStorage.setItem("isuv_profil", JSON.stringify(ohnePasswort)); } catch(e) {}
          setIsLoggedIn(true);
        }}>Software starten</button>
        {(loginDaten.email || loginDaten.whatsapp) && (
          <div style={{ fontSize:"10px", color:"#00afad", textAlign:"center", marginTop:"8px" }}>
            {loginDaten.email && <div>✉️ E-Mail: {loginDaten.email}</div>}
            {loginDaten.whatsapp && <div>📱 WhatsApp: {loginDaten.whatsapp}</div>}
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div style={styles.appFrame}>
      <header style={styles.header}>
        <div style={{ display: "flex", alignItems: "center", cursor: "pointer" }} onClick={() => setView("dashboard")}>

          <div style={{ marginLeft:"8px" }}>
            <strong style={{ display:"block", fontSize:"13px" }}>ANSPRUCHSLOTSE</strong>
            {(loginDaten.leiter || loginDaten.ort) && (
              <span style={{ fontSize:"10px", color:"#666" }}>{loginDaten.leiter}{loginDaten.leiter && loginDaten.ort ? " · " : ""}{loginDaten.ort}</span>
            )}
          </div>
        </div>
        <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
          {eingangFormulare.filter(f => !geseheneEingangIds.has(f.id)).length > 0 && (
            <div onClick={() => { setView("dashboard"); setShowFormulare(true); setShowEingang(true); setGeseheneEingangIds(prev => { const next = new Set([...prev, ...eingangFormulare.map(f => f.id)]); try { localStorage.setItem("isuv_gesehen_ids", JSON.stringify([...next])); } catch(e){} return next; }); }}
              style={{ cursor:"pointer", backgroundColor:"#e53935", color:"#fff", borderRadius:"20px", padding:"5px 10px", fontSize:"11px", fontWeight:"bold" }}>
              📥 {eingangFormulare.filter(f => !geseheneEingangIds.has(f.id)).length}
            </div>
          )}
          {(function() {
            var heute = new Date();
            var heuteTermine = termine.filter(function(t) {
              return t.tag === heute.getDate() && t.monat === heute.getMonth();
            });
            if (heuteTermine.length > 0) {
              return (
                <div onClick={() => { setView("dashboard"); setShowCalendar(true); }}

                  title={heuteTermine.map(function(t){ return t.zeit + " " + t.text; }).join(", ")}>
                  📅 {heuteTermine.length}
                </div>
              );
            }
            return null;
          })()}
          <button onClick={() => setView("profil")} style={{ ...styles.btnLogout, backgroundColor:"#e8f0fb", color:"#003366" }}>⚙️ Profil</button>
          <button onClick={() => setIsLoggedIn(false)} style={styles.btnLogout}>Abmelden</button>
        </div>
      </header>

      <main style={["formular_ausfuellen","tbg_form","buergergeld_form","eingang_detail","sorgerecht_form"].includes(view) ? {...styles.main, padding:"0", maxWidth:"800px"} : styles.main} className="app-main">
        {view === "dashboard" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>

            {/* ── Backup-Hinweis Banner ── */}
            {showBackupHinweis && (
              <div style={{ backgroundColor:"#c62828", borderRadius:"10px", padding:"12px 14px", color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center", gap:"10px" }}>

                  <strong>⚠️ Kein aktuelles Backup!</strong><br/>

                </div>
                <div style={{ display:"flex", gap:"6px", flexShrink:0 }}>
                  <button onClick={exportiereAllesDaten}
                    style={{ padding:"8px 12px", backgroundColor:"#fff", color:"#c62828", border:"none", borderRadius:"7px", fontWeight:"bold", fontSize:"12px", cursor:"pointer" }}>
                    💾 Backup
                  </button>
                  <button onClick={function(){ setShowBackupHinweis(false); }}
                    style={{ padding:"8px", backgroundColor:"rgba(255,255,255,0.2)", color:"#fff", border:"none", borderRadius:"7px", fontSize:"12px", cursor:"pointer" }}>
                    ✕
                  </button>
                </div>
              </div>
            )}
            <div style={styles.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }} onClick={() => setShowMemberList(!showMemberList)}>
                <h3 style={{ margin: 0, fontSize: "14px" }}>👥 Mitglieder</h3>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <div onClick={e => { e.stopPropagation(); setShowNeuesMitglied(true); setView("neues_mitglied"); }}
