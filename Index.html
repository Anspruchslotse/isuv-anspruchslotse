<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISUV Anspruchslotse</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; display: flex; justify-content: center; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
    h2 { color: #003366; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .btn { background: #003366; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-green { background: #00afad; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Anspruchslotse</h2>
    <p>Geben Sie den Namen des Partners ein:</p>
    <input type="text" id="partner" placeholder="Name des Partners">
    <button class="btn" onclick="bestaetigen()">Daten bestätigen</button>
    
    <div id="nextStep" style="display:none">
      <p style="margin-top:15px;">Danke! Jetzt können Sie das Dokument erstellen:</p>
      <button class="btn btn-green" onclick="geheZuFormular()">PDF für <span id="displayPartner"></span> öffnen</button>
    </div>
  </div>

  <script>
    function bestaetigen() {
      const p = document.getElementById('partner').value;
      if(!p) return alert("Bitte Namen eingeben");
      document.getElementById('displayPartner').innerText = p;
      document.getElementById('nextStep').style.display = 'block';
    }
    function geheZuFormular() {
      const p = document.getElementById('partner').value;
      // Wir leiten zur formular.html im selben Ordner weiter
      window.location.href = `formular.html?partner=${encodeURIComponent(p)}`;
    }
  </script>
</body>
</html>
