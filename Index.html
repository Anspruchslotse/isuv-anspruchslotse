<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ISUV Anspruchslotse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #e8edf2; font-family: sans-serif; color: #333; }
    .app-main { max-width: 800px; margin: 0 auto; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h2 { color: #003366; margin-top: 0; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .btn-primary { background: #003366; color: white; border: none; border-radius: 8px; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 15px; }
    .result-box { background: #f0f4f8; padding: 20px; border-radius: 8px; margin-top: 25px; border-left: 6px solid #00afad; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [partnerName, setPartnerName] = useState(""); 
  const [tageA, setTageA] = useState("");
  const [tageB, setTageB] = useState("");
  const [result, setResult] = useState(null);

  const handleBerechnen = () => {
    if(!partnerName) { 
      alert("Bitte gib den Namen des anderen Elternteils ein."); 
      return; 
    }
    setResult({ partner: partnerName, tA: tageA || "0", tB: tageB || "0" });
  };

  const openPDF = () => {
    const params = new URLSearchParams({
      partner: partnerName,
      tageA: tageA || "0",
      tageB: tageB || "0"
    });
    window.open(`formular.html?${params.toString()}`, "_blank");
  };

  return (
    <div className="app-main">
      <div className="card">
        <h2>🏠 Anlage TBG Erstellung</h2>
        <p>Geben Sie hier die Daten für die Temporäre Bedarfsgemeinschaft ein.</p>
        
        <label>Name des anderen Elternteils:</label>
        <input 
          type="text" 
          placeholder="Vorname Nachname" 
          value={partnerName} 
          onChange={e => setPartnerName(e.target.value)} 
        />

        <div className="grid">
          <div>
            <label>Tage bei Ihnen:</label>
            <input type="number" placeholder="0" value={tageA} onChange={e => setTageA(e.target.value)} />
          </div>
          <div>
            <label>Tage beim Partner:</label>
            <input type="number" placeholder="0" value={tageB} onChange={e => setTageB(e.target.value)} />
          </div>
        </div>

        <button className="btn-primary" onClick={handleBerechnen}>Daten bestätigen</button>

        {result && (
          <div className="result-box">
            <h3 style={{margin: "0 0 10px 0", color: "#00afad"}}>Bereit für {result.partner}</h3>
            <button className="btn-primary" style={{background: "#00afad"}} onClick={openPDF}>
              📄 PDF für {result.partner} öffnen
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
