<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISUV Anspruchslotse – Formular</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f7fa; color: #111; min-height: 100vh; }
    #root { max-width: 540px; margin: 0 auto; padding: 0 0 40px 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const ISUV_LOGO = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'%3E%3Crect width='200' height='80' fill='%23003366'/%3E%3Ctext x='100' y='52' font-family='Arial' font-weight='bold' font-size='36' fill='white' text-anchor='middle'%3EISUV%3C/text%3E%3C/svg%3E";

const styles = {
  input: { width:"100%", padding:"10px 12px", border:"1px solid #ccc", borderRadius:"8px", fontSize:"13px", marginBottom:"10px", display:"block" },
  label: { fontSize:"11px", fontWeight:"bold", color:"#555", marginBottom:"3px", display:"block" },
  formPage: { background:"#fff", minHeight:"100vh" },
};

function SigModal({ onSave, onClose }) {
  var canvasRef = useRef(null);
  var drawing = useRef(false);
  var lastPos = useRef(null);
  var getPos = function(canvas, evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var src = evt.touches ? evt.touches[0] : evt;
    return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
  };
  var startDraw = function(e) { e.preventDefault(); drawing.current = true; var cv = canvasRef.current; if (cv) lastPos.current = getPos(cv, e.nativeEvent || e); };
  var draw = function(e) {
    e.preventDefault(); if (!drawing.current) return;
    var cv = canvasRef.current; if (!cv) return;
    var ctx = cv.getContext("2d");
    var pos = getPos(cv, e.nativeEvent || e);
    ctx.beginPath(); ctx.strokeStyle = "#003366"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  var stopDraw = function(e) { if (e) e.preventDefault(); drawing.current = false; };
  var clear = function() { var cv = canvasRef.current; if (cv) cv.getContext("2d").clearRect(0,0,cv.width,cv.height); };
  var save = function() { var cv = canvasRef.current; if (cv) onSave(cv.toDataURL("image/png")); };
  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.6)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <div style={{ backgroundColor:"#fff", borderRadius:"14px", padding:"20px", width:"100%", maxWidth:"420px" }}>
        <div style={{ fontWeight:"bold", fontSize:"14px", color:"#003366", marginBottom:"6px" }}>✍️ Unterschrift des Antragstellers</div>
        <div style={{ fontSize:"11px", color:"#666", marginBottom:"12px" }}>Mit Finger oder Maus im Feld unterschreiben:</div>
        <canvas ref={canvasRef} width={560} height={160}
          style={{ border:"2px solid #003366", borderRadius:"8px", width:"100%", height:"120px", touchAction:"none", backgroundColor:"#fafcff", display:"block" }}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
        />
        <div style={{ display:"flex", gap:"8px", marginTop:"12px" }}>
          <button onClick={clear} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>🗑️ Löschen</button>
          <button onClick={onClose} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>Abbrechen</button>
          <button onClick={save} style={{ flex:2, padding:"10px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>✅ Übernehmen</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [status, setStatus] = useState("laden"); // laden | fehler | formular | gesendet
  const [fehler, setFehler] = useState("");
  const [formTyp, setFormTyp] = useState(null);
  const [daten, setDaten] = useState({});
  const [formularId, setFormularId] = useState(null);
  const [sbUrl, setSbUrl] = useState(null);
  const [sbKey, setSbKey] = useState(null);
  const [gerichtSuche, setGerichtSuche] = useState(false);
  const [gerichtFehler, setGerichtFehler] = useState("");
  const [sigModal, setSigModal] = useState(false);
  const [sigData, setSigData] = useState(null);

  useEffect(function() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get("id");
    var sb = params.get("sb");
    var key = params.get("key");

    if (!id || !sb || !key) {
      setFehler("Ungültiger Link – fehlende Parameter.");
      setStatus("fehler");
      return;
    }

    setFormularId(id);
    setSbUrl(sb);
    setSbKey(key);

    var url = sb.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(id) + "&select=*";
    fetch(url, {
      headers: {
        "apikey": key,
        "Authorization": "Bearer " + key,
        "Content-Type": "application/json"
      }
    })
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || rows.length === 0) {
        setFehler("Formular nicht gefunden. Möglicherweise abgelaufen oder ungültiger Link.");
        setStatus("fehler");
        return;
      }
      var row = rows[0];
      if (row.status === "beantwortet") {
        setStatus("gesendet");
        return;
      }
      var vorausgefuellt = {};
      try { vorausgefuellt = JSON.parse(row.vorausgefuellt || "{}"); } catch(e) {}
      setFormTyp(row.typ || "stammdaten");
      setDaten(vorausgefuellt);
      setStatus("formular");
    })
    .catch(function(e) {
      setFehler("Netzwerkfehler beim Laden: " + e.message);
      setStatus("fehler");
    });
  }, []);

  var upd = function(f, v) { setDaten(function(p) { return Object.assign({}, p, {[f]: v}); }); };

  var absenden = function() {
    // Validation per formtyp
    if (formTyp === "fr_sorgerecht") {
      var pflicht = [daten.antragsteller_name, daten.gegenseite_name, daten.kind_name];
      if (pflicht.some(function(v) { return !v || !v.trim(); })) {
        alert("Bitte alle Pflichtfelder (*) ausfüllen."); return;
      }
    }

    var url = sbUrl.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(formularId);
    fetch(url, {
      method: "PATCH",
      headers: {
        "apikey": sbKey,
        "Authorization": "Bearer " + sbKey,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        status: "beantwortet",
        antwort_daten: JSON.stringify(daten),
        beantwortet_am: new Date().toISOString()
      })
    })
    .then(function(r) {
      if (r.ok) {
        setStatus("gesendet");
        // Auto-generate PDF with signature if sorgerecht
        if (formTyp === "fr_sorgerecht") {
          setTimeout(function(){ erzeugePDF(sigData); }, 500);
        }
      }
      else { r.text().then(function(t) { alert("Fehler beim Senden: " + t.slice(0, 200)); }); }
    })
    .catch(function(e) { alert("Netzwerkfehler: " + e.message); });
  };

  var ermittleGericht = function() {
    var plz = (daten.kind_plz || "").trim();
    if (!plz || plz.length < 5) { setGerichtFehler("Bitte zuerst PLZ des Kindes eingeben."); return; }
    // CORS verhindert direkten Fetch – Link zum Justizportal öffnen
    window.open("https://www.justiz.de/onlinedienste/gerichtsverzeichnis/index.php?plz=" + encodeURIComponent(plz) + "&gtyp=AG&land=", "_blank");
    setGerichtFehler("🔍 Justizportal geöffnet – bitte Amtsgericht oben eintragen.");
  };

  // ── Render ──────────────────────────────────────────────
  if (status === "laden") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px", color:"#003366" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ fontSize:"14px" }}>⏳ Formular wird geladen...</div>
      </div>
    );
  }

  if (status === "fehler") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ backgroundColor:"#fff3f3", border:"1px solid #f5c6cb", borderRadius:"10px", padding:"20px", maxWidth:"400px", margin:"0 auto" }}>
          <div style={{ fontSize:"20px", marginBottom:"8px" }}>⚠️</div>
          <div style={{ fontWeight:"bold", marginBottom:"8px", color:"#721c24" }}>Formular nicht verfügbar</div>
          <div style={{ fontSize:"12px", color:"#555" }}>{fehler}</div>
        </div>
      </div>
    );
  }

  var erzeugePDF = function(sig) {
    var d = daten;
    var jsPDF = window.jspdf && window.jspdf.jsPDF;
    if (!jsPDF) { alert("PDF-Bibliothek nicht geladen."); return; }
    var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    var W=210, mL=25, mR=25, y=20, lineH=6;
    var heute = new Date().toLocaleDateString("de-DE");
    var absAnschrift = (d.antragsteller_strasse||"") + (d.antragsteller_plz ? ", "+d.antragsteller_plz : "") + (d.antragsteller_ort ? " "+d.antragsteller_ort : "");
    // Absender oben links
    doc.setFontSize(10); doc.setFont("helvetica","bold");
    doc.text(d.antragsteller_name||"", mL, y);
    doc.setFont("helvetica","normal");
    if (d.antragsteller_strasse) { y+=5; doc.text(d.antragsteller_strasse, mL, y); }
    if (d.antragsteller_plz||d.antragsteller_ort) { y+=5; doc.text((d.antragsteller_plz||"")+" "+(d.antragsteller_ort||""), mL, y); }
    // Datum oben rechts
    doc.text(d.antragsteller_ort ? d.antragsteller_ort+", "+heute : heute, W-mR, 20, {align:"right"});
    // Empfänger (Gericht)
    y+=12;
    doc.text("An das", mL, y); y+=5;
    doc.setFont("helvetica","bold");
    doc.text(d.gericht||"Amtsgericht _______________", mL, y); y+=5;
    doc.setFont("helvetica","normal");
    doc.text("– Abteilung für Familiensachen –", mL, y); y+=14;
    // Betreff
    doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text("Antrag auf Übertragung der gemeinsamen elterlichen Sorge", mL, y); y+=6;
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("gemäß § 1626a Abs. 2 BGB i.d.F. des Gesetzes v. 19.05.2013 (BGBl. I S. 1084)", mL, y); y+=5;
    doc.text("Betr.: Kind: "+(d.kind_name||"_______________")+(d.kind_geburt ? ", geb. "+d.kind_geburt : ""), mL, y); y+=10;
    doc.setLineWidth(0.3); doc.line(mL, y, W-mR, y); y+=8;
    var section = function(t) {
      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text(t, mL, y); doc.setLineWidth(0.2);
      doc.line(mL, y+1.5, W-mR, y+1.5); y+=8;
      doc.setFont("helvetica","normal"); doc.setFontSize(10);
    };
    var row = function(label, val) {
      doc.setFont("helvetica","bold"); doc.text(label+":", mL, y);
      doc.setFont("helvetica","normal");
      var ls = doc.splitTextToSize(val||"—", W-mL-mR-48);
      doc.text(ls, mL+48, y); y+=Math.max(lineH, ls.length*lineH);
    };
    section("I. Beteiligte");
    row("Antragsteller (Vater)", (d.antragsteller_name||"")+(absAnschrift ? ", "+absAnschrift : ""));
    row("Antragsgegnerin (Mutter)", (d.gegenseite_name||"")+(d.gegenseite_strasse ? ", "+d.gegenseite_strasse+", "+(d.gegenseite_plz||"")+" "+(d.gegenseite_ort||"") : "")); y+=4;
    section("II. Kind");
    row("Name", d.kind_name||"");
    row("Geburtsdatum", d.kind_geburt||"");
    row("Hauptwohnsitz", d.kind_strasse ? d.kind_strasse+", "+(d.kind_plz||"")+" "+(d.kind_ort||"") : ""); y+=4;
    section("III. Antrag");
    var aLines = doc.splitTextToSize("Der Antragsteller beantragt, ihm zusammen mit der Antragsgegnerin die gemeinsame elterliche Sorge für das oben genannte Kind gemäß § 1626a Abs. 2 BGB zu übertragen.", W-mL-mR);
    doc.setFontSize(10); doc.text(aLines, mL, y); y+=aLines.length*lineH+4;
    section("IV. Begründung");
    var bParts = [
      "1. Gemäß § 1626a Abs. 2 Satz 1 BGB überträgt das Familiengericht auf Antrag des Vaters die elterliche Sorge oder einen Teil davon beiden Eltern gemeinsam, wenn die Übertragung dem Kindeswohl nicht widerspricht.",
      "2. Gemäß § 1626a Abs. 2 Satz 2 BGB wird widerleglich vermutet, dass die Übertragung dem Kindeswohl nicht widerspricht (Kindeswohlvermutung). Die Beweislast liegt beim ablehnenden Elternteil (BGH, Beschluss v. 15.06.2016 – XII ZB 419/15).",
      "3. Tatsächliche Anhaltspunkte, die der Übertragung der gemeinsamen Sorge entgegenstehen würden, sind nicht ersichtlich. Eine gemeinsame Ausübung der elterlichen Sorge liegt im wohlverstandenen Interesse des Kindes."
    ];
    doc.setFontSize(10);
    bParts.forEach(function(part) { var ls=doc.splitTextToSize(part,W-mL-mR); doc.text(ls,mL,y); y+=ls.length*lineH+3; }); y+=4;
    // Unterschrift
    doc.setLineWidth(0.3); doc.line(mL, y, W-mR, y); y+=8;
    doc.text((d.antragsteller_ort||"_____________")+", den "+heute, mL, y); y+=14;
    if (sig) { try { doc.addImage(sig,"PNG",mL,y,70,25); } catch(e){} y+=28; }
    else { doc.line(mL,y+12,mL+70,y+12); y+=16; }
    doc.setFontSize(9); doc.text(d.antragsteller_name||"Antragsteller", mL, y);
    doc.save("Sorgerechtsantrag_"+(d.antragsteller_name||"").replace(/ /g,"_")+".pdf");
  };

  if (status === "gesendet") {
    return (
      <div style={{ padding:"40px 20px", textAlign:"center" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"16px" }} /><br/>
        <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"10px", padding:"20px", maxWidth:"420px", margin:"0 auto 20px" }}>
          <div style={{ fontSize:"28px", marginBottom:"6px" }}>✅</div>
          <div style={{ fontWeight:"bold", fontSize:"15px", marginBottom:"6px", color:"#2e7d32" }}>Angaben übermittelt</div>
          <div style={{ fontSize:"12px", color:"#555" }}>Ihre Angaben wurden erfolgreich übermittelt.</div>
        </div>
        {formTyp === "tbg" && (
          <div style={{ maxWidth:"420px", margin:"0 auto" }}>
            <button onClick={function(){
              var jsPDF = window.jspdf && window.jspdf.jsPDF;
              if(!jsPDF){ alert("PDF-Bibliothek nicht geladen."); return; }
              var heute = new Date().toLocaleDateString("de-DE");
              var doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
              doc.setFillColor(0,51,102); doc.rect(15,15,180,18,"F");
              doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont("helvetica","bold");
              doc.text("Anlage TBG – Angaben übermittelt", 19, 27);
              doc.setTextColor(0,0,0); doc.setFontSize(10); doc.setFont("helvetica","normal");
              doc.text("Ihre Angaben wurden am "+heute+" erfolgreich übermittelt.", 15, 45);
              doc.text("Ihr Berater wird die Anlage TBG prüfen und Sie kontaktieren.", 15, 53);
              doc.save("Anlage_TBG_Bestaetigung.pdf");
            }}
              style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
              📄 Bestätigung als PDF speichern
            </button>
          </div>
        )}
        {formTyp === "fr_sorgerecht" && (
          <div style={{ maxWidth:"420px", margin:"0 auto" }}>
            {sigData ? (
              <div style={{ marginBottom:"12px" }}>
                <img src={sigData} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift" />
                <button onClick={function(){ setSigData(null); }} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer", marginTop:"4px" }}>✕ Unterschrift löschen</button>
              </div>
            ) : (
              <button onClick={function(){ setSigModal(true); }}
                style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"10px" }}>
                ✍️ Jetzt unterschreiben (optional)
              </button>
            )}
            <button onClick={function(){ erzeugePDF(sigData); }}
              style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
              📄 Antrag als PDF speichern
            </button>
          </div>
        )}
        {sigModal && <SigModal onSave={function(d){ setSigData(d); setSigModal(false); }} onClose={function(){ setSigModal(false); }} />}
      </div>
    );
  }

  // ── Sorgerecht-Formular ──────────────────────────────────
  if (formTyp === "fr_sorgerecht") {
    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"24px 16px 16px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <img src={ISUV_LOGO} alt="ISUV" style={{ width:"140px", height:"auto", marginBottom:"10px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>ISUV Anspruchslotse</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Antrag Gemeinsames Sorgerecht (§ 1626a Abs. 2 BGB)</div>
        </div>

        <div style={{ padding:"0 16px" }}>
          <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"8px", padding:"10px 12px", marginBottom:"16px", fontSize:"11px", color:"#2e7d32" }}>
            ✅ <strong>Keine Begründung erforderlich.</strong> Nach § 1626a Abs. 2 BGB (Reform 2013) wird die gemeinsame Sorge übertragen, sofern sie dem Kindeswohl nicht widerspricht.
          </div>

          {/* Vater (Antragsteller) */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginBottom:"10px", letterSpacing:"0.5px" }}>👨 Vater (Antragsteller)</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.antragsteller_name||""} onChange={function(e){ upd("antragsteller_name", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.antragsteller_strasse||""} onChange={function(e){ upd("antragsteller_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}><label style={styles.label}>PLZ</label><input style={styles.input} placeholder="12345" value={daten.antragsteller_plz||""} onChange={function(e){ upd("antragsteller_plz", e.target.value); }} /></div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.antragsteller_ort||""} onChange={function(e){ upd("antragsteller_ort", e.target.value); }} /></div>
          </div>

          {/* Mutter (Antragsgegnerin) */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>👩 Mutter (Antragsgegnerin)</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.gegenseite_name||""} onChange={function(e){ upd("gegenseite_name", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.gegenseite_strasse||""} onChange={function(e){ upd("gegenseite_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}><label style={styles.label}>PLZ</label><input style={styles.input} placeholder="12345" value={daten.gegenseite_plz||""} onChange={function(e){ upd("gegenseite_plz", e.target.value); }} /></div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.gegenseite_ort||""} onChange={function(e){ upd("gegenseite_ort", e.target.value); }} /></div>
          </div>

          {/* Kind */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>👶 Kind</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.kind_name||""} onChange={function(e){ upd("kind_name", e.target.value); }} />
          <label style={styles.label}>Geburtsdatum</label>
          <input style={styles.input} type="date" value={daten.kind_geburt||""} onChange={function(e){ upd("kind_geburt", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer (Hauptwohnsitz)</label>

    var kindUpd = function(idx, feld, wert) {
      var neuKinder = kinder.map(function(k,i){ return i===idx ? Object.assign({},k,{[feld]:wert}) : k; });
      upd("kinder", neuKinder);
    };
    var kalUpd = function(idx, seite, mi, wert) {
      var neuKinder = kinder.map(function(k,i){
        if(i!==idx) return k;
        var kal = Object.assign({}, k.kalender||{});
        var arr = (kal[seite]||Array(12).fill("")).slice();
        arr[mi] = wert;
        kal[seite] = arr;
        return Object.assign({},k,{kalender:kal});
      });
      upd("kinder", neuKinder);
    };
    var addKind = function() {
      upd("kinder", kinder.concat([{ kNachname:"", kVorname:"", kGeburt:"", epNachname:"", epVorname:"", epStrasse:"", epPlz:"", epOrt:"", aufteilungsWunsch:"", kalenderjahr:String(new Date().getFullYear()), kalender:{ antragsteller:Array(12).fill(""), anderer:Array(12).fill("") }, kgBerechtigt:"", kgWeiterleitung:"", kgBetrag:"", einkommenWeiterleitung:"", einkommenBetrag:"", sonstigeAngaben:"" }]));
    };
    var removeKind = function(idx) {
      upd("kinder", kinder.filter(function(_,i){ return i!==idx; }));
    };

    var checkRow = { display:"flex", alignItems:"flex-start", gap:"8px", fontSize:"12px", cursor:"pointer", marginBottom:"8px" };

    var erzeugeTbgPDF = function(sig) {
      var jsPDF = window.jspdf && window.jspdf.jsPDF;
      if(!jsPDF) { alert("PDF-Bibliothek nicht geladen."); return; }
      var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      var pw=210, margin=15, cw=pw-margin*2, y=15, heute=new Date().toLocaleDateString("de-DE");
      // Header
      doc.setFillColor(0,51,102);
      doc.rect(margin, y, cw, 18, "F");
      doc.setTextColor(255,255,255);
      doc.setFontSize(13); doc.setFont("helvetica","bold");
      doc.text("Antrag auf Bürgergeld – Anlage TBG", margin+4, y+8);
      doc.setFontSize(8); doc.setFont("helvetica","normal");
      doc.text("Temporäre Bedarfsgemeinschaft", margin+4, y+13);
      y += 22; doc.setTextColor(0,0,0);
      var zeile = function(label, wert) {
        if(y>270){ doc.addPage(); y=15; }
        doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.text(label+":", margin, y);
        doc.setFont("helvetica","normal"); doc.text(String(wert||"–"), margin+50, y); y+=6;
      };
      // Abschnitt 1
      doc.setFillColor(230,240,251); doc.rect(margin, y, cw, 7, "F");
      doc.setFontSize(9); doc.setFont("helvetica","bold");
      doc.text("(1) Persönliche Daten Antragsteller*in", margin+3, y+5); y+=10;
      zeile("Nachname, Vorname", (d.antNachname||"") + ", " + (d.antVorname||""));
      zeile("Straße / Haus-Nr.", d.antStrasse||"");
      zeile("PLZ / Ort", (d.antPlz||"") + " " + (d.antOrt||""));
      zeile("Geburtsdatum", d.antGeburt||"");
      zeile("Telefon / E-Mail", (d.antTel||"") + (d.antMail?" · "+d.antMail:""));
      y+=3;
      // Kinder
      kinder.forEach(function(k, ki){
        if(y>260){ doc.addPage(); y=15; }
        doc.setFillColor(0,175,173); doc.rect(margin, y, cw, 7, "F");
        doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
        doc.text("Kind #"+(ki+1)+": "+(k.kVorname||"")+" "+(k.kNachname||""), margin+3, y+5);
        doc.setTextColor(0,0,0); y+=10;
        zeile("Geb. Kind", k.kGeburt||"");
        zeile("And. Elternteil", (k.epVorname||"")+" "+(k.epNachname||""));
        zeile("Anschrift And. ET", (k.epStrasse||"")+(k.epPlz?" · "+k.epPlz+" "+k.epOrt:""));
        zeile("Betreuungsmodell", k.aufteilungsWunsch==="paritaetisch"?"Paritätisches Wechselmodell":k.aufteilungsWunsch==="asymmetrisch"?"Asymmetrisches / Residenzmodell":k.aufteilungsWunsch==="keine"?"Keine Aufteilung gewünscht":"–");
        // Kalender
        if(y>250){ doc.addPage(); y=15; }
        doc.setFillColor(230,240,251); doc.rect(margin, y, cw, 7, "F");
        doc.setFont("helvetica","bold"); doc.text("Kalender "+(k.kalenderjahr||""), margin+3, y+5); y+=9;
        var colW=cw/3;
        doc.setFontSize(8);
        doc.setFillColor(220,230,241);
        doc.rect(margin,y,colW,6,"F"); doc.rect(margin+colW,y,colW,6,"F"); doc.rect(margin+colW*2,y,colW,6,"F");
        doc.setFont("helvetica","bold");
        doc.text("Monat", margin+2, y+4);
        doc.text("Antragsteller*in", margin+colW+2, y+4);
        doc.text("And. Elternteil", margin+colW*2+2, y+4);
        y+=7; doc.setFont("helvetica","normal");
        MONATE_TBG.forEach(function(m, mi){
          if(y>275){ doc.addPage(); y=15; }
          var bg=mi%2===0?[248,250,252]:[255,255,255];
          doc.setFillColor(bg[0],bg[1],bg[2]);
          doc.rect(margin,y,cw,5.5,"F");
          doc.text(m, margin+2, y+4);
          doc.text(String((k.kalender&&k.kalender.antragsteller&&k.kalender.antragsteller[mi])||"–"), margin+colW+2, y+4);
          doc.text(String((k.kalender&&k.kalender.anderer&&k.kalender.anderer[mi])||"–"), margin+colW*2+2, y+4);
          y+=5.5;
        });
        y+=3;
      });
      // Unterschriften
      if(y>230){ doc.addPage(); y=15; }
      doc.setFillColor(106,27,154); doc.rect(margin, y, cw, 7, "F");
      doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
      doc.text("Unterschriften & Umgangsvereinbarung", margin+3, y+5);
      doc.setTextColor(0,0,0); y+=10;
      doc.setFontSize(8); doc.setFont("helvetica","normal");
      doc.text("Ort/Datum: "+(d.ortDatum||"–"), margin, y); y+=10;
      if(sig){ try{ doc.setFont("helvetica","bold"); doc.text("Unterschrift Antragsteller*in:", margin, y); y+=3; doc.addImage(sig,"PNG",margin,y,80,20); doc.line(margin,y+21,margin+80,y+21); y+=25; }catch(e){} }
      // Footer
      doc.setFontSize(7); doc.setTextColor(150,150,150);
      doc.text("Erstellt mit ISUV Anspruchslotse · "+heute, margin, 290);
      doc.save("Anlage_TBG_"+(d.antNachname||"").replace(/ /g,"_")+"_"+(kinder[0]&&kinder[0].kalenderjahr||new Date().getFullYear())+".pdf");
    };

    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"20px 16px 12px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <img src={ISUV_LOGO} alt="ISUV" style={{ width:"130px", height:"auto", marginBottom:"8px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>Anlage TBG</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Temporäre Bedarfsgemeinschaft – Bürgergeldantrag</div>
        </div>
        <div style={{ padding:"0 16px" }}>

          {sec("👤", "① Persönliche Daten Antragsteller*in")}
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Nachname *")}<input style={fi} value={d.antNachname||""} onChange={function(e){upd("antNachname",e.target.value);}} placeholder="Nachname" /></div>
            <div style={{ flex:1 }}>{lbl("Vorname *")}<input style={fi} value={d.antVorname||""} onChange={function(e){upd("antVorname",e.target.value);}} placeholder="Vorname" /></div>
          </div>
          {lbl("Straße & Hausnummer")}<input style={fi} value={d.antStrasse||""} onChange={function(e){upd("antStrasse",e.target.value);}} placeholder="Musterstraße 1" />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}>{lbl("PLZ")}<input style={fi2} value={d.antPlz||""} onChange={function(e){upd("antPlz",e.target.value);}} placeholder="12345" /></div>
            <div style={{ flex:1 }}>{lbl("Ort")}<input style={fi2} value={d.antOrt||""} onChange={function(e){upd("antOrt",e.target.value);}} placeholder="Stadt" /></div>
          </div>
          <div style={{ display:"flex", gap:"6px", marginTop:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Geburtsdatum")}<input style={fi2} type="date" value={d.antGeburt||""} onChange={function(e){upd("antGeburt",e.target.value);}} /></div>
            <div style={{ flex:1 }}>{lbl("BG-Nummer (opt.)")}<input style={fi2} value={d.antBGNr||""} onChange={function(e){upd("antBGNr",e.target.value);}} placeholder="BG-Nr." /></div>
          </div>
          <div style={{ display:"flex", gap:"6px", marginTop:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Telefon")}<input style={fi2} type="tel" value={d.antTel||""} onChange={function(e){upd("antTel",e.target.value);}} placeholder="01701234567" /></div>
            <div style={{ flex:1 }}>{lbl("E-Mail")}<input style={fi2} type="email" value={d.antMail||""} onChange={function(e){upd("antMail",e.target.value);}} placeholder="name@mail.de" /></div>
          </div>

          {/* Kinder */}
          {kinder.map(function(kind, idx){
            var kal = kind.kalender || { antragsteller:Array(12).fill(""), anderer:Array(12).fill("") };
            var sumAnt = (kal.antragsteller||[]).reduce(function(s,x){return s+(parseInt(x)||0);},0);
            var sumAnd = (kal.anderer||[]).reduce(function(s,x){return s+(parseInt(x)||0);},0);
            var sumGes = sumAnt+sumAnd;
            var anteilAnt = sumGes>0 ? Math.round(sumAnt/sumGes*100) : 0;
            var istParit = anteilAnt>=43 && anteilAnt<=57;
            return (
              <div key={idx} style={{ border:"2px solid #00afad", borderRadius:"10px", padding:"14px", marginTop:"16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
                  <span style={{ fontWeight:"bold", fontSize:"14px", color:"#00afad" }}>Kind #{idx+1}</span>
                  {kinder.length>1 && <button onClick={function(){removeKind(idx);}} style={{ background:"none", border:"none", color:"#e53935", fontSize:"20px", cursor:"pointer", padding:0 }}>×</button>}
                </div>

                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginBottom:"10px", letterSpacing:"0.5px" }}>② Kind & anderer Elternteil</div>
                <div style={{ display:"flex", gap:"6px" }}>
                  <div style={{ flex:1 }}>{lbl("Nachname Kind *")}<input style={fi2} value={kind.kNachname||""} onChange={function(e){kindUpd(idx,"kNachname",e.target.value);}} placeholder="Nachname" /></div>
                  <div style={{ flex:1 }}>{lbl("Vorname Kind *")}<input style={fi2} value={kind.kVorname||""} onChange={function(e){kindUpd(idx,"kVorname",e.target.value);}} placeholder="Vorname" /></div>
                </div>
                <div style={{ marginTop:"6px" }}>{lbl("Geburtsdatum Kind *")}<input style={fi} type="date" value={kind.kGeburt||""} onChange={function(e){kindUpd(idx,"kGeburt",e.target.value);}} /></div>
                <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginTop:"10px", marginBottom:"6px", borderTop:"1px dashed #ddd", paddingTop:"8px" }}>Anderer Elternteil</div>
                <div style={{ display:"flex", gap:"6px" }}>
                  <div style={{ flex:1 }}>{lbl("Nachname")}<input style={fi2} value={kind.epNachname||""} onChange={function(e){kindUpd(idx,"epNachname",e.target.value);}} placeholder="Nachname" /></div>
                  <div style={{ flex:1 }}>{lbl("Vorname")}<input style={fi2} value={kind.epVorname||""} onChange={function(e){kindUpd(idx,"epVorname",e.target.value);}} placeholder="Vorname" /></div>
                </div>
                <div style={{ marginTop:"6px" }}>{lbl("Straße & Hausnummer")}<input style={fi} value={kind.epStrasse||""} onChange={function(e){kindUpd(idx,"epStrasse",e.target.value);}} placeholder="Straße, Hausnummer" /></div>
                <div style={{ display:"flex", gap:"6px" }}>
                  <div style={{ width:"90px" }}>{lbl("PLZ")}<input style={fi2} value={kind.epPlz||""} onChange={function(e){kindUpd(idx,"epPlz",e.target.value);}} placeholder="PLZ" /></div>
                  <div style={{ flex:1 }}>{lbl("Ort")}<input style={fi2} value={kind.epOrt||""} onChange={function(e){kindUpd(idx,"epOrt",e.target.value);}} placeholder="Ort" /></div>
                </div>

                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>③ Betreuungsaufteilung</div>
                {[{v:"keine",t:"Keine Aufteilung gewünscht"},{v:"paritaetisch",t:"Paritätisches Wechselmodell (ca. 50:50)"},{v:"asymmetrisch",t:"Asymmetrisches / Residenzmodell"}].map(function(opt){
                  return (
                    <label key={opt.v} style={checkRow} onClick={function(){kindUpd(idx,"aufteilungsWunsch",opt.v);}}>
                      <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.aufteilungsWunsch===opt.v?"#003366":"#fff", flexShrink:0, marginTop:"1px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {kind.aufteilungsWunsch===opt.v && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"bold" }}>✓</span>}
                      </div>
                      <span>{opt.t}</span>
                    </label>
                  );
                })}

                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>④ Kalender – Betreuungstage</div>
                <div style={{ marginBottom:"6px" }}>{lbl("Kalenderjahr")}<input style={{ ...fi2, width:"120px" }} value={kind.kalenderjahr||String(new Date().getFullYear())} onChange={function(e){kindUpd(idx,"kalenderjahr",e.target.value);}} /></div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 70px 70px", gap:"4px", marginTop:"10px" }}>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", padding:"4px 6px", backgroundColor:"#e8f0fb", borderRadius:"4px" }}>Monat</div>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", padding:"4px 6px", backgroundColor:"#e8f0fb", borderRadius:"4px", textAlign:"center" }}>Antragst.</div>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", padding:"4px 6px", backgroundColor:"#e8f0fb", borderRadius:"4px", textAlign:"center" }}>And. ET</div>
                  {MONATE_TBG.map(function(m, mi){
                    var tagA=parseInt((kal.antragsteller||[])[mi]||"0")||0;
                    var tagB=parseInt((kal.anderer||[])[mi]||"0")||0;
                    var ges=tagA+tagB;
                    var warn=ges>0&&(ges<28||ges>31);
                    return (
                      <React.Fragment key={m}>
                        <div style={{ fontSize:"12px", padding:"4px 6px", borderBottom:"1px solid #f0f0f0", display:"flex", alignItems:"center", gap:"4px" }}>
                          {m}{warn && <span style={{ fontSize:"9px", color:"#e53935" }}>⚠️</span>}
                        </div>
                        <input type="number" min="0" max="31" style={{ ...styles.input, textAlign:"center", padding:"4px", marginBottom:"0" }} value={(kal.antragsteller||[])[mi]||""} onChange={function(e){kalUpd(idx,"antragsteller",mi,e.target.value);}} placeholder="–" />
                        <input type="number" min="0" max="31" style={{ ...styles.input, textAlign:"center", padding:"4px", marginBottom:"0" }} value={(kal.anderer||[])[mi]||""} onChange={function(e){kalUpd(idx,"anderer",mi,e.target.value);}} placeholder="–" />
                      </React.Fragment>
                    );
                  })}
                  <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>Gesamt</div>
                  <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnt}</div>
                  <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnd}</div>
                </div>
                {sumGes>0 && (
                  <div style={{ marginTop:"8px", backgroundColor:istParit?"#e8f5e9":"#fff3e0", border:"1px solid "+(istParit?"#a5d6a7":"#ffcc02"), borderRadius:"7px", padding:"8px 10px", fontSize:"11px" }}>
                    {istParit ? "✅ Paritätisches Wechselmodell erkannt" : "📊 Asymmetrisch"} · Antragst. {anteilAnt}% ({sumAnt} Tage) · And. ET {100-anteilAnt}% ({sumAnd} Tage)
                  </div>
                )}

                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>⑤ Einkommen des Kindes</div>
                {lbl("Kindergeldberechtigte Person")}<input style={fi} value={kind.kgBerechtigt||""} onChange={function(e){kindUpd(idx,"kgBerechtigt",e.target.value);}} placeholder="Name der Person, die Kindergeld bezieht" />
                <label style={checkRow} onClick={function(){kindUpd(idx,"kgWeiterleitung",kind.kgWeiterleitung==="ja"?"":"ja");}}>
                  <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.kgWeiterleitung==="ja"?"#003366":"#fff", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {kind.kgWeiterleitung==="ja" && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"bold" }}>✓</span>}
                  </div>
                  <span>Kindergeld wird an and. Elternteil weitergeleitet</span>
                </label>
                {kind.kgWeiterleitung==="ja" && (
                  <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"8px", marginLeft:"26px" }}>
                    <input type="number" style={{ ...fi2, width:"90px" }} value={kind.kgBetrag||""} onChange={function(e){kindUpd(idx,"kgBetrag",e.target.value);}} placeholder="EUR" />
                    <span style={{ fontSize:"12px" }}>EUR/Monat</span>
                  </div>
                )}
                {lbl("Sonstige Angaben / Besonderheiten")}
                <textarea style={Object.assign({},styles.input,{minHeight:"60px",resize:"vertical"})} value={kind.sonstigeAngaben||""} onChange={function(e){kindUpd(idx,"sonstigeAngaben",e.target.value);}} placeholder="Weitere Angaben..." />
              </div>
            );
          })}

          <button onClick={addKind}
            style={{ width:"100%", padding:"11px", backgroundColor:"#e8f4fd", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"13px", marginTop:"14px" }}>
            + Weiteres Kind hinzufügen
          </button>

          {sec("✍️", "⑥ Unterschrift & Datum")}
          {lbl("Ort, Datum")}<input style={fi} value={d.ortDatum||""} onChange={function(e){upd("ortDatum",e.target.value);}} placeholder={"z.B. Berlin, "+new Date().toLocaleDateString("de-DE")} />
          {sigData ? (
            <div style={{ marginBottom:"10px" }}>
              <img src={sigData} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift" />
              <button onClick={function(){setSigData(null);}} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer", marginTop:"4px" }}>✕ Löschen</button>
            </div>
          ) : (
            <button onClick={function(){setSigModal(true);}}
              style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"10px" }}>
              ✍️ Jetzt unterschreiben (mit Finger oder Maus)
            </button>
          )}

          <button onClick={absenden}
            style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer", marginTop:"8px" }}>
            ✅ Angaben übermitteln
          </button>

          {sigModal && <SigModal onSave={function(dataUrl){setSigData(dataUrl);setSigModal(false);}} onClose={function(){setSigModal(false);}} />}
        </div>
      </div>
    );
  }

  // ── Fallback: unbekannter Formulartyp ────────────────────
  return (
    <div style={{ textAlign:"center", padding:"60px 20px" }}>
      <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
      <div style={{ fontSize:"13px", color:"#555" }}>Unbekannter Formulartyp: <strong>{formTyp}</strong></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
