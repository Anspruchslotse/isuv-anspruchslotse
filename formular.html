function SigModal({ onSave, onClose, titel }) {
  var canvasRef = useRef(null);
  var drawing = useRef(false);
  var lastPos = useRef(null);

  useEffect(function() {
    var cv = canvasRef.current;
    if (!cv) return;

    var getPos = function(evt) {
      var rect = cv.getBoundingClientRect();
      var scaleX = cv.width  / rect.width;
      var scaleY = cv.height / rect.height;
      var src = (evt.touches && evt.touches.length > 0)
        ? evt.touches[0]
        : (evt.changedTouches && evt.changedTouches.length > 0)
          ? evt.changedTouches[0]
          : evt;
      return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
    };

    var onStart = function(e) {
      e.preventDefault();
      drawing.current = true;
      lastPos.current = getPos(e);
    };
    var onMove = function(e) {
      e.preventDefault();
      if (!drawing.current) return;
      var ctx = cv.getContext("2d");
      var pos = getPos(e);
      ctx.beginPath();
      ctx.strokeStyle = "#003366";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.moveTo(lastPos.current.x, lastPos.current.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      lastPos.current = pos;
    };
    var onEnd = function(e) {
      e.preventDefault();
      drawing.current = false;
    };

    cv.addEventListener("mousedown",  onStart, { passive: false });
    cv.addEventListener("mousemove",  onMove,  { passive: false });
    cv.addEventListener("mouseup",    onEnd,   { passive: false });
    cv.addEventListener("mouseleave", onEnd,   { passive: false });
    cv.addEventListener("touchstart", onStart, { passive: false });
    cv.addEventListener("touchmove",  onMove,  { passive: false });
    cv.addEventListener("touchend",   onEnd,   { passive: false });
    cv.addEventListener("touchcancel",onEnd,   { passive: false });

    return function() {
      cv.removeEventListener("mousedown",  onStart);
      cv.removeEventListener("mousemove",  onMove);
      cv.removeEventListener("mouseup",    onEnd);
      cv.removeEventListener("mouseleave", onEnd);
      cv.removeEventListener("touchstart", onStart);
      cv.removeEventListener("touchmove",  onMove);
      cv.removeEventListener("touchend",   onEnd);
      cv.removeEventListener("touchcancel",onEnd);
    };
  }, []);

  var clear = function() {
    var cv = canvasRef.current;
    if (cv) cv.getContext("2d").clearRect(0, 0, cv.width, cv.height);
  };
  var save = function() {
    var cv = canvasRef.current;
    if (cv) onSave(cv.toDataURL("image/png"));
  };

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.65)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" }}
      onTouchMove={function(e){ e.preventDefault(); }} /* Verhindert Scrollen der Seite während Unterschreiben */
    >
      <div style={{ backgroundColor:"#fff", borderRadius:"14px", padding:"18px", width:"100%", maxWidth:"440px", boxShadow:"0 8px 32px rgba(0,0,0,0.3)" }}>
        <div style={{ fontWeight:"bold", fontSize:"14px", color:"#003366", marginBottom:"4px" }}>✍️ {titel || "Unterschrift"}</div>
        <div style={{ fontSize:"11px", color:"#666", marginBottom:"12px" }}>Mit Finger oder Stift im blauen Feld unterschreiben:</div>
        <canvas ref={canvasRef} width={600} height={180}
          style={{ border:"2px solid #003366", borderRadius:"8px", width:"100%", height:"130px",
                   touchAction:"none", backgroundColor:"#fafcff", display:"block", cursor:"crosshair" }}
        />
        <div style={{ display:"flex", gap:"8px", marginTop:"12px" }}>
          <button onClick={clear}   style={{ flex:1, padding:"11px", backgroundColor:"#f0f4f7", color:"#333", border:"1px solid #ccc", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>🗑️ Löschen</button>
          <button onClick={onClose} style={{ flex:1, padding:"11px", backgroundColor:"#f0f4f7", color:"#333", border:"1px solid #ccc", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>Abbrechen</button>
          <button onClick={save}    style={{ flex:2, padding:"11px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>✅ Übernehmen</button>
        </div>
      </div>
    </div>
  );
}

  const [status, setStatus] = useState("laden"); // laden | fehler | formular | gesendet
  const [fehler, setFehler] = useState("");
  const [formTyp, setFormTyp] = useState(null);
  const [daten, setDaten] = useState({});
  const [formularId, setFormularId] = useState(null);
  const [sbUrl, setSbUrl] = useState(null);
  const [sbKey, setSbKey] = useState(null);
  const [gerichtSuche, setGerichtSuche] = useState(false);
  const [gerichtFehler, setGerichtFehler] = useState("");
  const [sigModal, setSigModal] = useState(false);
  const [sigData, setSigData] = useState(null);

  useEffect(function() {
    // ── Modus 1: Hash-basiert (#tbg=...) – kein Supabase nötig ──
    var hash = window.location.hash;
    if (hash && hash.startsWith("#tbg=")) {
      try {
        var encoded = hash.slice(5);
        var decoded = JSON.parse(decodeURIComponent(escape(atob(encoded))));
        setFormTyp("tbg");
        setDaten(decoded);
        setStatus("formular");
        // kein Supabase – formularId bleibt leer → absenden merkt das
      } catch(e) {
        setFehler("Fehler beim Lesen der Formulardaten: " + e.message);
        setStatus("fehler");
      }
      return;
    }

    // ── Modus 2: Supabase-basiert (?id=...&sb=...&key=...) ──
    var params = new URLSearchParams(window.location.search);
    var id = params.get("id");
    var sb = params.get("sb");
    var key = params.get("key");

    if (!id || !sb || !key) {
      setFehler("Ungültiger Link – fehlende Parameter.");
      setStatus("fehler");
      return;
    }

    setFormularId(id);
    setSbUrl(sb);
    setSbKey(key);

    var url = sb.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(id) + "&select=*";
    fetch(url, {
      headers: {
        "apikey": key,
        "Authorization": "Bearer " + key,
        "Content-Type": "application/json"
      }
    })
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || rows.length === 0) {
        setFehler("Formular nicht gefunden. Möglicherweise abgelaufen oder ungültiger Link.");
        setStatus("fehler");
        return;
      }
      var row = rows[0];
      if (row.status === "beantwortet") {
        setStatus("gesendet");
        return;
      }
      var vorausgefuellt = {};
      try { vorausgefuellt = JSON.parse(row.vorausgefuellt || "{}"); } catch(e) {}
      setFormTyp(row.typ || "stammdaten");
      setDaten(vorausgefuellt);
      setStatus("formular");
    })
    .catch(function(e) {
      setFehler("Netzwerkfehler beim Laden: " + e.message);
      setStatus("fehler");
    });
  }, []);

  var upd = function(f, v) { setDaten(function(p) { return Object.assign({}, p, {[f]: v}); }); };

  var absenden = function() {
    // Validation per formtyp
    if (formTyp === "fr_sorgerecht") {
      var pflicht = [daten.antragsteller_name, daten.gegenseite_name, daten.kind_name];
      if (pflicht.some(function(v) { return !v || !v.trim(); })) {
        alert("Bitte alle Pflichtfelder (*) ausfüllen."); return;
      }
    }

    var url = sbUrl.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(formularId);
    fetch(url, {
      method: "PATCH",
      headers: {
        "apikey": sbKey,
        "Authorization": "Bearer " + sbKey,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        status: "beantwortet",
        antwort_daten: JSON.stringify(daten),
        beantwortet_am: new Date().toISOString()
      })
    })
    .then(function(r) {
      if (r.ok) {
        setStatus("gesendet");
        // Auto-generate PDF with signature if sorgerecht
        if (formTyp === "fr_sorgerecht") {
          setTimeout(function(){ erzeugePDF(sigData); }, 500);
        }
      }
      else { r.text().then(function(t) { alert("Fehler beim Senden: " + t.slice(0, 200)); }); }
    })
    .catch(function(e) { alert("Netzwerkfehler: " + e.message); });
  };

  var ermittleGericht = function() {
    var plz = (daten.kind_plz || "").trim();
    if (!plz || plz.length < 5) { setGerichtFehler("Bitte zuerst PLZ des Kindes eingeben."); return; }
    // CORS verhindert direkten Fetch – Link zum Justizportal öffnen
    window.open("https://www.justiz.de/onlinedienste/gerichtsverzeichnis/index.php?plz=" + encodeURIComponent(plz) + "&gtyp=AG&land=", "_blank");
    setGerichtFehler("🔍 Justizportal geöffnet – bitte Amtsgericht oben eintragen.");
  };

  // ── Render ──────────────────────────────────────────────
  if (status === "laden") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px", color:"#003366" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ fontSize:"14px" }}>⏳ Formular wird geladen...</div>
      </div>
    );
  }

  if (status === "fehler") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ backgroundColor:"#fff3f3", border:"1px solid #f5c6cb", borderRadius:"10px", padding:"20px", maxWidth:"400px", margin:"0 auto" }}>
          <div style={{ fontSize:"20px", marginBottom:"8px" }}>⚠️</div>
          <div style={{ fontWeight:"bold", marginBottom:"8px", color:"#721c24" }}>Formular nicht verfügbar</div>
          <div style={{ fontSize:"12px", color:"#555" }}>{fehler}</div>
        </div>
      </div>
    );
  }

  var erzeugePDF = function(sig) {
    var d = daten;
    var jsPDF = window.jspdf && window.jspdf.jsPDF;
    if (!jsPDF) { alert("PDF-Bibliothek nicht geladen."); return; }
    var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    var W=210, mL=25, mR=25, y=20, lineH=6;
    var heute = new Date().toLocaleDateString("de-DE");
    var absAnschrift = (d.antragsteller_strasse||"") + (d.antragsteller_plz ? ", "+d.antragsteller_plz : "") + (d.antragsteller_ort ? " "+d.antragsteller_ort : "");
    // Absender oben links
    doc.setFontSize(10); doc.setFont("helvetica","bold");
    doc.text(d.antragsteller_name||"", mL, y);
    doc.setFont("helvetica","normal");
    if (d.antragsteller_strasse) { y+=5; doc.text(d.antragsteller_strasse, mL, y); }
    if (d.antragsteller_plz||d.antragsteller_ort) { y+=5; doc.text((d.antragsteller_plz||"")+" "+(d.antragsteller_ort||""), mL, y); }
    // Datum oben rechts
    doc.text(d.antragsteller_ort ? d.antragsteller_ort+", "+heute : heute, W-mR, 20, {align:"right"});
    // Empfänger (Gericht)
    y+=12;
    doc.text("An das", mL, y); y+=5;
    doc.setFont("helvetica","bold");
    doc.text(d.gericht||"Amtsgericht _______________", mL, y); y+=5;
    doc.setFont("helvetica","normal");
    doc.text("– Abteilung für Familiensachen –", mL, y); y+=14;
    // Betreff
    doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text("Antrag auf Übertragung der gemeinsamen elterlichen Sorge", mL, y); y+=6;
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("gemäß § 1626a Abs. 2 BGB i.d.F. des Gesetzes v. 19.05.2013 (BGBl. I S. 1084)", mL, y); y+=5;
    doc.text("Betr.: Kind: "+(d.kind_name||"_______________")+(d.kind_geburt ? ", geb. "+d.kind_geburt : ""), mL, y); y+=10;
    doc.setLineWidth(0.3); doc.line(mL, y, W-mR, y); y+=8;
    var section = function(t) {
      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text(t, mL, y); doc.setLineWidth(0.2);
      doc.line(mL, y+1.5, W-mR, y+1.5); y+=8;
      doc.setFont("helvetica","normal"); doc.setFontSize(10);
    };
    var row = function(label, val) {
      doc.setFont("helvetica","bold"); doc.text(label+":", mL, y);
      doc.setFont("helvetica","normal");
      var ls = doc.splitTextToSize(val||"—", W-mL-mR-48);
      doc.text(ls, mL+48, y); y+=Math.max(lineH, ls.length*lineH);
    };
    section("I. Beteiligte");
    row("Antragsteller (Vater)", (d.antragsteller_name||"")+(absAnschrift ? ", "+absAnschrift : ""));
    row("Antragsgegnerin (Mutter)", (d.gegenseite_name||"")+(d.gegenseite_strasse ? ", "+d.gegenseite_strasse+", "+(d.gegenseite_plz||"")+" "+(d.gegenseite_ort||"") : "")); y+=4;
    section("II. Kind");
    row("Name", d.kind_name||"");
    row("Geburtsdatum", d.kind_geburt||"");
    row("Hauptwohnsitz", d.kind_strasse ? d.kind_strasse+", "+(d.kind_plz||"")+" "+(d.kind_ort||"") : ""); y+=4;
    section("III. Antrag");
    var aLines = doc.splitTextToSize("Der Antragsteller beantragt, ihm zusammen mit der Antragsgegnerin die gemeinsame elterliche Sorge für das oben genannte Kind gemäß § 1626a Abs. 2 BGB zu übertragen.", W-mL-mR);
    doc.setFontSize(10); doc.text(aLines, mL, y); y+=aLines.length*lineH+4;
    section("IV. Begründung");
    var bParts = [
      "1. Gemäß § 1626a Abs. 2 Satz 1 BGB überträgt das Familiengericht auf Antrag des Vaters die elterliche Sorge oder einen Teil davon beiden Eltern gemeinsam, wenn die Übertragung dem Kindeswohl nicht widerspricht.",
      "2. Gemäß § 1626a Abs. 2 Satz 2 BGB wird widerleglich vermutet, dass die Übertragung dem Kindeswohl nicht widerspricht (Kindeswohlvermutung). Die Beweislast liegt beim ablehnenden Elternteil (BGH, Beschluss v. 15.06.2016 – XII ZB 419/15).",
      "3. Tatsächliche Anhaltspunkte, die der Übertragung der gemeinsamen Sorge entgegenstehen würden, sind nicht ersichtlich. Eine gemeinsame Ausübung der elterlichen Sorge liegt im wohlverstandenen Interesse des Kindes."
    ];
    doc.setFontSize(10);
    bParts.forEach(function(part) { var ls=doc.splitTextToSize(part,W-mL-mR); doc.text(ls,mL,y); y+=ls.length*lineH+3; }); y+=4;
    // Unterschrift
    doc.setLineWidth(0.3); doc.line(mL, y, W-mR, y); y+=8;
    doc.text((d.antragsteller_ort||"_____________")+", den "+heute, mL, y); y+=14;
    if (sig) { try { doc.addImage(sig,"PNG",mL,y,70,25); } catch(e){} y+=28; }
    else { doc.line(mL,y+12,mL+70,y+12); y+=16; }
    doc.setFontSize(9); doc.text(d.antragsteller_name||"Antragsteller", mL, y);
    doc.save("Sorgerechtsantrag_"+(d.antragsteller_name||"").replace(/ /g,"_")+".pdf");
  };

  if (status === "gesendet") {
    return (
      <div style={{ padding:"40px 20px", textAlign:"center" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"16px" }} /><br/>
        <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"10px", padding:"20px", maxWidth:"420px", margin:"0 auto 20px" }}>
          <div style={{ fontSize:"28px", marginBottom:"6px" }}>✅</div>
          <div style={{ fontWeight:"bold", fontSize:"15px", marginBottom:"6px", color:"#2e7d32" }}>Angaben übermittelt</div>
          <div style={{ fontSize:"12px", color:"#555" }}>Ihre Angaben wurden erfolgreich übermittelt.</div>
        </div>
        {formTyp === "tbg" && (
          <div style={{ maxWidth:"420px", margin:"0 auto" }}>
            <button onClick={function(){
              var jsPDF = window.jspdf && window.jspdf.jsPDF;
              if(!jsPDF){ alert("PDF-Bibliothek nicht geladen."); return; }
              var heute = new Date().toLocaleDateString("de-DE");
              var doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
              doc.setFillColor(0,51,102); doc.rect(15,15,180,18,"F");
              doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont("helvetica","bold");
              doc.text("Anlage TBG – Angaben übermittelt", 19, 27);
              doc.setTextColor(0,0,0); doc.setFontSize(10); doc.setFont("helvetica","normal");
              doc.text("Ihre Angaben wurden am "+heute+" erfolgreich übermittelt.", 15, 45);
              doc.text("Ihr Berater wird die Anlage TBG prüfen und Sie kontaktieren.", 15, 53);
              doc.save("Anlage_TBG_Bestaetigung.pdf");
            }}
              style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
              📄 Bestätigung als PDF speichern
            </button>
          </div>
        )}
        {formTyp === "fr_sorgerecht" && (
          <div style={{ maxWidth:"420px", margin:"0 auto" }}>
            {sigData ? (
              <div style={{ marginBottom:"12px" }}>
                <img src={sigData} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift" />
                <button onClick={function(){ setSigData(null); }} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer", marginTop:"4px" }}>✕ Unterschrift löschen</button>
              </div>
            ) : (
              <button onClick={function(){ setSigModal(true); }}
                style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"10px" }}>
                ✍️ Jetzt unterschreiben (optional)
              </button>
            )}
            <button onClick={function(){ erzeugePDF(sigData); }}
              style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
              📄 Antrag als PDF speichern
            </button>
          </div>
        )}
        {sigModal && <SigModal onSave={function(d){ setSigData(d); setSigModal(false); }} onClose={function(){ setSigModal(false); }} />}
      </div>
    );
  }

  // ── Sorgerecht-Formular ──────────────────────────────────
  if (formTyp === "fr_sorgerecht") {
    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"24px 16px 16px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <img src={ISUV_LOGO} alt="ISUV" style={{ width:"140px", height:"auto", marginBottom:"10px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>ISUV Anspruchslotse</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Antrag Gemeinsames Sorgerecht (§ 1626a Abs. 2 BGB)</div>
        </div>

        <div style={{ padding:"0 16px" }}>
          <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"8px", padding:"10px 12px", marginBottom:"16px", fontSize:"11px", color:"#2e7d32" }}>
            ✅ <strong>Keine Begründung erforderlich.</strong> Nach § 1626a Abs. 2 BGB (Reform 2013) wird die gemeinsame Sorge übertragen, sofern sie dem Kindeswohl nicht widerspricht.
          </div>

          {/* Vater (Antragsteller) */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginBottom:"10px", letterSpacing:"0.5px" }}>👨 Vater (Antragsteller)</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.antragsteller_name||""} onChange={function(e){ upd("antragsteller_name", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.antragsteller_strasse||""} onChange={function(e){ upd("antragsteller_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}><label style={styles.label}>PLZ</label><input style={styles.input} placeholder="12345" value={daten.antragsteller_plz||""} onChange={function(e){ upd("antragsteller_plz", e.target.value); }} /></div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.antragsteller_ort||""} onChange={function(e){ upd("antragsteller_ort", e.target.value); }} /></div>
          </div>

          {/* Mutter (Antragsgegnerin) */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>👩 Mutter (Antragsgegnerin)</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.gegenseite_name||""} onChange={function(e){ upd("gegenseite_name", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.gegenseite_strasse||""} onChange={function(e){ upd("gegenseite_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}><label style={styles.label}>PLZ</label><input style={styles.input} placeholder="12345" value={daten.gegenseite_plz||""} onChange={function(e){ upd("gegenseite_plz", e.target.value); }} /></div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.gegenseite_ort||""} onChange={function(e){ upd("gegenseite_ort", e.target.value); }} /></div>
          </div>

          {/* Kind */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>👶 Kind</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.kind_name||""} onChange={function(e){ upd("kind_name", e.target.value); }} />
          <label style={styles.label}>Geburtsdatum</label>
          <input style={styles.input} type="date" value={daten.kind_geburt||""} onChange={function(e){ upd("kind_geburt", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer (Hauptwohnsitz)</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.kind_strasse||""} onChange={function(e){ upd("kind_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}>
              <label style={styles.label}>PLZ</label>
              <input style={styles.input} placeholder="12345" value={daten.kind_plz||""} onChange={function(e){ upd("kind_plz", e.target.value); setGerichtFehler(""); }} />
            </div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.kind_ort||""} onChange={function(e){ upd("kind_ort", e.target.value); }} /></div>
          </div>

          {/* Gericht */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>⚖️ Zuständiges Gericht</div>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px", alignItems:"flex-end" }}>
            <div style={{ flex:1 }}>
              <label style={styles.label}>Amtsgericht</label>
              <input style={styles.input} placeholder="Wird automatisch ermittelt oder manuell eintragen" value={daten.gericht||""} onChange={function(e){ upd("gericht", e.target.value); }} />
            </div>
            <button onClick={ermittleGericht}
              style={{ padding:"10px 12px", backgroundColor:"#1565c0", color:"#fff", border:"none", borderRadius:"6px", cursor:"pointer", fontWeight:"bold", fontSize:"11px", whiteSpace:"nowrap", marginBottom:"10px" }}>
              🔍 Gericht nachschlagen
            </button>
          </div>
          {gerichtFehler && (
            <div style={{ fontSize:"11px", color: gerichtFehler.startsWith("✅") ? "#2e7d32" : "#856404", backgroundColor: gerichtFehler.startsWith("✅") ? "#e8f5e9" : "#fff9e6", borderRadius:"6px", padding:"6px 10px", marginBottom:"8px" }}>
              {gerichtFehler}
            </div>
          )}
          <div style={{ fontSize:"10px", color:"#888", marginBottom:"16px" }}>ℹ️ Zuständig ist das Amtsgericht am <strong>Hauptwohnsitz des Kindes</strong> (§ 152 FamFG).</div>

          {/* Unterschrift */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>✍️ Unterschrift</div>
          {sigData ? (
            <div style={{ marginBottom:"10px" }}>
              <img src={sigData} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift" />
              <button onClick={function(){ setSigData(null); }} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer", marginTop:"4px" }}>✕ Löschen</button>
            </div>
          ) : (
            <button onClick={function(){ setSigModal(true); }}
              style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"10px" }}>
              ✍️ Jetzt unterschreiben (mit Finger oder Maus)
            </button>
          )}
          <button onClick={absenden}
            style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer", marginTop:"8px", marginBottom:"24px" }}>
            ✅ Angaben übermitteln & PDF erzeugen
          </button>
          {sigModal && <SigModal onSave={function(d){ setSigData(d); setSigModal(false); }} onClose={function(){ setSigModal(false); }} />}
        </div>
      </div>
    );
  }

  // ── Stammdaten-Fragebogen ────────────────────────────────
  if (formTyp === "stammdaten") {
    var d = daten;
    var inp = function(field, placeholder, type) {
      return <input style={styles.input} type={type||"text"} placeholder={placeholder||""} value={d[field]||""} onChange={function(e){ upd(field, e.target.value); }} />;
    };
    var lbl = function(text) { return <label style={styles.label}>{text}</label>; };
    var sec = function(icon, title) {

      if (alter < 0 || alter > 25) return null;
      var stufe = alter < 6 ? "u6" : alter < 14 ? "u14" : alter < 18 ? "u18" : alter < 25 ? "u25" : "ab25";
      return { alter: alter, betrag: REGEL2025[stufe], stufe: stufe };

        if(sG>0){
          doc.setFillColor(0,51,102); doc.rect(margin,y,cw,5.5,"F"); doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8);
          doc.text("Gesamt",margin+2,y+4); doc.text(String(sA),margin+colW+2,y+4); doc.text(String(sB),margin+colW*2+2,y+4);
          doc.setTextColor(0,0,0); y+=8;
        } else { y+=3; }
        // Regelsatz-Berechnung
        var ri = berechneRegelKind(k.kGeburt);
        if(ri && sG>0){
          if(y>265){ doc.addPage(); y=15; }
          doc.setFillColor(232,245,233); doc.rect(margin,y,cw,sG>0?14:8,"F");
          doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(27,94,32);
          doc.text("Regelsatz 2025 (SGB II) – Kind "+ki+" ("+ri.alter+" J., Stufe "+ri.stufe+"): "+ri.betrag+" €/Monat", margin+3, y+5);
          doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(85,85,85);
          var antA2 = Math.round(sA/sG*100);
          var antB2 = 100-antA2;
          var rA = Math.round(ri.betrag * sA / sG);
          var rB = ri.betrag - rA;
          if(antA2>=43 && antA2<=57){
            doc.text("Paritätisch: je "+Math.round(ri.betrag/2)+" €/Monat pro Elternteil", margin+3, y+10);
          } else {
            doc.text("Antragsteller*in ("+antA2+"%, "+sA+" Tage): "+rA+" €/Monat   ·   And. Elternteil ("+antB2+"%, "+sB+" Tage): "+rB+" €/Monat", margin+3, y+10);
          }
          doc.setTextColor(0,0,0); y+=17;
        } else { y+=3; }
      });
      // Unterschriften
      if(y>230){ doc.addPage(); y=15; }
      doc.setFillColor(106,27,154); doc.rect(margin, y, cw, 7, "F");
      doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
      doc.text("Unterschriften & Umgangsvereinbarung", margin+3, y+5);
      doc.setTextColor(0,0,0); y+=10;
      doc.setFontSize(8); doc.setFont("helvetica","normal");
      doc.text("Ort/Datum: "+(d.ortDatum||"–"), margin, y); y+=10;
      if(sig){ try{ doc.setFont("helvetica","bold"); doc.text("Unterschrift Antragsteller*in:", margin, y); y+=3; doc.addImage(sig,"PNG",margin,y,80,20); doc.line(margin,y+21,margin+80,y+21); y+=25; }catch(e){} }
      // Footer
      doc.setFontSize(7); doc.setTextColor(150,150,150);
      doc.text("Erstellt mit ISUV Anspruchslotse · "+heute, margin, 290);
      doc.save("Anlage_TBG_"+(d.antNachname||"").replace(/ /g,"_")+"_"+(kinder[0]&&kinder[0].kalenderjahr||new Date().getFullYear())+".pdf");
    };

    // Unterschrift anderer Elternteil – State über daten-Objekt
    var sigEp = d.sigAndererElternteil || "";
    var showSigEpModal = d._sigEpModal || false;

    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"20px 16px 12px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <img src={ISUV_LOGO} alt="ISUV" style={{ width:"130px", height:"auto", marginBottom:"8px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>Anlage TBG</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Temporäre Bedarfsgemeinschaft · Bürgergeldantrag · Umgangsvereinbarung</div>
        </div>
        <div style={{ padding:"0 16px" }}>

          {sec("👤", "① Persönliche Daten Antragsteller*in (Umgangsberechtigte/r)")}
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Nachname *")}<input style={fi} value={d.antNachname||""} onChange={function(e){upd("antNachname",e.target.value);}} placeholder="Nachname" /></div>
            <div style={{ flex:1 }}>{lbl("Vorname *")}<input style={fi} value={d.antVorname||""} onChange={function(e){upd("antVorname",e.target.value);}} placeholder="Vorname" /></div>
          </div>
          {lbl("Straße & Hausnummer")}<input style={fi} value={d.antStrasse||""} onChange={function(e){upd("antStrasse",e.target.value);}} placeholder="Musterstraße 1" />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}>{lbl("PLZ")}<input style={fi2} value={d.antPlz||""} onChange={function(e){upd("antPlz",e.target.value);}} placeholder="12345" /></div>
            <div style={{ flex:1 }}>{lbl("Ort")}<input style={fi2} value={d.antOrt||""} onChange={function(e){upd("antOrt",e.target.value);}} placeholder="Stadt" /></div>
          </div>
          <div style={{ display:"flex", gap:"6px", marginTop:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Geburtsdatum (TT.MM.JJJJ)")}<input style={fi2} placeholder="z.B. 15.03.1985" value={d.antGeburt||""} onChange={function(e){upd("antGeburt",e.target.value);}} /></div>
            <div style={{ flex:1 }}>{lbl("BG-Nummer (opt.)")}<input style={fi2} value={d.antBGNr||""} onChange={function(e){upd("antBGNr",e.target.value);}} placeholder="BG-Nr." /></div>
          </div>
          <div style={{ display:"flex", gap:"6px", marginTop:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Telefon")}<input style={fi2} type="tel" value={d.antTel||""} onChange={function(e){upd("antTel",e.target.value);}} placeholder="01701234567" /></div>
            <div style={{ flex:1 }}>{lbl("E-Mail")}<input style={fi2} type="email" value={d.antMail||""} onChange={function(e){upd("antMail",e.target.value);}} placeholder="name@mail.de" /></div>
          </div>

          {/* Kinder */}
          {kinder.map(function(kind, idx){
            var kal = kind.kalender || { antragsteller:Array(12).fill(""), anderer:Array(12).fill("") };
            var sumAnt = (kal.antragsteller||[]).reduce(function(s,x){return s+(parseInt(x)||0);},0);
            var sumAnd = (kal.anderer||[]).reduce(function(s,x){return s+(parseInt(x)||0);},0);
            var sumGes = sumAnt+sumAnd;
            var anteilAnt = sumGes>0 ? Math.round(sumAnt/sumGes*100) : 0;
            var istParit = anteilAnt>=43 && anteilAnt<=57;
            // Regelsatz berechnen
            var regelInfo = berechneRegelKind(kind.kGeburt);
            return (
              <div key={idx} style={{ border:"2px solid #00afad", borderRadius:"10px", padding:"14px", marginTop:"16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
                  <span style={{ fontWeight:"bold", fontSize:"14px", color:"#00afad" }}>Kind #{idx+1}</span>
                  {kinder.length>1 && <button onClick={function(){removeKind(idx);}} style={{ background:"none", border:"none", color:"#e53935", fontSize:"20px", cursor:"pointer", padding:0 }}>×</button>}
                </div>

                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginBottom:"10px", letterSpacing:"0.5px" }}>② Kind & anderer Elternteil</div>
                <div style={{ display:"flex", gap:"6px" }}>
                  <div style={{ flex:1 }}>{lbl("Nachname Kind *")}<input style={fi2} value={kind.kNachname||""} onChange={function(e){kindUpd(idx,"kNachname",e.target.value);}} placeholder="Nachname" /></div>
                  <div style={{ flex:1 }}>{lbl("Vorname Kind *")}<input style={fi2} value={kind.kVorname||""} onChange={function(e){kindUpd(idx,"kVorname",e.target.value);}} placeholder="Vorname" /></div>
                </div>
                {/* FIX 1: Text-Input statt type=date – kein langes Scrollen durch Jahrzehnte */}
                <div style={{ marginTop:"6px" }}>{lbl("Geburtsdatum Kind * (TT.MM.JJJJ)")}<input style={fi} placeholder="z.B. 22.07.2016" value={kind.kGeburt||""} onChange={function(e){kindUpd(idx,"kGeburt",e.target.value);}} /></div>

                {/* FIX 3: Regelsatz-Rechner */}
                {regelInfo ? (
                  <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"8px", padding:"10px 12px", marginBottom:"8px", fontSize:"12px" }}>
                    <div style={{ fontWeight:"bold", color:"#1b5e20", marginBottom:"3px" }}>📊 Regelsatz 2025 (SGB II)</div>
                    <div style={{ display:"flex", justifyContent:"space-between" }}>
                      <span style={{ color:"#555" }}>Alter: {regelInfo.alter} Jahre · Stufe: {regelInfo.stufe}</span>
                      <span style={{ fontWeight:"bold", color:"#1b5e20", fontSize:"14px" }}>{regelInfo.betrag} €/Monat</span>
                    </div>
                    {sumGes > 0 && !istParit && (
                      <div style={{ marginTop:"4px", color:"#555", fontSize:"11px" }}>
                        Antragst. ({anteilAnt}%): <strong>{Math.round(regelInfo.betrag * anteilAnt / 100)} €</strong> &nbsp;·&nbsp; And. ET ({100-anteilAnt}%): <strong>{Math.round(regelInfo.betrag * (100-anteilAnt) / 100)} €</strong>
                      </div>
                    )}
                    {sumGes > 0 && istParit && (
                      <div style={{ marginTop:"4px", color:"#555", fontSize:"11px" }}>
                        Paritätisch: je <strong>{Math.round(regelInfo.betrag / 2)} €</strong> pro Elternteil
                      </div>
                    )}
                  </div>
                ) : kind.kGeburt && kind.kGeburt.length >= 10 ? (
                  <div style={{ backgroundColor:"#fff3e0", border:"1px solid #ffcc02", borderRadius:"6px", padding:"6px 10px", fontSize:"11px", color:"#e65100", marginBottom:"8px" }}>
                    ⚠️ Geburtsdatum prüfen (Format: TT.MM.JJJJ)
                  </div>
                ) : null}

                <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", marginTop:"10px", marginBottom:"6px", borderTop:"1px dashed #ddd", paddingTop:"8px" }}>Anderer Elternteil</div>
                <div style={{ display:"flex", gap:"6px" }}>
                  <div style={{ flex:1 }}>{lbl("Nachname")}<input style={fi2} value={kind.epNachname||""} onChange={function(e){kindUpd(idx,"epNachname",e.target.value);}} placeholder="Nachname" /></div>
                  <div style={{ flex:1 }}>{lbl("Vorname")}<input style={fi2} value={kind.epVorname||""} onChange={function(e){kindUpd(idx,"epVorname",e.target.value);}} placeholder="Vorname" /></div>
                </div>
                <div style={{ marginTop:"6px" }}>{lbl("Straße & Hausnummer")}<input style={fi} value={kind.epStrasse||""} onChange={function(e){kindUpd(idx,"epStrasse",e.target.value);}} placeholder="Straße, Hausnummer" /></div>
                <div style={{ display:"flex", gap:"6px" }}>
                  <div style={{ width:"90px" }}>{lbl("PLZ")}<input style={fi2} value={kind.epPlz||""} onChange={function(e){kindUpd(idx,"epPlz",e.target.value);}} placeholder="PLZ" /></div>
                  <div style={{ flex:1 }}>{lbl("Ort")}<input style={fi2} value={kind.epOrt||""} onChange={function(e){kindUpd(idx,"epOrt",e.target.value);}} placeholder="Ort" /></div>
                </div>
                <div style={{ marginTop:"6px" }}>{lbl("E-Mail anderer Elternteil (für Versand)")}<input style={fi} type="email" value={kind.epMail||""} onChange={function(e){kindUpd(idx,"epMail",e.target.value);}} placeholder="elternteil@mail.de" /></div>
                <div style={{ marginTop:"0" }}>{lbl("Telefon anderer Elternteil (WhatsApp)")}<input style={fi} type="tel" value={kind.epTel||""} onChange={function(e){kindUpd(idx,"epTel",e.target.value);}} placeholder="+491701234567" /></div>

                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>③ Betreuungsaufteilung</div>
                {[{v:"keine",t:"Keine Aufteilung gewünscht (Kind lebt überwiegend bei Antragsteller*in)"},{v:"paritaetisch",t:"Paritätisches Wechselmodell (ca. 50:50)"},{v:"asymmetrisch",t:"Asymmetrisches / Residenzmodell (2–12 Tage beim anderen ET)"}].map(function(opt){
                  return (
                    <label key={opt.v} style={checkRow} onClick={function(){kindUpd(idx,"aufteilungsWunsch",opt.v);}}>
                      <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.aufteilungsWunsch===opt.v?"#003366":"#fff", flexShrink:0, marginTop:"1px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {kind.aufteilungsWunsch===opt.v && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"bold" }}>✓</span>}
                      </div>
                      <span>{opt.t}</span>
                    </label>
                  );
                })}

                {/* § 7 SGB II Umgangstage – korrekte Erklärung */}
                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"6px", letterSpacing:"0.5px" }}>④ Kalender – Umgangstage (§ 7 SGB II)</div>
                <div style={{ backgroundColor:"#e8f0fb", border:"1px solid #90caf9", borderRadius:"7px", padding:"9px 12px", fontSize:"11px", color:"#003366", marginBottom:"10px", lineHeight:"1.75" }}>
                  <strong>§ 7 SGB II – Zählung der Umgangstage:</strong><br/>
                  Als Umgangstag zählt ein Tag nur, wenn das Kind <strong>mehr als 12 Stunden</strong> im Haushalt des Umgangsberechtigten verbringt.<br/>
                  Bei <strong>genau 12 Stunden in beiden Haushalten</strong> gilt der Tag als Umgangstag bei dem Elternteil, bei dem das Kind <strong>übernachtet hat</strong>.
                </div>
                <div style={{ marginBottom:"8px" }}>{lbl("Kalenderjahr")}<input style={{ ...fi2, width:"120px" }} value={kind.kalenderjahr||String(new Date().getFullYear())} onChange={function(e){kindUpd(idx,"kalenderjahr",e.target.value);}} /></div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 70px 70px", gap:"4px", marginTop:"6px" }}>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", padding:"4px 6px", backgroundColor:"#e8f0fb", borderRadius:"4px" }}>Monat</div>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", padding:"4px 6px", backgroundColor:"#e8f0fb", borderRadius:"4px", textAlign:"center" }}>Antragst.</div>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", padding:"4px 6px", backgroundColor:"#e8f0fb", borderRadius:"4px", textAlign:"center" }}>And. ET</div>
                  {MONATE_TBG.map(function(m, mi){
                    var tagA=parseInt((kal.antragsteller||[])[mi]||"0")||0;
                    var tagB=parseInt((kal.anderer||[])[mi]||"0")||0;
                    var ges=tagA+tagB;
                    var warn=ges>0&&(ges<28||ges>31);
                    return (
                      <React.Fragment key={m}>
                        <div style={{ fontSize:"12px", padding:"4px 6px", borderBottom:"1px solid #f0f0f0", display:"flex", alignItems:"center", gap:"4px" }}>
                          {m}{warn && <span title={"Summe "+ges+" Tage – prüfen"} style={{ fontSize:"9px", color:"#e53935" }}>⚠️</span>}
                        </div>
                        <input type="number" min="0" max="31" style={{ ...styles.input, textAlign:"center", padding:"4px", marginBottom:"0" }} value={(kal.antragsteller||[])[mi]||""} onChange={function(e){kalUpd(idx,"antragsteller",mi,e.target.value);}} placeholder="–" />
                        <input type="number" min="0" max="31" style={{ ...styles.input, textAlign:"center", padding:"4px", marginBottom:"0" }} value={(kal.anderer||[])[mi]||""} onChange={function(e){kalUpd(idx,"anderer",mi,e.target.value);}} placeholder="–" />
                      </React.Fragment>
                    );
                  })}
                  <div style={{ fontSize:"11px", fontWeight:"bold", color:"#003366", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>Gesamt</div>
                  <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnt}</div>
                  <div style={{ fontSize:"11px", fontWeight:"bold", textAlign:"center", padding:"6px", borderTop:"2px solid #003366", backgroundColor:"#f0f4f7" }}>{sumAnd}</div>
                </div>
                {sumGes>0 && (
                  <div style={{ marginTop:"8px", backgroundColor:istParit?"#e8f5e9":"#fff3e0", border:"1px solid "+(istParit?"#a5d6a7":"#ffcc02"), borderRadius:"7px", padding:"8px 10px", fontSize:"11px" }}>
                    <div>{istParit ? "✅ Paritätisches Wechselmodell erkannt (43–57%)" : "📊 Asymmetrisch"} · Antragst. {anteilAnt}% ({sumAnt} Tage) · And. ET {100-anteilAnt}% ({sumAnd} Tage)</div>
                    {regelInfo && (
                      <div style={{ marginTop:"5px", borderTop:"1px dashed "+(istParit?"#a5d6a7":"#ffcc02"), paddingTop:"5px", color:"#333" }}>
                        <strong>Regelsatz Kind ({regelInfo.alter} J.):</strong> {regelInfo.betrag} €/Monat
                        {!istParit && sumGes > 0 && (
                          <span style={{ marginLeft:"8px", color:"#555" }}>
                            → Antragst. <strong>{Math.round(regelInfo.betrag * anteilAnt / 100)} €</strong> · And. ET <strong>{Math.round(regelInfo.betrag * (100-anteilAnt) / 100)} €</strong>
                          </span>
                        )}
                        {istParit && (
                          <span style={{ marginLeft:"8px", color:"#555" }}>→ je Elternteil <strong>{Math.round(regelInfo.betrag / 2)} €</strong></span>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* FIX 2: Kindergeld vorausgefüllt, Abschnitt ⑤ */}
                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>⑤ Einkommen des Kindes</div>
                {lbl("Kindergeldberechtigte Person")}<input style={fi} value={kind.kgBerechtigt||""} onChange={function(e){kindUpd(idx,"kgBerechtigt",e.target.value);}} placeholder="Name der Person, die Kindergeld bezieht" />
                {lbl("Kindergeldbetrag (€/Monat)")}<input type="number" style={fi} value={kind.kgBetrag||""} onChange={function(e){kindUpd(idx,"kgBetrag",e.target.value);}} placeholder="z.B. 250" />
                <label style={checkRow} onClick={function(){kindUpd(idx,"kgWeiterleitung",kind.kgWeiterleitung==="ja"?"":"ja");}}>
                  <div style={{ width:"18px", height:"18px", border:"2px solid #003366", borderRadius:"3px", backgroundColor:kind.kgWeiterleitung==="ja"?"#003366":"#fff", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {kind.kgWeiterleitung==="ja" && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"bold" }}>✓</span>}
                  </div>
                  <span>Kindergeld wird an anderen Elternteil weitergeleitet</span>
                </label>
                {kind.kgWeiterleitung==="ja" && (
                  <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"8px", marginLeft:"26px", fontSize:"12px", color:"#555" }}>
                    Weiterleitungsbetrag: <input type="number" style={{ ...fi2, width:"90px" }} value={kind.kgWeiterleitungBetrag||""} onChange={function(e){kindUpd(idx,"kgWeiterleitungBetrag",e.target.value);}} placeholder="EUR" /> EUR/Monat
                  </div>
                )}
                {lbl("Sonstige Angaben / Besonderheiten")}
                <textarea style={Object.assign({},styles.input,{minHeight:"60px",resize:"vertical"})} value={kind.sonstigeAngaben||""} onChange={function(e){kindUpd(idx,"sonstigeAngaben",e.target.value);}} placeholder="Weitere Angaben..." />
              </div>
            );
          })}

          <button onClick={addKind}
            style={{ width:"100%", padding:"11px", backgroundColor:"#e8f4fd", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", cursor:"pointer", fontWeight:"bold", fontSize:"13px", marginTop:"14px" }}>
            + Weiteres Kind hinzufügen
          </button>

          {/* ── Umgangsvereinbarung: Unterschrift anderer Elternteil ── */}
          {(function(){
            var ep0 = kinder[0] || {};
            var epVollname = ((ep0.epVorname||"")+" "+(ep0.epNachname||"")).trim();
            var sigEp = d.sigAndererElternteil || "";
            var showSigEpModal = d._sigEpModal || false;
            return (
              <div style={{ border:"2px solid #6a1b9a", borderRadius:"10px", padding:"14px", marginTop:"16px", marginBottom:"12px" }}>
                <div style={{ fontWeight:"bold", fontSize:"13px", color:"#4a148c", marginBottom:"3px" }}>📋 Umgangsvereinbarung & Unterschrift anderer Elternteil</div>
                <div style={{ fontSize:"11px", color:"#555", marginBottom:"12px", lineHeight:"1.6" }}>
                  Mit beiden Unterschriften gilt die Anlage TBG gleichzeitig als <strong>verbindliche Umgangsvereinbarung</strong> (§ 7 SGB II). Der andere Elternteil kann das Formular per Link erhalten (siehe unten) und direkt am Smartphone unterschreiben – oder hier direkt vor Ort.
                </div>

                {/* Unterschrift-Canvas anderer Elternteil */}
                <div style={{ fontWeight:"bold", fontSize:"12px", color:"#4a148c", marginBottom:"6px" }}>
                  ✍️ Unterschrift: {epVollname || "Anderer Elternteil"}
                </div>
                {sigEp ? (
                  <div>
                    <img src={sigEp} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift and. Elternteil" />
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"4px" }}>
                      <span style={{ fontSize:"10px", color:"#2e7d32", fontWeight:"bold" }}>✅ Unterschrift vorhanden – gilt als Umgangsvereinbarung</span>
                      <button onClick={function(){upd("sigAndererElternteil","");}} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer" }}>✕ Löschen</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={function(){upd("_sigEpModal",true);}}
                    style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#4a148c", border:"2px dashed #6a1b9a", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>
                    ✍️ Hier unterschreiben – anderer Elternteil (Finger / Maus)
                  </button>
                )}
                {showSigEpModal && <SigModal titel={"Unterschrift: "+(epVollname||"Anderer Elternteil")} onSave={function(dataUrl){upd("sigAndererElternteil",dataUrl);upd("_sigEpModal",false);}} onClose={function(){upd("_sigEpModal",false);}} />}
              </div>
            );
          })()}

          {sec("✍️", "⑥ Ort, Datum & Unterschrift Antragsteller*in")}
          {lbl("Ort, Datum")}<input style={fi} value={d.ortDatum||""} onChange={function(e){upd("ortDatum",e.target.value);}} placeholder={"z.B. Beispielort, "+new Date().toLocaleDateString("de-DE")} />
          {sigData ? (
            <div style={{ marginBottom:"10px" }}>
              <img src={sigData} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift Antragsteller*in" />
              <button onClick={function(){setSigData(null);}} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer", marginTop:"4px" }}>✕ Löschen</button>
            </div>
          ) : (
            <button onClick={function(){setSigModal(true);}}
              style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"10px" }}>
              ✍️ Antragsteller*in unterschreiben (Finger / Maus)
            </button>
          )}

          {/* PDF-Erzeugung erfolgt über erzeugeTbgPDF() in der Aktionsleiste unten */}
          {/* AKTIONSLEISTE                                      */}
          {/* ══════════════════════════════════════════════════ */}
          <div style={{ marginTop:"8px", marginBottom:"20px" }}>

            {/* ── Abschnitt: Speichern ── */}
            <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:"6px", marginTop:"4px" }}>💾 Speichern</div>

            {/* Ausgefülltes Formular als PDF speichern */}
            <button onClick={function(){ erzeugeTbgPDF(sigData); }}
              style={{ width:"100%", padding:"11px", backgroundColor:"#e8f5e9", color:"#1b5e20", border:"1px solid #a5d6a7", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"6px" }}>
              📄 Ausgefülltes Formular als PDF speichern
            </button>

            {/* Leerformular als PDF speichern */}
            <button onClick={function(){
              var jsPDF = window.jspdf && window.jspdf.jsPDF;
              if(!jsPDF){ alert("PDF-Bibliothek nicht geladen."); return; }
              var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
              var pw=210, margin=15, cw=pw-margin*2, y=15;
              doc.setFillColor(0,51,102); doc.rect(margin,y,cw,20,"F");
              doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont("helvetica","bold");
              doc.text("Anlage TBG – Temporäre Bedarfsgemeinschaft", margin+4, y+8);
              doc.setFontSize(8); doc.setFont("helvetica","normal");
              doc.text("Bürgergeldantrag · Umgangsvereinbarung § 7 SGB II · Leerformular", margin+4, y+14);
              y+=24; doc.setTextColor(0,0,0);
              var linie = function(label, breite) {
                if(y>272){ doc.addPage(); y=15; }
                doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.text(label+":", margin, y);
                doc.setFont("helvetica","normal"); doc.line(margin+50, y+1, margin+50+(breite||cw-50), y+1); y+=8;
              };
              var abschnitt = function(titel) {
                if(y>265){ doc.addPage(); y=15; }
                doc.setFillColor(230,240,251); doc.rect(margin,y,cw,7,"F");
                doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(0,51,102);
                doc.text(titel, margin+3, y+5); doc.setTextColor(0,0,0); y+=10;
              };
              abschnitt("(1) Antragsteller*in / Umgangsberechtigte*r");
              linie("Name, Vorname"); linie("Straße, Hausnummer"); linie("PLZ / Ort");
              linie("Geburtsdatum (TT.MM.JJJJ)", 60); linie("BG-Nummer", 60); linie("Telefon", 70); linie("E-Mail");
              abschnitt("(2) Kind & anderer Elternteil");
              linie("Nachname Kind", 70); linie("Vorname Kind", 70); linie("Geb. Kind (TT.MM.JJJJ)", 60);
              linie("Nachname and. ET", 70); linie("Vorname and. ET", 70); linie("Straße / Haus-Nr. and. ET"); linie("PLZ / Ort and. ET");
              abschnitt("(3) Betreuungsaufteilung");
              ["Keine Aufteilung (Residenzmodell – Kind lebt überwiegend beim and. ET)", "Paritätisches Wechselmodell (~50:50)", "Asymmetrisches Wechselmodell (2–12 Tage/Monat beim Antragsteller)"].forEach(function(opt) {
                if(y>272){ doc.addPage(); y=15; }
                doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.rect(margin, y-3, 4, 4); doc.text(opt, margin+6, y+0.5); y+=7;
              });
              y+=3;
              abschnitt("(4) Umgangstage (§ 7 SGB II – nur Tage mit >12h Umgang zählen; bei genau 12h entscheidet Übernachtung)");
              var colW=cw/3;
              doc.setFontSize(7); doc.setFont("helvetica","bold"); doc.setFillColor(220,230,241);
              doc.rect(margin,y,colW,6,"F"); doc.rect(margin+colW,y,colW,6,"F"); doc.rect(margin+colW*2,y,colW,6,"F");
              doc.text("Monat",margin+2,y+4); doc.text("Antragsteller*in",margin+colW+2,y+4); doc.text("Anderer Elternteil",margin+colW*2+2,y+4); y+=6;
              doc.setFont("helvetica","normal");
              ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"].forEach(function(m,mi){
                if(y>278){ doc.addPage(); y=15; }
                var bg=mi%2===0?[248,250,252]:[255,255,255]; doc.setFillColor(bg[0],bg[1],bg[2]); doc.rect(margin,y,cw,5.5,"F");
                doc.text(m,margin+2,y+4); doc.line(margin+colW+5,y+4,margin+colW+22,y+4); doc.line(margin+colW*2+5,y+4,margin+colW*2+22,y+4); y+=5.5;
              });
              doc.setFillColor(0,51,102); doc.rect(margin,y,cw,6,"F"); doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8);
              doc.text("Gesamt",margin+2,y+4); doc.setTextColor(0,0,0); y+=9;
              abschnitt("(5) Kindergeld");
              linie("Kindergeldberechtigte Person"); linie("Kindergeldbetrag (EUR/Monat)", 40);
              abschnitt("(6) Unterschriften – Umgangsvereinbarung nach § 7 SGB II");
              linie("Ort, Datum"); y+=12;
              doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.text("Antragsteller*in / Umgangsberechtigte*r:", margin, y); y+=18;
              doc.line(margin,y,margin+80,y); doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.text("Unterschrift", margin, y+4); y+=12;
              doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.text("Anderer Elternteil (hauptbetreuend):", margin, y); y+=18;
              doc.line(margin,y,margin+80,y); doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.text("Unterschrift", margin, y+4);
              doc.setFontSize(7); doc.setTextColor(150,150,150); doc.text("Erstellt mit ISUV Anspruchslotse", margin, 290);
              doc.save("Anlage_TBG_Leerformular.pdf");
            }}
              style={{ width:"100%", padding:"11px", backgroundColor:"#f0f4f7", color:"#003366", border:"1px solid #90a4ae", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"6px" }}>
              🖨️ Leerformular als PDF speichern
            </button>

            {/* ── Abschnitt: An anderen Elternteil senden ── */}
            {(function(){
              var ep0 = kinder[0] || {};
              var kindName = ((ep0.kVorname||"")+" "+(ep0.kNachname||"")).trim() || "Kind";
              var epName   = ((ep0.epVorname||"")+" "+(ep0.epNachname||"")).trim() || "Anderer Elternteil";

              var baueSendURL = function(modus) {
                var payload = {};
                if(modus === "ausgefuellt") {
                  // Alle Daten inkl. Kalender und Unterschrift Antragsteller – URL kann länger sein aber vollständig
                  payload = {
                    antNachname: d.antNachname||"", antVorname: d.antVorname||"",
                    antGeburt: d.antGeburt||"", antStrasse: d.antStrasse||"",
                    antPlz: d.antPlz||"", antOrt: d.antOrt||"",
                    antTel: d.antTel||"", antMail: d.antMail||"",
                    antBGNr: d.antBGNr||"", ortDatum: d.ortDatum||"",
                    sigAntragsteller: d.sigAntragsteller||"",
                    kinder: kinder.map(function(k){ return {
                      kNachname:k.kNachname||"", kVorname:k.kVorname||"", kGeburt:k.kGeburt||"",
                      epNachname:k.epNachname||"", epVorname:k.epVorname||"",
                      epStrasse:k.epStrasse||"", epPlz:k.epPlz||"", epOrt:k.epOrt||"",
                      epMail:k.epMail||"", epTel:k.epTel||"",
                      aufteilungsWunsch:k.aufteilungsWunsch||"",
                      kgBerechtigt:k.kgBerechtigt||"", kgBetrag:k.kgBetrag||"",
                      kalenderjahr:k.kalenderjahr||"",
                      kalender: k.kalender || { antragsteller:Array(12).fill(""), anderer:Array(12).fill("") }
                    };})
                  };
                } else if(modus === "teilausgefuellt") {
                  payload = {
                    antNachname: d.antNachname||"", antVorname: d.antVorname||"",
                    antTel: d.antTel||"", antMail: d.antMail||"",
                    kinder: kinder.map(function(k){ return {
                      kNachname:k.kNachname||"", kVorname:k.kVorname||"", kGeburt:k.kGeburt||"",
                      epNachname:k.epNachname||"", epVorname:k.epVorname||"",
                      epMail:k.epMail||"", epTel:k.epTel||"",
                      kgBerechtigt:k.kgBerechtigt||"", kgBetrag:k.kgBetrag||"",
                      kalenderjahr:k.kalenderjahr||"",
                      kalender:{ antragsteller:Array(12).fill(""), anderer:Array(12).fill("") }
                    };})
                  };
                }
                // leer: nur Kontakt des Antragstellers für Rücksendung
                if (modus === "leer") {
                  payload = { antTel: d.antTel||"", antMail: d.antMail||"", antVorname: d.antVorname||"", antNachname: d.antNachname||"" };
                }
                try {
                  return window.location.href.split("#")[0] + "#tbg=" + btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
                } catch(e) { return window.location.href.split("#")[0]; }
              };

              var sende = function(kanal, modus) {
                var kontakt = kanal === "mail" ? ep0.epMail : ep0.epTel;
                if (!kontakt) { alert("Bitte zuerst die " + (kanal==="mail" ? "E-Mail-Adresse" : "Telefonnummer") + " des anderen Elternteils unter ② eintragen."); return; }
                var sendURL = baueSendURL(modus);
                var betreff = "Anlage TBG – "+kindName+" – bitte prüfen und unterschreiben";

                // Feldliste je nach Modus
                var feldliste = "";
                if (modus === "leer") {
                  feldliste = "\n\nFolgende Angaben werden benötigt:\n"
                    + "① Deine persönlichen Daten (Name, Anschrift, Geburtsdatum, Telefon, E-Mail)\n"
                    + "② Daten von "+kindName+" (Geburtsdatum) und meine Kontaktdaten\n"
                    + "③ Betreuungsaufteilung (Wechselmodell / Residenz)\n"
                    + "④ Umgangstage je Monat (Anzahl Tage pro Monat für "+new Date().getFullYear()+")\n"
                    + "⑤ Kindergeld: wer bezieht es, wie viel?\n"
                    + "⑥ Deine Unterschrift direkt im Formular";
                } else if (modus === "teilausgefuellt") {
                  feldliste = "\n\nDiese Felder sind bereits ausgefüllt:\n"
                    + "✅ Deine Kontaktdaten und Kindesdaten\n"
                    + "✅ Kindergeld-Empfänger\n\n"
                    + "Bitte noch ausfüllen:\n"
                    + "④ Umgangstage je Monat (Anzahl Tage für "+new Date().getFullYear()+" eintragen)\n"
                    + "⑥ Deine Unterschrift direkt im Formular";
                } else {
                  feldliste = "\n\nDas Formular ist vollständig ausgefüllt inkl. Kalender und Regelsatz-Berechnung.\n"
                    + "Bitte nur noch prüfen und unterschreiben:\n"
                    + "⑥ Deine Unterschrift direkt im Formular";
                }

                var gruss = "\n\nViele Grüße,\n"+(d.antVorname||"")+" "+(d.antNachname||"");
                var hinweis = "\n\n⚠️ Der Link lässt sich nur einmal öffnen – bitte alle Daten vorher bereitlegen.";

                if (kanal === "mail") {
                  var body = "Hallo "+(ep0.epVorname||"")+",\n\n"
                    + (d.antVorname||"")+" "+(d.antNachname||"")+" hat die Anlage TBG (Bürgergeld / Umgangsvereinbarung) für "+kindName+" vorbereitet.\n"
                    + "Bitte öffne den Link, fülle die fehlenden Angaben aus und unterschreibe direkt am Gerät:"
                    + feldliste + hinweis
                    + "\n\n🔗 " + sendURL
                    + "\n\nDas Dokument gilt mit beiden Unterschriften als Umgangsvereinbarung nach § 7 SGB II."
                    + gruss;
                  window.open("mailto:"+encodeURIComponent(kontakt)+"?subject="+encodeURIComponent(betreff)+"&body="+encodeURIComponent(body));
                } else {
                  var tel = kontakt.replace(/[^0-9+]/g,"").replace(/^0/,"49");
                  var msg = "Hallo "+(ep0.epVorname||"")+",\n\n"
                    + (d.antVorname||"")+" "+(d.antNachname||"")+" hat die Anlage TBG für "+kindName+" vorbereitet."
                    + feldliste + hinweis
                    + "\n\n🔗 " + sendURL
                    + gruss;
                  window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg));
                }
              };

              var modusOptionen = [
                { v:"leer",           icon:"📋", label:"Leer",           desc:"Anderer ET füllt alles selbst aus" },
                { v:"teilausgefuellt",icon:"🔢", label:"Teilausgefüllt", desc:"Kinder-/Adressdaten drin, Kalender leer" },
                { v:"ausgefuellt",    icon:"📝", label:"Ausgefüllt",     desc:"Alle Felder drin, nur Unterschrift fehlt" }
              ];

              return (
                <div style={{ marginTop:"4px", marginBottom:"6px", border:"1px solid #ce93d8", borderRadius:"10px", padding:"12px", backgroundColor:"#fdf6ff" }}>
                  <div style={{ fontSize:"10px", fontWeight:"bold", color:"#6a1b9a", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:"10px" }}>📨 An anderen Elternteil senden – {epName}</div>

                  {modusOptionen.map(function(opt){
                    return (
                      <div key={opt.v} style={{ marginBottom:"8px" }}>
                        <div style={{ fontSize:"11px", fontWeight:"bold", color:"#4a148c", marginBottom:"4px" }}>{opt.icon} {opt.label} <span style={{ fontWeight:"normal", color:"#888" }}>– {opt.desc}</span></div>
                        <div style={{ display:"flex", gap:"6px" }}>
                          <button onClick={function(){ sende("mail", opt.v); }}
                            style={{ flex:1, padding:"9px 6px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"7px", fontWeight:"bold", fontSize:"11px", cursor:"pointer" }}>
                            ✉️ Per E-Mail
                          </button>
                          <button onClick={function(){ sende("wa", opt.v); }}
                            style={{ flex:1, padding:"9px 6px", backgroundColor:"#25d366", color:"#fff", border:"none", borderRadius:"7px", fontWeight:"bold", fontSize:"11px", cursor:"pointer" }}>
                            📱 Per WhatsApp
                          </button>
                        </div>
                      </div>
                    );
                  })}

                  {(!ep0.epMail && !ep0.epTel) && (
                    <div style={{ fontSize:"11px", color:"#e65100", backgroundColor:"#fff3e0", borderRadius:"6px", padding:"7px 10px", marginTop:"6px" }}>
                      ⚠️ Noch keine Kontaktdaten des anderen Elternteils eingetragen. Bitte unter <strong>② Kind & anderer Elternteil</strong> E-Mail oder Telefonnummer ergänzen.
                    </div>
                  )}
                </div>
              );
            })()}

            {/* ── Abschnitt: Zurücksenden an Berater / Antragsteller ── */}
            <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:"6px", marginTop:"8px" }}>📤 Zurücksenden</div>

            {formularId ? (
              // ── Modus A: Supabase vorhanden → direkt zurücksenden ──
              <button onClick={function(){
                var vollDaten = Object.assign({}, d, { kinder:kinder, _exportiert:new Date().toISOString(), _formVersion:"tbg_v2" });
                var url = sbUrl.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(formularId);
                fetch(url, {
                  method: "PATCH",
                  headers: { "apikey":sbKey, "Authorization":"Bearer "+sbKey, "Content-Type":"application/json", "Prefer":"return=minimal" },
                  body: JSON.stringify({ status:"beantwortet", antwort_daten:JSON.stringify(vollDaten), beantwortet_am:new Date().toISOString() })
                })
                .then(function(r) {
                  if(r.ok) { setStatus("gesendet"); setTimeout(function(){ erzeugeTbgPDF(sigData); }, 400); }
                  else { r.text().then(function(t){ alert("Fehler: "+t.slice(0,200)); }); }
                })
                .catch(function(e){ alert("Netzwerkfehler: "+e.message); });
              }}
                style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer", marginBottom:"6px" }}>
                ✅ Ausgefüllt an Anspruchslotse zurücksenden
              </button>
            ) : (function(){
              // ── Modus B: Hash-Modus → Unterschrift + PDF + direkt senden ──
              var ep0 = kinder[0] || {};
              var kindName    = ((ep0.kVorname||"")+" "+(ep0.kNachname||"")).trim() || "Kind";
              var antName     = ((d.antVorname||"")+" "+(d.antNachname||"")).trim() || "Antragsteller*in";
              var epEigenName = ((ep0.epVorname||"")+" "+(ep0.epNachname||"")).trim() || "Anderer Elternteil";
              // Kontakt des Antragstellers (= Empfänger des ausgefüllten Formulars)
              var rueckMail = d.antMail || "";
              var rueckTel  = d.antTel  || "";
              var betreff = "Anlage TBG – "+kindName+" – ausgefüllt & unterschrieben";
              var bodyMail = "Hallo "+antName+",\n\nanbei die ausgefüllte und unterschriebene Anlage TBG für "+kindName+".\n\nBitte PDF als Anhang beifügen und an den ISUV Anspruchslotse weiterleiten.\n\nViele Grüße,\n"+epEigenName;
              var bauePdfUndSende = function(kanal) {
                // Erst PDF erzeugen, dann Sende-Dialog öffnen
                erzeugeTbgPDF(sigData);
                setTimeout(function(){
                  if (kanal === "mail") {
                    var empf = rueckMail || window.prompt("E-Mail-Adresse des Antragstellers / Anspruchslotsen:");
                    if (empf) window.open("mailto:"+encodeURIComponent(empf)+"?subject="+encodeURIComponent(betreff)+"&body="+encodeURIComponent(bodyMail));
                  } else {
                    var tel = (rueckTel||"").replace(/[^0-9+]/g,"").replace(/^0/,"49");
                    if (!tel) { tel = (window.prompt("Telefonnummer des Antragstellers (mit Ländervorwahl):")||"").replace(/[^0-9+]/g,"").replace(/^0/,"49"); }
                    if (tel) {
                      var msg = "Hallo "+antName+",\n\ndie Anlage TBG für "+kindName+" ist ausgefüllt und unterschrieben. Das PDF wird gleich separat als Anhang gesendet.\n\nViele Grüße, "+epEigenName;
                      window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg));
                    }
                  }
                }, 800);
              };
              return (
                <div style={{ border:"2px solid #1565c0", borderRadius:"12px", padding:"14px", backgroundColor:"#e3f2fd" }}>
                  <div style={{ fontWeight:"bold", fontSize:"13px", color:"#0d47a1", marginBottom:"8px" }}>📤 Ausgefüllt zurücksenden an {antName}</div>

                  {/* Hinweis auf fehlende Unterschrift */}
                  {!sigData && (
                    <div style={{ backgroundColor:"#fff3e0", border:"1px solid #ffb300", borderRadius:"7px", padding:"8px 10px", fontSize:"12px", color:"#e65100", marginBottom:"10px" }}>
                      ⚠️ Bitte zuerst <strong>unterschreiben</strong> (Abschnitt ⑥ oben), dann zurücksenden.
                    </div>
                  )}

                  <div style={{ fontSize:"11px", color:"#1565c0", marginBottom:"10px", lineHeight:"1.6" }}>
                    Das Formular wird als <strong>PDF gespeichert</strong> und kann direkt per E-Mail oder WhatsApp zurückgeschickt werden. Bitte das PDF als Anhang beifügen.
                  </div>

                  {/* Direkt senden – E-Mail */}
                  <button onClick={function(){ bauePdfUndSende("mail"); }}
                    style={{ width:"100%", padding:"13px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"9px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"8px" }}>
                    ✉️ PDF speichern & per E-Mail zurücksenden{rueckMail ? " an "+rueckMail : ""}
                  </button>

                  {/* Direkt senden – WhatsApp */}
                  <button onClick={function(){ bauePdfUndSende("wa"); }}
                    style={{ width:"100%", padding:"13px", backgroundColor:"#25d366", color:"#fff", border:"none", borderRadius:"9px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"4px" }}>
                    📱 PDF speichern & WhatsApp öffnen{rueckTel ? " an "+rueckTel : ""}
                  </button>
                  <div style={{ fontSize:"10px", color:"#555", backgroundColor:"#f0f0f0", borderRadius:"6px", padding:"6px 8px", marginBottom:"8px", lineHeight:"1.5" }}>
                    ℹ️ WhatsApp kann keine Dateien per Link empfangen. Das PDF wird zuerst gespeichert — bitte danach in WhatsApp als Anhang hinzufügen (📎-Symbol).
                  </div>

                  {/* Nur PDF speichern */}
                  <button onClick={function(){ erzeugeTbgPDF(sigData); }}
                    style={{ width:"100%", padding:"10px", backgroundColor:"#fff", color:"#1565c0", border:"1px solid #1565c0", borderRadius:"9px", fontWeight:"bold", fontSize:"12px", cursor:"pointer" }}>
                    📄 Nur PDF speichern (manuell weiterleiten)
                  </button>

                  <div style={{ fontSize:"10px", color:"#1565c0", marginTop:"8px", lineHeight:"1.5" }}>
                    💡 Das PDF als Anhang zur E-Mail hinzufügen. Der ISUV Anspruchslotse übernimmt die Daten dann in die Akte.
                  </div>
                </div>
              );
            })()}

            <div style={{ fontSize:"10px", color:"#888", textAlign:"center", marginTop:"6px" }}>Das Formular wird als PDF gespeichert und die Daten können in die Akte übernommen werden.</div>
          </div>

          {sigModal && <SigModal onSave={function(dataUrl){setSigData(dataUrl);setSigModal(false);}} onClose={function(){setSigModal(false);}} />}
        </div>
      </div>
    );
  }

  // ── Fallback: unbekannter Formulartyp ────────────────────
  return (
    <div style={{ textAlign:"center", padding:"60px 20px" }}>
      <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
      <div style={{ fontSize:"13px", color:"#555" }}>Unbekannter Formulartyp: <strong>{formTyp}</strong></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
