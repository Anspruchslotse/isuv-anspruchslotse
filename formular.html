<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PDF Erstellung</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #003366; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Dein Dokument wird erstellt...</h2>
    <div class="loader"></div>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const partner = urlParams.get('partner') || 'Unbekannt';
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("ISUV Anspruchslotse", 20, 20);
            doc.text(`Betreff: Auskunft über Einkommen von ${partner}`, 20, 40);
            doc.text("Hiermit fordere ich Sie auf...", 20, 60);
            
            setTimeout(() => {
                doc.save(`Anschreiben_${partner}.pdf`);
                alert("PDF wurde heruntergeladen!");
            }, 1500);
        };
    </script>
</body>
</html>
