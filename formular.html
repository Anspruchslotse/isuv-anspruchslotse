<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISUV Anspruchslotse – Formular</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f7fa; color: #111; min-height: 100vh; }
    #root { max-width: 540px; margin: 0 auto; padding: 0 0 40px 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const ISUV_LOGO_SVG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'%3E%3Crect width='200' height='80' fill='%23003366'/%3E%3Ctext x='100' y='52' font-family='Arial' font-weight='bold' font-size='36' fill='white' text-anchor='middle'%3EISUV%3C/text%3E%3C/svg%3E";
const ISUV_LOGO = "isuv-logo.png";
function LogoImg(props) {
  return <img src={ISUV_LOGO} alt="ISUV" onError={function(e){ e.target.onerror=null; e.target.src=ISUV_LOGO_SVG; }} style={props.style||{}} />;
}

const styles = {
  input: { width:"100%", padding:"10px 12px", border:"1px solid #ccc", borderRadius:"8px", fontSize:"13px", marginBottom:"10px", display:"block" },
  label: { fontSize:"11px", fontWeight:"bold", color:"#555", marginBottom:"3px", display:"block" },
  formPage: { background:"#fff", minHeight:"100vh" },
};

function SigModal({ onSave, onClose }) {
  var canvasRef = useRef(null);
  var drawing = useRef(false);
  var lastPos = useRef(null);
  var getPos = function(canvas, evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var src = evt.touches ? evt.touches[0] : evt;
    return { x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY };
  };
  var startDraw = function(e) { e.preventDefault(); drawing.current = true; var cv = canvasRef.current; if (cv) lastPos.current = getPos(cv, e.nativeEvent || e); };
  var draw = function(e) {
    e.preventDefault(); if (!drawing.current) return;
    var cv = canvasRef.current; if (!cv) return;
    var ctx = cv.getContext("2d");
    var pos = getPos(cv, e.nativeEvent || e);
    ctx.beginPath(); ctx.strokeStyle = "#003366"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  var stopDraw = function(e) { if (e) e.preventDefault(); drawing.current = false; };
  var clear = function() { var cv = canvasRef.current; if (cv) cv.getContext("2d").clearRect(0,0,cv.width,cv.height); };
  var save = function() { var cv = canvasRef.current; if (cv) onSave(cv.toDataURL("image/png")); };
  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.6)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <div style={{ backgroundColor:"#fff", borderRadius:"14px", padding:"20px", width:"100%", maxWidth:"420px" }}>
        <div style={{ fontWeight:"bold", fontSize:"14px", color:"#003366", marginBottom:"6px" }}>✍️ Unterschrift des Antragstellers</div>
        <div style={{ fontSize:"11px", color:"#666", marginBottom:"12px" }}>Mit Finger oder Maus im Feld unterschreiben:</div>
        <canvas ref={canvasRef} width={560} height={160}
          style={{ border:"2px solid #003366", borderRadius:"8px", width:"100%", height:"120px", touchAction:"none", backgroundColor:"#fafcff", display:"block" }}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
        />
        <div style={{ display:"flex", gap:"8px", marginTop:"12px" }}>
          <button onClick={clear} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>🗑️ Löschen</button>
          <button onClick={onClose} style={{ flex:1, padding:"10px", backgroundColor:"#eee", color:"#333", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>Abbrechen</button>
          <button onClick={save} style={{ flex:2, padding:"10px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer" }}>✅ Übernehmen</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [status, setStatus] = useState("laden"); // laden | fehler | formular | gesendet
  const [fehler, setFehler] = useState("");
  const [formTyp, setFormTyp] = useState(null);
  const [daten, setDaten] = useState({});
  const [formularId, setFormularId] = useState(null);
  const [sbUrl, setSbUrl] = useState(null);
  const [sbKey, setSbKey] = useState(null);
  const [gerichtSuche, setGerichtSuche] = useState(false);
  const [gerichtFehler, setGerichtFehler] = useState("");
  const [sigModal, setSigModal] = useState(false);
  const [sigData, setSigData] = useState(null);

  useEffect(function() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get("id");
    var sb = params.get("sb");
    var key = params.get("key");

    if (!id || !sb || !key) {
      setFehler("Ungültiger Link – fehlende Parameter.");
      setStatus("fehler");
      return;
    }

    setFormularId(id);
    setSbUrl(sb);
    setSbKey(key);

    var url = sb.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(id) + "&select=*";
    fetch(url, {
      headers: {
        "apikey": key,
        "Authorization": "Bearer " + key,
        "Content-Type": "application/json"
      }
    })
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || rows.length === 0) {
        setFehler("Formular nicht gefunden. Möglicherweise abgelaufen oder ungültiger Link.");
        setStatus("fehler");
        return;
      }
      var row = rows[0];
      if (row.status === "beantwortet") {
        setStatus("gesendet");
        return;
      }
      var vorausgefuellt = {};
      try { vorausgefuellt = JSON.parse(row.vorausgefuellt || "{}"); } catch(e) {}
      var typ = row.typ || "stammdaten";
      // Mappe generische Felder auf formulartyp-spezifische Feldnamen
      var mapped = Object.assign({}, vorausgefuellt);
      var vn = vorausgefuellt.vorname || "";
      var nn = vorausgefuellt.name || "";
      var tel = vorausgefuellt.tel || "";
      var mail = vorausgefuellt.mail || "";
      var str = vorausgefuellt.strasse || "";
      var plz = vorausgefuellt.plz || "";
      var ort = vorausgefuellt.ort || "";
      var netto = vorausgefuellt.einkommenNetto || "";
      var kinder = vorausgefuellt.kinder || [];
      var kindVn = kinder.length > 0 ? (kinder[0].vorname || "") : "";
      var kindNn = kinder.length > 0 ? (kinder[0].nachname || "") : "";
      var kindGeb = kinder.length > 0 ? (kinder[0].geburt || "") : "";
      if (typ === "tbg") {
        if (!mapped.tbgVorname && vn) mapped.tbgVorname = vn;
        if (!mapped.tbgName && nn) mapped.tbgName = nn;
        if (!mapped.tbgMail && mail) mapped.tbgMail = mail;
        if (!mapped.tbgTel && tel) mapped.tbgTel = tel;
        if (!mapped.tbgStrasse && str) mapped.tbgStrasse = str;
        if (!mapped.tbgPlz && plz) mapped.tbgPlz = plz;
        if (!mapped.tbgOrt && ort) mapped.tbgOrt = ort;
        if (!mapped.tbgKindVorname && kindVn) mapped.tbgKindVorname = kindVn;
        if (!mapped.tbgKindName && kindNn) mapped.tbgKindName = kindNn;
        if (!mapped.tbgKindGeburt && kindGeb) mapped.tbgKindGeburt = kindGeb;
      } else if (typ === "wohngeld_fb") {
        if (!mapped.wgVorname && vn) mapped.wgVorname = vn;
        if (!mapped.wgName && nn) mapped.wgName = nn;
        if (!mapped.wgMail && mail) mapped.wgMail = mail;
        if (!mapped.wgTel && tel) mapped.wgTel = tel;
        if (!mapped.wgStrasse && str) mapped.wgStrasse = str;
        if (!mapped.wgPlz && plz) mapped.wgPlz = plz;
        if (!mapped.wgOrt && ort) mapped.wgOrt = ort;
        if (!mapped.wgEinkommen && netto) mapped.wgEinkommen = netto;
        if (!mapped.wgMieteKalt && vorausgefuellt.mieteKalt) mapped.wgMieteKalt = String(vorausgefuellt.mieteKalt);
        if (!mapped.wgHeizkosten && vorausgefuellt.heizkosten) mapped.wgHeizkosten = String(vorausgefuellt.heizkosten);
      } else if (typ === "fr_kindesunterhalt") {
        if (!mapped.kuVorname && vn) mapped.kuVorname = vn;
        if (!mapped.kuName && nn) mapped.kuName = nn;
        if (!mapped.kuMail && mail) mapped.kuMail = mail;
        if (!mapped.kuTel && tel) mapped.kuTel = tel;
        if (!mapped.kuEinkommen && netto) mapped.kuEinkommen = netto;
        if (kinder.length > 0 && !mapped.kuKindName) mapped.kuKindName = (kindVn + " " + kindNn).trim();
        if (kinder.length > 0 && !mapped.kuKindGeburt) mapped.kuKindGeburt = kindGeb;
      } else if (typ === "fr_wechselmodell") {
        if (!mapped.wmVorname && vn) mapped.wmVorname = vn;
        if (!mapped.wmName && nn) mapped.wmName = nn;
        if (!mapped.wmEinkommen && netto) mapped.wmEinkommen = netto;
        if (kinder.length > 0 && !mapped.wmKindName) mapped.wmKindName = (kindVn + " " + kindNn).trim();
        if (kinder.length > 0 && !mapped.wmKindGeburt) mapped.wmKindGeburt = kindGeb;
      } else if (typ === "fr_umgang") {
        if (!mapped.umVorname && vn) mapped.umVorname = vn;
        if (!mapped.umName && nn) mapped.umName = nn;
        if (!mapped.umStrasse && str) mapped.umStrasse = str;
        if (!mapped.umPlz && plz) mapped.umPlz = plz;
        if (!mapped.umOrt && ort) mapped.umOrt = ort;
        if (kinder.length > 0 && !mapped.umKindName) mapped.umKindName = (kindVn + " " + kindNn).trim();
        if (kinder.length > 0 && !mapped.umKindGeburt) mapped.umKindGeburt = kindGeb;
      } else if (typ === "fr_trennungsvereinbarung") {
        if (!mapped.tvVorname && vn) mapped.tvVorname = vn;
        if (!mapped.tvName && nn) mapped.tvName = nn;
        if (!mapped.tvEinkommen && netto) mapped.tvEinkommen = netto;
        if (!mapped.tvTrennungDatum && vorausgefuellt.trennungSeit) mapped.tvTrennungDatum = vorausgefuellt.trennungSeit;
      } else if (typ === "buergergeld") {
        if (!mapped.bgVorname && vn) mapped.bgVorname = vn;
        if (!mapped.bgName && nn) mapped.bgName = nn;
        if (!mapped.bgMail && mail) mapped.bgMail = mail;
        if (!mapped.bgTel && tel) mapped.bgTel = tel;
        if (!mapped.bgStrasse && str) mapped.bgStrasse = str;
        if (!mapped.bgPlz && plz) mapped.bgPlz = plz;
        if (!mapped.bgOrt && ort) mapped.bgOrt = ort;
        if (!mapped.bgEinkommen && netto) mapped.bgEinkommen = netto;
        if (!mapped.bgMieteKalt && vorausgefuellt.mieteKalt) mapped.bgMieteKalt = String(vorausgefuellt.mieteKalt);
        if (!mapped.bgHeizkosten && vorausgefuellt.heizkosten) mapped.bgHeizkosten = String(vorausgefuellt.heizkosten);
      }
      setFormTyp(typ);
      setDaten(mapped);
      setStatus("formular");
    })
    .catch(function(e) {
      setFehler("Netzwerkfehler beim Laden: " + e.message);
      setStatus("fehler");
    });
  }, []);

  var upd = function(f, v) { setDaten(function(p) { return Object.assign({}, p, {[f]: v}); }); };

  // Prüft ob ein Feld/Abschnitt angezeigt werden soll (basierend auf versandFelder aus Supabase)
  var zeigeAbschnitt = function(feldId) {
    var vf = daten.versandFelder;
    if (!vf || !Array.isArray(vf) || vf.length === 0) return true; // kein Filter = alles anzeigen
    return vf.indexOf(feldId) >= 0;
  };

  var absenden = function() {
    // Validation per formtyp
    if (formTyp === "fr_sorgerecht") {
      var pflicht = [daten.antragsteller_name, daten.gegenseite_name, daten.kind_name];
      if (pflicht.some(function(v) { return !v || !v.trim(); })) {
        alert("Bitte alle Pflichtfelder (*) ausfüllen."); return;
      }
    }

    var url = sbUrl.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(formularId);
    fetch(url, {
      method: "PATCH",
      headers: {
        "apikey": sbKey,
        "Authorization": "Bearer " + sbKey,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        status: "beantwortet",
        antwort_daten: JSON.stringify(daten),
        beantwortet_am: new Date().toISOString()
      })
    })
    .then(function(r) {
      if (r.ok) {
        setStatus("gesendet");
        // Auto-generate PDF with signature if sorgerecht
        if (formTyp === "fr_sorgerecht") {
          setTimeout(function(){ erzeugePDF(sigData); }, 500);
        }
      }
      else { r.text().then(function(t) { alert("Fehler beim Senden: " + t.slice(0, 200)); }); }
    })
    .catch(function(e) { alert("Netzwerkfehler: " + e.message); });
  };

  var ermittleGericht = function() {
    var plz = (daten.kind_plz || "").trim();
    if (!plz || plz.length < 5) { setGerichtFehler("Bitte zuerst PLZ des Kindes eingeben."); return; }
    // CORS verhindert direkten Fetch – Link zum Justizportal öffnen
    window.open("https://www.justiz.de/onlinedienste/gerichtsverzeichnis/index.php?plz=" + encodeURIComponent(plz) + "&gtyp=AG&land=", "_blank");
    setGerichtFehler("🔍 Justizportal geöffnet – bitte Amtsgericht oben eintragen.");
  };

  // ── Render ──────────────────────────────────────────────
  if (status === "laden") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px", color:"#003366" }}>
        <LogoImg style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ fontSize:"14px" }}>⏳ Formular wird geladen...</div>
      </div>
    );
  }

  if (status === "fehler") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px" }}>
        <LogoImg style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ backgroundColor:"#fff3f3", border:"1px solid #f5c6cb", borderRadius:"10px", padding:"20px", maxWidth:"400px", margin:"0 auto" }}>
          <div style={{ fontSize:"20px", marginBottom:"8px" }}>⚠️</div>
          <div style={{ fontWeight:"bold", marginBottom:"8px", color:"#721c24" }}>Formular nicht verfügbar</div>
          <div style={{ fontSize:"12px", color:"#555" }}>{fehler}</div>
        </div>
      </div>
    );
  }

  var erzeugePDF = function(sig) {
    var d = daten;
    var jsPDF = window.jspdf && window.jspdf.jsPDF;
    if (!jsPDF) { alert("PDF-Bibliothek nicht geladen."); return; }
    var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    var W=210, mL=25, mR=25, y=20, lineH=6;
    var heute = new Date().toLocaleDateString("de-DE");
    var absAnschrift = (d.antragsteller_strasse||"") + (d.antragsteller_plz ? ", "+d.antragsteller_plz : "") + (d.antragsteller_ort ? " "+d.antragsteller_ort : "");
    // Absender oben links
    doc.setFontSize(10); doc.setFont("helvetica","bold");
    doc.text(d.antragsteller_name||"", mL, y);
    doc.setFont("helvetica","normal");
    if (d.antragsteller_strasse) { y+=5; doc.text(d.antragsteller_strasse, mL, y); }
    if (d.antragsteller_plz||d.antragsteller_ort) { y+=5; doc.text((d.antragsteller_plz||"")+" "+(d.antragsteller_ort||""), mL, y); }
    // Datum oben rechts
    doc.text(d.antragsteller_ort ? d.antragsteller_ort+", "+heute : heute, W-mR, 20, {align:"right"});
    // Empfänger (Gericht)
    y+=12;
    doc.text("An das", mL, y); y+=5;
    doc.setFont("helvetica","bold");
    doc.text(d.gericht||"Amtsgericht _______________", mL, y); y+=5;
    doc.setFont("helvetica","normal");
    doc.text("– Abteilung für Familiensachen –", mL, y); y+=14;
    // Betreff
    doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text("Antrag auf Übertragung der gemeinsamen elterlichen Sorge", mL, y); y+=6;
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("gemäß § 1626a Abs. 2 BGB i.d.F. des Gesetzes v. 19.05.2013 (BGBl. I S. 1084)", mL, y); y+=5;
    doc.text("Betr.: Kind: "+(d.kind_name||"_______________")+(d.kind_geburt ? ", geb. "+d.kind_geburt : ""), mL, y); y+=10;
    doc.setLineWidth(0.3); doc.line(mL, y, W-mR, y); y+=8;
    var section = function(t) {
      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text(t, mL, y); doc.setLineWidth(0.2);
      doc.line(mL, y+1.5, W-mR, y+1.5); y+=8;
      doc.setFont("helvetica","normal"); doc.setFontSize(10);
    };
    var row = function(label, val) {
      doc.setFont("helvetica","bold"); doc.text(label+":", mL, y);
      doc.setFont("helvetica","normal");
      var ls = doc.splitTextToSize(val||"—", W-mL-mR-48);
      doc.text(ls, mL+48, y); y+=Math.max(lineH, ls.length*lineH);
    };
    section("I. Beteiligte");
    row("Antragsteller (Vater)", (d.antragsteller_name||"")+(absAnschrift ? ", "+absAnschrift : ""));
    row("Antragsgegnerin (Mutter)", (d.gegenseite_name||"")+(d.gegenseite_strasse ? ", "+d.gegenseite_strasse+", "+(d.gegenseite_plz||"")+" "+(d.gegenseite_ort||"") : "")); y+=4;
    section("II. Kind");
    row("Name", d.kind_name||"");
    row("Geburtsdatum", d.kind_geburt||"");
    row("Hauptwohnsitz", d.kind_strasse ? d.kind_strasse+", "+(d.kind_plz||"")+" "+(d.kind_ort||"") : ""); y+=4;
    section("III. Antrag");
    var aLines = doc.splitTextToSize("Der Antragsteller beantragt, ihm zusammen mit der Antragsgegnerin die gemeinsame elterliche Sorge für das oben genannte Kind gemäß § 1626a Abs. 2 BGB zu übertragen.", W-mL-mR);
    doc.setFontSize(10); doc.text(aLines, mL, y); y+=aLines.length*lineH+4;
    section("IV. Begründung");
    var bParts = [
      "1. Gemäß § 1626a Abs. 2 Satz 1 BGB überträgt das Familiengericht auf Antrag des Vaters die elterliche Sorge oder einen Teil davon beiden Eltern gemeinsam, wenn die Übertragung dem Kindeswohl nicht widerspricht.",
      "2. Gemäß § 1626a Abs. 2 Satz 2 BGB wird widerleglich vermutet, dass die Übertragung dem Kindeswohl nicht widerspricht (Kindeswohlvermutung). Die Beweislast liegt beim ablehnenden Elternteil (BGH, Beschluss v. 15.06.2016 – XII ZB 419/15).",
      "3. Tatsächliche Anhaltspunkte, die der Übertragung der gemeinsamen Sorge entgegenstehen würden, sind nicht ersichtlich. Eine gemeinsame Ausübung der elterlichen Sorge liegt im wohlverstandenen Interesse des Kindes."
    ];
    doc.setFontSize(10);
    bParts.forEach(function(part) { var ls=doc.splitTextToSize(part,W-mL-mR); doc.text(ls,mL,y); y+=ls.length*lineH+3; }); y+=4;
    // Unterschrift
    doc.setLineWidth(0.3); doc.line(mL, y, W-mR, y); y+=8;
    doc.text((d.antragsteller_ort||"_____________")+", den "+heute, mL, y); y+=14;
    if (sig) { try { doc.addImage(sig,"PNG",mL,y,70,25); } catch(e){} y+=28; }
    else { doc.line(mL,y+12,mL+70,y+12); y+=16; }
    doc.setFontSize(9); doc.text(d.antragsteller_name||"Antragsteller", mL, y);
    doc.save("Sorgerechtsantrag_"+(d.antragsteller_name||"").replace(/ /g,"_")+".pdf");
  };

  if (status === "gesendet") {
    return (
      <div style={{ padding:"40px 20px", textAlign:"center" }}>
        <LogoImg style={{ width:"120px", height:"auto", marginBottom:"16px" }} /><br/>
        <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"10px", padding:"20px", maxWidth:"420px", margin:"0 auto 20px" }}>
          <div style={{ fontSize:"28px", marginBottom:"6px" }}>✅</div>
          <div style={{ fontWeight:"bold", fontSize:"15px", marginBottom:"6px", color:"#2e7d32" }}>Angaben übermittelt</div>
          <div style={{ fontSize:"12px", color:"#555" }}>Ihre Angaben wurden erfolgreich übermittelt.</div>
        </div>
        {formTyp === "fr_sorgerecht" && (
          <div style={{ maxWidth:"420px", margin:"0 auto" }}>
            {sigData ? (
              <div style={{ marginBottom:"12px" }}>
                <img src={sigData} style={{ border:"1px solid #ccc", borderRadius:"6px", width:"100%", maxHeight:"80px", objectFit:"contain", backgroundColor:"#fff" }} alt="Unterschrift" />
                <button onClick={function(){ setSigData(null); }} style={{ fontSize:"11px", color:"#e53935", background:"none", border:"none", cursor:"pointer", marginTop:"4px" }}>✕ Unterschrift löschen</button>
              </div>
            ) : (
              <button onClick={function(){ setSigModal(true); }}
                style={{ width:"100%", padding:"12px", backgroundColor:"#fff", color:"#003366", border:"2px dashed #003366", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer", marginBottom:"10px" }}>
                ✍️ Jetzt unterschreiben (optional)
              </button>
            )}
            <button onClick={function(){ erzeugePDF(sigData); }}
              style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
              📄 Antrag als PDF speichern

  if (formTyp === "fr_trennungsvereinbarung") {
    var d = daten;
    var inp = function(field, placeholder, type) {
      return <input style={styles.input} type={type||"text"} placeholder={placeholder||""} value={d[field]||""} onChange={function(e){ upd(field, e.target.value); }} />;
    };
    var lbl = function(text) { return <label style={styles.label}>{text}</label>; };
    var sec = function(icon, title) {
      return <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>{icon} {title}</div>;
    };
    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"20px 16px 12px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <LogoImg style={{ width:"130px", height:"auto", marginBottom:"8px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>Trennungs- und Scheidungsfragebogen</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Vermögen · Unterhalt · Kinder · Wohnen</div>
        </div>
        <div style={{ padding:"0 16px" }}>
          {zeigeAbschnitt("tv_person") && <>{sec("👤","Persönliche Daten")}
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Vorname *")} {inp("tvVorname","Vorname")}</div>
            <div style={{ flex:1 }}>{lbl("Nachname *")} {inp("tvName","Nachname")}</div>
          </div>
          {lbl("Geburtsdatum")} {inp("tvGeburt","TT.MM.JJJJ")}
          {lbl("E-Mail")} {inp("tvMail","name@beispiel.de","email")}
          {lbl("Telefon")} {inp("tvTel","+49 123","tel")}
          {lbl("Adresse")} {inp("tvAdresse","Straße, PLZ Ort")}
          </> }
          {zeigeAbschnitt("tv_ehe") && <>{sec("💍","Ehe & Trennung")}
          {lbl("Heiratsdatum")} {inp("tvHeirat","TT.MM.JJJJ","date")}
          {lbl("Trennungsdatum")} {inp("tvTrennung","TT.MM.JJJJ","date")}
          {lbl("Zugewinngemeinschaft?")}
          <select style={styles.input} value={d.tvGueterstand||""} onChange={function(e){ upd("tvGueterstand", e.target.value); }}>
            <option value="">– bitte wählen –</option>
            <option>Zugewinngemeinschaft (Standard)</option>
            <option>Gütertrennung (ehevertragliche Vereinbarung)</option>
            <option>Gütergemeinschaft</option>
          </select>
          </> }
          {zeigeAbschnitt("tv_wohnen") && <>{sec("🏠","Wohnen")}
          {lbl("Familienwohnung: Eigentum oder Miete?")}
          <select style={styles.input} value={d.tvWohnung||""} onChange={function(e){ upd("tvWohnung", e.target.value); }}>
            <option value="">– bitte wählen –</option>
            <option>Miete</option><option>Eigentum (gemeinsam)</option><option>Eigentum (ein Ehepartner)</option>
          </select>
          {lbl("Wer wohnt weiterhin in der Familienwohnung?")}
          <select style={styles.input} value={d.tvWohnungBleibt||""} onChange={function(e){ upd("tvWohnungBleibt", e.target.value); }}>
            <option value="">– bitte wählen –</option>
            <option>Ich</option><option>Ehepartner/in</option><option>Beide ausgezogen</option>
          </select>
          </> }
          {zeigeAbschnitt("tv_einkommen") && <>{sec("💶","Einkommen & Unterhalt")}
          {lbl("Ihr Nettoeinkommen (€/Monat)")} {inp("tvEinkommen","z.B. 2800","number")}
          {lbl("Einkommen Ehepartner/in (€/Monat, falls bekannt)")} {inp("tvEinkommenPartner","z.B. 3200","number")}
          {lbl("Trennungsunterhalt bisher gezahlt (€/Monat)")} {inp("tvUnterhalt","z.B. 600","number")}
          </> }
          {zeigeAbschnitt("tv_kinder") && <>{sec("👶","Kinder")}
          {lbl("Anzahl gemeinsamer Kinder")}
          <select style={styles.input} value={d.tvAnzahlKinder||"0"} onChange={function(e){ upd("tvAnzahlKinder", e.target.value); }}>
            {["0","1","2","3","4","5+"].map(function(n){ return <option key={n}>{n}</option>; })}
          </select>
          {parseInt(d.tvAnzahlKinder||"0") > 0 && (<>
            {lbl("Kinder mit Namen & Geburtsdaten")} {inp("tvKinderAngaben","z.B. Max, 12.03.2015")}
            {lbl("Kinderbetreuung")}
            <select style={styles.input} value={d.tvKinderBetreuung||""} onChange={function(e){ upd("tvKinderBetreuung", e.target.value); }}>
              <option value="">– bitte wählen –</option>
              <option>Hauptsächlich bei mir</option><option>Hauptsächlich beim anderen Elternteil</option><option>Wechselmodell</option>
            </select>
          </>)}
          </> }
          {zeigeAbschnitt("tv_vermoegen") && <>{sec("🏦","Vermögen & Schulden")}
          {lbl("Gemeinsames Vermögen vorhanden? (Immobilien, Ersparnisse)")}
          <textarea style={Object.assign({}, styles.input, { minHeight:"60px", resize:"vertical" })} placeholder="z.B. Haus Wert ca. 320.000 €, gemeinsames Konto 15.000 €..." value={d.tvVermoegen||""} onChange={function(e){ upd("tvVermoegen", e.target.value); }} />
          {lbl("Schulden (gemeinsam oder einzeln)")} {inp("tvSchulden","z.B. Hypothek 150.000 €")}
          </> }
          {zeigeAbschnitt("tv_anliegen") && <>{sec("📝","Anliegen & Anmerkungen")}
          <textarea style={Object.assign({}, styles.input, { minHeight:"80px", resize:"vertical" })} placeholder="Weitere Anmerkungen oder offene Fragen..." value={d.tvNotizen||""} onChange={function(e){ upd("tvNotizen", e.target.value); }} />
          </> }
          <button onClick={absenden}
            style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer", marginTop:"8px", marginBottom:"24px" }}>
            ✅ Angaben übermitteln
          </button>
        </div>
      </div>
    );
  }

  // ── Wohngeld-Fragebogen ────────────────────────────────────
  if (formTyp === "wohngeld_fb") {
    var d = daten;
    var inp = function(field, placeholder, type) {
      return <input style={styles.input} type={type||"text"} placeholder={placeholder||""} value={d[field]||""} onChange={function(e){ upd(field, e.target.value); }} />;
    };
    var lbl = function(text) { return <label style={styles.label}>{text}</label>; };
    var sec = function(icon, title) {
      return <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>{icon} {title}</div>;
    };
    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"20px 16px 12px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <LogoImg style={{ width:"130px", height:"auto", marginBottom:"8px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>Wohngeld – Fragebogen</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>§ 16 WoGG – Wohngeldbehörde</div>
        </div>
        <div style={{ padding:"0 16px" }}>
          {zeigeAbschnitt("wg_person") && <>{sec("👤","Persönliche Daten")}
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ flex:1 }}>{lbl("Vorname *")} {inp("wgVorname","Vorname")}</div>
            <div style={{ flex:1 }}>{lbl("Nachname *")} {inp("wgName","Nachname")}</div>
          </div>
          {lbl("E-Mail")} {inp("wgMail","name@beispiel.de","email")}
          {lbl("Telefon")} {inp("wgTel","+49 123 456789","tel")}
          </> }
          {zeigeAbschnitt("wg_adresse") && <>{sec("🏠","Adresse & Mietstufe")}
          {lbl("Straße & Hausnummer")} {inp("wgStrasse","Musterstraße 1")}
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}>{lbl("PLZ")} {inp("wgPlz","12345")}</div>
            <div style={{ flex:1 }}>{lbl("Ort")} {inp("wgOrt","Stadt")}</div>
          </div>
          {lbl("Mietstufe (1–6)")} {inp("wgMietstufe","z.B. 3")}
          </> }
          {zeigeAbschnitt("wg_haushalt") && <>{sec("👨‍👩‍👧","Haushaltsgröße")}
          {lbl("Anzahl Personen im Haushalt")}
          <select style={styles.input} value={d.wgHaushalt||"1"} onChange={function(e){ upd("wgHaushalt", e.target.value); }}>
            {["1","2","3","4","5","6+"].map(function(n){ return <option key={n}>{n}</option>; })}
          </select>
          </> }
          {zeigeAbschnitt("wg_wohnen") && <>{sec("🏡","Mietkosten")}
          {lbl("Kaltmiete (€/Monat)")} {inp("wgMieteKalt","z.B. 600","number")}
          {lbl("Nebenkosten (€/Monat)")} {inp("wgNebenkosten","z.B. 120","number")}
          {lbl("Heizkosten (€/Monat)")} {inp("wgHeizkosten","z.B. 80","number")}
          {lbl("Wohnfläche (m²)")} {inp("wgWohnflaeche","z.B. 60","number")}
          </> }
          {zeigeAbschnitt("wg_einkommen") && <>{sec("💶","Einkommen")}
          {lbl("Nettoeinkommen (€/Monat)")} {inp("wgEinkommen","z.B. 1200","number")}
          {lbl("ALG I / ALG II (€/Monat, falls vorhanden)")} {inp("wgAlg","z.B. 800","number")}
          {lbl("Unterhalt erhalten (€/Monat, falls vorhanden)")} {inp("wgUnterhalt","z.B. 400","number")}
          </> }
          {zeigeAbschnitt("wg_kinder") && <>{sec("👶","Kinder")}
          {lbl("Kinder im Haushalt?")}
          <select style={styles.input} value={d.wgKinder||""} onChange={function(e){ upd("wgKinder", e.target.value); }}>
            <option value="">– bitte wählen –</option>
            <option value="ja">Ja</option><option value="nein">Nein</option>
          </select>
          {d.wgKinder === "ja" && (<>
            {lbl("Kindergeld (€/Monat)")} {inp("wgKindergeld","z.B. 255","number")}
            {lbl("Kinder mit Namen & Geburtsdaten")} {inp("wgKinderAngaben","z.B. Max, 12.03.2015")}
          </>)}
          </> }
          {zeigeAbschnitt("wg_anliegen") && <>{sec("📝","Anliegen & Anmerkungen")}
          {lbl("Mein Anliegen")}
          {["Erstantrag","Widerspruch","Neuberechnung","Sonstiges"].map(function(a) {
            var selected = (d.wgAnliegen||[]).includes(a);
            return (
              <button key={a} onClick={function(){
                var current = d.wgAnliegen || [];
                upd("wgAnliegen", selected ? current.filter(function(x){ return x !== a; }) : [...current, a]);
              }} style={{ display:"inline-block", margin:"3px", padding:"6px 10px", backgroundColor: selected ? "#003366" : "#eee", color: selected ? "#fff" : "#333", border:"none", borderRadius:"20px", fontSize:"12px", cursor:"pointer" }}>
                {a}
              </button>
            );
          })}
          <textarea style={Object.assign({}, styles.input, { minHeight:"80px", resize:"vertical", marginTop:"10px" })} placeholder="Weitere Anmerkungen..." value={d.wgNotizen||""} onChange={function(e){ upd("wgNotizen", e.target.value); }} />
          </> }
          <button onClick={absenden}
            style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer", marginTop:"8px", marginBottom:"24px" }}>
            ✅ Angaben übermitteln
          </button>
        </div>
      </div>
    );
  }

  // ── Fallback: unbekannter Formulartyp ────────────────────
  return (
    <div style={{ textAlign:"center", padding:"60px 20px" }}>
      <LogoImg style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
      <div style={{ fontSize:"13px", color:"#555" }}>Unbekannter Formulartyp: <strong>{formTyp}</strong></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
