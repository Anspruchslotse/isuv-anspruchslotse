<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISUV Anspruchslotse – Formular</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f7fa; color: #111; min-height: 100vh; }
    #root { max-width: 540px; margin: 0 auto; padding: 0 0 40px 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const ISUV_LOGO = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'%3E%3Crect width='200' height='80' fill='%23003366'/%3E%3Ctext x='100' y='52' font-family='Arial' font-weight='bold' font-size='36' fill='white' text-anchor='middle'%3EISUV%3C/text%3E%3C/svg%3E";

const styles = {
  input: { width:"100%", padding:"10px 12px", border:"1px solid #ccc", borderRadius:"8px", fontSize:"13px", marginBottom:"10px", display:"block" },
  label: { fontSize:"11px", fontWeight:"bold", color:"#555", marginBottom:"3px", display:"block" },
  formPage: { background:"#fff", minHeight:"100vh" },
};

function App() {
  const [status, setStatus] = useState("laden"); // laden | fehler | formular | gesendet
  const [fehler, setFehler] = useState("");
  const [formTyp, setFormTyp] = useState(null);
  const [daten, setDaten] = useState({});
  const [formularId, setFormularId] = useState(null);
  const [sbUrl, setSbUrl] = useState(null);
  const [sbKey, setSbKey] = useState(null);
  const [gerichtSuche, setGerichtSuche] = useState(false);
  const [gerichtFehler, setGerichtFehler] = useState("");

  useEffect(function() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get("id");
    var sb = params.get("sb");
    var key = params.get("key");

    if (!id || !sb || !key) {
      setFehler("Ungültiger Link – fehlende Parameter.");
      setStatus("fehler");
      return;
    }

    setFormularId(id);
    setSbUrl(sb);
    setSbKey(key);

    var url = sb.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(id) + "&select=*";
    fetch(url, {
      headers: {
        "apikey": key,
        "Authorization": "Bearer " + key,
        "Content-Type": "application/json"
      }
    })
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || rows.length === 0) {
        setFehler("Formular nicht gefunden. Möglicherweise abgelaufen oder ungültiger Link.");
        setStatus("fehler");
        return;
      }
      var row = rows[0];
      if (row.status === "beantwortet") {
        setStatus("gesendet");
        return;
      }
      var vorausgefuellt = {};
      try { vorausgefuellt = JSON.parse(row.vorausgefuellt || "{}"); } catch(e) {}
      setFormTyp(row.typ || "stammdaten");
      setDaten(vorausgefuellt);
      setStatus("formular");
    })
    .catch(function(e) {
      setFehler("Netzwerkfehler beim Laden: " + e.message);
      setStatus("fehler");
    });
  }, []);

  var upd = function(f, v) { setDaten(function(p) { return Object.assign({}, p, {[f]: v}); }); };

  var absenden = function() {
    // Validation per formtyp
    if (formTyp === "fr_sorgerecht") {
      var pflicht = [daten.antragsteller_name, daten.gegenseite_name, daten.kind_name];
      if (pflicht.some(function(v) { return !v || !v.trim(); })) {
        alert("Bitte alle Pflichtfelder (*) ausfüllen."); return;
      }
    }

    var url = sbUrl.replace(/\/+$/, "") + "/rest/v1/formulare?formular_id=eq." + encodeURIComponent(formularId);
    fetch(url, {
      method: "PATCH",
      headers: {
        "apikey": sbKey,
        "Authorization": "Bearer " + sbKey,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        status: "beantwortet",
        antwort_daten: JSON.stringify(daten),
        beantwortet_am: new Date().toISOString()
      })
    })
    .then(function(r) {
      if (r.ok) { setStatus("gesendet"); }
      else { r.text().then(function(t) { alert("Fehler beim Senden: " + t.slice(0, 200)); }); }
    })
    .catch(function(e) { alert("Netzwerkfehler: " + e.message); });
  };

  var ermittleGericht = function() {
    var plz = (daten.kind_plz || "").trim();
    if (!plz || plz.length < 5) { setGerichtFehler("Bitte zuerst PLZ des Kindes eingeben."); return; }
    setGerichtSuche(true); setGerichtFehler("");
    fetch("https://www.justiz.de/onlinedienste/gerichtsverzeichnis/index.php?plz=" + encodeURIComponent(plz) + "&gtyp=AG&land=")
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var match = html.match(/Amtsgericht\s+([^<"\n,]+)/i);
        var name = match ? ("Amtsgericht " + match[1].trim()) : null;
        if (!name) {
          var m2 = html.match(/<td[^>]*>\s*(Amtsgericht[^<]+)<\/td>/i);
          name = m2 ? m2[1].trim() : null;
        }
        if (name) { upd("gericht", name); setGerichtFehler("✅ Gericht ermittelt."); }
        else { setGerichtFehler("⚠️ Kein Ergebnis – bitte manuell eintragen."); }
        setGerichtSuche(false);
      })
      .catch(function() {
        setGerichtFehler("⚠️ Automatische Ermittlung nicht möglich – bitte manuell eintragen.");
        setGerichtSuche(false);
      });
  };

  // ── Render ──────────────────────────────────────────────
  if (status === "laden") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px", color:"#003366" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ fontSize:"14px" }}>⏳ Formular wird geladen...</div>
      </div>
    );
  }

  if (status === "fehler") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ backgroundColor:"#fff3f3", border:"1px solid #f5c6cb", borderRadius:"10px", padding:"20px", maxWidth:"400px", margin:"0 auto" }}>
          <div style={{ fontSize:"20px", marginBottom:"8px" }}>⚠️</div>
          <div style={{ fontWeight:"bold", marginBottom:"8px", color:"#721c24" }}>Formular nicht verfügbar</div>
          <div style={{ fontSize:"12px", color:"#555" }}>{fehler}</div>
        </div>
      </div>
    );
  }

  if (status === "gesendet") {
    return (
      <div style={{ textAlign:"center", padding:"60px 20px" }}>
        <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
        <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"10px", padding:"24px", maxWidth:"400px", margin:"0 auto" }}>
          <div style={{ fontSize:"32px", marginBottom:"8px" }}>✅</div>
          <div style={{ fontWeight:"bold", fontSize:"16px", marginBottom:"8px", color:"#2e7d32" }}>Angaben übermittelt</div>
          <div style={{ fontSize:"12px", color:"#555" }}>Ihre Angaben wurden erfolgreich an Ihren ISUV-Berater übermittelt. Sie können dieses Fenster schließen.</div>
        </div>
      </div>
    );
  }

  // ── Sorgerecht-Formular ──────────────────────────────────
  if (formTyp === "fr_sorgerecht") {
    return (
      <div style={styles.formPage}>
        <div style={{ textAlign:"center", padding:"24px 16px 16px", borderBottom:"1px solid #eee", marginBottom:"8px" }}>
          <img src={ISUV_LOGO} alt="ISUV" style={{ width:"140px", height:"auto", marginBottom:"10px" }} />
          <div style={{ fontSize:"13px", fontWeight:"bold", color:"#003366" }}>ISUV Anspruchslotse</div>
          <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>Antrag Gemeinsames Sorgerecht (§ 1626a Abs. 2 BGB)</div>
        </div>

        <div style={{ padding:"0 16px" }}>
          <div style={{ backgroundColor:"#e8f5e9", border:"1px solid #a5d6a7", borderRadius:"8px", padding:"10px 12px", marginBottom:"16px", fontSize:"11px", color:"#2e7d32" }}>
            ✅ <strong>Keine Begründung erforderlich.</strong> Nach § 1626a Abs. 2 BGB (Reform 2013) wird die gemeinsame Sorge übertragen, sofern sie dem Kindeswohl nicht widerspricht.
          </div>

          {/* Vater (Antragsteller) */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginBottom:"10px", letterSpacing:"0.5px" }}>👨 Vater (Antragsteller)</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.antragsteller_name||""} onChange={function(e){ upd("antragsteller_name", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.antragsteller_strasse||""} onChange={function(e){ upd("antragsteller_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}><label style={styles.label}>PLZ</label><input style={styles.input} placeholder="12345" value={daten.antragsteller_plz||""} onChange={function(e){ upd("antragsteller_plz", e.target.value); }} /></div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.antragsteller_ort||""} onChange={function(e){ upd("antragsteller_ort", e.target.value); }} /></div>
          </div>

          {/* Mutter (Antragsgegnerin) */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>👩 Mutter (Antragsgegnerin)</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.gegenseite_name||""} onChange={function(e){ upd("gegenseite_name", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.gegenseite_strasse||""} onChange={function(e){ upd("gegenseite_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}><label style={styles.label}>PLZ</label><input style={styles.input} placeholder="12345" value={daten.gegenseite_plz||""} onChange={function(e){ upd("gegenseite_plz", e.target.value); }} /></div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.gegenseite_ort||""} onChange={function(e){ upd("gegenseite_ort", e.target.value); }} /></div>
          </div>

          {/* Kind */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>👶 Kind</div>
          <label style={styles.label}>Vollständiger Name *</label>
          <input style={styles.input} placeholder="Vorname Nachname" value={daten.kind_name||""} onChange={function(e){ upd("kind_name", e.target.value); }} />
          <label style={styles.label}>Geburtsdatum</label>
          <input style={styles.input} type="date" value={daten.kind_geburt||""} onChange={function(e){ upd("kind_geburt", e.target.value); }} />
          <label style={styles.label}>Straße & Hausnummer (Hauptwohnsitz)</label>
          <input style={styles.input} placeholder="Musterstraße 1" value={daten.kind_strasse||""} onChange={function(e){ upd("kind_strasse", e.target.value); }} />
          <div style={{ display:"flex", gap:"6px" }}>
            <div style={{ width:"90px" }}>
              <label style={styles.label}>PLZ</label>
              <input style={styles.input} placeholder="12345" value={daten.kind_plz||""} onChange={function(e){ upd("kind_plz", e.target.value); setGerichtFehler(""); }} />
            </div>
            <div style={{ flex:1 }}><label style={styles.label}>Ort</label><input style={styles.input} placeholder="Stadt" value={daten.kind_ort||""} onChange={function(e){ upd("kind_ort", e.target.value); }} /></div>
          </div>

          {/* Gericht */}
          <div style={{ fontSize:"10px", fontWeight:"bold", color:"#003366", textTransform:"uppercase", backgroundColor:"#e8f0fb", borderRadius:"5px", padding:"5px 8px", marginTop:"14px", marginBottom:"10px", letterSpacing:"0.5px" }}>⚖️ Zuständiges Gericht</div>
          <div style={{ display:"flex", gap:"8px", marginBottom:"8px", alignItems:"flex-end" }}>
            <div style={{ flex:1 }}>
              <label style={styles.label}>Amtsgericht</label>
              <input style={styles.input} placeholder="Wird automatisch ermittelt oder manuell eintragen" value={daten.gericht||""} onChange={function(e){ upd("gericht", e.target.value); }} />
            </div>
            <button onClick={ermittleGericht} disabled={gerichtSuche}
              style={{ padding:"10px 12px", backgroundColor: gerichtSuche ? "#aaa" : "#1565c0", color:"#fff", border:"none", borderRadius:"6px", cursor: gerichtSuche ? "not-allowed" : "pointer", fontWeight:"bold", fontSize:"11px", whiteSpace:"nowrap", marginBottom:"10px" }}>
              {gerichtSuche ? "⏳ Suche..." : "🔍 Per PLZ ermitteln"}
            </button>
          </div>
          {gerichtFehler && (
            <div style={{ fontSize:"11px", color: gerichtFehler.startsWith("✅") ? "#2e7d32" : "#856404", backgroundColor: gerichtFehler.startsWith("✅") ? "#e8f5e9" : "#fff9e6", borderRadius:"6px", padding:"6px 10px", marginBottom:"8px" }}>
              {gerichtFehler}
            </div>
          )}
          <div style={{ fontSize:"10px", color:"#888", marginBottom:"16px" }}>ℹ️ Zuständig ist das Amtsgericht am <strong>Hauptwohnsitz des Kindes</strong> (§ 152 FamFG).</div>

          <button onClick={absenden}
            style={{ width:"100%", padding:"14px", backgroundColor:"#003366", color:"#fff", border:"none", borderRadius:"10px", fontWeight:"bold", fontSize:"14px", cursor:"pointer", marginTop:"8px", marginBottom:"24px" }}>
            ✅ Angaben übermitteln
          </button>
        </div>
      </div>
    );
  }

  // ── Fallback: unbekannter Formulartyp ────────────────────
  return (
    <div style={{ textAlign:"center", padding:"60px 20px" }}>
      <img src={ISUV_LOGO} alt="ISUV" style={{ width:"120px", height:"auto", marginBottom:"20px" }} /><br/>
      <div style={{ fontSize:"13px", color:"#555" }}>Unbekannter Formulartyp: <strong>{formTyp}</strong></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
